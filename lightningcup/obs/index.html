<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="transparent" />
  <title>Lightning Cup OBS</title>

  <style>
    :root{
      --text:#ecf3ff;
      --panel-border:rgba(148,163,184,.22);
      --panel-fill:rgba(6,18,38,.96);
      --panel-fill-soft:rgba(255,255,255,.045);
      --player-one-rgb:96,165,250;
      --player-two-rgb:34,197,94;
      --danger-rgb:239,68,68;
      --shadow:0 28px 48px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    [hidden]{ display:none !important; }
    html,
    body{
      margin:0;
      min-height:100%;
      background:transparent;
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow:hidden;
    }
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:16px;
    }
    .obs-shell{
      width:min(1180px, calc(100vw - 32px));
      display:grid;
      gap:10px;
    }
    .obs-status{
      margin:0;
      padding:11px 14px;
      border-radius:14px;
      border:1px solid rgba(248,113,113,.32);
      background:rgba(127,29,29,.42);
      color:#fecaca;
      font-size:13px;
      font-weight:800;
      letter-spacing:.03em;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .obs-status.is-hidden{ display:none; }
    .obs-card{
      display:grid;
      gap:14px;
      padding:18px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.11);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 26%),
        linear-gradient(180deg, rgba(7,21,45,.95), rgba(3,12,25,.985));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .scoreboard-shell{
      display:grid;
      gap:8px;
    }
    .scoreboard-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) repeat(3, 64px) 84px;
      gap:8px;
      align-items:center;
      min-height:78px;
      padding:10px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      border-left:4px solid rgba(148,163,184,.72);
      background:var(--panel-fill-soft);
    }
    .scoreboard-row.is-player-one{ border-left-color:rgba(var(--player-one-rgb), .96); }
    .scoreboard-row.is-player-two{ border-left-color:rgba(var(--player-two-rgb), .92); }
    .scoreboard-player{
      min-width:0;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .scoreboard-seed{
      color:rgba(191,219,254,.94);
      font-size:13px;
      font-weight:900;
      line-height:1;
      font-variant-numeric:tabular-nums;
    }
    .scoreboard-name{
      min-width:0;
      color:#fff;
      font-size:21px;
      font-weight:950;
      letter-spacing:.03em;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
    }
    .scoreboard-score,
    .scoreboard-match-score{
      min-height:54px;
      display:grid;
      place-items:center;
      border-radius:10px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(2,6,23,.42);
      color:rgba(226,232,240,.96);
      font-size:22px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .scoreboard-score.is-won{
      color:#020617;
      border-color:transparent;
    }
    .scoreboard-score.is-won.is-player-one{ background:rgba(var(--player-one-rgb), .96); }
    .scoreboard-score.is-won.is-player-two{ background:rgba(var(--player-two-rgb), .92); }
    .scoreboard-match-score{
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:28px;
    }
    .scoreboard-match-score.is-won.is-player-one{
      color:rgb(var(--player-one-rgb));
      border-color:rgba(var(--player-one-rgb), .88);
    }
    .scoreboard-match-score.is-won.is-player-two{
      color:rgb(var(--player-two-rgb));
      border-color:rgba(var(--player-two-rgb), .88);
    }
    .course-board{
      display:grid;
      grid-template-columns:minmax(0, 3fr) minmax(156px, 1fr);
      gap:10px;
      align-items:stretch;
    }
    .course-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:10px;
    }
    .special-course-slot{
      display:grid;
    }
    .course-tile{
      min-height:80px;
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(255,255,255,.04);
      display:grid;
      justify-items:center;
      align-content:center;
      gap:5px;
      text-align:center;
    }
    .course-tile.is-picked{
      color:#020617;
      border-color:transparent;
    }
    .course-tile.is-picked.is-player-one{ background:rgba(var(--player-one-rgb), .96); }
    .course-tile.is-picked.is-player-two{ background:rgba(var(--player-two-rgb), .92); }
    .course-tile.is-picked.is-sudden-death{
      background:rgba(var(--danger-rgb), .92);
      color:#fff;
    }
    .course-tile.is-live{
      border-color:rgba(255,255,255,.82);
      box-shadow:0 0 0 2px rgba(255,255,255,.1);
    }
    .course-tile-name{
      color:inherit;
      font-size:14px;
      font-weight:950;
      letter-spacing:.07em;
      text-transform:uppercase;
      line-height:1.15;
    }
    .course-tile-meta{
      color:inherit;
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.82;
      line-height:1.1;
    }
    @media (max-width:820px){
      body{
        place-items:start center;
        overflow:auto;
        padding:12px;
      }
      .obs-shell{
        width:min(100%, 760px);
      }
      .obs-card{
        padding:14px;
        border-radius:24px;
      }
      .scoreboard-row{
        grid-template-columns:minmax(0,1fr) repeat(3, 44px) 56px;
        gap:6px;
        min-height:68px;
        padding:8px;
      }
      .scoreboard-name{ font-size:16px; }
      .scoreboard-score{ min-height:48px; font-size:18px; }
      .scoreboard-match-score{ min-height:48px; font-size:22px; }
      .course-board{
        grid-template-columns:1fr;
      }
      .course-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
      .special-course-slot{
        grid-template-columns:minmax(0, calc((100% - 10px) / 2));
        justify-content:center;
      }
    }
  </style>
</head>
<body>
  <main class="obs-shell">
    <p class="obs-status is-hidden" id="pageStatus"></p>

    <section class="obs-card" aria-label="Lightning Cup OBS match graphic">
      <div class="scoreboard-shell" aria-label="Lightning Cup match scoreboard">
        <div class="scoreboard-row is-player-one">
          <div class="scoreboard-player">
            <span class="scoreboard-seed" id="scoreboardTopSeed">TBD</span>
            <span class="scoreboard-name" id="scoreboardTopName">TBD</span>
          </div>
          <span class="scoreboard-score" id="scoreboardTopSet1">-</span>
          <span class="scoreboard-score" id="scoreboardTopSet2">-</span>
          <span class="scoreboard-score" id="scoreboardTopSet3">-</span>
          <span class="scoreboard-match-score" id="scoreboardTopMatch">0</span>
        </div>

        <div class="scoreboard-row is-player-two">
          <div class="scoreboard-player">
            <span class="scoreboard-seed" id="scoreboardBottomSeed">TBD</span>
            <span class="scoreboard-name" id="scoreboardBottomName">TBD</span>
          </div>
          <span class="scoreboard-score" id="scoreboardBottomSet1">-</span>
          <span class="scoreboard-score" id="scoreboardBottomSet2">-</span>
          <span class="scoreboard-score" id="scoreboardBottomSet3">-</span>
          <span class="scoreboard-match-score" id="scoreboardBottomMatch">0</span>
        </div>
      </div>

      <div class="course-board">
        <div class="course-grid" id="courseGrid" aria-label="Course grid"></div>
        <div class="special-course-slot" id="specialCourseSlot" aria-label="Special course"></div>
      </div>
    </section>
  </main>

  <script type="module" src="/lightningcup/obs/obs-page.js?v=20260410-compact"></script>
</body>
</html>
