<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <title>NSS Golf Community</title>

  <style>
    :root{
      --bg1:#061C3B; --bg2:#04142E; --bg3:#020B18;

      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);

      --text: #e9eef8;
      --title: #c7d7ff;
      --muted: #9ca3c7;

      --border-lite: rgba(148,163,184,0.20);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.10);
      --btn-border: rgba(255,255,255,0.15);
      --btn-border-hover: rgba(255,255,255,0.28);
    }

    *{ box-sizing:border-box; }
    html{
      background-color: var(--bg3);
    }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg3);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }

    .topbar{
      position: sticky; top:0; z-index:10;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(3,18,42,.70);
      backdrop-filter: blur(10px);
    }
    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{display:flex; gap:12px; align-items:center;}
    .home-badge{
      width:40px; height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
      display:grid; place-items:center;
      overflow:hidden;
      user-select:none;
    }
    .home-badge img{
      width:70%;
      height:70%;
      object-fit: contain;
      display:block;
      pointer-events:none;
    }

    .kicker{
      font-size:11px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color: rgba(255,255,255,.65);
      font-weight:900;
    }
    .page-nav-select{
      background: rgba(2,6,23,.85);
      color: inherit;
      border: 1px solid rgba(125,211,252,.35);
      border-radius: 10px;
      padding: 6px 32px 6px 10px;
      font: inherit;
      letter-spacing: inherit;
      text-transform: uppercase;
      max-width: min(56vw, 420px);
      cursor: pointer;
    }
    .page-nav-select:focus-visible{
      outline: 2px solid rgba(125,211,252,.6);
      outline-offset: 2px;
    }


    .container{
      max-width:1100px;
      margin:0 auto;
      padding: 28px 18px 56px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 18px;
    }

    .card{
      width: min(820px, 100%);
      background: var(--card-bg);
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .headline{
      font-size: 22px;
      font-weight: 950;
      color: var(--title);
      letter-spacing: .035em;
      text-transform: uppercase;
      margin: 0 0 10px 0;
    }

    .copy{
      margin: 0;
      color: rgba(233,238,248,0.92);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .actions{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content: center;
      padding-top: 6px;
    }

    .archive-card{
      text-align:center;
    }

    .archive-actions{
      display:flex;
      justify-content:center;
      padding-top: 4px;
    }

    .league-tabs{
      margin: 16px 0 0;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab-button{
      appearance:none;
      -webkit-appearance:none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: rgba(255,255,255,0.92);
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-size: 11px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height: 1;
      flex: 1 1 0;
      min-width: 160px;
    }

    .tab-button.is-active{
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.45);
      color: #fff;
    }

    .league-section{
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border-lite);
      text-align: center;
    }

    .league-section[hidden]{
      display: none;
    }

    .league-placeholder{
      margin: 0;
      font-size: 14px;
      color: rgba(233,238,248,0.72);
      font-weight: 600;
    }

    .btn{
      appearance:none;
      -webkit-appearance:none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: rgba(255,255,255,0.92);
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-size: 12px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      line-height: 1;
    }
    .btn.neon-red{
      color: #ff5a5a;
      border-color: rgba(255,90,90,0.9);
      box-shadow: 0 0 12px rgba(255,90,90,0.45), 0 0 24px rgba(255,90,90,0.2);
      text-shadow: 0 0 8px rgba(255,90,90,0.9);
    }
    .btn.neon-blue{
      color: #7dd3fc;
      border-color: rgba(125,211,252,0.9);
      box-shadow: 0 0 12px rgba(125,211,252,0.45), 0 0 24px rgba(125,211,252,0.2);
      text-shadow: 0 0 8px rgba(125,211,252,0.9);
    }
    .btn.neon-green{
      color: #5dff9c;
      border-color: rgba(93,255,156,0.9);
      box-shadow: 0 0 12px rgba(93,255,156,0.45), 0 0 24px rgba(93,255,156,0.2);
      text-shadow: 0 0 8px rgba(93,255,156,0.9);
    }
    .btn.neon-yellow{
      color: #f6ff6a;
      border-color: rgba(246,255,106,0.9);
      box-shadow: 0 0 12px rgba(246,255,106,0.45), 0 0 24px rgba(246,255,106,0.2);
      text-shadow: 0 0 8px rgba(246,255,106,0.9);
    }
    .btn.neon-purple{
      color: #d176ff;
      border-color: rgba(209,118,255,0.9);
      box-shadow: 0 0 12px rgba(209,118,255,0.45), 0 0 24px rgba(209,118,255,0.2);
      text-shadow: 0 0 8px rgba(209,118,255,0.9);
    }
    .btn.solid-teal{
      background: #14b8a6;
      border-color: rgba(20,184,166,0.95);
      color: #02111f;
      box-shadow: 0 12px 24px rgba(20,184,166,0.24);
      text-shadow: none;
    }
    .btn.solid-teal:hover{
      background: #2dd4bf;
      border-color: rgba(45,212,191,0.95);
      color: #02111f;
    }
    .btn.neon-gradient{
      border: 1px solid transparent;
      border-image: linear-gradient(90deg, #7dd3fc, #f6ff6a) 1;
      border-radius: 14px;
      background-image: linear-gradient(90deg, #7dd3fc, #f6ff6a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      box-shadow: 0 0 12px rgba(125,211,252,0.45), 0 0 24px rgba(246,255,106,0.2);
      filter: drop-shadow(0 0 6px rgba(125,211,252,0.5)) drop-shadow(0 0 8px rgba(246,255,106,0.35));
    }
    .btn-icon{
      width: 16px;
      height: 16px;
      display: block;
      fill: currentColor;
    }
    .btn-icon path{
      fill: currentColor;
    }
    .btn:hover{
      background: var(--btn-bg-hover);
      border-color: var(--btn-border-hover);
    }
    .discord-button{
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: .08em;
      line-height: 1;
      flex-shrink: 0;
    }
    .discord-button .btn-icon{
      width: 14px;
      height: 14px;
    }
    .home-discord-invite{
      display:flex;
      justify-content:flex-end;
      margin: 0 0 12px;
    }

    .footer{
      margin-top: 18px;
      text-align:center;
      font-size:12px;
      color: rgba(233,238,248,0.55);
    }

    @media (max-width: 760px){
      .container{ padding: 20px 12px 44px; }
      .topbar-inner{ padding: 12px 12px; flex-wrap: nowrap; }
      .brand{ flex: 1; min-width: 0; }
      .brand > div{ min-width: 0; }
      .page-nav-select{ width: min(100%, 420px); max-width: 100%; }
      .discord-button{ padding: 8px 10px; font-size: 10px; letter-spacing: .06em; }
      .discord-button .btn-icon{ width: 14px; height: 14px; }
      .home-discord-invite{ justify-content:center; }
      .headline{ font-size: 18px; }
      .card{ padding: 18px 14px; border-radius: 18px; }
      .league-tabs{
        display:grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .tab-button{
        min-width: 0;
      }
      .tab-button.tab-primary{
        grid-column: 1 / -1;
      }
      .league-section .actions{
        flex-direction: column;
        align-items: stretch;
        padding-left: 12px;
        padding-right: 12px;
      }
      .league-section .actions .btn{
        width: 100%;
        justify-content: center;
        text-align: center;
        min-height: 44px;
      }
      .archive-actions{
        padding-left: 12px;
        padding-right: 12px;
      }
      .archive-actions .btn{
        width: 100%;
        justify-content: center;
      }
    }
  </style>
  <link rel="stylesheet" href="/site-topbar.css" />
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="home-badge" aria-hidden="true">
          <img src="/logos/golf.png" alt="Home" loading="eager" decoding="async" />
        </div>
        <div>
                    <select class="kicker page-nav-select" aria-label="Select page" onchange="if (this.value) window.location.href=this.value;">
            <option value="/index.html" selected>Home</option>
            <option value="/worldopen/index.html">World Open</option>
            <option value="/proleague/index.html">Shotgun Pro League</option>
            <option value="/superleague/index.html">Super League</option>
            <option value="/lightningcup/index.html">Lightning Cup</option>
            <option value="/beataidan/index.html">Beat Aidan</option>
            <option value="/records.html">Records</option>
          </select>
        </div>
      </div>
      <a class="btn discord-button" href="https://discord.gg/VfTX9BwuTH" target="_blank" rel="noopener noreferrer" aria-label="Join our Discord">
        <img class="btn-icon" src="/logos/discord.svg" alt="" aria-hidden="true" />
        DISCORD
      </a>
    </div>
  </div>

  <div class="container">
    <div class="home-discord-invite">
      <a class="btn discord-button" href="https://discord.gg/VfTX9BwuTH" target="_blank" rel="noopener noreferrer" aria-label="Join our Discord">
        <img class="btn-icon" src="/logos/discord.svg" alt="" aria-hidden="true" />
        DISCORD
      </a>
    </div>

    <div class="card">
      <h1 class="headline">Leagues &amp; Events</h1>
      <div class="league-tabs" role="tablist" aria-label="League sections">
        <button class="tab-button tab-primary is-active" id="happening-now-tab" type="button" role="tab" aria-selected="true" aria-controls="happening-now-section" data-target="happening-now-section">
          Happening Now
        </button>
        <button class="tab-button" id="upcoming-tab" type="button" role="tab" aria-selected="false" aria-controls="upcoming-section" data-target="upcoming-section">
          Upcoming
        </button>
        <button class="tab-button" id="archive-tab" type="button" role="tab" aria-selected="false" aria-controls="archive-section" data-target="archive-section">
          Archive
        </button>
      </div>

      <div class="league-section" id="happening-now-section" aria-labelledby="happening-now-tab">
        <div class="actions">
          <a class="btn neon-red" href="https://teamupdiscord.com/leaderboard/client/DISCORD%7C1069003073311211601/leaderboard/Season_12/rating_type/player_global_all/format/global" target="_blank" rel="noopener noreferrer" aria-label="Open Ranked League Leaderboard">
            Ranked League - Season 12
          </a>

          <a class="btn neon-blue" href="/proleague" aria-label="Go to Pro League">
            2026 Shotgun Pro League
          </a>

          <a class="btn neon-purple" href="/superleague/index.html" aria-label="Go to Super League">
            Super League
          </a>

          <a class="btn neon-green" href="/worldopen" aria-label="Go to 2026 World Open">
            2026 World Open
          </a>

          <a class="btn neon-yellow" href="/lightningcup/index.html" aria-label="Go to 2026 Lightning Cup">
            2026 Lightning Cup
          </a>
        </div>
      </div>

      <div class="league-section" id="upcoming-section" aria-labelledby="upcoming-tab" hidden>
        <p class="league-placeholder">Nothing here... yet.</p>
      </div>

      <div class="league-section" id="archive-section" aria-labelledby="archive-tab" hidden>
        <p class="league-placeholder">Nothing here... yet.</p>
      </div>

      <div class="footer">NSS Golf Community Events</div>
    </div>
    <div class="card archive-card">
      <h2 class="headline">Archives</h2>
      <span class="archive-actions">
        <a class="btn solid-teal" href="/records.html" aria-label="Go to NSS Golf Records">
          NSS Golf Records
        </a>
      </span>
    </div>
  </div>

  <script>
    const leagueTabs = Array.from(document.querySelectorAll(".league-tabs .tab-button[data-target]"));
    const leagueSections = Array.from(document.querySelectorAll("#happening-now-section, #upcoming-section, #archive-section"));

    function setActiveLeagueTab(targetId){
      for(const section of leagueSections){
        const isActive = section.id === targetId;
        section.hidden = !isActive;
        section.setAttribute("aria-hidden", isActive ? "false" : "true");
      }
      for(const tab of leagueTabs){
        const isActive = tab.dataset.target === targetId;
        tab.classList.toggle("is-active", isActive);
        tab.setAttribute("aria-selected", isActive ? "true" : "false");
      }
    }

    function initLeagueTabs(){
      if(!leagueTabs.length) return;
      const targetIds = new Set(leagueSections.map(section => section.id));
      const initial = leagueTabs.find(tab => tab.classList.contains("is-active") && targetIds.has(tab.dataset.target))
        || leagueTabs.find(tab => targetIds.has(tab.dataset.target))
        || null;

      if(initial?.dataset.target){
        setActiveLeagueTab(initial.dataset.target);
      }

      for(const tab of leagueTabs){
        if(!targetIds.has(tab.dataset.target)) continue;
        tab.addEventListener("click", (event) => {
          event.preventDefault();
          setActiveLeagueTab(tab.dataset.target);
        });
      }
    }

    initLeagueTabs();
  </script>
  <script type="module" src="/site-topbar.js"></script>
</body>
</html>
