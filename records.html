<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <title>NSS Golf Records</title>

  <style>
    :root{
      --bg1:#061C3B; --bg2:#04142E; --bg3:#020B18;
      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);
      --text: #e9eef8;
      --title: #c7d7ff;
      --muted: #9ca3c7;
      --border-lite: rgba(148,163,184,0.20);
      --panel-bg: rgba(6,24,46,0.72);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.10);
      --btn-border: rgba(255,255,255,0.15);
      --btn-border-hover: rgba(255,255,255,0.28);
    }

    *{ box-sizing:border-box; }
    html{ background-color: var(--bg3); }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg3);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }

    .topbar{
      position: sticky; top:0; z-index:10;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(3,18,42,.70);
      backdrop-filter: blur(10px);
    }
    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{display:flex; gap:12px; align-items:center;}
    .home-badge,
    .home-btn{
      width:40px; height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
      display:grid; place-items:center;
      overflow:hidden;
      user-select:none;
      flex-shrink:0;
    }
    .home-badge img,
    .home-btn img{
      width:70%;
      height:70%;
      object-fit: contain;
      display:block;
      pointer-events:none;
    }
    .kicker{
      font-size:11px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color: rgba(255,255,255,.65);
      font-weight:900;
    }
    .page-nav-select{
      background: rgba(2,6,23,.85);
      color: inherit;
      border: 1px solid rgba(125,211,252,.35);
      border-radius: 10px;
      padding: 6px 32px 6px 10px;
      font: inherit;
      letter-spacing: inherit;
      text-transform: uppercase;
      max-width: min(56vw, 420px);
      cursor: pointer;
    }
    .page-nav-select:focus-visible{
      outline: 2px solid rgba(125,211,252,.6);
      outline-offset: 2px;
    }

    .btn{
      appearance:none;
      -webkit-appearance:none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: rgba(255,255,255,0.92);
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-size: 12px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      line-height: 1;
    }
    .btn:hover{
      background: var(--btn-bg-hover);
      border-color: var(--btn-border-hover);
    }
    .discord-button{
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: .08em;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-icon{
      width: 14px;
      height: 14px;
      display:block;
      fill: currentColor;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
      padding: 28px 18px 56px;
    }
    .card{
      width: 100%;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .headline{
      font-size: 24px;
      font-weight: 950;
      color: var(--title);
      letter-spacing: .035em;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      text-align:center;
    }
    .status{
      margin: 18px 0 0;
      min-height: 22px;
      color: rgba(233,238,248,0.72);
      font-size: 13px;
      font-weight: 800;
      text-align:center;
    }
    .status[hidden]{
      display:none;
    }

    .records-tabs-root{
      width:100%;
      margin-top: 14px;
    }
    .records-tabs-list{
      width:100%;
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:0;
      padding:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.24);
      border-radius:0;
      background: transparent;
    }
    .records-tabs-trigger{
      position:relative;
      min-height:35px;
      border:0;
      border-radius:0;
      background: transparent;
      color: rgba(233,238,248,.86);
      padding:6px 8px 7px;
      text-align:center;
      line-height:1.2;
      font: inherit;
      font-size:11px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      appearance:none;
      cursor:pointer;
      transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .records-tabs-trigger-label{
      display:block;
      width:100%;
      text-align:center;
    }
    .records-tabs-trigger::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      border-radius:0;
      background: transparent;
      transition: background-color 140ms ease;
    }
    .records-tabs-trigger:hover{
      background: rgba(148,163,184,.10);
      color: rgba(255,255,255,.95);
    }
    .records-tabs-trigger[data-state="active"]{
      background: rgba(79,70,229,.12);
      color:#f4faff;
    }
    .records-tabs-trigger[data-state="active"]::after{
      background: rgba(79,70,229,.92);
    }
    .records-tabs-trigger:focus-visible{
      outline:none;
      box-shadow: inset 0 0 0 1px rgba(79,70,229,.56);
    }
    .records-tabs-content[data-state="inactive"]{
      display:none;
    }

    .records-grid{
      margin-top: 22px;
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items:start;
    }
    .record-section{
      min-width: 0;
      border: 1px solid var(--border-lite);
      background: var(--panel-bg);
      border-radius: 16px;
      overflow:hidden;
    }
    .record-section-toggle{
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      border:0;
      background:transparent;
      color:inherit;
      padding: 14px 42px 14px 14px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      position:relative;
      cursor:pointer;
      text-align:left;
    }
    .record-section-toggle:hover{
      background: rgba(255,255,255,0.05);
    }
    .record-section-toggle:disabled{
      opacity: 1;
    }
    .record-section-toggle:focus-visible{
      outline: 2px solid rgba(125,211,252,.6);
      outline-offset: -2px;
    }
    .record-section-title{
      margin: 0;
      color: var(--title);
      font-size: 16px;
      font-weight: 950;
      letter-spacing: .10em;
      text-transform: uppercase;
      text-align:left;
    }
    .record-chevron{
      width: 10px;
      height: 10px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      color: rgba(199,215,255,0.86);
      position:absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-65%) rotate(45deg);
      transition: transform 160ms ease;
    }
    .record-section-toggle[aria-expanded="true"] .record-chevron{
      transform: translateY(-35%) rotate(225deg);
    }
    .record-section-body{
      padding: 0 14px 14px;
      border-top: 1px solid rgba(255,255,255,0.10);
    }
    .record-section-body[hidden]{
      display:none;
    }
    .role-group{
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.10);
    }
    .role-group:first-child{
      border-top: 0;
      padding-top: 0;
    }
    .role-title{
      margin: 0;
      color: rgba(255,255,255,0.95);
      font-size: 13px;
      font-weight: 950;
      letter-spacing: .06em;
      text-transform: uppercase;
      overflow-wrap:anywhere;
    }
    .role-title-row{
      margin: 0 0 8px;
      display:flex;
      align-items:center;
      gap: 8px;
      min-width:0;
    }
    .role-title-text{
      min-width:0;
      flex: 0 1 auto;
    }
    .role-count-badge{
      height: 1.55em;
      min-width: 2.7em;
      padding: 0 7px;
      border: 1px solid rgba(148,163,184,0.24);
      border-radius: 999px;
      background: rgba(2,6,23,0.78);
      color: rgba(226,232,240,0.82);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 4px;
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0;
      line-height: 1;
      flex: 0 0 auto;
      box-shadow: inset 0 0 10px rgba(255,255,255,0.025);
    }
    .role-count-value{
      display:inline-flex;
      align-items:center;
      height: 1em;
      line-height:1;
    }
    .role-count-icon{
      width: 11px;
      height: 11px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex: 0 0 auto;
      transform: translateY(-0.5px);
    }
    .member-list{
      list-style:none;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }
    .member-row{
      min-width:0;
    }
    .member-link{
      display:flex;
      align-items:center;
      gap: 10px;
      width:100%;
      min-width:0;
      color: rgba(233,238,248,0.92);
      font-size: 13px;
      font-weight: 800;
      text-decoration:none;
      border-radius: 10px;
      padding: 3px 4px;
      margin: -3px -4px;
    }
    .member-link:hover{
      background: rgba(255,255,255,0.06);
      color:#fff;
    }
    .member-link:focus-visible{
      outline: 2px solid rgba(125,211,252,.6);
      outline-offset: 2px;
    }
    .member-avatar{
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }
    .member-name{
      min-width: 0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .empty-role{
      margin: 0;
      color: rgba(233,238,248,0.54);
      font-size: 12px;
      font-weight: 700;
    }

    @media (min-width: 761px){
      .record-section-toggle{
        cursor: default;
        pointer-events: none;
        padding-right: 14px;
      }
      .record-section-toggle:hover{
        background: transparent;
      }
      .record-chevron{
        display:none;
      }
      .record-section-body[hidden]{
        display:block;
      }
    }

    @media (max-width: 900px){
      .records-grid{
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px){
      .container{ padding: 20px 12px 44px; }
      .topbar-inner{ padding: 12px 12px; flex-wrap: nowrap; }
      .brand{ flex: 1; min-width: 0; }
      .brand > div{ min-width: 0; }
      .page-nav-select{ width: min(100%, 420px); max-width: 100%; }
      .discord-button{ padding: 8px 10px; font-size: 10px; letter-spacing: .06em; }
      .headline{ font-size: 20px; }
      .card{ padding: 18px 14px; border-radius: 18px; }
    }
  </style>
  <link rel="stylesheet" href="/site-topbar.css" />
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="home-btn" href="/index.html" aria-label="Home">
          <img src="/logos/golf.png" alt="Home" loading="eager" decoding="async" />
        </a>
        <div>
          <select class="kicker page-nav-select" aria-label="Select page" onchange="if (this.value) window.location.href=this.value;">
            <option value="/index.html">Home</option>
            <option value="/noptational.html">The Noptational</option>
            <option value="/worldopen/index.html">World Open</option>
            <option value="/proleague/index.html">Shotgun Pro League</option>
            <option value="/superleague/index.html">Super League</option>
            <option value="/lightningcup/index.html">Lightning Cup</option>
            <option value="/beataidan/index.html">Beat Aidan</option>
            <option value="/records.html" selected>Records</option>
          </select>
        </div>
      </div>
      <a class="btn discord-button" href="https://discord.gg/VfTX9BwuTH" target="_blank" rel="noopener noreferrer" aria-label="Join our Discord">
        <img class="btn-icon" src="/logos/discord.svg" alt="" aria-hidden="true" />
        DISCORD
      </a>
    </div>
  </div>

  <main class="container">
    <section class="card" aria-labelledby="records-title">
      <h1 class="headline" id="records-title">NSS Golf Records</h1>
      <div class="records-tabs-root" id="records-tabs-root">
        <div class="records-tabs-list" role="tablist" aria-label="Records views">
          <button class="records-tabs-trigger" id="records-tab-personal-bests" type="button" role="tab" data-records-tab="qualified-personal-bests" aria-controls="records-panel-personal-bests">
            <span class="records-tabs-trigger-label">Qualified Personal Bests</span>
          </button>
          <button class="records-tabs-trigger" id="records-tab-global-ranks" type="button" role="tab" data-records-tab="global-ranks" aria-controls="records-panel-global-ranks">
            <span class="records-tabs-trigger-label">(Unofficial) Global Ranks</span>
          </button>
        </div>
        <div class="status" id="records-status" hidden></div>
        <div class="records-tabs-content" id="records-panel-personal-bests" role="tabpanel" data-records-panel="qualified-personal-bests" aria-labelledby="records-tab-personal-bests">
          <div class="records-grid" id="records-grid" aria-live="polite"></div>
        </div>
        <div class="records-tabs-content" id="records-panel-global-ranks" role="tabpanel" data-records-panel="global-ranks" aria-labelledby="records-tab-global-ranks">
          <div class="records-grid" id="global-ranks-grid" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { createBrowserSupabaseClient } from "/auth/supabase-auth.js";
    import { GLOBAL_RANKS_NO_CS, GLOBAL_RANKS_WITH_CS } from "/settings-data.js";

    const RECORD_GROUPS = [
      {
        title: "18-hole",
        roleIds: [
          "1466897504334516257",
          "1279498515776540796",
          "1279498415444856864",
          "1279498113886982225",
          "1279497781454569563",
          "1279497671815725137",
          "1279496346960789597",
        ],
      },
      {
        title: "9-hole",
        roleIds: [
          "1279496097328398438",
          "1279495906089111573",
          "1279495694578614455",
          "1279495547727909005",
        ],
      },
      {
        title: "Global",
        roleIds: [
          "1247012004028354620",
          "1095534496570425354",
          "1077315124613890139",
          "1279487297246462064",
        ],
      },
    ];

    const GLOBAL_RANK_GROUPS = [
      { title: "Current", key: "current_global_rank", rankOrder: GLOBAL_RANKS_WITH_CS },
      { title: "Max (no CS)", key: "max_global_rank_no_cs", rankOrder: GLOBAL_RANKS_NO_CS },
      { title: "Max (CS)", key: "max_global_rank_cs", rankOrder: GLOBAL_RANKS_WITH_CS },
    ];
    const DEFAULT_RECORDS_TAB = "qualified-personal-bests";
    const VALID_RECORDS_TABS = new Set([DEFAULT_RECORDS_TAB, "global-ranks"]);

    const supabase = createBrowserSupabaseClient();
    const statusEl = document.getElementById("records-status");
    const gridEl = document.getElementById("records-grid");
    const globalRanksGridEl = document.getElementById("global-ranks-grid");
    const desktopRecordsQuery = window.matchMedia("(min-width: 761px)");
    const tabButtons = [...document.querySelectorAll("[data-records-tab]")];
    const tabPanels = [...document.querySelectorAll("[data-records-panel]")];

    function cleanRoleName(name){
      const clean = String(name || "")
        .replace(/^[^A-Za-z0-9\-−–—]+/, "")
        .replace(/\s+/g, " ")
        .trim();
      return clean || "Record title unavailable";
    }

    function avatarUrlFor(member){
      return member?.server_avatar_url || member?.avatar_url || "/logos/golf.png";
    }

    function playerNameFor(member){
      return member?.display_name || member?.username || member?.discord_user_id || "Player";
    }

    function getRecordsTabFromUrl(){
      const params = new URLSearchParams(window.location.search);
      const view = params.get("view") || params.get("tab") || DEFAULT_RECORDS_TAB;
      return VALID_RECORDS_TABS.has(view) ? view : DEFAULT_RECORDS_TAB;
    }

    function setRecordsTab(tab, options = {}){
      const nextTab = VALID_RECORDS_TABS.has(tab) ? tab : DEFAULT_RECORDS_TAB;
      for(const button of tabButtons){
        const isActive = button.dataset.recordsTab === nextTab;
        button.dataset.state = isActive ? "active" : "inactive";
        button.setAttribute("aria-selected", isActive ? "true" : "false");
        button.tabIndex = isActive ? 0 : -1;
      }

      for(const panel of tabPanels){
        const isActive = panel.dataset.recordsPanel === nextTab;
        panel.dataset.state = isActive ? "active" : "inactive";
        panel.hidden = !isActive;
      }

      if(options.updateUrl){
        const url = new URL(window.location.href);
        url.searchParams.set("view", nextTab);
        window.history.pushState({ recordsView: nextTab }, "", url);
      }
      syncRecordsLayout();
    }

    function focusTabAt(index){
      const nextButton = tabButtons[index];
      if(!nextButton) return;
      setRecordsTab(nextButton.dataset.recordsTab, { updateUrl: true });
      nextButton.focus();
    }

    for(const [index, button] of tabButtons.entries()){
      button.addEventListener("click", () => setRecordsTab(button.dataset.recordsTab, { updateUrl: true }));
      button.addEventListener("keydown", (event) => {
        if(event.key === "ArrowRight"){
          event.preventDefault();
          focusTabAt((index + 1) % tabButtons.length);
        }else if(event.key === "ArrowLeft"){
          event.preventDefault();
          focusTabAt((index - 1 + tabButtons.length) % tabButtons.length);
        }else if(event.key === "Home"){
          event.preventDefault();
          focusTabAt(0);
        }else if(event.key === "End"){
          event.preventDefault();
          focusTabAt(tabButtons.length - 1);
        }
      });
    }

    window.addEventListener("popstate", () => setRecordsTab(getRecordsTabFromUrl()));

    function createPlayerCountBadge(count){
      const badge = document.createElement("span");
      badge.className = "role-count-badge";
      badge.setAttribute("aria-label", `${count} ${count === 1 ? "player" : "players"}`);

      const icon = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      icon.classList.add("role-count-icon");
      icon.setAttribute("viewBox", "0 0 24 24");
      icon.setAttribute("aria-hidden", "true");

      const head = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      head.setAttribute("cx", "12");
      head.setAttribute("cy", "8");
      head.setAttribute("r", "4");

      const shoulders = document.createElementNS("http://www.w3.org/2000/svg", "path");
      shoulders.setAttribute("d", "M4 21c1.8-4 4.4-6 8-6s6.2 2 8 6");

      icon.append(head, shoulders);

      const value = document.createElement("span");
      value.className = "role-count-value";
      value.textContent = String(count);

      badge.append(icon, value);
      return badge;
    }

    function slugifyId(value, fallback = "section"){
      return String(value || fallback).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || fallback;
    }

    function getRecordGrids(){
      return [gridEl, globalRanksGridEl].filter(Boolean);
    }

    function syncRecordsLayout(){
      const isDesktop = desktopRecordsQuery.matches;
      for(const grid of getRecordGrids()){
        grid.querySelectorAll(".record-section-toggle").forEach((toggle) => {
          const bodyId = toggle.getAttribute("aria-controls");
          const body = bodyId ? document.getElementById(bodyId) : null;
          if(!body) return;

          if(isDesktop){
            toggle.setAttribute("aria-expanded", "true");
            toggle.disabled = true;
            body.hidden = false;
            return;
          }

          toggle.disabled = false;
          toggle.setAttribute("aria-expanded", "false");
          body.hidden = true;
        });
      }
    }

    function createRecordSection(titleText, idPrefix){
      const section = document.createElement("section");
      section.className = "record-section";

      const sectionId = `${idPrefix}-section-${slugifyId(titleText)}`;
      const bodyId = `${sectionId}-body`;

      const toggle = document.createElement("button");
      toggle.className = "record-section-toggle";
      toggle.type = "button";
      toggle.setAttribute("aria-expanded", "false");
      toggle.setAttribute("aria-controls", bodyId);

      const title = document.createElement("span");
      title.className = "record-section-title";
      title.textContent = titleText;
      const chevron = document.createElement("span");
      chevron.className = "record-chevron";
      chevron.setAttribute("aria-hidden", "true");
      toggle.append(title, chevron);
      section.appendChild(toggle);

      const body = document.createElement("div");
      body.className = "record-section-body";
      body.id = bodyId;
      body.hidden = true;
      toggle.addEventListener("click", () => {
        if(desktopRecordsQuery.matches) return;
        const isExpanded = toggle.getAttribute("aria-expanded") === "true";
        toggle.setAttribute("aria-expanded", isExpanded ? "false" : "true");
        body.hidden = isExpanded;
      });

      section.appendChild(body);
      return { section, body };
    }

    function createMemberList(members){
      const list = document.createElement("ul");
      list.className = "member-list";

      for(const member of members){
        const item = document.createElement("li");
        item.className = "member-row";

        const link = document.createElement("a");
        link.className = "member-link";
        link.href = `/player.html?id=${encodeURIComponent(member.discord_user_id)}`;
        link.setAttribute("aria-label", `View ${playerNameFor(member)} profile`);

        const avatar = document.createElement("img");
        avatar.className = "member-avatar";
        avatar.src = avatarUrlFor(member);
        avatar.alt = "";
        avatar.loading = "lazy";
        avatar.decoding = "async";
        avatar.referrerPolicy = "no-referrer";

        const name = document.createElement("span");
        name.className = "member-name";
        name.textContent = playerNameFor(member);

        link.append(avatar, name);
        item.appendChild(link);
        list.appendChild(item);
      }

      return list;
    }

    function createRoleGroup(titleText, members){
      const roleGroup = document.createElement("div");
      roleGroup.className = "role-group";

      const roleTitle = document.createElement("h3");
      roleTitle.className = "role-title role-title-row";

      const roleTitleText = document.createElement("span");
      roleTitleText.className = "role-title-text";
      roleTitleText.textContent = titleText;

      roleTitle.append(roleTitleText, createPlayerCountBadge(members.length));
      roleGroup.appendChild(roleTitle);

      if(!members.length){
        const empty = document.createElement("p");
        empty.className = "empty-role";
        empty.textContent = "No players.";
        roleGroup.appendChild(empty);
      }else{
        roleGroup.appendChild(createMemberList(members));
      }

      return roleGroup;
    }

    function sortMembersByName(members){
      return [...members].sort((a, b) => playerNameFor(a).localeCompare(playerNameFor(b), undefined, { sensitivity: "base" }));
    }

    function renderRecords(groups, rolesById, linksByRoleId, membersById){
      gridEl.innerHTML = "";
      const fragment = document.createDocumentFragment();

      for(const group of groups){
        const { section, body } = createRecordSection(group.title, "records");

        for(const roleId of group.roleIds){
          const role = rolesById.get(roleId);
          const links = linksByRoleId.get(roleId) || [];
          const members = sortMembersByName(links.map(link => membersById.get(link.discord_user_id)).filter(Boolean));

          body.appendChild(createRoleGroup(cleanRoleName(role?.name), members));
        }

        fragment.appendChild(section);
      }

      gridEl.appendChild(fragment);
      syncRecordsLayout();
    }

    function normalizeRankValue(value){
      return String(value || "").trim();
    }

    function getOrderedRankValues(settingsRows, key, rankOrder){
      const rankOrderMap = new Map(rankOrder.map((rank, index) => [rank, index]));
      const values = [...new Set(settingsRows.map(row => normalizeRankValue(row[key])).filter(Boolean))];
      return values.sort((left, right) => {
        const leftIndex = rankOrderMap.has(left) ? rankOrderMap.get(left) : -1;
        const rightIndex = rankOrderMap.has(right) ? rankOrderMap.get(right) : -1;
        if(leftIndex !== rightIndex) return rightIndex - leftIndex;
        return right.localeCompare(left, undefined, { numeric: true, sensitivity: "base" });
      });
    }

    function renderGlobalRanks(settingsRows, membersById){
      globalRanksGridEl.innerHTML = "";
      const rowsWithMembers = settingsRows
        .map(row => ({ ...row, member: membersById.get(row.discord_user_id) }))
        .filter(row => row.member);
      const fragment = document.createDocumentFragment();

      for(const group of GLOBAL_RANK_GROUPS){
        const { section, body } = createRecordSection(group.title, "global-ranks");
        const rankValues = getOrderedRankValues(rowsWithMembers, group.key, group.rankOrder);

        if(!rankValues.length){
          const empty = document.createElement("p");
          empty.className = "empty-role";
          empty.textContent = "No players.";
          body.appendChild(empty);
        }

        for(const rank of rankValues){
          const members = sortMembersByName(
            rowsWithMembers
              .filter(row => normalizeRankValue(row[group.key]) === rank)
              .map(row => row.member)
          );
          body.appendChild(createRoleGroup(rank, members));
        }

        fragment.appendChild(section);
      }

      globalRanksGridEl.appendChild(fragment);
      syncRecordsLayout();
    }

    desktopRecordsQuery.addEventListener("change", syncRecordsLayout);
    setRecordsTab(getRecordsTabFromUrl());

    async function loadRecords(){
      const roleIds = RECORD_GROUPS.flatMap(group => group.roleIds);

      const [rolesRes, linksRes] = await Promise.all([
        supabase
          .from("discord_roles")
          .select("role_id,name,position")
          .in("role_id", roleIds),
        supabase
          .from("discord_member_roles")
          .select("role_id,discord_user_id")
          .in("role_id", roleIds),
      ]);

      if(rolesRes.error) throw rolesRes.error;
      if(linksRes.error) throw linksRes.error;

      const memberIds = [...new Set((linksRes.data || []).map(row => row.discord_user_id).filter(Boolean))];
      let members = [];
      if(memberIds.length){
        const membersRes = await supabase
          .from("discord_guild_members")
          .select("discord_user_id,username,display_name,avatar_url,server_avatar_url")
          .in("discord_user_id", memberIds)
          .eq("is_current_member", true);
        if(membersRes.error) throw membersRes.error;
        members = membersRes.data || [];
      }

      const rolesById = new Map((rolesRes.data || []).map(role => [role.role_id, role]));
      const missingRoleIds = roleIds.filter(roleId => !rolesById.has(roleId));
      if(missingRoleIds.length){
        console.warn("Missing discord_roles rows for record role IDs.", missingRoleIds);
      }
      const membersById = new Map(members.map(member => [member.discord_user_id, member]));
      const linksByRoleId = new Map();

      for(const link of linksRes.data || []){
        if(!linksByRoleId.has(link.role_id)) linksByRoleId.set(link.role_id, []);
        linksByRoleId.get(link.role_id).push(link);
      }

      renderRecords(RECORD_GROUPS, rolesById, linksByRoleId, membersById);
    }

    async function loadGlobalRanks(){
      const settingsRes = await supabase
        .from("player_settings")
        .select("discord_user_id,current_global_rank,max_global_rank_no_cs,max_global_rank_cs");

      if(settingsRes.error) throw settingsRes.error;

      const settingsRows = (settingsRes.data || [])
        .map(row => ({
          ...row,
          discord_user_id: String(row.discord_user_id || "").trim(),
          current_global_rank: normalizeRankValue(row.current_global_rank),
          max_global_rank_no_cs: normalizeRankValue(row.max_global_rank_no_cs),
          max_global_rank_cs: normalizeRankValue(row.max_global_rank_cs),
        }))
        .filter(row => row.discord_user_id && GLOBAL_RANK_GROUPS.some(group => row[group.key]));

      const memberIds = [...new Set(settingsRows.map(row => row.discord_user_id))];
      let members = [];
      if(memberIds.length){
        const membersRes = await supabase
          .from("discord_guild_members")
          .select("discord_user_id,username,display_name,avatar_url,server_avatar_url")
          .in("discord_user_id", memberIds)
          .eq("is_current_member", true);
        if(membersRes.error) throw membersRes.error;
        members = membersRes.data || [];
      }

      const membersById = new Map(members.map(member => [member.discord_user_id, member]));
      renderGlobalRanks(settingsRows, membersById);
    }

    async function loadAllRecords(){
      await Promise.all([loadRecords(), loadGlobalRanks()]);
    }

    loadAllRecords().catch(error => {
      console.error(error);
      statusEl.hidden = false;
      statusEl.textContent = `Unable to load records: ${error?.message || "Unknown error"}`;
    });
  </script>
  <script type="module" src="/site-topbar.js"></script>
</body>
