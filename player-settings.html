<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player Settings | NSS Golf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;950&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site-topbar.css" />
  <link rel="stylesheet" href="/settings-page.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="settings-brand">
        <a class="settings-home-btn" href="/index.html" aria-label="NSS Golf home">
          <img src="/logos/golf.png" alt="" />
        </a>
        <div class="topbar-page-title" aria-label="Player Settings">
          <svg class="topbar-page-title-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span>Player Settings</span>
        </div>
      </div>
    </div>
  </header>

  <main class="settings-main">
    <section class="settings-card" aria-labelledby="settings-title">
      <h1 class="settings-title" id="settings-title">Player Settings</h1>
      <p class="settings-copy">These optional details appear on your public player page. Global ranks are self-reported and unofficial.</p>

      <form class="settings-form" id="playerSettingsForm" hidden>
        <label class="settings-field">
          <span class="settings-label">Custom Player URL</span>
          <span class="settings-input-wrap">
            <span class="settings-url-input">
              <span class="settings-url-prefix">https://nssgolf.com/</span>
              <input class="settings-input settings-url-slug-input" id="customUrlSlug" name="custom_url_slug" type="text" inputmode="url" autocomplete="off" spellcheck="false" placeholder="your-name" maxlength="48" />
            </span>
            <span class="url-status-icon" id="customUrlStatusIcon" hidden aria-live="polite"></span>
          </span>
        </label>
        <div class="settings-grid settings-grid-profile">
          <label class="settings-field">
            <span class="settings-label">Primary Country</span>
            <select class="settings-select" id="country1" name="country_1"></select>
          </label>
          <label class="settings-field">
            <span class="settings-label">Secondary Country</span>
            <select class="settings-select" id="country2" name="country_2"></select>
          </label>
          <label class="settings-field">
            <span class="settings-label">Time zone</span>
            <select class="settings-select" id="timeZone" name="time_zone"></select>
          </label>
        </div>
        <div class="settings-grid settings-grid-ranks">
          <label class="settings-field">
            <span class="settings-label">Current Global Rank</span>
            <select class="settings-select" id="currentRank" name="current_global_rank"></select>
          </label>
          <label class="settings-field">
            <span class="settings-label">Maximum Global Rank (no cloud saves)</span>
            <select class="settings-select" id="maxRankNoCs" name="max_global_rank_no_cs"></select>
          </label>
          <label class="settings-field">
            <span class="settings-label">Maximum Global Rank (with cloud saves)</span>
            <select class="settings-select" id="maxRankCs" name="max_global_rank_cs"></select>
          </label>
        </div>
        <div class="settings-actions">
          <button class="settings-button" id="saveSettingsBtn" type="submit">Save Settings</button>
        </div>
      </form>

      <div class="settings-actions" id="loginActions" hidden>
        <button class="settings-button" id="loginBtn" type="button">Log In With Discord</button>
      </div>
      <p class="settings-status" id="settingsStatus" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="/site-topbar.js"></script>
  <script type="module">
    import { buildAuthRedirectTo, createBrowserSupabaseClient } from "/auth/supabase-auth.js";
    import {
      buildCountryOptions,
      buildTimeZoneOptions,
      GLOBAL_RANKS,
      normalizePlayerUrlSlug,
      playerUrlSlugError,
    } from "/settings-data.js";

    const supabase = createBrowserSupabaseClient();
    const form = document.getElementById("playerSettingsForm");
    const loginActions = document.getElementById("loginActions");
    const loginBtn = document.getElementById("loginBtn");
    const saveBtn = document.getElementById("saveSettingsBtn");
    const statusEl = document.getElementById("settingsStatus");
    const customUrlSlug = document.getElementById("customUrlSlug");
    const customUrlStatusIcon = document.getElementById("customUrlStatusIcon");
    const country1 = document.getElementById("country1");
    const country2 = document.getElementById("country2");
    const timeZone = document.getElementById("timeZone");
    const currentRank = document.getElementById("currentRank");
    const maxRankNoCs = document.getElementById("maxRankNoCs");
    const maxRankCs = document.getElementById("maxRankCs");
    let currentUser = null;
    let currentDiscordId = "";
    let currentCustomUrl = null;

    function normalizeText(value){
      return String(value || "").trim();
    }

    function normalizeDiscordId(value){
      return normalizeText(value).replace(/[^\d]/g, "");
    }

    function getDiscordIdentity(user){
      const identities = Array.isArray(user?.identities) ? user.identities : [];
      return identities.find(identity => normalizeText(identity?.provider).toLowerCase() === "discord") || null;
    }

    function getDiscordIdFromUser(user){
      const identity = getDiscordIdentity(user);
      return normalizeDiscordId(
        identity?.provider_id ||
        identity?.identity_data?.provider_id ||
        identity?.identity_data?.sub ||
        identity?.identity_data?.id ||
        user?.user_metadata?.provider_id ||
        user?.user_metadata?.sub
      );
    }

    function setStatus(message, tone = ""){
      statusEl.textContent = message || "";
      statusEl.className = `settings-status ${tone}`.trim();
    }

    function addBlankOption(select, label = "Not selected"){
      const option = document.createElement("option");
      option.value = "";
      option.textContent = label;
      select.appendChild(option);
    }

    function fillSelect(select, options, blankLabel = "Not selected"){
      select.replaceChildren();
      addBlankOption(select, blankLabel);
      for(const optionData of options){
        const option = document.createElement("option");
        option.value = optionData.value || optionData.code || optionData.timeZone || "";
        option.textContent = optionData.label;
        select.appendChild(option);
      }
    }

    function fillRankSelect(select){
      select.replaceChildren();
      addBlankOption(select);
      for(const rank of GLOBAL_RANKS){
        const option = document.createElement("option");
        option.value = rank;
        option.textContent = rank;
        select.appendChild(option);
      }
    }

    function setSelectValue(select, value){
      select.value = normalizeText(value);
      if(select.value !== normalizeText(value)) select.value = "";
    }

    function readOptional(select){
      return normalizeText(select.value) || null;
    }

    function setCustomUrlStatus(status){
      const cleanStatus = normalizeText(status).toLowerCase();
      customUrlStatusIcon.className = `url-status-icon ${cleanStatus}`.trim();

      if(cleanStatus === "pending"){
        customUrlStatusIcon.hidden = false;
        customUrlStatusIcon.dataset.tooltip = "Pending admin approval";
        customUrlStatusIcon.setAttribute("aria-label", "Pending admin approval");
        customUrlStatusIcon.tabIndex = 0;
        customUrlStatusIcon.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 6v6l4 2"></path>
          </svg>
        `;
        return;
      }

      if(cleanStatus === "approved"){
        customUrlStatusIcon.hidden = false;
        customUrlStatusIcon.dataset.tooltip = "Approved";
        customUrlStatusIcon.setAttribute("aria-label", "Approved");
        customUrlStatusIcon.tabIndex = 0;
        customUrlStatusIcon.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        `;
        return;
      }

      customUrlStatusIcon.hidden = true;
      customUrlStatusIcon.removeAttribute("data-tooltip");
      customUrlStatusIcon.removeAttribute("aria-label");
      customUrlStatusIcon.removeAttribute("tabindex");
      customUrlStatusIcon.replaceChildren();
    }

    function setFormValues(settings = {}){
      setSelectValue(country1, settings.country_1);
      setSelectValue(country2, settings.country_2);
      setSelectValue(timeZone, settings.time_zone);
      setSelectValue(currentRank, settings.current_global_rank);
      setSelectValue(maxRankNoCs, settings.max_global_rank_no_cs);
      setSelectValue(maxRankCs, settings.max_global_rank_cs);
    }

    function setCustomUrlValue(urlClaim = null){
      currentCustomUrl = urlClaim;
      const slug = normalizePlayerUrlSlug(urlClaim?.slug);
      customUrlSlug.value = slug;
      customUrlSlug.disabled = urlClaim?.status === "approved";
      setCustomUrlStatus(urlClaim?.status);
    }

    async function loadProfileForUser(user){
      const { data, error } = await supabase
        .from("profiles")
        .select("user_id,username,discord_user_id")
        .eq("user_id", user.id)
        .maybeSingle();
      if(error) throw error;
      return data || null;
    }

    async function loadSettings(userId){
      const { data, error } = await supabase
        .from("player_settings")
        .select("country_1,country_2,time_zone,current_global_rank,max_global_rank_no_cs,max_global_rank_cs")
        .eq("user_id", userId)
        .maybeSingle();
      if(error) throw error;
      return data || {};
    }

    async function loadCustomUrl(userId){
      const { data, error } = await supabase
        .from("player_custom_urls")
        .select("user_id,slug,status")
        .eq("user_id", userId)
        .maybeSingle();
      if(error) throw error;
      return data || null;
    }

    async function validateCustomUrlAvailability(slug){
      const cleanSlug = normalizePlayerUrlSlug(slug);
      const localError = playerUrlSlugError(cleanSlug);
      if(localError) return localError;
      if(!cleanSlug) return "";

      const { data, error } = await supabase
        .from("player_custom_urls")
        .select("user_id,slug,status")
        .eq("slug", cleanSlug)
        .maybeSingle();

      if(error) throw error;
      if(data?.user_id && data.user_id !== currentUser.id){
        return "That custom URL is already claimed.";
      }
      return "";
    }

    async function initialize(){
      fillSelect(country1, buildCountryOptions());
      fillSelect(country2, buildCountryOptions());
      fillSelect(timeZone, buildTimeZoneOptions(), "Not selected");
      fillRankSelect(currentRank);
      fillRankSelect(maxRankNoCs);
      fillRankSelect(maxRankCs);

      setStatus("Loading settings...");
      const { data: sessionData } = await supabase.auth.getSession();
      if(!sessionData?.session?.user){
        form.hidden = true;
        loginActions.hidden = false;
        setStatus("Log in with Discord to edit your player settings.");
        return;
      }

      const { data: userData, error: userError } = await supabase.auth.getUser();
      if(userError) throw userError;
      currentUser = userData.user;
      const profile = await loadProfileForUser(currentUser);
      currentDiscordId = normalizeDiscordId(profile?.discord_user_id) || getDiscordIdFromUser(currentUser);
      if(!currentDiscordId){
        form.hidden = true;
        loginActions.hidden = true;
        setStatus("Your account is not linked to a Discord player profile yet.", "error");
        return;
      }

      const [settings, customUrl] = await Promise.all([
        loadSettings(currentUser.id),
        loadCustomUrl(currentUser.id),
      ]);
      setFormValues(settings);
      setCustomUrlValue(customUrl);
      loginActions.hidden = true;
      form.hidden = false;
      setStatus("");
    }

    customUrlSlug.addEventListener("blur", () => {
      const slug = normalizePlayerUrlSlug(customUrlSlug.value);
      customUrlSlug.value = slug;
    });

    customUrlSlug.addEventListener("input", () => {
      const slug = normalizePlayerUrlSlug(customUrlSlug.value);
      if(currentCustomUrl?.slug !== slug){
        setCustomUrlStatus("");
      }else{
        setCustomUrlStatus(currentCustomUrl?.status);
      }
    });

    loginBtn.addEventListener("click", async () => {
      setStatus("Opening Discord login...");
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "discord",
        options: { redirectTo: buildAuthRedirectTo("/player-settings.html") },
      });
      if(error) setStatus(error.message || "Unable to start Discord login.", "error");
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if(!currentUser?.id || !currentDiscordId) return;

      const firstCountry = readOptional(country1);
      const secondCountry = readOptional(country2);
      if(firstCountry && secondCountry && firstCountry === secondCountry){
        setStatus("Choose two different countries, or leave one blank.", "error");
        return;
      }

      saveBtn.disabled = true;
      setStatus("Saving settings...");
      const cleanCustomUrlSlug = normalizePlayerUrlSlug(customUrlSlug.value);
      const customUrlError = customUrlSlug.disabled ? "" : await validateCustomUrlAvailability(cleanCustomUrlSlug);
      if(customUrlError){
        saveBtn.disabled = false;
        setStatus(customUrlError, "error");
        return;
      }

      const payload = {
        user_id: currentUser.id,
        discord_user_id: currentDiscordId,
        country_1: firstCountry,
        country_2: secondCountry,
        time_zone: readOptional(timeZone),
        current_global_rank: readOptional(currentRank),
        max_global_rank_no_cs: readOptional(maxRankNoCs),
        max_global_rank_cs: readOptional(maxRankCs),
      };

      const { error } = await supabase
        .from("player_settings")
        .upsert(payload, { onConflict: "user_id" });

      if(error){
        saveBtn.disabled = false;
        setStatus(error.message || "Unable to save settings.", "error");
        return;
      }

      if(!customUrlSlug.disabled){
        if(cleanCustomUrlSlug){
          const { error: urlError } = await supabase
            .from("player_custom_urls")
            .upsert({
              user_id: currentUser.id,
              discord_user_id: currentDiscordId,
              slug: cleanCustomUrlSlug,
              status: "pending",
              approved_at: null,
              approved_by_user_id: null,
              approved_by_username: null,
            }, { onConflict: "user_id" });

          if(urlError){
            setStatus(urlError.code === "23505" ? "That custom URL is already claimed." : (urlError.message || "Unable to save custom URL."), "error");
            return;
          }

          setCustomUrlValue({ user_id: currentUser.id, slug: cleanCustomUrlSlug, status: "pending" });
        }else if(currentCustomUrl?.status === "pending"){
          const { error: deleteError } = await supabase
            .from("player_custom_urls")
            .delete()
            .eq("user_id", currentUser.id);

          if(deleteError){
            setStatus(deleteError.message || "Unable to remove custom URL request.", "error");
            return;
          }
          setCustomUrlValue(null);
        }
      }

      setStatus("Settings saved.", "success");
    });

    initialize().catch(error => {
      console.error(error);
      form.hidden = true;
      setStatus(error?.message || "Unable to load settings.", "error");
    });
  </script>
</body>
</html>
