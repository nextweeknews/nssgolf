<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <link rel="stylesheet" href="/worldcup-flags.css?v=20260609-flags3" />
  <title>World Cup</title>

  <style>
    :root{
      --bg1:#061C3B; --bg2:#04142E; --bg3:#020B18;
      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);
      --header-bg: rgba(148,163,184,0.12);
      --row-bg: rgba(255,255,255,0.06);
      --row-bg-2: rgba(255,255,255,0.045);
      --text: #e9eef8;
      --title: #c7d7ff;
      --muted: #9ca3c7;
      --border-lite: rgba(148,163,184,0.20);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.10);
      --btn-border: rgba(255,255,255,0.15);
      --btn-border-hover: rgba(255,255,255,0.28);
      --worldcup-accent-rgb: 37,99,235;
      --worldcup-accent: #60a5fa;
      --wc-round-column-width: 252px;
      --wc-match-height: 64px;
    }

    *{ box-sizing:border-box; }
    [hidden]{ display:none !important; }
    html{ background-color:var(--bg3); }
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--text);
      background-color:var(--bg3);
      background-image:linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:1px solid rgba(255,255,255,.10);
      background:rgba(3,18,42,.70);
      backdrop-filter:blur(10px);
    }
    .topbar-inner{
      max-width:1260px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
    }
    .home-btn{
      width:40px;
      height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);
      display:grid;
      place-items:center;
      overflow:hidden;
      text-decoration:none;
      flex:0 0 auto;
    }
    .home-btn:hover{
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.25);
    }
    .home-btn img{
      width:70%;
      height:70%;
      object-fit:contain;
      display:block;
      pointer-events:none;
    }
    .kicker{
      font-size:11px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color:rgba(255,255,255,.65);
      font-weight:900;
    }
    .page-nav-select,
    .year-select{
      background:rgba(2,6,23,.85);
      color:inherit;
      border:1px solid rgba(96,165,250,.45);
      border-radius:10px;
      padding:6px 32px 6px 10px;
      font:inherit;
      letter-spacing:inherit;
      text-transform:uppercase;
      cursor:pointer;
    }
    .page-nav-select{
      max-width:min(56vw, 420px);
    }
    .page-nav-select:focus-visible,
    .year-select:focus-visible{
      outline:2px solid rgba(96,165,250,.62);
      outline-offset:2px;
    }
    .btn{
      appearance:none;
      -webkit-appearance:none;
      border:1px solid var(--btn-border);
      background:var(--btn-bg);
      color:rgba(255,255,255,0.92);
      padding:8px 12px;
      border-radius:14px;
      font-weight:950;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:11px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      line-height:1;
      flex-shrink:0;
    }
    .btn:hover{
      background:var(--btn-bg-hover);
      border-color:var(--btn-border-hover);
    }
    .btn-icon{
      width:14px;
      height:14px;
      display:block;
    }
    .container{
      max-width:1260px;
      margin:0 auto;
      padding:22px 18px 52px;
      display:grid;
      gap:14px;
    }
    .card{
      width:100%;
      background:var(--card-bg);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--card-shadow);
      border:1px solid rgba(255,255,255,0.10);
      display:grid;
      gap:14px;
    }
    .card-head{
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:22px;
      flex-wrap:wrap;
      text-align:center;
    }
    .headline{
      margin:0;
      color:var(--title);
      font-size:26px;
      font-weight:950;
      letter-spacing:.035em;
      text-transform:uppercase;
    }
    .year-select{
      min-height:34px;
      font-size:11px;
      font-weight:950;
      letter-spacing:.10em;
    }
    .worldcup-tabs-root{ width:100%; }
    .worldcup-tabs-list{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:0;
      padding:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.24);
      background:transparent;
    }
    .worldcup-tabs-trigger{
      position:relative;
      min-height:38px;
      border:0;
      border-radius:0;
      background:transparent;
      color:rgba(233,238,248,.86);
      padding:7px 10px;
      text-align:center;
      line-height:1.2;
      font:inherit;
      font-size:11px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      appearance:none;
      cursor:pointer;
      transition:background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .worldcup-tabs-trigger-label{
      display:block;
      width:100%;
      text-align:center;
    }
    .worldcup-tabs-trigger::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      background:transparent;
      transition:background-color 140ms ease;
    }
    .worldcup-tabs-trigger:hover{
      background:rgba(var(--worldcup-accent-rgb), .10);
      color:rgba(255,255,255,.95);
    }
    .worldcup-tabs-trigger[data-state="active"]{
      background:rgba(var(--worldcup-accent-rgb), .12);
      color:#f8fbff;
    }
    .worldcup-tabs-trigger[data-state="active"]::after{
      background:rgba(96,165,250,.90);
    }
    .worldcup-tabs-trigger:focus-visible{
      outline:none;
      box-shadow:inset 0 0 0 1px rgba(var(--worldcup-accent-rgb), .46);
    }
    .tab-panel{ min-width:0; }
    .status{
      margin:0;
      padding:18px 4px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      text-align:center;
    }
    .status.error{ color:rgba(252,165,165,.96); }

    .wc-bracket-scroll{
      width:100%;
      overflow-x:auto;
      overflow-y:hidden;
      padding-bottom:4px;
      -webkit-overflow-scrolling:touch;
    }
    .wc-bracket-grid{
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:var(--wc-round-column-width);
      gap:18px;
      align-items:start;
      width:max-content;
      min-width:100%;
      justify-content:center;
      padding:2px;
    }
    .wc-round-column{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }
    .wc-round-title{
      margin:0;
      color:var(--muted);
      font-size:10px;
      font-weight:950;
      letter-spacing:.10em;
      text-transform:uppercase;
      text-align:center;
    }
    .wc-round-stack{
      display:flex;
      flex-direction:column;
      gap:var(--wc-round-gap, 8px);
    }
    .wc-round-stack .wc-bracket-match:first-child{
      padding-top:var(--wc-round-padding-top, 0px);
    }
    .wc-round-stack .wc-bracket-match + .wc-bracket-match{
      padding-top:var(--wc-round-gap, 8px);
    }
    .wc-round-stack .wc-bracket-match.has-label + .wc-bracket-match.has-label{
      padding-top:calc(var(--wc-round-gap, 8px) + 32px);
    }
    .wc-bracket-match{
      display:grid;
      position:relative;
      min-height:var(--wc-match-height);
      align-items:center;
    }
    .wc-match-label{
      position:absolute;
      left:0;
      right:0;
      bottom:calc(100% - 10px);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:4px 10px 14px;
      border:1px solid rgba(96,165,250,.38);
      border-bottom:0;
      border-top-left-radius:10px;
      border-top-right-radius:10px;
      background:rgba(15,23,42,.98);
      box-shadow:0 -10px 18px rgba(0,0,0,.16);
      color:rgba(186,230,253,.96);
      font-size:9px;
      font-weight:950;
      letter-spacing:.12em;
      line-height:1;
      text-align:center;
      text-transform:uppercase;
      pointer-events:none;
      z-index:0;
    }
    .wc-match-card{
      position:relative;
      width:100%;
      min-width:0;
      border-radius:10px;
      overflow:hidden;
      background:rgba(255,255,255,0.05);
      isolation:isolate;
    }
    .wc-match-card.has-label{
      overflow:visible;
    }
    .wc-match-card::before{
      content:"";
      position:absolute;
      inset:0;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:inherit;
      pointer-events:none;
      z-index:4;
    }
    .wc-match-row{
      width:100%;
      display:grid;
      grid-template-columns:minmax(0,1fr) 34px;
      align-items:center;
      gap:8px;
      min-height:30px;
      background:rgba(255,255,255,0.06);
      color:var(--muted);
      padding:4px 6px 4px 8px;
      border:0;
      font-size:11px;
      position:relative;
      z-index:2;
    }
    .wc-match-row:first-child{
      border-top-left-radius:10px;
      border-top-right-radius:10px;
    }
    .wc-match-card.has-label .wc-match-label + .wc-match-row{
      border-top-left-radius:10px;
      border-top-right-radius:10px;
    }
    .wc-match-row:last-child{
      border-bottom-left-radius:10px;
      border-bottom-right-radius:10px;
    }
    .wc-match-row:nth-child(2){ background:rgba(255,255,255,0.045); }
    .wc-match-card.has-label .wc-match-label + .wc-match-row{
      background:rgba(255,255,255,0.06);
    }
    .wc-match-card.has-label .wc-match-row:last-child{
      background:rgba(255,255,255,0.045);
    }
    .wc-match-row + .wc-match-row{ border-top:1px solid rgba(148,163,184,0.38); }
    .wc-match-row.is-winner{
      background:rgba(var(--worldcup-accent-rgb), .13);
      color:#fff;
    }
    .wc-match-row.is-winner::after{
      content:"";
      position:absolute;
      inset:0;
      border:1px solid rgba(96,165,250,.62);
      pointer-events:none;
      z-index:5;
    }
    .wc-match-row.is-winner:first-child::after{
      border-top-left-radius:10px;
      border-top-right-radius:10px;
    }
    .wc-match-card.has-label .wc-match-label + .wc-match-row.is-winner::after{
      border-top-left-radius:10px;
      border-top-right-radius:10px;
    }
    .wc-match-row.is-winner:last-child::after{
      border-bottom-left-radius:10px;
      border-bottom-right-radius:10px;
    }
    .wc-match-row.is-bye{
      color:rgba(233,238,248,.72);
      background:rgba(148,163,184,.08);
    }
    .wc-team-name{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-weight:950;
      letter-spacing:.02em;
      text-transform:uppercase;
      color:inherit;
    }
    .wc-score{
      justify-self:end;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:28px;
      min-height:20px;
      border-radius:7px;
      border:1px solid rgba(255,255,255,.62);
      background:#fff;
      color:#020617;
      font-weight:950;
      font-variant-numeric:tabular-nums;
      line-height:1;
      padding:0 5px;
    }
    .wc-score.is-empty{
      background:transparent;
      color:rgba(233,238,248,.70);
      border-color:rgba(148,163,184,.30);
    }

    .group-stage-list{
      display:grid;
      gap:0;
    }
    .group-stage-block{
      display:grid;
      grid-template-columns:minmax(270px, 360px) minmax(0, 1fr);
      gap:16px;
      align-items:center;
      padding:16px 0;
      border-top:1px solid rgba(148,163,184,.18);
    }
    .group-stage-block:first-child{
      border-top:0;
      padding-top:4px;
    }
    .group-card,
    .games-card,
    .roster-team-card{
      min-width:0;
      border:1px solid var(--border-lite);
      border-radius:14px;
      background:rgba(15,23,42,0.58);
    }
    .group-card{
      padding:12px;
    }
    .group-title,
    .roster-team-title{
      margin:0 0 10px;
      color:#fff;
      font-size:14px;
      font-weight:950;
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .standings-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      color:rgba(233,238,248,.94);
      font-size:14px;
      font-variant-numeric:tabular-nums;
    }
    .standings-table th,
    .standings-table td{
      padding:8px 6px;
      border-bottom:1px solid rgba(148,163,184,.18);
      text-align:center;
      white-space:nowrap;
    }
    .standings-table th{
      color:var(--muted);
      font-size:10px;
      font-weight:950;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:var(--header-bg);
    }
    .standings-table th:first-child,
    .standings-table td:first-child{
      text-align:left;
      width:48%;
    }
    .standings-table tbody tr:last-child td{ border-bottom:0; }
    .standings-table td{
      background:var(--row-bg);
      font-weight:900;
    }
    .standings-table tbody tr:nth-child(even) td{ background:var(--row-bg-2); }
    .games-card{
      padding:12px;
      align-self:center;
    }
    .games-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:9px;
    }
    .group-game{
      border:1px solid rgba(255,255,255,.08);
      border-radius:10px;
      overflow:hidden;
      background:rgba(255,255,255,.045);
    }
    .group-game-column{
      display:grid;
      gap:7px;
      align-content:start;
    }
    .group-round-label{
      margin:0;
      padding:6px 7px;
      color:rgba(156,163,199,.86);
      font-size:9px;
      font-weight:950;
      letter-spacing:.10em;
      text-transform:uppercase;
      text-align:center;
      background:rgba(2,8,24,.35);
      border:1px solid rgba(255,255,255,.08);
      border-radius:10px;
    }
    .group-game-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 30px;
      gap:8px;
      align-items:center;
      min-height:28px;
      padding:4px 7px;
      color:rgba(233,238,248,.88);
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
    }
    .group-game-row + .group-game-row{ border-top:1px solid rgba(148,163,184,.24); }
    .group-game-row.is-winner{
      color:#fff;
      background:rgba(var(--worldcup-accent-rgb), .13);
    }
    .group-game-row.is-bye{
      color:rgba(233,238,248,.72);
      background:rgba(148,163,184,.08);
    }
    .group-game-team{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .rosters-layout{
      display:grid;
      gap:18px;
    }
    .roster-advancement-section{
      display:grid;
      gap:12px;
    }
    .roster-advancement-section + .roster-advancement-section{
      padding-top:18px;
      border-top:1px solid rgba(148,163,184,.24);
    }
    .roster-section-title{
      margin:0;
      color:rgba(186,230,253,.94);
      font-size:11px;
      font-weight:950;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .roster-card-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
      gap:12px;
    }
    .roster-podium{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      grid-template-areas:"second first third";
      gap:12px;
      align-items:end;
    }
    .roster-podium .podium-placement-1{ grid-area:first; }
    .roster-podium .podium-placement-2{ grid-area:second; }
    .roster-podium .podium-placement-3{ grid-area:third; }
    .roster-fourth-row{
      display:grid;
      grid-template-columns:minmax(250px, 390px);
      justify-content:center;
      margin-top:2px;
    }
    .roster-team-card{
      padding:12px;
      display:grid;
      gap:10px;
    }
    .roster-team-card.is-podium{
      background:linear-gradient(180deg, rgba(37,99,235,.18), rgba(15,23,42,.58));
      border-color:rgba(96,165,250,.36);
    }
    .roster-place-badge{
      justify-self:start;
      display:inline-flex;
      align-items:center;
      min-height:22px;
      padding:4px 7px;
      border-radius:999px;
      border:1px solid rgba(96,165,250,.34);
      background:rgba(37,99,235,.13);
      color:rgba(219,234,254,.96);
      font-size:9px;
      font-weight:950;
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .roster-player-list{
      display:grid;
      gap:8px;
    }
    .roster-player{
      min-width:0;
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px;
      border-radius:10px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:rgba(233,238,248,.94);
      text-decoration:none;
    }
    a.roster-player:hover{
      background:rgba(255,255,255,.09);
      border-color:rgba(96,165,250,.34);
    }
    .roster-avatar{
      width:36px;
      height:36px;
      border-radius:999px;
      object-fit:cover;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      flex:0 0 auto;
    }
    .roster-copy{
      min-width:0;
      display:grid;
      gap:3px;
    }
    .roster-name{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:13px;
      font-weight:950;
      color:#fff;
    }
    .roster-user{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:rgba(156,163,199,.82);
      font-size:11px;
      font-weight:800;
    }

    @media (max-width:900px){
      .container{ padding:20px 12px 44px; }
      .topbar-inner{ padding:12px; flex-wrap:nowrap; }
      .brand{ flex:1; min-width:0; }
      .brand > div{ min-width:0; }
      .page-nav-select{ width:min(100%, 420px); max-width:100%; }
      .discord-button{ padding:8px 10px; font-size:10px; letter-spacing:.06em; }
      .card{ padding:14px 12px; border-radius:18px; }
      .headline{ font-size:22px; }
      .card-head{ gap:12px; }
      .worldcup-tabs-trigger{ font-size:10px; padding-inline:5px; }
      .wc-bracket-scroll{
        position:sticky;
        top:65px;
        z-index:1;
        background:rgba(15,23,42,.98);
        border-radius:12px;
        border:1px solid rgba(148,163,184,.16);
        padding:8px;
      }
      .wc-bracket-grid{
        justify-content:start;
        grid-auto-columns:min(238px, calc(100vw - 54px));
      }
      .group-stage-block{
        grid-template-columns:1fr;
        gap:10px;
      }
      .games-grid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
      .roster-podium{
        grid-template-columns:1fr;
        grid-template-areas:"first" "second" "third";
        align-items:stretch;
      }
      .roster-fourth-row{
        grid-template-columns:1fr;
      }
    }
    @media (max-width:560px){
      .card-head{
        justify-content:flex-start;
        text-align:left;
      }
      .year-select{
        width:100%;
      }
      .games-grid{
        grid-template-columns:1fr;
      }
      .standings-table{
        font-size:12px;
      }
    }
  </style>
  <link rel="stylesheet" href="/site-topbar.css" />
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="home-btn" href="/index.html" aria-label="Home">
          <img src="/logos/golf.png" alt="Home" loading="eager" decoding="async" />
        </a>
        <div>
          <select class="kicker page-nav-select" aria-label="Select page" onchange="if (this.value) window.location.href=this.value;">
            <option value="/index.html">Home</option>
            <option value="/championship.html">World Championship</option>
            <option value="/masters.html">World Golf Masters</option>
            <option value="/worldcup.html" selected>World Cup</option>
            <option value="/noptational.html">The Noptational</option>
            <option value="/worldopen/index.html">World Open</option>
            <option value="/proleague/index.html">Shotgun Pro League</option>
            <option value="/superleague/index.html">Super League</option>
            <option value="/lightningcup/index.html">Lightning Cup</option>
            <option value="/beataidan/index.html">Beat Aidan</option>
            <option value="/records.html">Records</option>
          </select>
        </div>
      </div>
      <a class="btn discord-button" href="https://discord.gg/VfTX9BwuTH" target="_blank" rel="noopener noreferrer" aria-label="Join our Discord">
        <img class="btn-icon" src="/logos/discord.svg" alt="" aria-hidden="true" />
        Discord
      </a>
    </div>
  </div>

  <main class="container">
    <section class="card" aria-labelledby="worldcup-title">
      <div class="card-head">
        <h1 class="headline" id="worldcup-title">World Cup</h1>
        <select id="yearSelect" class="year-select" aria-label="Select World Cup year"></select>
      </div>
      <div id="worldcupTabsRoot"></div>
      <div id="bracketPanel" class="tab-panel" role="tabpanel" aria-labelledby="worldcup-tab-bracket"></div>
      <div id="groupPanel" class="tab-panel" role="tabpanel" aria-labelledby="worldcup-tab-group" hidden></div>
      <div id="rostersPanel" class="tab-panel" role="tabpanel" aria-labelledby="worldcup-tab-rosters" hidden></div>
    </section>
  </main>

  <script type="module" src="/site-topbar.js"></script>
  <script type="module">
    import { createBrowserSupabaseClient } from "/auth/supabase-auth.js";
    import { mountWorldCupTabs } from "/worldcup-tabs.bundle.js?v=20260609-rosters3";
    import {
      WORLD_CUP_YEARS,
      fetchWorldCupValues,
      findWorldCupTeamNamesForDiscordId,
      getWorldCupMatchOutcome,
      normalizeWorldCupDiscordId,
      parseWorldCupSheet,
      worldCupMatchesForTeam,
      worldCupRoundLabel,
      worldCupFlagForTeam,
      worldCupTeamLabel,
    } from "/worldcup-data.js?v=20260609-flags3";

    const supabase = createBrowserSupabaseClient();
    const tabs = [
      { value:"rosters", label:"Teams", id:"worldcup-tab-rosters", controls:"rostersPanel" },
      { value:"bracket", label:"Bracket Stage", id:"worldcup-tab-bracket", controls:"bracketPanel" },
      { value:"group", label:"Group Stage", id:"worldcup-tab-group", controls:"groupPanel" },
    ];
    const panels = {
      bracket: document.getElementById("bracketPanel"),
      group: document.getElementById("groupPanel"),
      rosters: document.getElementById("rostersPanel"),
    };
    const yearSelect = document.getElementById("yearSelect");
    const memberCache = new Map();
    const dataCache = new Map();

    let activeYear = getInitialYear();
    let activeTab = getInitialTab();
    let activeData = null;

    const tabRoot = mountWorldCupTabs(document.getElementById("worldcupTabsRoot"), {
      tabs,
      onTabChange(value){
        setActiveTab(value);
      },
    });

    function getInitialYear(){
      const params = new URLSearchParams(window.location.search);
      const requested = Number(params.get("year"));
      return WORLD_CUP_YEARS.includes(requested) ? requested : WORLD_CUP_YEARS[0];
    }

    function getInitialTab(){
      const params = new URLSearchParams(window.location.search);
      const requested = String(params.get("tab") || "rosters").trim().toLowerCase();
      return tabs.some(tab => tab.value === requested) ? requested : "rosters";
    }

    function updateUrl(){
      const url = new URL(window.location.href);
      url.searchParams.set("year", String(activeYear));
      url.searchParams.set("tab", activeTab);
      window.history.replaceState(null, "", url.toString());
    }

    function setActiveTab(value){
      if(!tabs.some(tab => tab.value === value)) return;
      activeTab = value;
      Object.entries(panels).forEach(([key, panel]) => {
        panel.hidden = key !== activeTab;
      });
      tabRoot.render(activeTab);
      updateUrl();
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderWorldCupTeamLabel(teamName, fallback = "TBD"){
      const rawName = String(teamName ?? "").trim();
      let label = worldCupTeamLabel(rawName) || rawName || fallback;
      if(rawName && label !== rawName && label.endsWith(rawName)) label = rawName;
      const flagCode = rawName ? worldCupFlagForTeam(rawName) : "";
      const safeFlagClass = /^[a-z0-9-]+$/i.test(flagCode) ? `wc-flag-${flagCode.toLowerCase()}` : "";
      return `
        <span class="wc-team-label">
          ${safeFlagClass ? `<span class="wc-flag-icon ${safeFlagClass}" style="--wc-flag-image:url('/assets/flag-icons/4x3/${escapeHtml(flagCode.toLowerCase())}.svg')" aria-hidden="true"></span>` : ""}
          <span class="wc-team-label-text">${escapeHtml(label)}</span>
        </span>
      `;
    }

    function scoreText(value){
      const text = String(value ?? "").trim();
      return text || "-";
    }

    function showStatus(message, isError = false){
      Object.values(panels).forEach((panel) => {
        panel.innerHTML = `<p class="status ${isError ? "error" : ""}">${escapeHtml(message)}</p>`;
      });
    }

    async function loadYearData(year){
      if(dataCache.has(year)) return dataCache.get(year);
      const promise = fetchWorldCupValues(year).then(values => parseWorldCupSheet(values, { year }));
      dataCache.set(year, promise);
      return promise;
    }

    function memberDisplayName(member, fallback){
      return String(member?.display_name || member?.username || fallback || "Player").trim();
    }

    function avatarUrlFor(member){
      return member?.server_avatar_url || member?.avatar_url || "/logos/golf.png";
    }

    async function loadMembersForData(data){
      const ids = [...new Set((data?.rosterPlayers || []).map(player => normalizeWorldCupDiscordId(player.discordId)).filter(Boolean))];
      const missing = ids.filter(id => !memberCache.has(id));
      for(let index = 0; index < missing.length; index += 100){
        const chunk = missing.slice(index, index + 100);
        const { data: rows, error } = await supabase
          .from("discord_guild_members")
          .select("discord_user_id,username,display_name,avatar_url,server_avatar_url")
          .in("discord_user_id", chunk);
        if(error) throw error;
        chunk.forEach(id => memberCache.set(id, null));
        (rows || []).forEach(member => {
          const id = normalizeWorldCupDiscordId(member.discord_user_id);
          if(id) memberCache.set(id, { ...member, discord_user_id:id });
        });
      }
      return memberCache;
    }

    function groupBracketRounds(matches, year){
      const roundGroups = new Map();
      (matches || []).forEach((match) => {
        const rawRound = String(match.round || "").trim();
        const key = rawRound === "F" || rawRound === "Final" || rawRound === "3rd" ? "Medal" : rawRound;
        if(!roundGroups.has(key)){
          roundGroups.set(key, {
            key,
            label: key === "Medal" ? "Medal Matches" : worldCupRoundLabel(rawRound),
            matches: [],
          });
        }
        roundGroups.get(key).matches.push(match);
      });
      const order = year === 2024 ? ["R24", "R16", "QF", "SF", "Medal"] : ["R16", "QF", "SF", "Medal"];
      return [...roundGroups.values()]
        .sort((left, right) => order.indexOf(left.key) - order.indexOf(right.key))
        .map(group => ({
          ...group,
          matches: group.matches.slice().sort((left, right) => Number(left.id || 0) - Number(right.id || 0)),
        }));
    }

    function spacingIndexForRound(groups, index, year, countOverride = null){
      if(year === 2024 && index < 2) return 0;
      const firstCount = groups[0]?.matches?.length || 1;
      const count = countOverride || groups[index]?.matches?.length || 1;
      const ratio = Math.max(1, firstCount / count);
      return Math.max(0, Math.round(Math.log2(ratio)));
    }

    function renderBracketMatchRow(match, side){
      const team = side === "team1" ? match.team1 : match.team2;
      const score = side === "team1" ? match.score1 : match.score2;
      const outcome = getWorldCupMatchOutcome(match, team);
      const isBye = outcome?.outcome === "bye" || /^bye$/i.test(team);
      const isWinner = outcome?.outcome === "win" && !isBye;
      return `
        <div class="wc-match-row ${isWinner ? "is-winner" : ""} ${isBye ? "is-bye" : ""}">
          <span class="wc-team-name">${renderWorldCupTeamLabel(team)}</span>
          <span class="wc-score ${score ? "" : "is-empty"}">${escapeHtml(scoreText(score))}</span>
        </div>
      `;
    }

    function medalMatchLabel(match){
      const round = String(match?.round || "").trim();
      if(round === "F" || /^final$/i.test(round)) return "Championship";
      if(round === "3rd") return "3rd Place";
      return "";
    }

    function renderBracketMatch(match, label = ""){
      return `
        <div class="wc-bracket-match ${label ? "has-label" : ""}">
          <div class="wc-match-card ${label ? "has-label" : ""}" title="${escapeHtml(`${worldCupRoundLabel(match.round)} ${match.id || ""}`.trim())}">
            ${label ? `<div class="wc-match-label">${escapeHtml(label)}</div>` : ""}
            ${renderBracketMatchRow(match, "team1")}
            ${renderBracketMatchRow(match, "team2")}
          </div>
        </div>
      `;
    }

    function renderBracket(data){
      const groups = groupBracketRounds(data.bracket, data.year);
      const matchHeight = 64;
      const baseGap = 8;
      const baseStep = matchHeight + (baseGap * 2);
      panels.bracket.innerHTML = `
        <div class="wc-bracket-scroll">
          <div class="wc-bracket-grid" data-year="${escapeHtml(data.year)}">
            ${groups.map((group, index) => {
              const isMedalRound = group.key === "Medal";
              const spacingIndex = spacingIndexForRound(groups, index, data.year, isMedalRound ? 1 : null);
              const roundGap = isMedalRound
                ? baseGap
                : Math.round((baseStep * (2 ** spacingIndex) - matchHeight) / 2);
              const topPadding = spacingIndex ? Math.round((baseStep * ((2 ** spacingIndex) - 1)) / 2) : 0;
              return `
                <div class="wc-round-column" style="--wc-round-gap:${roundGap}px;--wc-round-padding-top:${topPadding}px;">
                  <h3 class="wc-round-title">${escapeHtml(group.label)}</h3>
                  <div class="wc-round-stack">
                    ${group.matches.map(match => renderBracketMatch(match, isMedalRound ? medalMatchLabel(match) : "")).join("")}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderGameRow(match, side){
      const team = side === "team1" ? match.team1 : match.team2;
      const score = side === "team1" ? match.score1 : match.score2;
      const outcome = getWorldCupMatchOutcome(match, team);
      const isBye = outcome?.outcome === "bye" || /^bye$/i.test(team);
      const isWinner = outcome?.outcome === "win" && !isBye;
      return `
        <div class="group-game-row ${isWinner ? "is-winner" : ""} ${isBye ? "is-bye" : ""}">
          <span class="group-game-team">${renderWorldCupTeamLabel(team)}</span>
          <span>${escapeHtml(scoreText(score))}</span>
        </div>
      `;
    }

    function renderGroupRoundColumn(group, roundNumber){
      const games = (group.games || []).filter(game => Number(game.block) === roundNumber);
      return `
        <div class="group-game-column">
          <p class="group-round-label">Round ${roundNumber}</p>
          ${games.map((game) => `
            <div class="group-game">
              ${renderGameRow(game, "team1")}
              ${renderGameRow(game, "team2")}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderGroupStage(data){
      panels.group.innerHTML = `
        <div class="group-stage-list">
          ${data.groups.map(group => `
            <section class="group-stage-block" aria-label="${escapeHtml(group.name)}">
              <div class="group-card">
                <h2 class="group-title">${escapeHtml(group.name)}</h2>
                <table class="standings-table">
                  <thead>
                    <tr>
                      <th>Team</th>
                      <th>Pts</th>
                      <th>Diff</th>
                      <th>${escapeHtml(group.recordHeader)}</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${group.standings.map(row => `
                      <tr>
                        <td>${renderWorldCupTeamLabel(row.team, "-")}</td>
                        <td>${escapeHtml(row.points || "-")}</td>
                        <td>${escapeHtml(row.differential || "-")}</td>
                        <td>${escapeHtml(row.record || "-")}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
              <div class="games-card">
                <div class="games-grid">
                  ${[1, 2, 3].map(roundNumber => renderGroupRoundColumn(group, roundNumber)).join("")}
                </div>
              </div>
            </section>
          `).join("")}
        </div>
      `;
    }

    function teamKey(value){
      return String(value || "").trim().toLowerCase();
    }

    function orderedMatchTeams(match){
      return [match?.team1, match?.team2].map(team => String(team || "").trim()).filter(Boolean);
    }

    function getMatchWinnerLoser(match, fallbackToSheetOrder = false){
      const teams = orderedMatchTeams(match);
      if(teams.length < 2) return { winner:"", loser:"" };
      const first = getWorldCupMatchOutcome(match, teams[0]);
      const second = getWorldCupMatchOutcome(match, teams[1]);
      if(first?.outcome === "win") return { winner:teams[0], loser:teams[1] };
      if(second?.outcome === "win") return { winner:teams[1], loser:teams[0] };
      if(fallbackToSheetOrder) return { winner:teams[0], loser:teams[1] };
      return { winner:"", loser:"" };
    }

    function ordinal(value){
      const number = Number(value);
      if(!Number.isInteger(number) || number <= 0) return "";
      const suffix = [11, 12, 13].includes(number % 100) ? "th" : ({ 1:"st", 2:"nd", 3:"rd" }[number % 10] || "th");
      return `${number}${suffix}`;
    }

    function numericText(value, fallback = 0){
      const match = String(value ?? "").match(/-?\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : fallback;
    }

    function buildRosterPlacementMap(data){
      const order = new Map();
      const setOrder = (team, placement) => {
        const key = teamKey(team);
        if(!key || /^bye$/i.test(team)) return;
        const existing = order.get(key);
        const next = {
          rank: placement.rank ?? 9999,
          sourceIndex: placement.sourceIndex ?? 0,
          sectionKey: placement.sectionKey || "other",
          sectionLabel: placement.sectionLabel || "Other Teams",
          badge: placement.badge || "",
        };
        if(existing && existing.rank <= next.rank) return;
        order.set(key, next);
      };

      const bracketMatches = (data.bracket || []).slice().sort((left, right) => Number(left.id || 0) - Number(right.id || 0));
      const finalMatch = bracketMatches.find(match => {
        const round = String(match.round || "").trim();
        return round === "F" || /^final$/i.test(round);
      });
      const thirdPlaceMatch = bracketMatches.find(match => String(match.round || "").trim() === "3rd");

      if(finalMatch){
        const { winner, loser } = getMatchWinnerLoser(finalMatch, true);
        setOrder(winner, { rank:0, sourceIndex:0, sectionKey:"podium", sectionLabel:"Podium", badge:"1st" });
        setOrder(loser, { rank:1, sourceIndex:0, sectionKey:"podium", sectionLabel:"Podium", badge:"2nd" });
      }
      if(thirdPlaceMatch){
        const { winner, loser } = getMatchWinnerLoser(thirdPlaceMatch, true);
        setOrder(winner, { rank:2, sourceIndex:0, sectionKey:"podium", sectionLabel:"Podium", badge:"3rd" });
        setOrder(loser, { rank:3, sourceIndex:0, sectionKey:"fourth", sectionLabel:"4th Place", badge:"4th" });
      }

      const roundPlacement = {
        SF:{ rank:4, sectionKey:"semifinalists", sectionLabel:"Semifinalists" },
        QF:{ rank:5, sectionKey:"quarterfinalists", sectionLabel:"Quarterfinalists" },
        R16:{ rank:6, sectionKey:"round-of-16", sectionLabel:"Round of 16" },
        R24:{ rank:7, sectionKey:"round-of-24", sectionLabel:"Round of 24" },
      };
      const bracketTeamKeys = new Set();
      bracketMatches.forEach((match) => {
        orderedMatchTeams(match).forEach((team) => {
          if(!/^bye$/i.test(team)) bracketTeamKeys.add(teamKey(team));
        });
        const round = String(match.round || "").trim();
        const placement = roundPlacement[round];
        if(!placement) return;
        const matchOrder = Number(match.id || 0);
        orderedMatchTeams(match).forEach((team, teamIndex) => {
          setOrder(team, { ...placement, sourceIndex:(matchOrder * 10) + teamIndex });
        });
      });

      (data.groups || []).forEach((group, groupIndex) => {
        (group.standings || []).forEach((standing) => {
          const key = teamKey(standing.team);
          if(!key || bracketTeamKeys.has(key)) return;
          const standingRank = Number(standing.rank || 99);
          const points = numericText(standing.points, 0);
          const differential = numericText(standing.differential, 0);
          setOrder(standing.team, {
            rank:100 + standingRank,
            sourceIndex:(-points * 1000) + (-differential * 10) + groupIndex,
            sectionKey:`group-rank-${standingRank}`,
            sectionLabel:`Group Stage - ${ordinal(standingRank)} in Group`,
            badge:`${group.name} #${standingRank}`,
          });
        });
      });

      (data.rosters || []).forEach((team, index) => {
        setOrder(team.name, {
          rank:1000 + index,
          sourceIndex:index,
          sectionKey:"group-stage",
          sectionLabel:"Group Stage",
        });
      });

      return order;
    }

    function rosterEntries(data){
      const placements = buildRosterPlacementMap(data);
      return (data.rosters || []).slice().map(team => ({
        ...team,
        placement: placements.get(teamKey(team.name)) || {
          rank:9999,
          sourceIndex:0,
          sectionKey:"group-stage",
          sectionLabel:"Group Stage",
          badge:"",
        },
      })).sort((left, right) => {
        const leftOrder = left.placement;
        const rightOrder = right.placement;
        if(leftOrder.rank !== rightOrder.rank) return leftOrder.rank - rightOrder.rank;
        if(leftOrder.sourceIndex !== rightOrder.sourceIndex) return leftOrder.sourceIndex - rightOrder.sourceIndex;
        return String(left.name || "").localeCompare(String(right.name || ""), undefined, { sensitivity:"base" });
      });
    }

    function renderRosterCard(team, className = ""){
      return `
        <section class="roster-team-card ${className}">
          ${team.placement.badge ? `<span class="roster-place-badge">${escapeHtml(team.placement.badge)}</span>` : ""}
          <h2 class="roster-team-title">${renderWorldCupTeamLabel(team.name, "-")}</h2>
          <div class="roster-player-list">
            ${team.players.map(player => {
              const member = player.discordId ? memberCache.get(player.discordId) : null;
              const tag = member?.discord_user_id ? "a" : "div";
              const href = member?.discord_user_id ? ` href="/player.html?id=${encodeURIComponent(member.discord_user_id)}"` : "";
              const username = member?.username ? `@${member.username}` : player.discordId || "Discord ID unavailable";
              return `
                <${tag} class="roster-player"${href}>
                  <img class="roster-avatar" src="${escapeHtml(avatarUrlFor(member))}" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer" />
                  <span class="roster-copy">
                    <span class="roster-name">${escapeHtml(memberDisplayName(member, player.playerName))}</span>
                    <span class="roster-user">${escapeHtml(username)}</span>
                  </span>
                </${tag}>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function groupRosterSections(entries){
      const sections = [];
      entries.forEach((entry) => {
        let section = sections.find(item => item.key === entry.placement.sectionKey);
        if(!section){
          section = {
            key:entry.placement.sectionKey,
            label:entry.placement.sectionLabel,
            entries:[],
          };
          sections.push(section);
        }
        section.entries.push(entry);
      });
      return sections;
    }

    function renderRosters(data){
      const entries = rosterEntries(data);
      const podium = entries.filter(entry => entry.placement.rank <= 2);
      const fourth = entries.find(entry => entry.placement.rank === 3);
      const remainingSections = groupRosterSections(entries.filter(entry => entry.placement.rank > 3));
      panels.rosters.innerHTML = `
        <div class="rosters-layout">
          <section class="roster-advancement-section">
            <h2 class="roster-section-title">Podium</h2>
            <div class="roster-podium">
              ${podium.map(team => renderRosterCard(team, `is-podium podium-placement-${team.placement.rank + 1}`)).join("")}
            </div>
            ${fourth ? `<div class="roster-fourth-row">${renderRosterCard(fourth, "is-podium")}</div>` : ""}
          </section>
          ${remainingSections.map(section => `
            <section class="roster-advancement-section">
              <h2 class="roster-section-title">${escapeHtml(section.label)}</h2>
              <div class="roster-card-grid">
                ${section.entries.map(team => renderRosterCard(team)).join("")}
              </div>
            </section>
          `).join("")}
        </div>
      `;
    }

    async function renderYear(){
      showStatus(`Loading World Cup ${activeYear}...`);
      try{
        activeData = await loadYearData(activeYear);
        await loadMembersForData(activeData);
        renderBracket(activeData);
        renderGroupStage(activeData);
        renderRosters(activeData);
      }catch(error){
        console.error("Unable to load World Cup data", error);
        showStatus("Unable to load World Cup data.", true);
      }
    }

    function hydrateYearSelect(){
      yearSelect.innerHTML = WORLD_CUP_YEARS.map(year => `<option value="${year}">${year}</option>`).join("");
      yearSelect.value = String(activeYear);
      yearSelect.addEventListener("change", async () => {
        const nextYear = Number(yearSelect.value);
        if(!WORLD_CUP_YEARS.includes(nextYear)) return;
        activeYear = nextYear;
        updateUrl();
        await renderYear();
      });
    }

    hydrateYearSelect();
    setActiveTab(activeTab);
    renderYear();

    window.NSSGolfWorldCup = {
      getActiveData: () => activeData,
      findWorldCupTeamNamesForDiscordId,
      worldCupMatchesForTeam,
    };
  </script>
