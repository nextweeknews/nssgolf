<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <title>The Noptational</title>

  <style>
    :root{
      --bg1:#071b34;
      --bg2:#04142e;
      --bg3:#020b18;
      --card-bg:rgba(15,23,42,1);
      --card-shadow:0 32px 32px rgba(0,0,0,0.65);
      --header-bg:rgba(148,163,184,0.12);
      --row-bg:rgba(255,255,255,0.06);
      --row-bg-2:rgba(255,255,255,0.045);
      --text:#e9eef8;
      --title:#c7d7ff;
      --muted:#9ca3c7;
      --border-lite:rgba(148,163,184,0.20);
      --border-strong:rgba(148,163,184,0.38);
      --accent:#7dd3fc;
      --accent-2:#2dd4bf;
      --warn:#facc15;
      --danger:#fb7185;
      --rank-col:64px;
      --name-col:minmax(190px, 1fr);
      --name-sticky-col:220px;
      --total-col:86px;
      --score-cell:78px;
    }

    *{ box-sizing:border-box; }
    [hidden]{ display:none !important; }
    html{ background-color:var(--bg3); }
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--text);
      background-color:var(--bg3);
      background-image:linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:1px solid rgba(255,255,255,.10);
      background:rgba(3,18,42,.70);
      backdrop-filter:blur(10px);
    }
    .topbar-inner{
      max-width:1220px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .brand{ display:flex; gap:12px; align-items:center; min-width:0; }
    .home-btn{
      width:40px;
      height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);
      display:grid;
      place-items:center;
      overflow:hidden;
      text-decoration:none;
      cursor:pointer;
      flex:0 0 auto;
    }
    .home-btn:hover{
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.25);
    }
    .home-btn img{
      width:70%;
      height:70%;
      object-fit:contain;
      display:block;
      pointer-events:none;
    }
    .kicker{
      font-size:11px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color:rgba(255,255,255,.65);
      font-weight:900;
    }
    .page-nav-select{
      background:rgba(2,6,23,.85);
      color:inherit;
      border:1px solid rgba(125,211,252,.35);
      border-radius:10px;
      padding:6px 32px 6px 10px;
      font:inherit;
      letter-spacing:inherit;
      text-transform:uppercase;
      max-width:min(56vw, 420px);
      cursor:pointer;
    }
    .page-nav-select:focus-visible{
      outline:2px solid rgba(125,211,252,.6);
      outline-offset:2px;
    }

    .container{
      max-width:1220px;
      margin:0 auto;
      padding:22px 18px 52px;
      display:grid;
      gap:14px;
    }
    .card{
      background:var(--card-bg);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--card-shadow);
      border:1px solid rgba(255,255,255,0.10);
    }
    .card-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .headline{
      margin:0;
      color:var(--title);
      font-size:26px;
      font-weight:950;
      letter-spacing:.045em;
      text-transform:uppercase;
      line-height:1.05;
    }
    .subhead{
      margin:6px 0 0;
      color:rgba(233,238,248,0.76);
      font-size:13px;
      line-height:1.45;
      font-weight:700;
    }
    .status{
      margin:0;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      text-align:center;
    }
    .status.error{ color:rgba(251,113,133,0.96); }

    .format-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:10px;
    }
    .format-tile{
      min-width:0;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,0.22);
      background:rgba(255,255,255,0.045);
      display:grid;
      gap:8px;
    }
    .format-week{
      color:rgba(233,238,248,0.62);
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:950;
    }
    .format-course{
      color:#fff;
      font-size:16px;
      font-weight:950;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .format-meta{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:0 8px;
      border-radius:999px;
      border:1px solid rgba(125,211,252,0.30);
      background:rgba(125,211,252,0.09);
      color:rgba(224,242,254,0.94);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight:900;
      white-space:nowrap;
    }
    .pill.cutline{
      border-color:rgba(250,204,21,0.36);
      background:rgba(250,204,21,0.10);
      color:rgba(254,249,195,0.96);
    }
    .nopt-tabs-root{
      display:grid;
      gap:0;
      min-width:0;
      width:100%;
    }
    .nopt-tabs-list{
      width:100%;
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:0;
      padding:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,0.16);
      border-radius:0;
      background:transparent;
    }
    .nopt-tabs-trigger{
      position:relative;
      appearance:none;
      border:0;
      border-radius:0;
      background:transparent;
      color:rgba(233,238,248,0.86);
      min-height:38px;
      padding:6px 10px 7px;
      text-align:center;
      line-height:1.2;
      font:inherit;
      font-size:11px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      cursor:pointer;
      transition:background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .nopt-tabs-trigger::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      border-radius:0;
      background:transparent;
      transition:background-color 140ms ease;
    }
    .nopt-tabs-trigger:hover{
      background:rgba(148,163,184,0.10);
      color:rgba(255,255,255,0.95);
    }
    .nopt-tabs-trigger[data-state="active"]{
      background:rgba(129,140,248,0.09);
      color:#f4faff;
    }
    .nopt-tabs-trigger[data-state="active"]::after{
      background:rgba(129,140,248,0.78);
    }
    .nopt-tabs-trigger:focus-visible{
      outline:none;
      box-shadow:inset 0 0 0 1px rgba(129,140,248,0.42);
    }
    .nopt-tabs-content:focus-visible{
      outline:2px solid rgba(129,140,248,0.7);
      outline-offset:-2px;
    }
    .nopt-tabs-content{ min-width:0; }
    .nopt-tabs-content[data-state="inactive"]{ display:none; }
    .format-content{
      display:grid;
      gap:18px;
      padding:16px;
    }
    .format-intro{
      display:grid;
      gap:8px;
    }
    .format-title{
      margin:0;
      color:#fff;
      font-size:22px;
      line-height:1.12;
      font-weight:950;
      letter-spacing:.03em;
      text-transform:uppercase;
    }
    .format-copy{
      margin:0;
      color:rgba(233,238,248,0.86);
      font-size:14px;
      line-height:1.55;
      font-weight:700;
    }
    .format-section{
      display:grid;
      gap:10px;
      padding-top:2px;
    }
    .format-section-title{
      margin:0;
      color:var(--title);
      font-size:17px;
      font-weight:950;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .format-table-wrap{
      overflow:hidden;
      -webkit-overflow-scrolling:touch;
      border:1px solid rgba(148,163,184,0.18);
      border-radius:12px;
      background:rgba(255,255,255,0.04);
    }
    .format-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
      background:transparent;
      border-radius:12px;
      overflow:hidden;
    }
    .format-table th,
    .format-table td{
      padding:10px 12px;
      border-bottom:1px solid rgba(148,163,184,0.14);
      border-right:1px solid rgba(148,163,184,0.10);
      text-align:center;
      vertical-align:middle;
    }
    .format-table th{
      color:var(--muted);
      background:var(--header-bg);
      font-size:11px;
      font-weight:950;
      letter-spacing:.10em;
      text-transform:uppercase;
      white-space:normal;
    }
    .format-table td{
      color:rgba(233,238,248,0.88);
      font-size:13px;
      font-weight:750;
      line-height:1.35;
      text-align:center;
    }
    .format-table tr:last-child td{ border-bottom:0; }
    .format-table th:last-child,
    .format-table td:last-child{ border-right:0; }
    .format-rule-list{
      display:grid;
      gap:12px;
    }
    .format-rule-item{
      display:grid;
      gap:4px;
    }
    .format-rule-label{
      margin:2px 0 3px;
      color:rgba(233,238,248,0.62);
      font-size:10px;
      line-height:1.35;
      letter-spacing:.13em;
      text-transform:uppercase;
      font-weight:950;
    }
    .format-rule-text{
      margin:0;
      color:rgba(233,238,248,0.88);
      font-size:13px;
      line-height:1.45;
      font-weight:750;
    }

    .leaderboard-card{ padding:0; overflow:hidden; }
    .leaderboard-top{
      padding:16px;
      border-bottom:1px solid rgba(148,163,184,0.16);
    }
    .leaderboard-top .card-head{ margin-bottom:0; }
    .leaderboard-shell{
      display:block;
      min-width:0;
      max-width:100%;
    }
    .leaderboard-table-wrap{
      width:100%;
      max-width:100%;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:thin;
    }
    .leaderboard-table{
      width:max-content;
      min-width:100%;
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
    }
    .leaderboard-table th,
    .leaderboard-table td{
      border-right:1px solid rgba(148,163,184,0.10);
      border-bottom:1px solid rgba(148,163,184,0.12);
      background:var(--row-bg);
      vertical-align:middle;
    }
    .leaderboard-table tbody tr:nth-child(even) td{ background:var(--row-bg-2); }
    .leaderboard-table thead th{
      height:34px;
      padding:6px 7px;
      text-align:center;
      background:var(--header-bg);
      color:var(--muted);
      font-size:11px;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-weight:950;
      white-space:nowrap;
    }
    .leaderboard-table thead .course-heading{
      color:rgba(233,238,248,0.88);
      font-size:12px;
      letter-spacing:.08em;
    }
    .leaderboard-table thead .round-heading{
      color:rgba(156,163,199,0.92);
      font-variant-numeric:tabular-nums;
    }
    .leaderboard-table tbody td{
      height:58px;
      padding:8px 10px;
    }
    .rank-cell,
    .total-cell,
    .score-cell{
      text-align:center;
      font-variant-numeric:tabular-nums;
    }
    .rank-cell{
      width:var(--rank-col);
      min-width:var(--rank-col);
      max-width:var(--rank-col);
      color:#fff;
      font-size:18px;
      font-weight:950;
    }
    .rank-cell.gold{ color:#ffd700; }
    .rank-cell.silver{ color:#c0c0c0; }
    .rank-cell.bronze{ color:#cd7f32; }
    .rank-cell.cut-rank{
      color:rgba(251,113,133,0.92);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight:950;
    }
    .name-cell{
      width:var(--name-sticky-col);
      min-width:var(--name-sticky-col);
      max-width:var(--name-sticky-col);
      text-align:left;
    }
    .player-link,
    .player-static{
      min-width:0;
      color:inherit;
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .player-link:hover .player-name{
      color:#bfdbfe;
      text-decoration:underline;
      text-underline-offset:3px;
    }
    .player-avatar{
      width:34px;
      height:34px;
      border-radius:999px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.08);
      flex:0 0 auto;
    }
    .player-copy{
      min-width:0;
      display:grid;
      gap:3px;
    }
    .player-name{
      min-width:0;
      color:#fff;
      font-size:15px;
      font-weight:950;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .player-user{
      min-width:0;
      color:rgba(156,163,199,0.74);
      font-size:11px;
      font-weight:750;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .total-cell{
      width:var(--total-col);
      min-width:var(--total-col);
      max-width:var(--total-col);
      color:rgba(233,238,248,0.98);
      font-size:18px;
      font-weight:950;
    }
    .score-cell{
      width:var(--score-cell);
      min-width:var(--score-cell);
      color:rgba(233,238,248,0.82);
      font-size:16px;
      font-weight:850;
    }
    .sticky-col{
      position:sticky;
      z-index:5;
      background:var(--row-bg);
    }
    .leaderboard-table tbody tr:nth-child(even) .sticky-col{ background:var(--row-bg-2); }
    thead .sticky-col{
      z-index:8;
      background:var(--header-bg);
    }
    .sticky-rank{
      left:0;
      z-index:7;
    }
    .sticky-name{
      left:var(--rank-col);
      z-index:7;
    }
    .sticky-total{
      left:calc(var(--rank-col) + var(--name-sticky-col));
      z-index:7;
      box-shadow:inset -1px 0 rgba(148,163,184,0.14), 8px 0 14px rgba(0,0,0,0.24);
    }
    thead .sticky-rank,
    thead .sticky-name,
    thead .sticky-total{
      z-index:10;
    }
    .cut-row td{
      opacity:.82;
      background:rgba(255,255,255,0.035);
    }
    .cut-heading-row td{
      height:38px;
      padding:0 16px 0 22px;
      border-top:2px solid var(--border-strong);
      border-bottom:1px solid rgba(251,113,133,0.18);
      background:rgba(251,113,133,0.08);
    }
    .no-scores-heading-row td{
      height:38px;
      padding:0 16px 0 22px;
      border-top:2px solid var(--border-strong);
      border-bottom:1px solid rgba(148,163,184,0.18);
      background:rgba(148,163,184,0.08);
    }
    .cut-heading{
      color:rgba(254,205,211,0.94);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:950;
    }
    .no-scores-heading{
      color:rgba(203,213,225,0.95);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:950;
    }
    .empty-state{
      padding:20px 16px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      text-align:center;
      background:rgba(255,255,255,0.035);
    }
    @media (max-width:900px){
      .format-grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
      :root{
        --rank-col:56px;
        --name-sticky-col:180px;
        --total-col:74px;
        --score-cell:72px;
      }
    }

    @media (max-width:680px){
      .topbar-inner{
        padding:12px;
        flex-wrap:nowrap;
      }
      .brand{ flex:1; }
      .brand > div{ min-width:0; }
      .page-nav-select{
        width:min(100%, 420px);
        max-width:100%;
      }
      .container{ padding:14px 12px 42px; }
      .card{ padding:14px 12px; border-radius:18px; }
      .headline{ font-size:21px; }
      .format-grid{ gap:8px; }
      .format-tile{ padding:10px; border-radius:10px; }
      .format-course{ font-size:14px; }
      .nopt-tabs-trigger{
        min-height:40px;
        padding:5px 4px 7px;
        font-size:9px;
        line-height:1.05;
      }
      .format-content{ padding:12px; }
      .format-title{ font-size:18px; }
      .format-section{ gap:12px; }
      .format-section-title{
        line-height:1.35;
        margin:2px 0 3px;
      }
      .format-rule-list{ gap:14px; }
      .format-rule-label{
        line-height:1.4;
        margin:4px 0 5px;
      }
      .format-table th,
      .format-table td{
        padding:7px 6px;
        font-size:10px;
        line-height:1.2;
      }
      .format-table th{
        font-size:8px;
        letter-spacing:.05em;
      }
      .leaderboard-card{ padding:0; }
      .leaderboard-top{ padding:14px 12px; }
      :root{
        --header-bg:#0b1324;
        --row-bg:#101a2b;
        --row-bg-2:#0c1626;
        --rank-col:40px;
        --name-sticky-col:120px;
        --total-col:50px;
        --score-cell:54px;
      }
      .leaderboard-table-wrap{
        background:var(--row-bg);
        border-top:1px solid rgba(148,163,184,0.10);
      }
      .leaderboard-table .sticky-col{
        border-right-color:transparent;
      }
      .sticky-rank,
      .sticky-name{
        box-shadow:inset -1px 0 rgba(148,163,184,0.16);
      }
      .sticky-total{
        box-shadow:inset -1px 0 rgba(148,163,184,0.18), 10px 0 16px rgba(0,0,0,0.34);
      }
      .rank-cell{ font-size:13px; }
      .rank-cell.cut-rank{
        font-size:8px;
        letter-spacing:0;
      }
      .player-link,
      .player-static{ gap:6px; }
      .player-avatar{
        width:22px;
        height:22px;
      }
      .player-copy{ gap:1px; }
      .player-name{ font-size:11px; }
      .player-user{ font-size:9px; }
      .total-cell{ font-size:13px; }
      .leaderboard-table thead th{
        height:26px;
        padding:3px 4px;
        font-size:9px;
        letter-spacing:.06em;
      }
      .leaderboard-table thead .course-heading{ font-size:10px; letter-spacing:.04em; }
      .leaderboard-table tbody td{
        height:38px;
        padding:4px 5px;
      }
      .score-cell{
        font-size:12px;
      }
      .name-cell{ padding-left:6px !important; padding-right:6px !important; }
      .cut-heading-row td{
        height:34px;
        padding:0 12px 0 18px;
      }
      .no-scores-heading-row td{
        height:34px;
        padding:0 12px 0 18px;
      }
      .cut-row td{
        opacity:1;
        background:#101a2b;
      }
      .leaderboard-table tbody tr:nth-child(even).cut-row td{ background:#0c1626; }
      .cut-row .sticky-col{ background:#101a2b; }
      .leaderboard-table tbody tr:nth-child(even).cut-row .sticky-col{ background:#0c1626; }
      .cut-heading{
        font-size:11px;
      }
      .no-scores-heading{
        font-size:11px;
      }
    }

    @media (max-width:420px){
      .format-grid{ grid-template-columns:1fr; }
      .headline{ font-size:19px; }
      .subhead{ font-size:12px; }
      :root{
        --rank-col:38px;
        --name-sticky-col:112px;
        --total-col:48px;
        --score-cell:52px;
      }
      .player-name{ font-size:10px; }
      .player-user{ font-size:8px; }
      .score-cell{ font-size:11px; }
    }
  </style>
  <link rel="stylesheet" href="/site-topbar.css" />
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="home-btn" href="/index.html" aria-label="Home">
          <img src="/logos/golf.png" alt="Home" loading="eager" decoding="async" />
        </a>
        <div>
          <select class="kicker page-nav-select" aria-label="Select page" onchange="if (this.value) window.location.href=this.value;">
            <option value="/index.html">Home</option>
            <option value="/noptational.html" selected>The Noptational</option>
            <option value="/worldopen/index.html">World Open</option>
            <option value="/proleague/index.html">Shotgun Pro League</option>
            <option value="/superleague/index.html">Super League</option>
            <option value="/lightningcup/index.html">Lightning Cup</option>
            <option value="/beataidan/index.html">Beat Aidan</option>
            <option value="/records.html">Records</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <main class="container">
    <section id="leaderboardCard" class="card leaderboard-card">
      <div class="leaderboard-top">
        <div class="card-head">
          <div>
            <h1 class="headline">The Noptational</h1>
          </div>
        </div>
      </div>
      <div id="noptationalTabsRoot"></div>
    </section>
  </main>

  <script type="module">
    import { mountNoptationalTabs } from "/noptational-tabs.bundle.js";
    import { createBrowserSupabaseClient } from "/auth/supabase-auth.js";

    mountNoptationalTabs(document.getElementById("noptationalTabsRoot"));

    const supabase = createBrowserSupabaseClient();
    const WORKER_URL = "https://small-mud-2771.nextweekmedia.workers.dev/";
    const SHEET_ID = "1T7kmgUtimrOW3LaTw2hYLMFvO600SjmUDLTecL6gY00";
    const SHEET_NAME = "Round Scores (2026)";
    const SHEET_RANGE = `'${SHEET_NAME}'!A1:J250`;
    const MEMBER_PAGE_SIZE = 1000;

    const COURSES = [
      { key:"classic", name:"Classic", minimum:-12, columns:[1, 2] },
      { key:"resort", name:"Resort", minimum:-10, columns:[3, 4] },
      { key:"specials", name:"Specials", minimum:-3, columns:[5, 6, 7] },
      { key:"eighteen", name:"18 Holes", minimum:-22, columns:[8, 9] },
    ];

    const SCORE_COLUMNS = [
      { course:"classic", label:"C1", title:"Classic R1", column:1 },
      { course:"classic", label:"C2", title:"Classic R2", column:2 },
      { course:"resort", label:"R1", title:"Resort R1", column:3 },
      { course:"resort", label:"R2", title:"Resort R2", column:4 },
      { course:"specials", label:"S1", title:"Specials R1", column:5 },
      { course:"specials", label:"S2", title:"Specials R2", column:6 },
      { course:"specials", label:"S3", title:"Specials R3", column:7 },
      { course:"eighteen", label:"18-1", title:"18 Holes R1", column:8 },
      { course:"eighteen", label:"18-2", title:"18 Holes R2", column:9 },
    ];

    const leaderboardCard = document.getElementById("leaderboardCard");
    const leaderboardShell = document.getElementById("leaderboardShell");
    let discordMembersByUsernamePromise = null;

    function normalizeValues(resp){
      if(!resp) return [];
      if(resp.error){
        throw new Error(resp.error.message || "Google Sheets request failed.");
      }
      if(Array.isArray(resp)) return resp;
      if(Array.isArray(resp.values)) return resp.values;
      if(Array.isArray(resp.data?.values)) return resp.data.values;
      if(Array.isArray(resp.result?.values)) return resp.result.values;
      return [];
    }

    async function readWorkerResponse(response){
      const text = await response.text();
      let payload = null;
      try{
        payload = text ? JSON.parse(text) : null;
      }catch(e){
        if(!response.ok) throw new Error(`Worker request failed (${response.status}).`);
        throw new Error("Worker returned an unreadable response.");
      }

      if(!response.ok){
        const message = payload?.error?.message || payload?.message || text;
        throw new Error(`Worker request failed (${response.status}). ${message}`.trim());
      }
      return normalizeValues(payload);
    }

    async function fetchRange(range){
      const payload = { sheetId:SHEET_ID, range };

      try{
        const response = await fetch(WORKER_URL, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify(payload),
        });
        return await readWorkerResponse(response);
      }catch(e){
        if(e?.message && !/Failed to fetch|NetworkError|Load failed/i.test(e.message)){
          throw e;
        }
      }

      const url = new URL(WORKER_URL);
      url.searchParams.set("sheetId", SHEET_ID);
      url.searchParams.set("range", range);
      return readWorkerResponse(await fetch(url.toString()));
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function parseScore(value){
      const raw = String(value ?? "").trim();
      if(!raw) return null;
      if(/^e$/i.test(raw)) return 0;
      const cleaned = raw.replace(/[^\d.+-]/g, "");
      if(!cleaned || cleaned === "+" || cleaned === "-") return null;
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : null;
    }

    function formatScore(value){
      if(value === null || value === undefined || value === "") return "-";
      const n = typeof value === "number" ? value : parseScore(value);
      if(n === null) return String(value);
      if(n === 0 || Object.is(n, -0)) return "E";
      return n > 0 ? `+${n}` : String(n);
    }

    function getDisplayParts(rawName){
      const lines = String(rawName ?? "")
        .split(/\r?\n/)
        .map(part => part.trim())
        .filter(Boolean);
      const display = lines[0] || "";
      const username = lines[1] || "";
      return { display, username };
    }

    function normalizeUsernameKey(value){
      return String(value ?? "").trim().replace(/^@+/, "").toLowerCase();
    }

    function normalizeDiscordId(value){
      return String(value ?? "").replace(/[^\d]/g, "");
    }

    function avatarUrlForMember(member){
      return member?.server_avatar_url || member?.avatar_url || "/logos/golf.png";
    }

    function memberDisplayName(member, fallback){
      return String(member?.display_name || member?.username || fallback || "Player").trim();
    }

    async function loadDiscordMembersByUsername(){
      if(discordMembersByUsernamePromise) return discordMembersByUsernamePromise;

      discordMembersByUsernamePromise = (async () => {
        const members = [];
        for(let from = 0;; from += MEMBER_PAGE_SIZE){
          const to = from + MEMBER_PAGE_SIZE - 1;
          const { data, error } = await supabase
            .from("discord_guild_members")
            .select("discord_user_id,username,display_name,server_avatar_url,avatar_url")
            .eq("is_current_member", true)
            .range(from, to);

          if(error) throw error;
          members.push(...(data || []));
          if(!data || data.length < MEMBER_PAGE_SIZE) break;
        }

        const byUsername = new Map();
        members.forEach((member) => {
          const key = normalizeUsernameKey(member?.username);
          const discordId = normalizeDiscordId(member?.discord_user_id);
          if(!key || !discordId) return;
          if(!byUsername.has(key)) byUsername.set(key, { ...member, discord_user_id:discordId });
        });
        return byUsername;
      })();

      return discordMembersByUsernamePromise;
    }

    function scoreForCourse(row, course){
      const attempts = course.columns.map((column) => ({
        column,
        value:row[column] ?? "",
        score:parseScore(row[column]),
      }));
      const numeric = attempts.filter(attempt => attempt.score !== null);
      if(!numeric.length){
        return { attempts, best:null, qualifyingColumn:null, roundTotal:0, roundCount:0, hasScore:false, madeCut:null };
      }
      const best = Math.min(...numeric.map(attempt => attempt.score));
      const qualifyingColumn = numeric.find(attempt => attempt.score === best)?.column ?? null;
      return {
        attempts,
        best,
        qualifyingColumn,
        roundTotal:numeric.reduce((sum, attempt) => sum + attempt.score, 0),
        roundCount:numeric.length,
        hasScore:true,
        madeCut:best <= course.minimum,
      };
    }

    function buildPlayers(values){
      const dataRows = (values || []).slice(1);
      return dataRows.map((row, index) => {
        const { display, username } = getDisplayParts(row?.[0]);
        if(!display) return null;

        const courseResults = {};
        let cutCourse = null;
        let total = 0;
        let countedCount = 0;

        COURSES.forEach((course) => {
          const result = scoreForCourse(row, course);
          courseResults[course.key] = result;

          total += result.roundTotal;
          countedCount += result.roundCount;

          if(!cutCourse && result.hasScore){
            if(!result.madeCut){
              cutCourse = course;
            }
          }
        });

        return {
          id:`player-${index}`,
          display,
          username,
          member:null,
          row,
          courseResults,
          cutCourse,
          total,
          countedCount,
          rank:null,
        };
      }).filter(Boolean);
    }

    function comparePlayers(a, b){
      if(a.total !== b.total) return a.total - b.total;
      if(a.countedCount !== b.countedCount) return b.countedCount - a.countedCount;
      return a.display.localeCompare(b.display, undefined, { sensitivity:"base" });
    }

    function rankContenders(players){
      const sorted = [...players].sort(comparePlayers);
      let previousTotal = null;
      let previousRank = 0;
      sorted.forEach((player, index) => {
        if(index === 0 || player.total !== previousTotal){
          previousRank = index + 1;
          previousTotal = player.total;
        }
        player.rank = previousRank;
      });
      return sorted;
    }

    function rankClass(rank){
      return rank === 1 ? "gold" : rank === 2 ? "silver" : rank === 3 ? "bronze" : "";
    }

    function renderScoreCells(player){
      return SCORE_COLUMNS.map((scoreColumn) => {
        const value = player.row[scoreColumn.column] ?? "";
        return `
          <td class="score-cell" title="${escapeHtml(scoreColumn.title)}">${escapeHtml(formatScore(value))}</td>
        `;
      }).join("");
    }

    function renderPlayerRow(player, state = "active"){
      const isCut = state === "cut";
      const isNoScores = state === "no-scores";
      const rankContent = isCut ? "Cut" : isNoScores ? "-" : player.rank;
      const total = player.countedCount ? formatScore(player.total) : "-";
      const username = player.username ? `@${player.username.replace(/^@/, "")}` : "";
      const member = player.member || null;
      const playerUrl = member?.discord_user_id ? `/player.html?id=${encodeURIComponent(member.discord_user_id)}` : "";
      const avatarUrl = avatarUrlForMember(member);
      const avatarAlt = member ? memberDisplayName(member, player.display) : "";
      const copyHtml = `
        <img class="player-avatar" src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(avatarAlt)}" width="34" height="34" loading="lazy" decoding="async" fetchpriority="low" referrerpolicy="no-referrer" />
        <div class="player-copy">
          <div class="player-name">${escapeHtml(player.display)}</div>
          ${username ? `<div class="player-user">${escapeHtml(username)}</div>` : ""}
        </div>
      `;
      return `
        <tr class="${isCut ? "cut-row" : isNoScores ? "no-scores-row" : ""}">
          <td class="sticky-col sticky-rank rank-cell ${isCut ? "cut-rank" : rankClass(player.rank)}">${escapeHtml(rankContent)}</td>
          <td class="sticky-col sticky-name name-cell">
            ${playerUrl
              ? `<a class="player-link" href="${escapeHtml(playerUrl)}" aria-label="View ${escapeHtml(memberDisplayName(member, player.display))} player page">${copyHtml}</a>`
              : `<div class="player-static">${copyHtml}</div>`}
          </td>
          <td class="sticky-col sticky-total total-cell">${escapeHtml(total)}</td>
          ${renderScoreCells(player)}
        </tr>
      `;
    }

    function renderHeader(){
      return `
        <thead>
          <tr>
            <th class="sticky-col sticky-rank rank-cell" rowspan="2">Rank</th>
            <th class="sticky-col sticky-name name-cell" rowspan="2">Name</th>
            <th class="sticky-col sticky-total total-cell" rowspan="2">Total</th>
            ${COURSES.map(course => `<th class="course-heading" colspan="${course.columns.length}">${escapeHtml(course.name)}</th>`).join("")}
          </tr>
          <tr>
            ${COURSES.map(course => course.columns.map((column, index) => `<th class="score-cell round-heading">${index + 1}</th>`).join("")).join("")}
          </tr>
        </thead>
      `;
    }

    function renderLeaderboard(players){
      const playersWithScores = players.filter(player => player.countedCount > 0);
      const noScorePlayers = players.filter(player => player.countedCount === 0).sort(comparePlayers);
      const contenders = rankContenders(playersWithScores.filter(player => !player.cutCourse));
      const cutGroups = COURSES.map(course => ({
        course,
        players:playersWithScores.filter(player => player.cutCourse?.key === course.key).sort(comparePlayers),
      })).filter(group => group.players.length > 0);

      let bodyHtml = "";
      if(contenders.length){
        bodyHtml += contenders.map(player => renderPlayerRow(player)).join("");
      }else if(!cutGroups.length && !noScorePlayers.length){
        bodyHtml += `<tr><td class="empty-state" colspan="${SCORE_COLUMNS.length + 3}">No active players yet.</td></tr>`;
      }

      cutGroups.forEach((group) => {
        bodyHtml += `
          <tr class="cut-heading-row">
            <td colspan="${SCORE_COLUMNS.length + 3}">
              <div class="cut-heading">Cut - ${escapeHtml(group.course.name)}</div>
            </td>
          </tr>
            ${group.players.map(player => renderPlayerRow(player, "cut")).join("")}
        `;
      });

      if(noScorePlayers.length){
        bodyHtml += `
          <tr class="no-scores-heading-row">
            <td colspan="${SCORE_COLUMNS.length + 3}">
              <div class="no-scores-heading">NO SCORES</div>
            </td>
          </tr>
            ${noScorePlayers.map(player => renderPlayerRow(player, "no-scores")).join("")}
        `;
      }

      leaderboardShell.innerHTML = `
        <div class="leaderboard-table-wrap">
          <table class="leaderboard-table">
            ${renderHeader()}
            <tbody>${bodyHtml}</tbody>
          </table>
        </div>
      `;
    }

    function showStatus(message, isError = false){
      leaderboardShell.innerHTML = `
        <div class="empty-state">
          <p class="status ${isError ? "error" : ""}">${escapeHtml(message)}</p>
        </div>
      `;
      leaderboardCard.hidden = false;
    }

    function showLeaderboard(){
      leaderboardCard.hidden = false;
    }

    async function loadLeaderboard(){
      try{
        const values = await fetchRange(SHEET_RANGE);
        const players = buildPlayers(values);
        if(!players.length){
          showStatus("No leaderboard rows found yet.");
          return;
        }
        try{
          const membersByUsername = await loadDiscordMembersByUsername();
          players.forEach((player) => {
            player.member = membersByUsername.get(normalizeUsernameKey(player.username)) || null;
          });
        }catch(error){
          console.warn("Could not load Discord member data for Noptational leaderboard.", error);
        }
        renderLeaderboard(players);
        showLeaderboard();
      }catch(error){
        const message = error?.message || "";
        const friendly = /Failed to fetch|NetworkError|Load failed/i.test(message)
          ? "Leaderboard unavailable. The Google Sheets worker request was blocked or failed."
          : message || "Leaderboard unavailable.";
        showStatus(friendly, true);
      }
    }

    loadLeaderboard();
  </script>
  <script type="module" src="/site-topbar.js"></script>
</body>
