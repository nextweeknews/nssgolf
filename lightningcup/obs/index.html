<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="transparent" />
  <title>Lightning Cup OBS</title>

  <style>
    :root{
      --text:#ecf3ff;
      --muted:#9fb0d0;
      --title:#d4e2ff;
      --panel-border:rgba(148,163,184,.22);
      --panel-fill:rgba(6,18,38,.95);
      --panel-fill-soft:rgba(255,255,255,.045);
      --player-one-rgb:96,165,250;
      --player-two-rgb:34,197,94;
      --danger-rgb:239,68,68;
      --shadow:0 28px 48px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    [hidden]{ display:none !important; }
    html,
    body{
      margin:0;
      min-height:100%;
      background:transparent;
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow:hidden;
    }
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px;
    }
    .obs-shell{
      width:min(1500px, calc(100vw - 36px));
      display:grid;
      gap:10px;
    }
    .obs-status{
      margin:0;
      padding:11px 14px;
      border-radius:14px;
      border:1px solid rgba(248,113,113,.32);
      background:rgba(127,29,29,.42);
      color:#fecaca;
      font-size:13px;
      font-weight:800;
      letter-spacing:.03em;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .obs-status.is-hidden{ display:none; }
    .obs-card{
      display:grid;
      gap:16px;
      padding:18px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.11);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.2), transparent 28%),
        linear-gradient(180deg, rgba(7,21,45,.94), rgba(3,12,25,.985));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .obs-header{
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:14px;
    }
    .brand-block{
      display:grid;
      gap:3px;
      min-width:0;
    }
    .brand-kicker{
      color:rgba(233,238,248,.62);
      font-size:11px;
      font-weight:900;
      letter-spacing:.24em;
      text-transform:uppercase;
    }
    .brand-title{
      color:var(--title);
      font-size:25px;
      font-weight:950;
      letter-spacing:.05em;
      text-transform:uppercase;
      line-height:1;
    }
    .meta-pills{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }
    .meta-pill,
    .panel-chip,
    .note-chip{
      min-height:34px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--panel-border);
      background:rgba(255,255,255,.06);
      color:rgba(226,232,240,.96);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:12px;
      font-weight:900;
      letter-spacing:.09em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .meta-pill.is-region{
      color:rgb(125,211,252);
      border-color:rgba(125,211,252,.34);
    }
    .obs-live{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:9px;
      min-width:0;
    }
    .realtime-state{
      font-size:12px;
      font-weight:950;
      letter-spacing:.11em;
      text-transform:uppercase;
      color:#4ade80;
      white-space:nowrap;
    }
    .realtime-state.is-error{ color:#f87171; }
    .realtime-updated{
      color:rgba(226,232,240,.86);
      font-size:12px;
      font-weight:700;
      letter-spacing:.02em;
      white-space:nowrap;
    }
    .live-dot,
    .online-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      flex:0 0 auto;
      background:rgba(148,163,184,.4);
      box-shadow:none;
    }
    .live-dot.is-live,
    .online-dot.is-online{
      background:#22c55e;
      box-shadow:0 0 0 0 rgba(34,197,94,.56);
      animation:pulse-live 1.5s ease-out infinite;
    }
    .obs-body{
      display:grid;
      grid-template-columns:minmax(0, 1.12fr) minmax(440px, .88fr);
      gap:14px;
      align-items:stretch;
    }
    .panel{
      display:grid;
      gap:14px;
      min-width:0;
      padding:16px;
      border-radius:22px;
      border:1px solid var(--panel-border);
      background:var(--panel-fill);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }
    .scoreboard-shell{
      display:grid;
      gap:8px;
    }
    .scoreboard-header,
    .scoreboard-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) repeat(3, 64px) 84px;
      gap:8px;
      align-items:center;
    }
    .scoreboard-header{
      padding:0 8px;
      min-height:16px;
      color:rgba(148,163,184,.9);
      font-size:10px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .scoreboard-header span{
      display:grid;
      justify-items:center;
      text-align:center;
      white-space:nowrap;
      line-height:1.1;
    }
    .scoreboard-header span:first-child{ justify-items:start; }
    .scoreboard-row{
      min-height:78px;
      padding:10px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      border-left:4px solid rgba(148,163,184,.72);
      background:var(--panel-fill-soft);
    }
    .scoreboard-row.is-player-one{ border-left-color:rgba(var(--player-one-rgb), .96); }
    .scoreboard-row.is-player-two{ border-left-color:rgba(var(--player-two-rgb), .92); }
    .scoreboard-player{
      min-width:0;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .scoreboard-seed{
      color:rgba(191,219,254,.94);
      font-size:13px;
      font-weight:900;
      line-height:1;
      font-variant-numeric:tabular-nums;
    }
    .scoreboard-player-copy{
      min-width:0;
      display:grid;
      gap:4px;
    }
    .scoreboard-label{
      color:rgba(148,163,184,.86);
      font-size:10px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .scoreboard-name{
      color:#fff;
      font-size:21px;
      font-weight:950;
      letter-spacing:.03em;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
    }
    .scoreboard-score,
    .scoreboard-match-score{
      min-height:54px;
      display:grid;
      place-items:center;
      border-radius:10px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(2,6,23,.42);
      color:rgba(226,232,240,.96);
      font-size:22px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .scoreboard-score.is-won{
      color:#020617;
      border-color:transparent;
    }
    .scoreboard-score.is-won.is-player-one{ background:rgba(var(--player-one-rgb), .96); }
    .scoreboard-score.is-won.is-player-two{ background:rgba(var(--player-two-rgb), .92); }
    .scoreboard-match-score{
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:28px;
    }
    .scoreboard-match-score.is-won.is-player-one{
      color:rgb(var(--player-one-rgb));
      border-color:rgba(var(--player-one-rgb), .88);
    }
    .scoreboard-match-score.is-won.is-player-two{
      color:rgb(var(--player-two-rgb));
      border-color:rgba(var(--player-two-rgb), .88);
    }
    .scoreboard-notes{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .note-chip.is-player-one,
    .panel-chip.is-player-one{ border-color:rgba(var(--player-one-rgb), .38); color:rgb(var(--player-one-rgb)); }
    .note-chip.is-player-two,
    .panel-chip.is-player-two{ border-color:rgba(var(--player-two-rgb), .38); color:rgb(var(--player-two-rgb)); }
    .panel-chip.is-danger{ border-color:rgba(var(--danger-rgb), .42); color:#fda4af; }
    .course-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }
    .course-copy{
      display:grid;
      gap:6px;
      min-width:0;
    }
    .panel-kicker{
      margin:0;
      color:rgba(148,163,184,.92);
      font-size:11px;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
    }
    .panel-title{
      margin:0;
      min-width:0;
      color:#fff;
      font-size:24px;
      font-weight:950;
      line-height:1.08;
      letter-spacing:.02em;
      text-transform:uppercase;
    }
    .panel-title .is-player-one{ color:rgb(var(--player-one-rgb)); }
    .panel-title .is-player-two{ color:rgb(var(--player-two-rgb)); }
    .panel-title .is-course{ color:#bfdbfe; }
    .course-board{
      display:grid;
      grid-template-columns:minmax(0, 3fr) minmax(156px, 1fr);
      gap:10px;
      align-items:stretch;
    }
    .course-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:10px;
    }
    .special-course-slot{
      display:grid;
    }
    .course-tile{
      min-height:106px;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(255,255,255,.04);
      display:grid;
      gap:14px;
      align-content:space-between;
      transition:border-color 140ms ease, background-color 140ms ease, transform 140ms ease;
    }
    .course-tile.is-picked{
      color:#020617;
      border-color:transparent;
    }
    .course-tile.is-picked.is-player-one{ background:rgba(var(--player-one-rgb), .96); }
    .course-tile.is-picked.is-player-two{ background:rgba(var(--player-two-rgb), .92); }
    .course-tile.is-picked.is-sudden-death{
      background:rgba(var(--danger-rgb), .92);
      color:#fff;
    }
    .course-tile.is-live{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.82);
      box-shadow:0 0 0 2px rgba(255,255,255,.1);
    }
    .course-tile.is-available{
      border-style:dashed;
      border-color:rgba(191,219,254,.34);
      background:rgba(191,219,254,.05);
    }
    .course-tile-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .course-tile-name{
      color:inherit;
      font-size:15px;
      font-weight:950;
      letter-spacing:.07em;
      text-transform:uppercase;
      line-height:1.15;
    }
    .course-badge{
      min-width:30px;
      min-height:30px;
      padding:0 8px;
      border-radius:999px;
      background:rgba(2,6,23,.18);
      color:inherit;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      flex:0 0 auto;
    }
    .course-badge.is-live{
      background:rgba(255,255,255,.16);
      color:#fff;
    }
    .course-tile-meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-width:0;
      color:inherit;
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.82;
    }
    .course-tile-state{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
    }
    .course-hint{
      margin:0;
      color:rgba(148,163,184,.94);
      font-size:12px;
      font-weight:700;
      letter-spacing:.02em;
      line-height:1.45;
    }
    @keyframes pulse-live{
      0%{ box-shadow:0 0 0 0 rgba(34,197,94,.55); }
      70%{ box-shadow:0 0 0 8px rgba(34,197,94,0); }
      100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
    }
    @media (max-width:1180px){
      body{
        place-items:start center;
        overflow:auto;
      }
      .obs-body{
        grid-template-columns:1fr;
      }
    }
    @media (max-width:820px){
      body{ padding:12px; }
      .obs-shell{ width:min(100%, 760px); }
      .obs-card{ padding:14px; border-radius:24px; }
      .obs-header{
        grid-template-columns:1fr;
        justify-items:start;
      }
      .meta-pills,
      .obs-live{
        justify-content:flex-start;
      }
      .scoreboard-header,
      .scoreboard-row{
        grid-template-columns:minmax(0,1fr) repeat(3, 44px) 56px;
        gap:6px;
      }
      .scoreboard-row{ min-height:68px; padding:8px; }
      .scoreboard-name{ font-size:16px; }
      .scoreboard-score{ min-height:48px; font-size:18px; }
      .scoreboard-match-score{ min-height:48px; font-size:22px; }
      .course-board{
        grid-template-columns:1fr;
      }
      .course-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
      .special-course-slot{
        grid-template-columns:minmax(0, calc((100% - 10px) / 2));
        justify-content:center;
      }
      .panel-title{ font-size:20px; }
    }
  </style>
</head>
<body>
  <main class="obs-shell">
    <p class="obs-status is-hidden" id="pageStatus"></p>

    <section class="obs-card" aria-label="Lightning Cup OBS match graphic">
      <header class="obs-header">
        <div class="brand-block">
          <span class="brand-kicker">Lightning Cup</span>
          <span class="brand-title">OBS Match Feed</span>
        </div>

        <div class="meta-pills" aria-label="Match metadata">
          <span class="meta-pill" id="roundPill">Match</span>
          <span class="meta-pill is-region" id="regionPill" hidden></span>
          <span class="meta-pill" id="matchPill">Match</span>
        </div>

        <div class="obs-live" aria-label="Realtime status">
          <span class="realtime-state" id="realtimeStatusText">Connecting</span>
          <span class="live-dot" id="realtimePulse" aria-hidden="true"></span>
          <span class="realtime-updated" id="lastUpdatedText">Updated -</span>
        </div>
      </header>

      <div class="obs-body">
        <section class="panel" aria-label="Scoreboard">
          <div class="scoreboard-shell">
            <div class="scoreboard-header" aria-hidden="true">
              <span>Player</span>
              <span>Set 1</span>
              <span>Set 2</span>
              <span>Set 3</span>
              <span>Match</span>
            </div>

            <div class="scoreboard-row is-player-one">
              <div class="scoreboard-player">
                <span class="scoreboard-seed" id="scoreboardTopSeed">TBD</span>
                <div class="scoreboard-player-copy">
                  <span class="scoreboard-label">Top</span>
                  <span class="scoreboard-name" id="scoreboardTopName">TBD</span>
                </div>
                <span class="online-dot" id="scoreboardTopOnline" aria-hidden="true"></span>
              </div>
              <span class="scoreboard-score" id="scoreboardTopSet1">-</span>
              <span class="scoreboard-score" id="scoreboardTopSet2">-</span>
              <span class="scoreboard-score" id="scoreboardTopSet3">-</span>
              <span class="scoreboard-match-score" id="scoreboardTopMatch">0</span>
            </div>

            <div class="scoreboard-row is-player-two">
              <div class="scoreboard-player">
                <span class="scoreboard-seed" id="scoreboardBottomSeed">TBD</span>
                <div class="scoreboard-player-copy">
                  <span class="scoreboard-label">Bottom</span>
                  <span class="scoreboard-name" id="scoreboardBottomName">TBD</span>
                </div>
                <span class="online-dot" id="scoreboardBottomOnline" aria-hidden="true"></span>
              </div>
              <span class="scoreboard-score" id="scoreboardBottomSet1">-</span>
              <span class="scoreboard-score" id="scoreboardBottomSet2">-</span>
              <span class="scoreboard-score" id="scoreboardBottomSet3">-</span>
              <span class="scoreboard-match-score" id="scoreboardBottomMatch">0</span>
            </div>
          </div>

          <div class="scoreboard-notes">
            <span class="note-chip" id="ctpStatus">Awaiting match data</span>
          </div>
        </section>

        <section class="panel" aria-label="Course selection board">
          <div class="course-head">
            <div class="course-copy">
              <p class="panel-kicker" id="courseSetLabel">Course Board</p>
              <p class="panel-title" id="flowSummary">Waiting for match data</p>
            </div>
            <span class="panel-chip" id="phaseMeta">Standby</span>
          </div>

          <div class="course-board">
            <div class="course-grid" id="courseGrid" aria-label="Course grid"></div>
            <div class="special-course-slot" id="specialCourseSlot" aria-label="Special course"></div>
          </div>

          <p class="course-hint" id="courseHint">Add a match ID in the query string to render a live feed.</p>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="/lightningcup/obs/obs-page.js?v=20260410-live"></script>
</body>
</html>
