<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <title>Lightning Cup 2026</title>

  <style>
    :root{
      --bg1:#061C3B; --bg2:#04142E; --bg3:#020B18;
      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);
      --header-bg: rgba(148,163,184,0.12);
      --row-bg: rgba(255,255,255,0.06);
      --text: #e9eef8;
      --title: #c7d7ff;
      --muted: #9ca3c7;
      --border-lite: rgba(148,163,184,0.20);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.10);
      --btn-border: rgba(255,255,255,0.15);
      --btn-border-hover: rgba(255,255,255,0.28);
      --success: rgba(34,197,94,0.20);
      --danger: rgba(239,68,68,0.22);
      --pending: rgba(148,163,184,0.20);
      --pick: rgba(56,189,248,0.18);
      --warning: rgba(251,191,36,0.22);
      --region-accent-rgb: 125,211,252;
      --qualifier-round-column-width: 264px;
      --qualifier-match-height: 64px;
      --qualifier-seed-col-width: 14px;
      --qualifier-score-col-width: 14px;
      --qualifier-final-score-width: 24px;
      --qualifier-scorepack-width: 78px;
      --qualifier-pick-indicator-width: 15px;
    }
    *{ box-sizing:border-box; }
    html{ background-color: var(--bg3); }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg3);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }
    .topbar{ position: sticky; top:0; z-index:10; border-bottom:1px solid rgba(255,255,255,.10); background: rgba(3,18,42,.70); backdrop-filter: blur(10px); }
    .topbar-inner{ max-width:1260px; margin:0 auto; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .brand{display:flex; gap:12px; align-items:center;}
    .home-badge{ width:40px; height:40px; border-radius:16px; border:1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.05); display:grid; place-items:center; overflow:hidden; user-select:none; }
    .home-badge img{ width:70%; height:70%; object-fit:contain; display:block; pointer-events:none; }
    .kicker{ font-size:11px; letter-spacing:.25em; text-transform:uppercase; color: rgba(255,255,255,.65); font-weight:900; }
    .page-nav-select{ background: rgba(2,6,23,.85); color: inherit; border: 1px solid rgba(125,211,252,.35); border-radius: 10px; padding: 6px 32px 6px 10px; font: inherit; letter-spacing: inherit; text-transform: uppercase; max-width: min(56vw, 420px); cursor: pointer; }
    .topbar-user{ margin-left:auto; position:relative; display:none; align-items:center; gap:8px; }
    .topbar-user.is-visible{ display:flex; }
    .user-greeting{ font-size:12px; font-weight:500; letter-spacing:.03em; color: rgba(233,238,248,0.92); }
    .user-greeting-name{ font-weight:800; }
    .user-menu-button{ width:38px; height:38px; border-radius:999px; border:1px solid var(--btn-border); background: var(--btn-bg); color: rgba(233,238,248,0.92); display:grid; place-items:center; cursor:pointer; overflow:hidden; padding:0; }
    .user-menu-button:hover{ background: var(--btn-bg-hover); border-color:var(--btn-border-hover); }
    .user-menu-avatar{ width:100%; height:100%; object-fit:cover; display:block; }
    .user-menu-button svg{ width:18px; height:18px; fill: currentColor; }
    .user-menu-button.has-avatar svg{ display:none; }
    .user-menu-dropdown{ position:absolute; top: calc(100% + 8px); right:0; min-width:220px; border-radius:12px; border:1px solid rgba(148,163,184,.35); background: rgba(2,8,24,.97); box-shadow: 0 24px 36px rgba(0,0,0,.48); padding:6px; display:none; z-index:30; }
    .user-menu-dropdown.is-open{ display:grid; gap:4px; }
    .user-menu-item{ width:100%; border:1px solid transparent; border-radius:9px; background: rgba(255,255,255,.04); color: rgba(255,255,255,.92); min-height:34px; padding:0 10px; text-align:left; font-size:11px; letter-spacing:.05em; text-transform:uppercase; font-weight:800; cursor:pointer; }
    .user-menu-item:hover{ background: rgba(255,255,255,.10); border-color:rgba(255,255,255,.22); }
    .user-menu-item[disabled]{ opacity:.5; cursor:not-allowed; }
    .user-menu-item[disabled]:hover{ background: rgba(255,255,255,.04); border-color:transparent; }
    .user-menu-divider{ height:1px; margin:4px 2px; background: rgba(148,163,184,.24); }

    .container{ max-width:1260px; margin:0 auto; padding:22px 18px 52px; display:grid; gap:12px; }
    .card{ background: var(--card-bg); border-radius: 20px; padding:14px; box-shadow: var(--card-shadow); border: 1px solid rgba(255,255,255,0.10); display:grid; gap:10px; }
    .headline{ margin:0; font-size:26px; font-weight:950; color:var(--title); letter-spacing:.035em; text-transform:uppercase; text-align:center; }
    .season-head{ min-height:44px; padding:2px 0; margin-bottom:8px; display:flex; align-items:center; justify-content:center; }
    .status{ margin:0; color:var(--muted); font-size:12px; text-align:center; }

    .tabs{ width:100%; }
    .btn{ border:1px solid var(--btn-border); background: var(--btn-bg); color: rgba(255,255,255,.92); border-radius:999px; padding:8px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; font-weight:850; cursor:pointer; }
    .btn:hover{ background: var(--btn-bg-hover); border-color:var(--btn-border-hover); }
    .btn-primary{ background: rgba(56,189,248,0.18); border-color: rgba(56,189,248,0.42); }
    .btn[disabled]{ opacity:.45; cursor:not-allowed; }
    .lc-nav-root{ width:100%; display:grid; gap:0; }
    .lc-nav-list{
      list-style:none;
      margin:0;
      padding:0;
      width:100%;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.24);
      background: transparent;
    }
    .lc-nav-item{ position:relative; min-width:0; }
    .lc-nav-trigger{
      width:100%;
      min-height:36px;
      position:relative;
      border:0;
      border-radius:0;
      background: transparent;
      color: rgba(233,238,248,.88);
      padding:7px 10px;
      text-align:center;
      line-height:1.2;
      font: inherit;
      font-size:12px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0;
      appearance:none;
      cursor:pointer;
      transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .lc-nav-trigger-label{ display:block; width:100%; text-align:center; }
    .lc-nav-trigger::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      border-radius:0;
      background: transparent;
      transition: background-color 140ms ease;
    }
    .lc-nav-trigger:hover{
      background: rgba(148,163,184,.10);
      color: rgba(255,255,255,.96);
    }
    .lc-nav-item[value="game"] .lc-nav-trigger{ color: rgba(250,204,21,.94); }
    .lc-nav-item[value="game"] .lc-nav-trigger:hover{
      background: rgba(250,204,21,.12);
      color: rgba(254,243,199,.98);
    }
    .lc-nav-trigger[data-state="open"]{
      background: rgba(56,189,248,.14);
      color: #f1f8ff;
    }
    .lc-nav-trigger[data-state="open"]::after{ background: rgba(125,211,252,.95); }
    .lc-nav-item[value="game"] .lc-nav-trigger[data-state="open"]{
      background: rgba(250,204,21,.16);
      color: rgba(254,243,199,.98);
    }
    .lc-nav-item[value="game"] .lc-nav-trigger[data-state="open"]::after{ background: rgba(250,204,21,.95); }
    .lc-nav-trigger:focus-visible{
      outline:none;
      box-shadow: inset 0 0 0 1px rgba(125,211,252,.55);
    }
    .lc-nav-viewport-wrap{ position:relative; width:100%; }
    .lc-nav-viewport{
      position:relative;
      width:100%;
      height: var(--radix-navigation-menu-viewport-height);
      transform-origin: top center;
      border:0;
      border-radius:0;
      background: transparent;
      box-shadow:none;
      overflow:visible;
      transition: width 220ms ease, height 220ms ease;
    }
    .lc-nav-viewport[data-state="open"]{ animation: lc-nav-viewport-in 180ms ease; }
    .lc-nav-viewport[data-state="closed"]{ animation: lc-nav-viewport-out 140ms ease; }
    .lc-nav-content{
      width:100%;
      padding:0;
      display:grid;
      gap:4px;
    }
    .lc-nav-sublist{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:minmax(0,1fr);
      gap:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.22);
      background: transparent;
    }
    .lc-nav-sublist > li{ min-width:0; }
    .lc-nav-sublink{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:32px;
      border:0;
      border-radius:0;
      background: transparent;
      color: rgba(233,238,248,.9);
      padding:0 10px;
      text-align:center;
      text-decoration:none;
      line-height:1.2;
      font-size:10px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .lc-nav-sublink:hover{
      background: rgba(148,163,184,.10);
      color:#f8fbff;
    }
    .lc-nav-sublink[data-active]{
      background: rgba(148,163,184,.16);
      color: rgba(246,248,252,.97);
    }
    .lc-nav-sublink:focus-visible{
      outline:none;
      box-shadow: 0 0 0 2px rgba(125,211,252,.45);
    }
    .lc-nav-sublink[data-disabled]{ opacity:.55; cursor:not-allowed; }
    .lc-nav-sublink[data-disabled]:hover{
      background: transparent;
      color: rgba(233,238,248,.9);
    }
    .lc-nav-subtext{
      color: rgba(156,163,199,.9);
      font-size:11px;
      line-height:1.35;
      padding:4px 2px 1px;
      text-align:center;
    }
    .lc-region-tabs-root{ width:100%; }
    .lc-region-tabs-list{
      width:100%;
      display:grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap:0;
      padding:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.24);
      border-radius:0;
      background: transparent;
    }
    .lc-region-tabs-trigger{
      position:relative;
      min-height:35px;
      border:0;
      border-radius:0;
      background: transparent;
      color: rgba(233,238,248,.86);
      padding:6px 8px 7px;
      text-align:center;
      line-height:1.2;
      font: inherit;
      font-size:11px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      appearance:none;
      cursor:pointer;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .lc-region-tabs-trigger::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      border-radius:0;
      background: transparent;
      transition: background-color 140ms ease;
    }
    .lc-region-tabs-trigger:hover{
      background: rgba(148,163,184,.10);
      color: rgba(255,255,255,.95);
    }
    .lc-region-tabs-trigger[data-state="active"]{
      background: rgba(var(--region-accent-rgb), .13);
      color:#f4faff;
    }
    .lc-region-tabs-trigger[data-state="active"]::after{ background: rgba(var(--region-accent-rgb), .95); }
    .lc-region-tabs-trigger:focus-visible{
      outline:none;
      box-shadow: inset 0 0 0 1px rgba(var(--region-accent-rgb), .55);
    }
    .lc-region-tabs-trigger[data-disabled]{ opacity:.5; cursor:not-allowed; }
    .lc-region-tabs-content{
      position:absolute;
      width:1px;
      height:1px;
      margin:-1px;
      padding:0;
      overflow:hidden;
      clip:rect(0, 0, 0, 0);
      white-space:nowrap;
      border:0;
    }
    @keyframes lc-nav-viewport-in{
      from{ opacity:0; transform:scale(.98); }
      to{ opacity:1; transform:scale(1); }
    }
    @keyframes lc-nav-viewport-out{
      from{ opacity:1; }
      to{ opacity:0; }
    }
    .two-col{ display:grid; grid-template-columns: minmax(0,1fr); gap:12px; }
    .panel{ border:1px solid var(--border-lite); border-radius:16px; padding:12px; background: rgba(15,23,42,0.55); }

    .qualifier-seed-list{ display:grid; gap:6px; }
    .qualifier-seed-head,.qualifier-seed-row{ display:grid; grid-template-columns: 44px 1fr; align-items:center; text-align:center; }
    .qualifier-seed-head{ background: var(--header-bg); border-radius:10px; padding:8px 6px; color:var(--muted); font-size:8px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; }
    .qualifier-seed-row{ background: var(--row-bg); border-radius:10px; padding:8px 6px; }
    .qualifier-seed-number{ font-size:12px; font-weight:800; color:#93c5fd; }
    .qualifier-seed-player{ font-size:12px; font-weight:850; text-transform: uppercase; overflow-wrap:anywhere; }

    .qualifier-bracket-scroll{ width:100%; overflow-x:auto; overflow-y:hidden; padding-bottom:4px; }
    .qualifier-bracket-grid{ display:grid; grid-auto-flow:column; grid-auto-columns:var(--qualifier-round-column-width); gap:18px; align-items:start; width:max-content; min-width:100%; justify-content:center; padding:2px; }
    .qualifier-round-column{ display:flex; flex-direction:column; gap:8px; min-width:0; }
    .qualifier-round-title{ margin:0; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); text-align:center; }
    .qualifier-round-stack{ display:flex; flex-direction:column; gap: var(--qualifier-round-gap, 8px); }
    .qualifier-round-stack .qualifier-bracket-match:first-child{ padding-top: var(--qualifier-round-padding-top, 0px); }
    .qualifier-round-stack .qualifier-bracket-match + .qualifier-bracket-match{ padding-top: var(--qualifier-round-gap, 8px); }
    .qualifier-bracket-match{ display:grid; grid-template-columns:22px minmax(0,1fr); column-gap:6px; align-items:center; width:100%; min-height:var(--qualifier-match-height); }
    .qualifier-match-info{ width:22px; flex:0 0 22px; height:22px; border-radius:999px; border:1px solid var(--btn-border); background: var(--btn-bg); color: rgba(233,238,248,0.86); font-size:11px; font-weight:900; cursor:pointer; }
    .qualifier-match-card{ position:relative; width:100%; min-width:0; border-radius:10px; overflow:hidden; background: rgba(255,255,255,0.05); isolation:isolate; }
    .qualifier-match-card::before{ content:""; position:absolute; inset:0; border:1px solid rgba(255,255,255,0.08); border-radius:inherit; pointer-events:none; z-index:3; transition: border-color 120ms ease, box-shadow 120ms ease; }
    .qualifier-match-row{ width:100%; display:grid; grid-template-columns:var(--qualifier-seed-col-width) minmax(0,1fr) var(--qualifier-scorepack-width); align-items:center; gap:8px; min-height:24px; background: rgba(255,255,255,0.06); color: var(--muted); padding:3px 5px 3px 6px; border:0; font-size:10px; text-align:left; position:relative; z-index:1; transition: box-shadow 120ms ease, border-color 120ms ease, background-color 120ms ease, color 120ms ease; }
    .qualifier-match-row.no-score{ grid-template-columns:var(--qualifier-seed-col-width) minmax(0,1fr); }
    .qualifier-match-row.no-score.has-pick-radio{ grid-template-columns:var(--qualifier-seed-col-width) minmax(0,1fr) var(--qualifier-pick-indicator-width); }
    .qualifier-match-row:first-child{ border-top-left-radius:10px; border-top-right-radius:10px; }
    .qualifier-match-row:last-child{ border-bottom-left-radius:10px; border-bottom-right-radius:10px; }
    .qualifier-match-row:nth-child(2){ background: rgba(255,255,255,0.045); }
    .qualifier-match-row + .qualifier-match-row{ border-top:1px solid rgba(148,163,184,0.38); }
    .qualifier-match-row.winner{ background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.55); }
    .qualifier-match-row.selected{ box-shadow: inset 0 0 0 999px var(--pick); }
    .qualifier-match-row.correct{ box-shadow: inset 0 0 0 999px var(--success); }
    .qualifier-match-row.incorrect{ box-shadow: inset 0 0 0 999px var(--danger); }
    .qualifier-match-row.pending{ box-shadow: inset 0 0 0 999px var(--pending); }
    .qualifier-bracket-grid[data-bracket-mode="pick"] .qualifier-match-row:not([disabled]){ cursor: pointer; }
    .qualifier-bracket-grid[data-bracket-mode="pick"] .qualifier-match-row:not([disabled]):hover:not(.selected){ box-shadow: inset 0 0 0 999px rgba(var(--region-accent-rgb), .07); }
    .qualifier-bracket-grid[data-bracket-mode="pick"] .qualifier-match-card.is-selected .qualifier-match-row + .qualifier-match-row{ border-top-color: rgba(var(--region-accent-rgb), .56); }
    .qualifier-bracket-grid[data-bracket-mode="pick"] .qualifier-match-row.selected,
    .qualifier-bracket-grid[data-bracket-mode="pick"] .qualifier-match-row.selected.pending{
      z-index:4;
      box-shadow: inset 0 0 0 999px rgba(var(--region-accent-rgb), .12);
    }
    .qualifier-bracket-grid[data-bracket-mode="pick"] .qualifier-match-row.selected:first-child::after{
      content:"";
      position:absolute;
      inset:0;
      border-top:1px solid rgba(var(--region-accent-rgb), .56);
      border-left:1px solid rgba(var(--region-accent-rgb), .56);
      border-right:1px solid rgba(var(--region-accent-rgb), .56);
      border-top-left-radius:inherit;
      border-top-right-radius:inherit;
      pointer-events:none;
    }
    .qualifier-bracket-grid[data-bracket-mode="pick"] .qualifier-match-row.selected:last-child::after{
      content:"";
      position:absolute;
      inset:0;
      border-bottom:1px solid rgba(var(--region-accent-rgb), .56);
      border-left:1px solid rgba(var(--region-accent-rgb), .56);
      border-right:1px solid rgba(var(--region-accent-rgb), .56);
      border-bottom-left-radius:inherit;
      border-bottom-right-radius:inherit;
      pointer-events:none;
    }
    .qualifier-match-row[disabled]{ cursor:not-allowed; opacity:.7; }
    .qualifier-player-seed{ width:100%; text-align:center; font-variant-numeric: tabular-nums; font-weight:800; }
    .qualifier-player-seed{ color:#93c5fd; }
    .qualifier-player-name{ min-width:0; font-weight:900; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:.02em; color:#fff; }
    .qualifier-row-radio{
      width:var(--qualifier-pick-indicator-width);
      height:var(--qualifier-pick-indicator-width);
      border-radius:999px;
      border:1px solid rgba(148,163,184,.48);
      background: rgba(2,8,24,.44);
      display:grid;
      place-items:center;
      justify-self:end;
      pointer-events:none;
      transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
    }
    .qualifier-row-radio-indicator{
      width:6px;
      height:6px;
      border-radius:999px;
      background: transparent;
      transform:scale(.8);
      transition: background-color 120ms ease, transform 120ms ease;
    }
    .qualifier-row-radio[data-state="checked"]{
      border-color: rgba(var(--region-accent-rgb), .84);
      background: rgba(var(--region-accent-rgb), .17);
      box-shadow: 0 0 0 1px rgba(var(--region-accent-rgb), .22);
    }
    .qualifier-row-radio[data-state="checked"] .qualifier-row-radio-indicator{
      background: rgba(var(--region-accent-rgb), .96);
      transform:scale(1);
    }
    .qualifier-player-scorepack{ display:grid; grid-template-columns: repeat(3, var(--qualifier-score-col-width)) var(--qualifier-final-score-width); align-items:stretch; justify-content:end; justify-items:stretch; gap:4px; width:var(--qualifier-scorepack-width); min-width:var(--qualifier-scorepack-width); }
    .qualifier-player-set-score{ width:100%; min-height:16px; text-align:center; font-variant-numeric: tabular-nums; font-weight:900; color:#fff; letter-spacing:.02em; display:flex; align-items:center; justify-content:center; }
    .qualifier-player-final-score{ width:var(--qualifier-final-score-width); height:16px; border-radius:6px; border:1px solid rgba(255,255,255,.9); color:#fff; text-align:center; font-variant-numeric: tabular-nums; font-weight:900; display:flex; align-items:center; justify-content:center; justify-self:stretch; padding:0; line-height:1; white-space:nowrap; background: transparent; }
    .qualifier-bracket-grid[data-bracket-mode="actual"] .qualifier-player-final-score{ background:#fff; border-color:#fff; color:#000; }

    .auth-grid{ display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:10px; }
    .auth-buttons{ justify-content:center; margin-top:2px; }
    .auth-buttons.is-logged-in{ justify-content:flex-end; }
    label{ display:grid; gap:4px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:700; }
    input, select{ width:100%; border:1px solid rgba(148,163,184,.35); border-radius:10px; background: rgba(2,8,24,.70); color:#fff; padding:10px; font:inherit; }
    .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .pill{ border:1px solid rgba(148,163,184,.35); border-radius:999px; padding:6px 10px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; font-weight:800; }
    .pill.warn{ background: var(--warning); }
    .pill.good{ background: var(--success); }

  <script type="module">
    import { buildAuthRedirectTo, createBrowserSupabaseClient } from "/auth/supabase-auth.js";
    import { mountLightningCupRadixControls } from "/lightningcup/radix-controls.bundle.js";

    const WORKER_BASE = "https://small-mud-2771.nextweekmedia.workers.dev/";
    const SHEET_ID = "1nqZpVdf8bRlNAS-a16HeW5Lp9za5bKT18GofnXI7FXQ";
    const AUTH_RETURN_PATH = "/lightningcup/index.html";
    const ROUND_ORDER = ["R64", "R32", "R16", "R8", "R4", "Final"];
    const ROUND_NUMBER = { R64: 1, R32: 2, R16: 3, R8: 4, R4: 5, Final: 6 };
    const REGION_TABS = ["Wii Plaza", "Wuhu Island", "Wedge Island", "Spocco Square", "Finals"];
    const REGION_ID_BY_TAB = {
      "Wii Plaza": 1,
      "Wuhu Island": 4,
      "Wedge Island": 3,
      "Spocco Square": 2,
    };
    const REGION_ACCENT_RGB_BY_TAB = {
      "Wii Plaza": "34,197,94",
      "Spocco Square": "125,211,252",
      "Wedge Island": "249,115,22",
      "Wuhu Island": "168,85,247",
      Finals: "250,204,21",
    };
    const TOTAL_BRACKET_MATCHES = 63;
    const TOURNAMENT_YEAR = "2026";
    const BRACKET_DRAFT_STORAGE_VERSION = 1;
    const BRACKET_DRAFT_STORAGE_PREFIX = "nssgolf:lightningcup:bracket-draft";
    const BRACKET_SAVED_MARKER_STORAGE_PREFIX = "nssgolf:lightningcup:bracket-saved";

    /** @typedef {{seed:number|null,name:string,score:string|null}} PlayerSlot */
    /** @typedef {{id:number,round:string,region:number,top:PlayerSlot,bottom:PlayerSlot,winner:string}} ActualMatch */
    /** @typedef {{id:number,round:string,roundNumber:number,region:number,top:PlayerSlot,bottom:PlayerSlot,pickedWinner:string}} PredictedMatch */
    /** @typedef {{user_id:string,username:string|null,discord_user_id?:string|null,full_name?:string|null}} ProfileRow */
    /** @typedef {{id:string,user_id:string,bracket_name:string,submitted_at:string|null,year:string}} BracketRow */
    /** @typedef {{bracket_id:string|null,match_id:number,round_code:string,round_number:number,selected_winner_name:string,selected_winner_seed:number|null,is_correct:boolean|null,points_awarded:number|null,year:string}} PickRow */

    const state = {
      actualMatches: /** @type {ActualMatch[]} */ ([]),
      players: new Map(),
      lockFlag: "no",
      mainTab: "Actual Bracket",
      activeTab: "Wii Plaza",
      context: null,
      session: null,
      profile: /** @type {ProfileRow|null} */ (null),
      userBracket: /** @type {BracketRow|null} */ (null),
      userPicks: /** @type {Map<number, PickRow>} */ (new Map()),
      savedPicksSnapshot: /** @type {Map<number, PickRow>} */ (new Map()),
      savedPicksLoaded: false,
      predicted: /** @type {Map<number, PredictedMatch>} */ (new Map()),
      validUserPicks: /** @type {Map<number, PickRow>} */ (new Map()),
      allBrackets: /** @type {(BracketRow & {username:string})[]} */ ([]),
      allPicks: /** @type {PickRow[]} */ ([]),
      detailPredicted: /** @type {Map<number, PredictedMatch>} */ (new Map()),
      selectedBracketId: null,
      userAvatarUrl: "",
      authSub: null,
      tournamentLoaded: false,
      lastDraftRestoreNoticeToken: "",
      inlineStatusText: "",
      inlineStatusType: "",
      radixControls: null,
    };

    const supabase = createBrowserSupabaseClient();

    const els = {
      mainTabs: document.getElementById("mainTabs"),
      lockStatusInput: document.getElementById("lockStatusInput"),
      pickStatus: document.getElementById("pickStatus"),
      pickProgressCount: document.getElementById("pickProgressCount"),
      topbarUserMenu: document.getElementById("topbarUserMenu"),
      topbarUserGreeting: document.getElementById("topbarUserGreeting"),
      topbarUserMenuBtn: document.getElementById("topbarUserMenuBtn"),
      topbarUserAvatar: document.getElementById("topbarUserAvatar"),
      topbarUserDropdown: document.getElementById("topbarUserDropdown"),
      viewPlayerPageBtn: document.getElementById("viewPlayerPageBtn"),
      accountSettingsBtn: document.getElementById("accountSettingsBtn"),
      menuLogoutBtn: document.getElementById("menuLogoutBtn"),
      regionTabs: document.getElementById("regionTabs"),
      actualBracketGrid: document.getElementById("actualBracketGrid"),
      pickBracketGrid: document.getElementById("pickBracketGrid"),
      detailBracketGrid: document.getElementById("detailBracketGrid"),
      actualPanel: document.getElementById("actualPanel"),
      yourPanel: document.getElementById("yourPanel"),
      leaderboardPanel: document.getElementById("leaderboardPanel"),
      detailHeader: document.getElementById("detailHeader"),
      summaryRow: document.getElementById("summaryRow"),
      leaderboardTable: document.getElementById("leaderboardTable"),
      usernameInput: document.getElementById("usernameInput"),
      bracketSelect: document.getElementById("bracketSelect"),
      discordLoginBtn: document.getElementById("discordLoginBtn"),
      authButtonsRow: document.getElementById("authButtonsRow"),
      saveProfileBtn: document.getElementById("saveProfileBtn"),
      savePicksBtn: document.getElementById("savePicksBtn"),
      reloadBtn: document.getElementById("reloadBtn"),
      matchModal: document.getElementById("matchModal"),
      matchModalBody: document.getElementById("matchModalBody"),
      closeMatchModal: document.getElementById("closeMatchModal"),
      chooseUsernameModal: document.getElementById("chooseUsernameModal"),
      chooseUsernameForm: document.getElementById("chooseUsernameForm"),
      chooseUsernameInput: document.getElementById("chooseUsernameInput"),
      chooseUsernameCancelBtn: document.getElementById("chooseUsernameCancelBtn"),
      chooseUsernameSubmitBtn: document.getElementById("chooseUsernameSubmitBtn"),
      chooseUsernameModalMessage: document.getElementById("chooseUsernameModalMessage"),
    };

    const normalizeName = (value) => String(value || "").trim();
    function applyActiveRegionAccentTheme(activeTab){
      const fallbackRgb = REGION_ACCENT_RGB_BY_TAB["Spocco Square"];
      const accentRgb = REGION_ACCENT_RGB_BY_TAB[activeTab] || fallbackRgb;
      document.documentElement.style.setProperty("--region-accent-rgb", accentRgb);
    }
    const modalState = { chooseUsernameSubmitting: false };
    let discordSignInPending = false;
    let userMenuOpen = false;
    const roundBasePoints = (roundCode) => ({ R64:1, R32:2, R16:4, R8:8, R4:16, Final:32 }[roundCode] ?? 0);

    function getDraftStorageKey(userId, year = TOURNAMENT_YEAR){
      const normalizedUserId = normalizeName(userId);
      const normalizedYear = normalizeName(year || TOURNAMENT_YEAR);
      if(!normalizedUserId || !normalizedYear) return "";
      return `${BRACKET_DRAFT_STORAGE_PREFIX}:${normalizedYear}:${normalizedUserId}`;
    }

    function getSavedMarkerStorageKey(userId, year = TOURNAMENT_YEAR){
      const normalizedUserId = normalizeName(userId);
      const normalizedYear = normalizeName(year || TOURNAMENT_YEAR);
      if(!normalizedUserId || !normalizedYear) return "";
      return `${BRACKET_SAVED_MARKER_STORAGE_PREFIX}:${normalizedYear}:${normalizedUserId}`;
    }

    function draftRowsFromPickMap(picksMap){
      if(!(picksMap instanceof Map)) return [];
      return [...picksMap.values()]
        .map((pick) => ({
          match_id: Number(pick.match_id),
          round_code: normalizeName(pick.round_code),
          round_number: Number(pick.round_number),
          selected_winner_name: normalizeName(pick.selected_winner_name),
          selected_winner_seed: pick.selected_winner_seed == null ? null : Number(pick.selected_winner_seed),
        }))
        .filter((pick) => Number.isFinite(pick.match_id) && pick.round_code && Number.isFinite(pick.round_number) && pick.selected_winner_name)
        .sort((a,b) => a.match_id - b.match_id);
    }

    function buildPickMapFromDraftRows(rows, bracketId){
      const normalizedBracketId = normalizeName(bracketId) || null;
      const map = new Map();
      if(!Array.isArray(rows)) return map;
      rows.forEach((row) => {
        const matchId = Number(row?.match_id);
        const roundCode = normalizeName(row?.round_code);
        const roundNumber = Number(row?.round_number);
        const selectedWinnerName = normalizeName(row?.selected_winner_name);
        if(!Number.isFinite(matchId) || !roundCode || !Number.isFinite(roundNumber) || !selectedWinnerName) return;
        map.set(matchId, {
          bracket_id: normalizedBracketId,
          match_id: matchId,
          round_code: roundCode,
          round_number: roundNumber,
          selected_winner_name: selectedWinnerName,
          selected_winner_seed: row?.selected_winner_seed == null ? null : Number(row.selected_winner_seed),
          is_correct: null,
          points_awarded: null,
          year: TOURNAMENT_YEAR,
        });
      });
      return map;
    }

    function arePickSelectionsEqual(leftPick, rightPick){
      if(!leftPick || !rightPick) return false;
      return normalizeName(leftPick.selected_winner_name) === normalizeName(rightPick.selected_winner_name)
        && Number(leftPick.selected_winner_seed ?? -1) === Number(rightPick.selected_winner_seed ?? -1)
        && normalizeName(leftPick.round_code) === normalizeName(rightPick.round_code)
        && Number(leftPick.round_number ?? 0) === Number(rightPick.round_number ?? 0);
    }

    function arePickMapsEquivalent(leftMap, rightMap){
      if(!(leftMap instanceof Map) || !(rightMap instanceof Map)) return false;
      if(leftMap.size !== rightMap.size) return false;
      for(const [matchId, leftPick] of leftMap.entries()){
        const rightPick = rightMap.get(matchId);
        if(!arePickSelectionsEqual(leftPick, rightPick)) return false;
      }
      return true;
    }

    function normalizePickMapForComparison(picksMap){
      if(!(picksMap instanceof Map)) return new Map();
      if(!state.context) return new Map(picksMap);
      const { validPicks } = applyUserPicksToPredictedBracket(state.context, picksMap);
      return new Map(validPicks);
    }

    function setSavedPicksSnapshot(picksMap, { loaded = true } = {}){
      state.savedPicksSnapshot = picksMap instanceof Map ? new Map(picksMap) : new Map();
      state.savedPicksLoaded = !!loaded;
    }

    function isCurrentUserBracketStateSaved(){
      if(!state.savedPicksLoaded) return false;
      const currentComparable = state.context ? state.validUserPicks : normalizePickMapForComparison(state.userPicks);
      const savedComparable = normalizePickMapForComparison(state.savedPicksSnapshot);
      return arePickMapsEquivalent(currentComparable, savedComparable);
    }

    function loadLocalBracketDraft(userId, year = TOURNAMENT_YEAR){
      const key = getDraftStorageKey(userId, year);
      if(!key) return null;
      try{
        const raw = window.localStorage.getItem(key);
        if(!raw) return null;
        const parsed = JSON.parse(raw);
        if(!parsed || typeof parsed !== "object") return null;
        if(Number(parsed.version) !== BRACKET_DRAFT_STORAGE_VERSION) return null;
        if(normalizeName(parsed.userId) !== normalizeName(userId)) return null;
        if(normalizeName(parsed.year) !== normalizeName(year)) return null;
        return {
          updatedAt: normalizeName(parsed.updatedAt),
          picks: Array.isArray(parsed.picks) ? parsed.picks : [],
        };
      }catch{
        try{
          window.localStorage.removeItem(key);
        }catch{
          // Ignore storage cleanup errors for draft recovery.
        }
        return null;
      }
    }

    function clearLocalBracketDraft(userId = state.session?.user?.id, year = TOURNAMENT_YEAR){
      const key = getDraftStorageKey(userId, year);
      if(!key) return;
      try{
        window.localStorage.removeItem(key);
      }catch{
        // Ignore storage cleanup errors for draft recovery.
      }
    }

    function getLocalSavedMarkerTimestamp(userId, year = TOURNAMENT_YEAR){
      const key = getSavedMarkerStorageKey(userId, year);
      if(!key) return "";
      try{
        const raw = window.localStorage.getItem(key);
        if(!raw) return "";
        const parsed = JSON.parse(raw);
        if(!parsed || typeof parsed !== "object") return "";
        if(normalizeName(parsed.userId) !== normalizeName(userId)) return "";
        if(normalizeName(parsed.year) !== normalizeName(year)) return "";
        return normalizeName(parsed.savedAt);
      }catch{
        return "";
      }
    }

    function saveLocalSavedMarkerTimestamp(userId, year = TOURNAMENT_YEAR){
      const key = getSavedMarkerStorageKey(userId, year);
      if(!key) return;
      const payload = {
        userId: normalizeName(userId),
        year: normalizeName(year || TOURNAMENT_YEAR),
        savedAt: new Date().toISOString(),
      };
      try{
        window.localStorage.setItem(key, JSON.stringify(payload));
      }catch{
        // Ignore storage write errors so bracket save flow remains usable.
      }
    }

    function saveLocalBracketDraft(picksMap = state.userPicks){
      const userId = normalizeName(state.session?.user?.id);
      const key = getDraftStorageKey(userId, TOURNAMENT_YEAR);
      if(!key) return;
      const picks = draftRowsFromPickMap(picksMap);
      if(!picks.length){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return;
      }
      const payload = {
        version: BRACKET_DRAFT_STORAGE_VERSION,
        userId,
        year: TOURNAMENT_YEAR,
        updatedAt: new Date().toISOString(),
        picks,
      };
      try{
        window.localStorage.setItem(key, JSON.stringify(payload));
      }catch{
        // Ignore storage write errors so bracket editing remains usable.
      }
    }

    function resolveUserPicksForSession(userId, savedPicksMap, bracketId){
      const draft = loadLocalBracketDraft(userId, TOURNAMENT_YEAR);
      if(!draft){
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      const draftPickMap = buildPickMapFromDraftRows(draft.picks, bracketId);
      if(draftPickMap.size === 0){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      if(arePickMapsEquivalent(savedPicksMap, draftPickMap)){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      const draftUpdatedAt = normalizeName(draft.updatedAt);
      const savedMarkerUpdatedAt = getLocalSavedMarkerTimestamp(userId, TOURNAMENT_YEAR);
      const draftMillis = Date.parse(draftUpdatedAt);
      const savedMarkerMillis = Date.parse(savedMarkerUpdatedAt);
      if(Number.isFinite(draftMillis) && Number.isFinite(savedMarkerMillis) && draftMillis <= savedMarkerMillis){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      return {
        picksMap: draftPickMap,
        restoredDraft: true,
        draftUpdatedAt,
      };
    }

    function announceDraftRestoreOnce(userId, draftUpdatedAt){
      const token = `${normalizeName(userId)}:${normalizeName(draftUpdatedAt) || "draft"}`;
      if(!token || state.lastDraftRestoreNoticeToken === token) return;
      state.lastDraftRestoreNoticeToken = token;
      setMessage("Restored unsaved bracket edits.", "ok");
    }

    function normalizeAvatarUrl(value){
      const raw = normalizeName(value);
      if(!raw) return "";
      try{
        const parsed = new URL(raw, window.location.origin);
        if(parsed.protocol !== "http:" && parsed.protocol !== "https:") return "";
        return parsed.toString();
      }catch{
        return "";
      }
    }

    function getAvatarUrlFromProviders(providers){
      if(Array.isArray(providers)){
        for(const entry of providers){
          if(!entry || typeof entry !== "object") continue;
          const entryProvider = normalizeName(entry.provider || entry.name || entry.id).toLowerCase();
          if(entryProvider && entryProvider !== "discord") continue;
          const nestedDiscord = entry.discord && typeof entry.discord === "object" ? entry.discord : null;
          const candidate = normalizeAvatarUrl(
            entry.avatar_url ||
            entry.avatarUrl ||
            entry.picture ||
            entry.image_url ||
            nestedDiscord?.avatar_url ||
            nestedDiscord?.avatarUrl ||
            nestedDiscord?.picture ||
            nestedDiscord?.image_url
          );
          if(candidate) return candidate;
        }
        return "";
      }
      if(!providers || typeof providers !== "object") return "";
      const discordProvider = providers.discord && typeof providers.discord === "object" ? providers.discord : null;
      return normalizeAvatarUrl(
        discordProvider?.avatar_url ||
        discordProvider?.avatarUrl ||
        discordProvider?.picture ||
        discordProvider?.image_url ||
        providers.avatar_url ||
        providers.avatarUrl ||
        providers.picture ||
        providers.image_url
      );
    }

    function getDiscordAvatarUrlFromAuthUser(user){
      const providerCandidates = [
        user?.providers,
        user?.user_metadata?.providers,
        user?.raw_user_meta_data?.providers,
        user?.app_metadata?.providers,
        user?.raw_app_meta_data?.providers,
      ];
      for(const providers of providerCandidates){
        const url = getAvatarUrlFromProviders(providers);
        if(url) return url;
      }

      const identities = Array.isArray(user?.identities) ? user.identities : [];
      const discordIdentity = identities.find((identity) => normalizeName(identity?.provider).toLowerCase() === "discord");
      const identityData = discordIdentity?.identity_data && typeof discordIdentity.identity_data === "object"
        ? discordIdentity.identity_data
        : {};
      const fromIdentity = normalizeAvatarUrl(
        identityData.avatar_url ||
        identityData.picture ||
        identityData.image_url
      );
      if(fromIdentity) return fromIdentity;

      const metadata = user?.user_metadata && typeof user.user_metadata === "object" ? user.user_metadata : {};
      return normalizeAvatarUrl(metadata.avatar_url || metadata.picture || metadata.image_url);
    }

    async function fetchSheet(range){
      const url = new URL(WORKER_BASE);
      url.searchParams.set("sheetId", SHEET_ID);
      url.searchParams.set("range", range);
      const res = await fetch(url.toString());
      if(!res.ok) throw new Error(`Worker fetch failed (${res.status})`);
      return res.json();
    }

    function buildActualMatchesFromSheet(raw){
      const rows = Array.isArray(raw?.values) ? raw.values : [];
      return rows.slice(1).map((r) => ({
        id: Number(r[0]),
        round: normalizeName(r[1]),
        region: Number(r[2]) || 0,
        top: { seed: Number(r[3]) || null, name: normalizeName(r[4]), score: normalizeName(r[5]) || null },
        bottom: { seed: Number(r[6]) || null, name: normalizeName(r[7]), score: normalizeName(r[8]) || null },
        winner: normalizeName(r[9]),
      })).filter((m) => Number.isFinite(m.id) && ROUND_ORDER.includes(m.round));
    }

    function parsePlayers(raw){
      const rows = Array.isArray(raw?.values) ? raw.values : [];
      const map = new Map();
      rows.slice(1).forEach((r) => {
        const name = normalizeName(r[0]);
        if(!name) return;
        map.set(name, { name, best9: normalizeName(r[1]), best18: normalizeName(r[2]), bestGlobalScore: normalizeName(r[3]), bestGlobalRating: normalizeName(r[4]), discordId: normalizeName(r[6]) });
      });
      return map;
    }

    function parseLock(raw){
      return normalizeName(raw?.values?.[0]?.[0]).toLowerCase() === "yes" ? "yes" : "no";
    }

    function buildBracketContext(actualMatches){
      const byRoundRegion = new Map();
      const byId = new Map(actualMatches.map((m) => [m.id, m]));
      actualMatches.forEach((m) => {
        const key = `${m.round}:${m.region}`;
        if(!byRoundRegion.has(key)) byRoundRegion.set(key, []);
        byRoundRegion.get(key).push(m);
      });
      for(const list of byRoundRegion.values()) list.sort((a,b)=>a.id-b.id);

      /** @type {Map<number,{nextId:number,slot:'top'|'bottom'}>} */
      const nextMap = new Map();
      /** @type {Map<number,{topSource:number|null,bottomSource:number|null}>} */
      const prevMap = new Map();
      const setEdge = (fromId, toId, slot) => {
        if(!fromId || !toId) return;
        nextMap.set(fromId, { nextId: toId, slot });
        const prev = prevMap.get(toId) || { topSource: null, bottomSource: null };
        prev[slot === "top" ? "topSource" : "bottomSource"] = fromId;
        prevMap.set(toId, prev);
      };

      const regionChampions = new Map();
      [1,2,3,4].forEach((region) => {
        const r64 = byRoundRegion.get(`R64:${region}`) || [];
        const r32 = byRoundRegion.get(`R32:${region}`) || [];
        const r16 = byRoundRegion.get(`R16:${region}`) || [];
        const r8 = byRoundRegion.get(`R8:${region}`) || [];

        r64.forEach((m, i) => setEdge(m.id, r32[Math.floor(i/2)]?.id, i % 2 === 0 ? "top" : "bottom"));
        r32.forEach((m, i) => setEdge(m.id, r16[Math.floor(i/2)]?.id, i % 2 === 0 ? "top" : "bottom"));
        r16.forEach((m, i) => setEdge(m.id, r8[Math.floor(i/2)]?.id, i % 2 === 0 ? "top" : "bottom"));
        if(r8[0]) regionChampions.set(region, r8[0].id);
      });

      const semifinals = actualMatches.filter((m) => m.round === "R4").sort((a,b)=>a.id-b.id);
      const finals = actualMatches.filter((m) => m.round === "Final").sort((a,b)=>a.id-b.id);
      const finalMatch = finals[0];

      setEdge(regionChampions.get(1), semifinals[0]?.id, "top");
      setEdge(regionChampions.get(4), semifinals[0]?.id, "bottom");
      setEdge(regionChampions.get(2), semifinals[1]?.id, "top");
      setEdge(regionChampions.get(3), semifinals[1]?.id, "bottom");
      setEdge(semifinals[0]?.id, finalMatch?.id, "top");
      setEdge(semifinals[1]?.id, finalMatch?.id, "bottom");

      return { byId, byRoundRegion, nextMap, prevMap };
    }

    function buildInitialUserBracketFromActualR64(context){
      const predicted = new Map();
      const actualSorted = [...context.byId.values()].sort((a,b)=>a.id-b.id);
      actualSorted.forEach((m) => {
        predicted.set(m.id, {
          id: m.id,
          round: m.round,
          roundNumber: ROUND_NUMBER[m.round] || 0,
          region: m.region,
          top: m.round === "R64" ? { ...m.top } : { seed: null, name: "", score: null },
          bottom: m.round === "R64" ? { ...m.bottom } : { seed: null, name: "", score: null },
          pickedWinner: "",
        });
      });
      return predicted;
    }

    function getParticipantFromPicked(match, pickedName){
      if(match.top.name && match.top.name === pickedName) return { ...match.top };
      if(match.bottom.name && match.bottom.name === pickedName) return { ...match.bottom };
      return null;
    }

    function propagateWinnerToNextMatch(predicted, context, matchId, pickedName){
      const link = context.nextMap.get(matchId);
      if(!link) return;
      const current = predicted.get(matchId);
      const next = predicted.get(link.nextId);
      if(!current || !next) return;
      const participant = getParticipantFromPicked(current, pickedName);
      const fallback = { seed: null, name: "", score: null };
      next[link.slot] = participant || fallback;
    }

    function applyUserPicksToPredictedBracket(context, picksMap){
      const predicted = buildInitialUserBracketFromActualR64(context);
      const validPicks = new Map();
      const matchOrder = [...predicted.keys()].sort((a,b)=>a-b);
      matchOrder.forEach((matchId) => {
        const pick = picksMap.get(matchId);
        if(!pick) return;
        const match = predicted.get(matchId);
        const chosen = normalizeName(pick.selected_winner_name);
        if(!chosen) return;
        const participant = getParticipantFromPicked(match, chosen);
        if(!participant) return;

        const normalizedPick = {
          ...pick,
          selected_winner_seed: participant.seed ?? pick.selected_winner_seed ?? null,
          round_code: match.round,
          round_number: match.roundNumber,
        };
        match.pickedWinner = chosen;
        validPicks.set(matchId, normalizedPick);
        propagateWinnerToNextMatch(predicted, context, matchId, chosen);
      });
      return { predicted, validPicks };
    }

    function clearDependentDownstreamPicks(_changedMatchId, picksMap, context){
      const nextPickMap = new Map(picksMap);
      const { validPicks } = applyUserPicksToPredictedBracket(context, nextPickMap);
      return new Map(validPicks);
    }

    function hydratePickCorrectnessAgainstActualResults(pick, actualById){
      const actual = actualById.get(pick.match_id);
      if(!actual || !actual.winner) return { ...pick, is_correct: null, points_awarded: null };
      const isCorrect = actual.winner === pick.selected_winner_name;
      return {
        ...pick,
        is_correct: isCorrect,
        points_awarded: isCorrect ? roundBasePoints(pick.round_code) + (pick.selected_winner_seed || 0) : 0,
      };
    }

    function computeActualPossibleWinnerSets(context){
      const memo = new Map();
      const recurse = (matchId) => {
        if(memo.has(matchId)) return memo.get(matchId);
        const actual = context.byId.get(matchId);
        if(!actual){ const empty = new Set(); memo.set(matchId, empty); return empty; }
        if(actual.winner){ const done = new Set([actual.winner]); memo.set(matchId, done); return done; }
        const prev = context.prevMap.get(matchId);
        if(!prev){
          const set = new Set([actual.top.name, actual.bottom.name].filter(Boolean));
          memo.set(matchId, set);
          return set;
        }
        const set = new Set();
        if(prev.topSource) recurse(prev.topSource).forEach((name) => set.add(name));
        if(prev.bottomSource) recurse(prev.bottomSource).forEach((name) => set.add(name));
        memo.set(matchId, set);
        return set;
      };
      [...context.byId.keys()].forEach((id) => recurse(id));
      return memo;
    }

    function calculateActualScore(hydratedPicks){
      return hydratedPicks.reduce((sum, p) => sum + (p.is_correct ? (p.points_awarded || 0) : 0), 0);
    }

    function calculatePossibleRemainingScore(hydratedPicks, validPicks, actualPossibleSets){
      return hydratedPicks.reduce((sum, p) => {
        if(p.is_correct !== null) return sum;
        if(!validPicks.has(p.match_id)) return sum;
        const possibleSet = actualPossibleSets.get(p.match_id) || new Set();
        if(!possibleSet.has(p.selected_winner_name)) return sum;
        return sum + roundBasePoints(p.round_code) + (p.selected_winner_seed || 0);
      }, 0);
    }

    function calculatePossibleTotalScore(actualScore, possibleRemaining){
      return actualScore + possibleRemaining;
    }

    function getMatchesForTab(tab, matchesMap){
      const all = [...matchesMap.values()];
      if(tab === "Finals") return all.filter((m) => m.round === "R4" || m.round === "Final").sort((a,b)=>a.id-b.id);
      const region = Number(REGION_ID_BY_TAB[tab]);
      if(!Number.isFinite(region)) return [];
      return all.filter((m) => m.region === region && ["R64","R32","R16","R8"].includes(m.round)).sort((a,b)=>a.id-b.id);
    }

    function groupByRound(matches){
      return ROUND_ORDER.map((round) => ({ round, matches: matches.filter((m) => m.round === round) })).filter((g) => g.matches.length);
    }

    function parseScoreSegments(scoreValue){
      const tokens = normalizeName(scoreValue).split(/[\s|,/;]+/).filter(Boolean);
      if(tokens.length === 0){
        return { setScores: ["", "", ""], finalScore: "" };
      }
      if(tokens.length === 1){
        return { setScores: ["", "", ""], finalScore: tokens[0] };
      }
      const finalScore = tokens[tokens.length - 1];
      const recentSets = tokens.slice(0, -1).slice(-3);
      const setScores = ["", "", ""];
      setScores.splice(3 - recentSets.length, recentSets.length, ...recentSets);
      return { setScores, finalScore };
    }

    function getDisplayedScoreValue(match, slot, mode){
      if(mode === "actual") return normalizeName(slot?.score);
      const slotScore = normalizeName(slot?.score);
      const actualMatch = state.context?.byId?.get(match.id);
      if(!actualMatch) return slotScore;
      const slotName = normalizeName(slot?.name);
      if(!slotName) return slotScore;
      if(slotName === normalizeName(actualMatch.top?.name)) return normalizeName(actualMatch.top?.score);
      if(slotName === normalizeName(actualMatch.bottom?.name)) return normalizeName(actualMatch.bottom?.score);
      return slotScore;
    }

    function renderBracketGrid(target, matches, options = {}){
      const { mode = "actual", picksMap = new Map(), hydratedMap = new Map(), clickable = false, lockPicking = false, infoSource = "actual" } = options;
      const groups = groupByRound(matches);
      const baseRoundGap = 8;
      const matchBlockHeight = 64;
      const baseRoundStep = matchBlockHeight + (baseRoundGap * 2);
      const roundTopPaddingAdjustments = {
        R32: 8,
        R16: -8,
        R8: -8,
      };
      target.dataset.bracketMode = mode;
      target.innerHTML = groups.map((group, roundIndex) => {
        const roundMultiplier = 2 ** roundIndex;
        const roundGap = Math.round((baseRoundStep * roundMultiplier - matchBlockHeight) / 2);
        const baseRoundTopPadding = roundIndex === 0
          ? 0
          : Math.round((baseRoundStep * (roundMultiplier - 1)) / 2);
        const roundTopPadding = baseRoundTopPadding + (roundTopPaddingAdjustments[group.round] || 0);
        return `
        <div class="qualifier-round-column" style="--qualifier-round-gap:${roundGap}px;--qualifier-round-padding-top:${roundTopPadding}px;">
          <h3 class="qualifier-round-title">${group.round}</h3>
          <div class="qualifier-round-stack">
            ${group.matches.map((match) => {
              const pick = picksMap.get(match.id);
              const hydrated = hydratedMap.get(match.id);
              const selectedWinnerName = normalizeName(pick?.selected_winner_name);
              const topSelected = !!selectedWinnerName && selectedWinnerName === normalizeName(match.top?.name);
              const bottomSelected = !!selectedWinnerName && selectedWinnerName === normalizeName(match.bottom?.name);
              const matchCardClass = [
                "qualifier-match-card",
                topSelected || bottomSelected ? "is-selected" : "",
                topSelected ? "is-selected-top" : "",
                bottomSelected ? "is-selected-bottom" : "",
              ].filter(Boolean).join(" ");
              const renderRow = (slot) => {
                const name = slot.name || "";
                const isPicked = pick && pick.selected_winner_name === name;
                const stateClass = !isPicked ? "" : hydrated?.is_correct === true ? "selected correct" : hydrated?.is_correct === false ? "selected incorrect" : "selected pending";
                const actualWinnerClass = mode === "actual" && name && match.winner === name ? "winner" : "";
                const showScoreIndicators = mode === "actual" || mode === "detail" || (mode === "pick" && lockPicking);
                const showPickRadioIndicator = mode === "pick" && !lockPicking && !!name;
                const disabled = !clickable || lockPicking || !slot.name;
                const scoreParts = parseScoreSegments(getDisplayedScoreValue(match, slot, mode));
                const scoreMarkup = showScoreIndicators
                  ? `<span class="qualifier-player-scorepack">${scoreParts.setScores.map((score) => `<span class="qualifier-player-set-score">${score || "-"}</span>`).join("")}<span class="qualifier-player-final-score">${scoreParts.finalScore || "-"}</span></span>`
                  : "";
                const pickRadioMarkup = showPickRadioIndicator
                  ? `<span class="qualifier-row-radio" data-state="${isPicked ? "checked" : "unchecked"}" aria-hidden="true"><span class="qualifier-row-radio-indicator"></span></span>`
                  : "";
                const rowClasses = [
                  "qualifier-match-row",
                  showScoreIndicators ? "" : "no-score",
                  showPickRadioIndicator ? "has-pick-radio" : "",
                  actualWinnerClass,
                  stateClass,
                ].filter(Boolean).join(" ");
                return `<button class="${rowClasses}" ${disabled ? "disabled" : ""} data-match-id="${match.id}" data-name="${slot.name || ""}" data-seed="${slot.seed ?? ""}" type="button"><span class="qualifier-player-seed">${slot.seed ?? ""}</span><span class="qualifier-player-name">${name}</span>${scoreMarkup}${pickRadioMarkup}</button>`;
              };
              return `<div class="qualifier-bracket-match"><button class="qualifier-match-info" type="button" data-match-info="${match.id}" data-source="${infoSource}" aria-label="Match info for ${match.id}">i</button><div class="${matchCardClass}">${renderRow(match.top)}${renderRow(match.bottom)}</div></div>`;
            }).join("")}
          </div>
        </div>`;
      }).join("");
    }

    function updateLockUI(){
      const locked = state.lockFlag === "yes";
      els.lockStatusInput.value = locked ? "YES (LOCKED)" : "NO (OPEN)";
      const hasInlineMessage = !!normalizeName(state.inlineStatusText);

          defaultStatus = "Log in to save picks.";

          defaultStatus = "Set a username to continue.";
        }else if(locked && !state.userBracket){
          defaultStatus = "Bracket locked. New entries closed.";
        }else if(locked){
          defaultStatus = "Bracket is locked. Picks are read-only.";

    function updatePickProgressUI(){
      const selectedCount = getSelectedPickCount();
      const isComplete = selectedCount >= TOTAL_BRACKET_MATCHES;
      const isSaved = isCurrentUserBracketStateSaved();
      const saveStateLabel = isSaved ? "Saved" : "Unsaved";

    function hydrateMapFromPicks(picks){
      const map = new Map();
      picks.forEach((p) => map.set(p.match_id, hydratePickCorrectnessAgainstActualResults(p, state.context.byId)));
      return map;
    }

    function computeScoresFromPicks(validPicks){
      const actualPossibleSets = computeActualPossibleWinnerSets(state.context);
      const hydrated = [...validPicks.values()].map((p) => hydratePickCorrectnessAgainstActualResults(p, state.context.byId));
      const actual = calculateActualScore(hydrated);
      const possibleRemaining = calculatePossibleRemainingScore(hydrated, validPicks, actualPossibleSets);
      return { actual, possibleRemaining, possibleTotal: calculatePossibleTotalScore(actual, possibleRemaining), hydratedMap: new Map(hydrated.map((p)=>[p.match_id,p])) };
    }

    function renderSummary(){
      if(!state.userBracket){
        if(!state.profile?.username){
          els.summaryRow.innerHTML = `<span class="pill warn">Set a username.</span>`;
          return;
        }
        if(state.lockFlag === "yes"){
          els.summaryRow.innerHTML = `<span class="pill warn">Bracket locked. New entries closed.</span>`;
          return;
        }
        els.summaryRow.innerHTML = `<span class="pill warn">Make picks, then save.</span>`;
        return;
      }
      if(state.validUserPicks.size === 0){
        els.summaryRow.innerHTML = `<span class="pill warn">No saved picks yet.</span>`;
        return;
      }
      const scores = computeScoresFromPicks(state.validUserPicks);
      els.summaryRow.innerHTML = `<span class="pill">User: ${state.profile?.username || "-"}</span><span class="pill">Actual: ${scores.actual}</span><span class="pill">Possible Remaining: ${scores.possibleRemaining}</span><span class="pill">Possible Total: ${scores.possibleTotal}</span>${state.lockFlag === "yes" ? '<span class="pill warn">Locked</span>' : '<span class="pill good">Editable</span>'}`;

    function renderLeaderboard(){
      const pickByBracket = new Map();
      state.allPicks.forEach((p) => {
        if(!pickByBracket.has(p.bracket_id)) pickByBracket.set(p.bracket_id, []);
        pickByBracket.get(p.bracket_id).push(p);
      });
      const rows = state.allBrackets.map((b) => {
        const raw = pickByBracket.get(b.id) || [];
        const rawMap = new Map(raw.map((p) => [p.match_id, p]));
        const { validPicks } = applyUserPicksToPredictedBracket(state.context, rawMap);
        const scores = computeScoresFromPicks(validPicks);
        return { ...b, ...scores, validPicks };
      }).sort((a,b) => b.actual - a.actual);

      const topScore = rows[0]?.actual ?? null;
      const topCount = rows.filter((r) => r.actual === topScore).length;
      const rankByScore = new Map();
      [...new Set(rows.map((r) => r.actual))].forEach((score, idx) => rankByScore.set(score, idx + 1));

      if(!rows.length){
        els.leaderboardTable.innerHTML = `<thead><tr><th>Rank</th><th>Bracket</th><th>User</th><th>Actual</th><th>Possible Total</th><th>Possible Remaining</th><th>View</th></tr></thead><tbody><tr><td colspan="7">No entries yet.</td></tr></tbody>`;
        els.bracketSelect.innerHTML = "";
        state.selectedBracketId = null;
        return;
      }

      els.leaderboardTable.innerHTML = `<thead><tr><th>Rank</th><th>Bracket</th><th>User</th><th>Actual</th><th>Possible Total</th><th>Possible Remaining</th><th>View</th></tr></thead><tbody>${rows.map((row) => {
        const rank = rankByScore.get(row.actual);
        const tiedCount = rows.filter((r) => r.actual === row.actual).length;
        const rankLabel = tiedCount > 1 ? `T-${rank}` : `${rank}`;
        const coWinner = topCount > 1 && row.actual === topScore;
        const selectedClass = row.id === state.selectedBracketId ? "is-selected" : "";
        return `<tr class="${selectedClass}"><td>${rankLabel}${coWinner ? ' <span class="winner-badge">Co-Winner</span>' : ''}</td><td>${row.bracket_name}</td><td>${row.username || "-"}</td><td>${row.actual}</td><td>${row.possibleTotal}</td><td>${row.possibleRemaining}</td><td><button class="btn" data-select-bracket="${row.id}" type="button">Open</button></td></tr>`;
      }).join("")}</tbody>`;

      els.bracketSelect.innerHTML = rows.map((r) => `<option value="${r.id}">${r.bracket_name} (${r.username || "Unknown"})</option>`).join("");
      if(state.selectedBracketId && !rows.some((r) => r.id === state.selectedBracketId)) state.selectedBracketId = null;
      if(!state.selectedBracketId && rows[0]) state.selectedBracketId = rows[0].id;
      if(state.selectedBracketId) els.bracketSelect.value = state.selectedBracketId;
    }

      const list = Array.isArray(identities) ? identities : [];

      if(!discordIdentity) return "";

    async function syncProfileFromAuthUser(){
      const sessionUserId = normalizeName(state.session?.user?.id);
      if(!sessionUserId) return;

      let authUser = state.session?.user || null;
      try{
        const { data, error } = await supabase.auth.getUser();
        if(!error && data?.user?.id === sessionUserId){
          authUser = data.user;
        }
      }catch{
        // Keep profile bootstrap non-blocking if auth user enrichment is unavailable.
      }

      const identities = Array.isArray(authUser?.identities)
        ? authUser.identities
        : Array.isArray(state.session?.user?.identities)
          ? state.session.user.identities
          : [];
      const discordUserId = getDiscordProviderIdFromIdentities(identities);
      const providerFullName = getProviderProfileName(authUser || state.session?.user);
      state.userAvatarUrl = getDiscordAvatarUrlFromAuthUser(authUser || state.session?.user);

      let existingProfile = null;
      try{
        const { data, error } = await supabase
          .from("profiles")
          .select("user_id,username,discord_user_id,full_name")
          .eq("user_id", sessionUserId)
          .maybeSingle();
        if(error) return;
        existingProfile = data || null;
      }catch{
        return;
      }

      const existingUsername = normalizeName(existingProfile?.username);
      const existingDiscordUserId = normalizeName(existingProfile?.discord_user_id);
      const existingFullName = normalizeName(existingProfile?.full_name);

      /** @type {{user_id:string,username?:string,discord_user_id?:string,full_name?:string}} */
      const payload = { user_id: sessionUserId };
      let shouldUpsert = !existingProfile;

      if(discordUserId && discordUserId !== existingDiscordUserId){
        payload.discord_user_id = discordUserId;
        shouldUpsert = true;
      }

      if(providerFullName && providerFullName !== existingFullName){
        payload.full_name = providerFullName;
        shouldUpsert = true;
      }

      if(!existingUsername && providerFullName){
        payload.username = providerFullName;
        if(providerFullName !== normalizeName(existingProfile?.username)){
          shouldUpsert = true;
        }
      }

      if(!shouldUpsert) return;

      try{
        const { error } = await supabase.from("profiles").upsert(payload, { onConflict: "user_id" });
        if(error) return;
      }catch{
        // Keep auth flow and onboarding resilient if profile sync fails.
      }
    }

    async function ensureUserBracket(){
      if(!state.session) return null;
      const userId = state.session.user.id;
      const { data: existingBracket, error: existingError } = await supabase
        .from("brackets")
        .select("id,user_id,bracket_name,submitted_at,year")
        .eq("user_id", userId)
        .eq("year", TOURNAMENT_YEAR)
        .maybeSingle();
      if(existingError) throw existingError;
      if(existingBracket?.id){
        state.userBracket = existingBracket;
        return state.userBracket;
      }

      const username = normalizeName(state.profile?.username);
      const existingName = normalizeName(state.userBracket?.bracket_name);
      const providerName = getProviderProfileName(state.session.user);
      const emailPrefix = normalizeName(state.session.user.email).split("@")[0];
      const bracket_name = username || existingName || providerName || emailPrefix || "My Bracket";
      const payload = { user_id: userId, bracket_name, year: TOURNAMENT_YEAR };
      const { error: upsertError } = await supabase
        .from("brackets")
        .upsert(payload, { onConflict: "user_id,year" });
      if(upsertError) throw upsertError;

      const { data, error } = await supabase
        .from("brackets")
        .select("id,user_id,bracket_name,submitted_at,year")
        .eq("user_id", userId)
        .eq("year", TOURNAMENT_YEAR)
        .maybeSingle();
      if(error) throw error;
      if(!data?.id) throw new Error("Could not create bracket yet.");
      state.userBracket = data || state.userBracket;
      return state.userBracket;
    }

    async function loadAuthStateFromCurrentSession(){
      if(!state.session?.user?.id){
        clearUserScopedState();
        setSessionState(null);
        return { ok: true };
      }

      const userId = state.session.user.id;
      const [{ data: profile, error: profileError }, { data: bracketRows, error: bracketError }] = await Promise.all([
        supabase.from("profiles").select("user_id,username").eq("user_id", userId).maybeSingle(),
        supabase.from("brackets").select("id,user_id,bracket_name,submitted_at,year").eq("user_id", userId).eq("year", TOURNAMENT_YEAR).maybeSingle(),
      ]);
      if(profileError || bracketError){
        clearUserScopedState();
        renderAuthShell();
        return { ok: false, message: "Could not load your account details." };
      }
      state.profile = profile || null;
      state.userBracket = bracketRows || null;

      let savedUserPicks = new Map();
      if(state.userBracket?.id){
        const { data: picks, error: picksError } = await supabase
          .from("bracket_picks")
          .select("bracket_id,match_id,round_code,round_number,selected_winner_name,selected_winner_seed,is_correct,points_awarded,year")
          .eq("bracket_id", state.userBracket.id)
          .eq("year", TOURNAMENT_YEAR);
        if(picksError){
          setSavedPicksSnapshot(new Map(), { loaded: false });
          const draftFallback = resolveUserPicksForSession(userId, new Map(), state.userBracket?.id || null);
          state.userPicks = draftFallback.picksMap;
          if(draftFallback.restoredDraft){
            announceDraftRestoreOnce(userId, draftFallback.draftUpdatedAt);
          }else{
            state.lastDraftRestoreNoticeToken = "";
          }
          els.usernameInput.value = normalizeName(state.profile?.username);
          renderAuthShell();
          return { ok: false, message: "Could not load your saved bracket picks." };
        }
        savedUserPicks = new Map((picks || []).map((p) => [p.match_id, p]));
      }

      setSavedPicksSnapshot(savedUserPicks, { loaded: true });
      const pickResolution = resolveUserPicksForSession(userId, savedUserPicks, state.userBracket?.id || null);
      state.userPicks = pickResolution.picksMap;
      if(pickResolution.restoredDraft){
        announceDraftRestoreOnce(userId, pickResolution.draftUpdatedAt);
      }else{
        state.lastDraftRestoreNoticeToken = "";
      }

      els.usernameInput.value = normalizeName(state.profile?.username);
      renderAuthShell();
      return { ok: true };
    }

    let authRefreshPromise = null;
    let authRefreshQueued = false;
    let queuedRefreshSyncSession = false;
    let authRefreshRunning = false;
    async function refreshAuthDrivenUI(reason = "unknown", { syncSession = true } = {}){
      if(authRefreshRunning){
        authRefreshQueued = true;
        queuedRefreshSyncSession = queuedRefreshSyncSession || syncSession;
        return authRefreshPromise;
      }
      authRefreshRunning = true;
      authRefreshPromise = (async () => {
        let runSyncSession = syncSession;
        do{
          authRefreshQueued = false;
          try{
            if(runSyncSession){
              await syncSessionFromSupabase();
            }else{
              renderAuthShell();
            }
            await syncProfileFromAuthUser();
            const authStateLoad = await loadAuthStateFromCurrentSession();
            if(!authStateLoad.ok){
              setMessage(authStateLoad.message, "error");
            }
            if(state.context) refreshPredictedFromUserPicks();
            await loadLeaderboardData();
          }catch{
            setAuthRefreshError();
          }
          if(state.context){
            try{
              renderView();
            }catch{
              renderFallbackTournamentView();
              setMessage("Part of the page failed to render. Try refreshing to reload your data.", "error");
            }
          }
          runSyncSession = authRefreshQueued ? queuedRefreshSyncSession : false;
          queuedRefreshSyncSession = false;
        }while(authRefreshQueued);
      })().finally(() => {
        authRefreshRunning = false;
        authRefreshPromise = null;
      });
      return authRefreshPromise;
    }

    async function loadLeaderboardData(){
      const [profilesRes, bracketsRes, picksRes] = await Promise.all([
        supabase.from("profiles").select("user_id,username"),
        supabase.from("brackets").select("id,user_id,bracket_name,submitted_at,year").eq("year", TOURNAMENT_YEAR),
        supabase.from("bracket_picks").select("bracket_id,match_id,round_code,round_number,selected_winner_name,selected_winner_seed,is_correct,points_awarded,year").eq("year", TOURNAMENT_YEAR),

      if(profilesRes.error || bracketsRes.error || picksRes.error){
        state.allBrackets = [];
        state.allPicks = [];
        if(!state.userBracket?.id) state.selectedBracketId = null;
        return;
      }
      const profileByUser = new Map((profilesRes.data || []).map((p) => [p.user_id, p.username]));
      state.allBrackets = (bracketsRes.data || []).map((b) => {
        const username = profileByUser.get(b.user_id) || "";
        return { ...b, username, bracket_name: username || b.bracket_name || "Unknown" };
      });
      state.allPicks = picksRes.data || [];
      if(!state.selectedBracketId && state.userBracket?.id) state.selectedBracketId = state.userBracket.id;

    async function saveCurrentPicksToDatabase(bracketId){
      if(!bracketId) throw new Error("Could not create bracket yet.");
      refreshPredictedFromUserPicks();
      const desiredRows = [...state.validUserPicks.values()].map((pick) => ({
        bracket_id: bracketId,
        match_id: pick.match_id,
        round_code: pick.round_code,
        round_number: pick.round_number,
        selected_winner_name: pick.selected_winner_name,
        selected_winner_seed: pick.selected_winner_seed,
        year: TOURNAMENT_YEAR,
      }));
      const { data: existingRows, error: existingError } = await supabase
        .from("bracket_picks")
        .select("match_id,round_code,round_number,selected_winner_name,selected_winner_seed,year")
        .eq("bracket_id", bracketId)
        .eq("year", TOURNAMENT_YEAR);
      if(existingError) throw existingError;

      const existingByMatch = new Map((existingRows || []).map((row) => [Number(row.match_id), row]));
      const rowsToUpsert = desiredRows.filter((row) => {
        const existing = existingByMatch.get(row.match_id);
        if(!existing) return true;
        return existing.round_code !== row.round_code
          || Number(existing.round_number) !== Number(row.round_number)
          || normalizeName(existing.selected_winner_name) !== normalizeName(row.selected_winner_name)
          || Number(existing.selected_winner_seed) !== Number(row.selected_winner_seed);
      });
      const desiredMatchIds = new Set(desiredRows.map((row) => row.match_id));
      const staleMatchIds = (existingRows || [])
        .map((row) => Number(row.match_id))
        .filter((matchId) => !desiredMatchIds.has(matchId));

      if(rowsToUpsert.length){
        const { error } = await supabase
          .from("bracket_picks")
          .upsert(rowsToUpsert, { onConflict: "bracket_id,match_id" });
        if(error) throw error;
      }
      if(staleMatchIds.length){
        const { error } = await supabase
          .from("bracket_picks")
          .delete()
          .eq("bracket_id", bracketId)
          .eq("year", TOURNAMENT_YEAR)
          .in("match_id", staleMatchIds);
        if(error) throw error;
      }

      return { savedCount: desiredRows.length };
    }
