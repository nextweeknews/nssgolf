<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="transparent" />
  <title>Lightning Cup OBS</title>

  <style>
    :root{
      --text:#ecf3ff;
      --panel-border:rgba(148,163,184,.22);
      --panel-fill:rgba(6,18,38,.96);
      --panel-fill-soft:rgba(255,255,255,.045);
      --player-one-rgb:96,165,250;
      --player-two-rgb:34,197,94;
      --danger-rgb:239,68,68;
      --shadow:0 28px 48px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    [hidden]{ display:none !important; }
    html,
    body{
      margin:0;
      min-height:100%;
      background:transparent;
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow:hidden;
    }
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:12px;
    }
    .obs-shell{
      width:710px;
      display:grid;
      gap:8px;
    }
    .obs-status{
      margin:0;
      padding:11px 14px;
      border-radius:14px;
      border:1px solid rgba(248,113,113,.32);
      background:rgba(127,29,29,.42);
      color:#fecaca;
      font-size:13px;
      font-weight:800;
      letter-spacing:.03em;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .obs-status.is-hidden{ display:none; }
    .obs-card{
      display:grid;
      gap:10px;
      padding:12px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.11);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 26%),
        linear-gradient(180deg, rgba(7,21,45,.95), rgba(3,12,25,.985));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .scoreboard-shell{
      display:grid;
      gap:6px;
    }
    .scoreboard-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) repeat(3, 50px) 62px;
      gap:6px;
      align-items:center;
      min-height:62px;
      padding:5px 8px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.22);
      border-left:4px solid rgba(148,163,184,.72);
      background:var(--panel-fill-soft);
    }
    .scoreboard-row.is-player-one{ border-left-color:rgba(var(--player-one-rgb), .96); }
    .scoreboard-row.is-player-two{ border-left-color:rgba(var(--player-two-rgb), .92); }
    .scoreboard-player{
      min-width:0;
      display:grid;
      grid-template-columns:28px minmax(0, 1fr);
      align-items:center;
      gap:6px;
    }
    .scoreboard-seed-slot{
      display:grid;
      align-items:center;
      justify-items:center;
      min-width:0;
    }
    .scoreboard-name-slot{
      min-width:0;
      display:grid;
      align-items:center;
      justify-items:start;
    }
    .scoreboard-seed{
      color:rgba(191,219,254,.94);
      font-size:20px;
      font-weight:900;
      line-height:1;
      font-variant-numeric:tabular-nums;
      text-align:center;
    }
    .scoreboard-name{
      min-width:0;
      color:#fff;
      font-size:36px;
      font-weight:950;
      letter-spacing:.02em;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
    }
    .scoreboard-score,
    .scoreboard-match-score{
      min-height:50px;
      display:grid;
      place-items:center;
      border-radius:8px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(2,6,23,.42);
      color:rgba(226,232,240,.96);
      font-size:26px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
      line-height:1;
    }
    .scoreboard-score.is-won{
      color:#020617;
      border-color:transparent;
    }
    .scoreboard-score.is-won.is-player-one{ background:rgba(var(--player-one-rgb), .96); }
    .scoreboard-score.is-won.is-player-two{ background:rgba(var(--player-two-rgb), .92); }
    .scoreboard-match-score{
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:31px;
    }
    .scoreboard-match-score.is-won.is-player-one{
      color:rgb(var(--player-one-rgb));
      border-color:rgba(var(--player-one-rgb), .88);
    }
    .scoreboard-match-score.is-won.is-player-two{
      color:rgb(var(--player-two-rgb));
      border-color:rgba(var(--player-two-rgb), .88);
    }
    .course-board{
      display:grid;
      grid-template-columns:minmax(0, 3fr) minmax(0, 1fr);
      gap:8px;
      align-items:stretch;
    }
    .course-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:8px;
    }
    .special-course-slot{
      display:grid;
      align-items:center;
    }
    .special-course-slot .course-tile{
      align-self:center;
    }
    .course-tile{
      min-height:68px;
      padding:8px 8px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(255,255,255,.04);
      display:grid;
      justify-items:center;
      align-content:center;
      gap:2px;
      text-align:center;
    }
    .course-tile.is-picked{
      color:#020617;
      border-color:transparent;
    }
    .course-tile.is-picked.is-player-one{ background:rgba(var(--player-one-rgb), .96); }
    .course-tile.is-picked.is-player-two{ background:rgba(var(--player-two-rgb), .92); }
    .course-tile.is-picked.is-sudden-death{
      background:rgba(var(--danger-rgb), .92);
      color:#fff;
    }
    .course-tile.is-live{
      border-color:rgba(255,255,255,.82);
      box-shadow:0 0 0 2px rgba(255,255,255,.1);
    }
    .course-tile-name{
      color:inherit;
      font-size:16px;
      font-weight:950;
      letter-spacing:.05em;
      text-transform:uppercase;
      line-height:1.08;
    }
    .course-tile-meta{
      color:inherit;
      font-size:12px;
      font-weight:800;
      letter-spacing:.05em;
      text-transform:uppercase;
      opacity:.82;
      line-height:1.1;
    }
  </style>
</head>
<body>
  <main class="obs-shell">
    <p class="obs-status is-hidden" id="pageStatus"></p>

    <section class="obs-card" aria-label="Lightning Cup OBS match graphic">
      <div class="scoreboard-shell" aria-label="Lightning Cup match scoreboard">
        <div class="scoreboard-row is-player-one">
          <div class="scoreboard-player">
            <span class="scoreboard-seed-slot"><span class="scoreboard-seed" id="scoreboardTopSeed">TBD</span></span>
            <span class="scoreboard-name-slot"><span class="scoreboard-name" id="scoreboardTopName">TBD</span></span>
          </div>
          <span class="scoreboard-score" id="scoreboardTopSet1">-</span>
          <span class="scoreboard-score" id="scoreboardTopSet2">-</span>
          <span class="scoreboard-score" id="scoreboardTopSet3">-</span>
          <span class="scoreboard-match-score" id="scoreboardTopMatch">0</span>
        </div>

        <div class="scoreboard-row is-player-two">
          <div class="scoreboard-player">
            <span class="scoreboard-seed-slot"><span class="scoreboard-seed" id="scoreboardBottomSeed">TBD</span></span>
            <span class="scoreboard-name-slot"><span class="scoreboard-name" id="scoreboardBottomName">TBD</span></span>
          </div>
          <span class="scoreboard-score" id="scoreboardBottomSet1">-</span>
          <span class="scoreboard-score" id="scoreboardBottomSet2">-</span>
          <span class="scoreboard-score" id="scoreboardBottomSet3">-</span>
          <span class="scoreboard-match-score" id="scoreboardBottomMatch">0</span>
        </div>
      </div>

      <div class="course-board">
        <div class="course-grid" id="courseGrid" aria-label="Course grid"></div>
        <div class="special-course-slot" id="specialCourseSlot" aria-label="Special course"></div>
      </div>
    </section>
  </main>

  <script type="module" src="/lightningcup/obs/obs-page.js?v=20260410-compact2"></script>
</body>
</html>
