      if(!state.session) return;
      if(hasProfileUsername()) return;
      openChooseUsernameModal();
    }

    function closeAuthModals(){
      closeChooseUsernameModal();
      setUserMenuOpen(false);
    }

    async function ensureUserBracket(){
      if(!state.session) return null;
      const userId = state.session.user.id;
      const { data: existingBracket, error: existingError } = await supabase
        .from("brackets")
        .select("id,user_id,bracket_name,submitted_at,year")
        .eq("user_id", userId)
        .eq("year", TOURNAMENT_YEAR)
        .maybeSingle();
      if(existingError) throw existingError;
      if(existingBracket?.id){
        state.userBracket = existingBracket;
        return state.userBracket;
      }

      const username = normalizeName(state.profile?.username);
      const existingName = normalizeName(state.userBracket?.bracket_name);
      const providerName = getProviderProfileName(state.session.user);
      const emailPrefix = normalizeName(state.session.user.email).split("@")[0];
      const bracket_name = username || existingName || providerName || emailPrefix || "My Bracket";
      const payload = { user_id: userId, bracket_name, year: TOURNAMENT_YEAR };
      const { error: upsertError } = await supabase
        .from("brackets")
        .upsert(payload, { onConflict: "user_id,year" });
      if(upsertError) throw upsertError;

      const { data, error } = await supabase
        .from("brackets")
        .select("id,user_id,bracket_name,submitted_at,year")
        .eq("user_id", userId)
        .eq("year", TOURNAMENT_YEAR)
        .maybeSingle();
      if(error) throw error;
      if(!data?.id) throw new Error("Could not create bracket yet.");
      state.userBracket = data || state.userBracket;
      return state.userBracket;
    }

    async function loadTournament(){
      const [bracketRaw, lockRaw, playersRaw, seedsRaw] = await Promise.all([
        fetchSheet("Bracket!A:J"),
        fetchSheet("Bracket!I1"),
        fetchSheet("Form Responses!B:H"),
        fetchSheet("Seeds!C:E"),
      ]);
      state.actualMatches = buildActualMatchesFromSheet(bracketRaw);
      state.players = parsePlayers(playersRaw);
      state.lockFlag = parseLock(lockRaw);
      const seedsMaps = parseSeedsNameDiscordMap(seedsRaw);
      state.seedDiscordMap = seedsMaps.exact;
      state.seedDiscordMapLower = seedsMaps.lower;
      state.context = buildBracketContext(state.actualMatches);
      const applied = applyUserPicksToPredictedBracket(state.context, state.userPicks);
      state.predicted = applied.predicted;
      state.validUserPicks = applied.validPicks;
      state.tournamentLoaded = true;
    }

    async function syncSessionFromSupabase(){
      const { data, error } = await supabase.auth.getSession();
      if(error) throw new Error("Could not verify your sign-in session.");
      setSessionState(data?.session || null);
      return state.session;
    }

    async function loadAuthStateFromCurrentSession(){
      if(!state.session?.user?.id){
        clearUserScopedState();
        setSessionState(null);
        return { ok: true };
      }

      const userId = state.session.user.id;
      const [{ data: profile, error: profileError }, { data: bracketRows, error: bracketError }] = await Promise.all([
        supabase.from("profiles").select("user_id,username,discord_user_id,full_name").eq("user_id", userId).maybeSingle(),
        supabase.from("brackets").select("id,user_id,bracket_name,submitted_at,year").eq("user_id", userId).eq("year", TOURNAMENT_YEAR).maybeSingle(),
      ]);
      if(profileError || bracketError){
        clearUserScopedState();
        renderAuthShell();
        return { ok: false, message: "Could not load your account details." };
      }
      state.profile = profile || null;
      state.userBracket = bracketRows || null;

      let savedUserPicks = new Map();
      if(state.userBracket?.id){
        const { data: picks, error: picksError } = await supabase
          .from("bracket_picks")
          .select("bracket_id,match_id,round_code,round_number,selected_winner_name,selected_winner_seed,is_correct,points_awarded,year")
          .eq("bracket_id", state.userBracket.id)
          .eq("year", TOURNAMENT_YEAR);
        if(picksError){
          setSavedPicksSnapshot(new Map(), { loaded: false });
          const draftFallback = resolveUserPicksForSession(userId, new Map(), state.userBracket?.id || null);
          state.userPicks = draftFallback.picksMap;
          if(draftFallback.restoredDraft){
            announceDraftRestoreOnce(userId, draftFallback.draftUpdatedAt);
          }else{
            state.lastDraftRestoreNoticeToken = "";
          }
          els.usernameInput.value = normalizeName(state.profile?.username);
          renderAuthShell();
          return { ok: false, message: "Could not load your saved bracket picks." };
        }
        savedUserPicks = new Map((picks || []).map((p) => [p.match_id, p]));
      }

      setSavedPicksSnapshot(savedUserPicks, { loaded: true });
      const pickResolution = resolveUserPicksForSession(userId, savedUserPicks, state.userBracket?.id || null);
      state.userPicks = pickResolution.picksMap;
      if(pickResolution.restoredDraft){
        announceDraftRestoreOnce(userId, pickResolution.draftUpdatedAt);
      }else{
        state.lastDraftRestoreNoticeToken = "";
      }

      els.usernameInput.value = normalizeName(state.profile?.username);
      renderAuthShell();
      return { ok: true };
    }

    let authRefreshPromise = null;
    let authRefreshQueued = false;
    let queuedRefreshSyncSession = false;
    let authRefreshRunning = false;
    async function refreshAuthDrivenUI(reason = "unknown", { syncSession = true } = {}){
      if(authRefreshRunning){
        authRefreshQueued = true;
        queuedRefreshSyncSession = queuedRefreshSyncSession || syncSession;
        return authRefreshPromise;
      }
      authRefreshRunning = true;
      authRefreshPromise = (async () => {
        let runSyncSession = syncSession;
        do{
          authRefreshQueued = false;
          try{
            if(runSyncSession){
              await syncSessionFromSupabase();
            }else{
              renderAuthShell();
            }
            await syncProfileFromAuthUser();
            const authStateLoad = await loadAuthStateFromCurrentSession();
            if(!authStateLoad.ok){
              setMessage(authStateLoad.message, "error");
            }
            if(state.context) refreshPredictedFromUserPicks();
            await loadLeaderboardData();
          }catch{
            setAuthRefreshError();
          }
          if(state.context){
            try{
              renderView();
            }catch{
              renderFallbackTournamentView();
              setMessage("Part of the page failed to render. Try refreshing to reload your data.", "error");
            }
          }
          runSyncSession = authRefreshQueued ? queuedRefreshSyncSession : false;
          queuedRefreshSyncSession = false;
        }while(authRefreshQueued);
      })().finally(() => {
        authRefreshRunning = false;
        authRefreshPromise = null;
      });
      return authRefreshPromise;
    }

    async function loadLeaderboardData(){
      const [profilesRes, bracketsRes, picksRes] = await Promise.all([
        supabase.from("profiles").select("user_id,username"),
        supabase.from("brackets").select("id,user_id,bracket_name,submitted_at,year").eq("year", TOURNAMENT_YEAR),
        supabase.from("bracket_picks").select("bracket_id,match_id,round_code,round_number,selected_winner_name,selected_winner_seed,is_correct,points_awarded,year").eq("year", TOURNAMENT_YEAR),
      ]);
      if(profilesRes.error || bracketsRes.error || picksRes.error){
        state.allBrackets = [];
        state.allPicks = [];
        state.selectedBracketId = null;
        return;
      }
      const profileByUser = new Map((profilesRes.data || []).map((p) => [p.user_id, p.username]));
      state.allBrackets = (bracketsRes.data || []).map((b) => {
        const username = profileByUser.get(b.user_id) || "";
        return { ...b, username, bracket_name: username || b.bracket_name || "Unknown" };
      });
      state.allPicks = picksRes.data || [];
      if(state.selectedBracketId && !state.allBrackets.some((bracket) => bracket.id === state.selectedBracketId)){
        state.selectedBracketId = null;
      }
    }

    function refreshPredictedFromUserPicks(){
      const applied = applyUserPicksToPredictedBracket(state.context, state.userPicks);
      state.predicted = applied.predicted;
      state.validUserPicks = applied.validPicks;
    }

    async function saveCurrentPicksToDatabase(bracketId){
      if(!bracketId) throw new Error("Could not create bracket yet.");
      refreshPredictedFromUserPicks();
      const desiredRows = [...state.validUserPicks.values()].map((pick) => ({
        bracket_id: bracketId,
        match_id: pick.match_id,
        round_code: pick.round_code,
        round_number: pick.round_number,
        selected_winner_name: pick.selected_winner_name,
        selected_winner_seed: pick.selected_winner_seed,
        year: TOURNAMENT_YEAR,
      }));
      const { data: existingRows, error: existingError } = await supabase
        .from("bracket_picks")
        .select("match_id,round_code,round_number,selected_winner_name,selected_winner_seed,year")
        .eq("bracket_id", bracketId)
        .eq("year", TOURNAMENT_YEAR);
      if(existingError) throw existingError;

      const existingByMatch = new Map((existingRows || []).map((row) => [Number(row.match_id), row]));
      const rowsToUpsert = desiredRows.filter((row) => {
        const existing = existingByMatch.get(row.match_id);
        if(!existing) return true;
        return existing.round_code !== row.round_code
          || Number(existing.round_number) !== Number(row.round_number)
          || normalizeName(existing.selected_winner_name) !== normalizeName(row.selected_winner_name)
          || Number(existing.selected_winner_seed) !== Number(row.selected_winner_seed);
      });
      const desiredMatchIds = new Set(desiredRows.map((row) => row.match_id));
      const staleMatchIds = (existingRows || [])
        .map((row) => Number(row.match_id))
        .filter((matchId) => !desiredMatchIds.has(matchId));

      if(rowsToUpsert.length){
        const { error } = await supabase
          .from("bracket_picks")
          .upsert(rowsToUpsert, { onConflict: "bracket_id,match_id" });
        if(error) throw error;
      }
      if(staleMatchIds.length){
        const { error } = await supabase
          .from("bracket_picks")
          .delete()
          .eq("bracket_id", bracketId)
          .eq("year", TOURNAMENT_YEAR)
          .in("match_id", staleMatchIds);
        if(error) throw error;
      }

      return { savedCount: desiredRows.length };
    }

    async function saveProfile(){
      try{
        await saveUsernameForCurrentUser(els.usernameInput.value);
        setMessage("Username saved.", "ok");
      }catch(error){
        setMessage(error.message || "Failed to save username.", "error");
      }
    }

    async function savePicks(){
      if(!state.session) return setMessage("Log in first.", "error");
      if(state.lockFlag === "yes" && !state.userBracket) return setMessage("Bracket is locked. Bracket creation is closed.", "error");
      if(state.lockFlag === "yes") return setMessage("Bracket is locked.", "error");
      if(!state.profile?.username) return setMessage("Set your username first.", "error");
      let bracketId = "";
      try{
        const ensuredBracket = await ensureUserBracket();
        bracketId = normalizeName(ensuredBracket?.id);
      }catch(error){
        return setMessage(error.message || "Failed to create your bracket.", "error");
      }
      if(!bracketId) return setMessage("Could not create bracket yet.", "error");

      try{
        await saveCurrentPicksToDatabase(bracketId);
      }catch(error){
        return setMessage(error.message || "Failed to save picks.", "error");
      }

      clearLocalBracketDraft(state.session.user.id, TOURNAMENT_YEAR);
      saveLocalSavedMarkerTimestamp(state.session.user.id, TOURNAMENT_YEAR);
      state.lastDraftRestoreNoticeToken = "";
      await refreshAuthDrivenUI("savePicks", { syncSession: false });
      const selectedCount = getSelectedPickCount();
      const isComplete = selectedCount >= TOTAL_BRACKET_MATCHES;
      if(isCurrentUserBracketStateSaved()){
        setMessage(isComplete ? "Bracket saved." : "Bracket progress saved.", "ok");
      }else{
        setMessage("Save submitted, but we could not confirm it yet. Please refresh to recheck.", "error");
      }
    }

    function handlePickClick(event){
      const row = event.target.closest("button[data-match-id]");
      if(!row || !canEditUserBracket()) return;
      const matchId = Number(row.dataset.matchId);
      const selected_winner_name = normalizeName(row.dataset.name);
      applyUserPickSelection(matchId, selected_winner_name);
    }

    function bindEvents(){
      els.pickBracketGrid.addEventListener("click", handlePickClick);
      els.topbarUserAvatar.addEventListener("error", () => {
        els.topbarUserAvatar.hidden = true;
        els.topbarUserAvatar.removeAttribute("src");
        els.topbarUserMenuBtn.classList.remove("has-avatar");
      });
      els.leaderboardTable.addEventListener("click", (event) => {
        const sortButton = event.target.closest("button[data-sort-key]");
        if(sortButton){
          setLeaderboardSort(sortButton.dataset.sortKey);
          return;
        }

        const detailTabButton = event.target.closest("button[data-detail-tab]");
        if(detailTabButton){
          if(!canViewLeaderboardBrackets()) return;
          const nextTab = detailTabButton.dataset.detailTab;
          if(REGION_TABS.includes(nextTab)){
            state.leaderboardDetailTab = nextTab;
            renderLeaderboard();
          }
          return;
        }

        const bracketToggle = event.target.closest("button[data-toggle-bracket-detail]");
        if(bracketToggle){
          if(!canViewLeaderboardBrackets()) return;
          toggleLeaderboardBracketDetail(bracketToggle.dataset.toggleBracketDetail);
        }
      });
      els.topbarUserMenuBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        setUserMenuOpen(!userMenuOpen);
      });
      document.addEventListener("click", (event) => {
        if(!userMenuOpen) return;
        if(els.topbarUserMenu.contains(event.target)) return;
        setUserMenuOpen(false);
      });
      els.topbarUserDropdown.addEventListener("click", (event) => {
        const clicked = event.target.closest("button");
        if(!clicked) return;
        if(clicked.disabled){
          event.preventDefault();
          event.stopPropagation();
        }
      });

      els.discordLoginBtn.addEventListener("click", async () => {
        if(discordSignInPending) return;
        setDiscordSignInPending(true);
        try{
          const { error } = await supabase.auth.signInWithOAuth({
            provider: "discord",
            options: { redirectTo: buildAuthRedirectTo(AUTH_RETURN_PATH) },
          });
          if(error){
            setDiscordSignInPending(false);
            setMessage("Could not start Discord sign-in. Please try again.", "error");
          }
        }catch{
          setDiscordSignInPending(false);
          setMessage("Could not start Discord sign-in. Please try again.", "error");
        }
      });

      els.chooseUsernameCancelBtn.addEventListener("click", () => {
        if(!modalState.chooseUsernameSubmitting) closeChooseUsernameModal();
      });
      els.chooseUsernameModal.addEventListener("click", (event) => {
        if(event.target === els.chooseUsernameModal && !modalState.chooseUsernameSubmitting) closeChooseUsernameModal();
      });

      els.chooseUsernameForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if(modalState.chooseUsernameSubmitting) return;
        setInlineModalMessage(els.chooseUsernameModalMessage, "");
        const username = normalizeName(els.chooseUsernameInput.value);
        if(!username){
          setInlineModalMessage(els.chooseUsernameModalMessage, "Username is required.", "error");
          return;
        }
        setChooseUsernameSubmitting(true);
        try{
          await saveUsernameForCurrentUser(username);
          closeChooseUsernameModal();
          setMessage("Username saved.", "ok");
        }catch(error){
          setInlineModalMessage(els.chooseUsernameModalMessage, error.message || "Failed to save username.", "error");
        }finally{
          setChooseUsernameSubmitting(false);
        }
      });

      els.menuLogoutBtn.addEventListener("click", async () => {
        try{
          const { error } = await supabase.auth.signOut();
          if(error) return setMessage(error.message || "Logout failed.", "error");
          closeAuthModals();
          clearUserScopedState();
          setSessionState(null);
          await refreshAuthDrivenUI("logout click", { syncSession: false });
          setMessage("Logged out.", "ok");
        }catch{
          setMessage("Logout failed. Please try again.", "error");
        }
      });

      els.saveProfileBtn.addEventListener("click", saveProfile);
      els.savePicksBtn.addEventListener("click", savePicks);
      els.reloadBtn.addEventListener("click", async () => {
        await loadTournament();
        refreshPredictedFromUserPicks();
        await loadLeaderboardData();
        renderView();
        setMessage("Data refreshed.", "ok");
      });

      document.addEventListener("keydown", (event) => {
        if(event.key !== "Escape") return;
        if(userMenuOpen) setUserMenuOpen(false);
        if(els.chooseUsernameModal.classList.contains("is-open") && !modalState.chooseUsernameSubmitting) closeChooseUsernameModal();
      });
      window.addEventListener("popstate", () => {
        applyUrlStateToView();
        if(state.context){
          renderView();
        }else{
          renderAuthShell();
        }
      });

      state.authSub = supabase.auth.onAuthStateChange((eventName, session) => {
        if(eventName === "INITIAL_SESSION") return;
        if(eventName === "SIGNED_IN" || eventName === "SIGNED_OUT"){
          closeAuthModals();
        }
        if(eventName === "SIGNED_OUT"){
          clearUserScopedState();
          setSessionState(null);
        }else if(session){
          setSessionState(session);
        }
        void refreshAuthDrivenUI(`auth event:${eventName}`, { syncSession: !session })
          .then(() => {
            if(eventName === "SIGNED_IN"){
              openChooseUsernameModalIfMissing();
            }
          })
          .catch(() => {
            setAuthRefreshError();
            renderFallbackTournamentView();
          });
      });
    }

    async function init(){
      bindEvents();
      initializeRadixControls();
      startLightningCupCountdown();
      applyUrlStateToView();
      try{
        await syncSessionFromSupabase();
        await loadTournament();
        await refreshAuthDrivenUI("init", { syncSession: false });
        openChooseUsernameModalIfMissing();
        setMessage("");
      }catch{
        setMessage("Initialization failed. Please refresh and try again.", "error");
      }
    }

    init();
  </script>
</body>
