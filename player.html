<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <link rel="stylesheet" href="/worldcup-flags.css?v=20260610-flag-img" />
  <title>NSS Golf Player</title>

  <style>
    :root{
      --bg1:#061C3B; --bg2:#04142E; --bg3:#020B18;
      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);
      --text: #e9eef8;
      --title: #c7d7ff;
      --muted: #9ca3c7;
      --border-lite: rgba(148,163,184,0.20);
      --panel-bg: rgba(6,24,46,0.72);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.10);
      --btn-border: rgba(255,255,255,0.15);
      --btn-border-hover: rgba(255,255,255,0.28);
      --event-ranked: rgba(255,90,90,0.4);
      --event-proleague: rgba(125,211,252,0.4);
      --event-noptational: rgba(129,140,248,0.4);
      --event-superleague: rgba(209,118,255,0.4);
      --event-lightning: rgba(246,255,106,0.4);
      --event-worldopen: rgba(93,255,156,0.4);
      --event-worldcup: rgba(37,99,235,0.4);
    }

    *{ box-sizing:border-box; }
    html{ background-color: var(--bg3); }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg3);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }
    .topbar{
      position: sticky; top:0; z-index:10;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(3,18,42,.70);
      backdrop-filter: blur(10px);
    }
    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{display:flex; gap:12px; align-items:center;}
    .home-badge,
    .home-btn{
      width:40px; height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
      display:grid; place-items:center;
      overflow:hidden;
      user-select:none;
      flex-shrink:0;
    }
    .home-badge img,
    .home-btn img{
      width:70%;
      height:70%;
      object-fit: contain;
      display:block;
      pointer-events:none;
    }
    .kicker{
      font-size:11px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color: rgba(255,255,255,.65);
      font-weight:900;
    }
    .page-nav-select{
      background: rgba(2,6,23,.85);
      color: inherit;
      border: 1px solid rgba(125,211,252,.35);
      border-radius: 10px;
      padding: 6px 32px 6px 10px;
      font: inherit;
      letter-spacing: inherit;
      text-transform: uppercase;
      max-width: min(56vw, 420px);
      cursor: pointer;
    }
    .page-nav-select:focus-visible{
      outline: 2px solid rgba(125,211,252,.6);
      outline-offset: 2px;
    }
    .btn{
      appearance:none;
      -webkit-appearance:none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: rgba(255,255,255,0.92);
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-size: 14px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      line-height: 1;
    }
    .btn:hover{
      background: var(--btn-bg-hover);
      border-color: var(--btn-border-hover);
    }
    .discord-button{
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: .08em;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-icon{
      width: 14px;
      height: 14px;
      display:block;
      fill: currentColor;
    }
    .container{
      max-width:1100px;
      margin:0 auto;
      padding: 28px 18px 56px;
    }
    .profile-card{
      width: min(820px, 100%);
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .profile-header{
      display:flex;
      align-items:center;
      gap: 18px;
      min-width:0;
    }
    .profile-avatar{
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit:cover;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }
    .profile-heading{
      min-width:0;
      flex: 1 1 auto;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap: 5px;
    }
    .headline{
      font-size: 24px;
      font-weight: 950;
      color: var(--title);
      letter-spacing: .035em;
      text-transform: uppercase;
      margin: 0 0 8px;
      overflow-wrap:anywhere;
    }
    .profile-muted{
      margin:0;
      color: rgba(233,238,248,0.70);
      font-size: 13px;
      font-weight: 750;
      line-height:1.25;
    }
    .player-name-title{
      --player-name-max-size: 30px;
      --player-name-min-size: 14px;
      margin:0;
      color: rgba(255,255,255,0.94);
      font-size: var(--player-name-fit-size, var(--player-name-max-size));
      font-weight: 820;
      letter-spacing: 0;
      text-transform:none;
      line-height:1.05;
      display:flex;
      align-items:center;
      gap: 8px;
      flex-wrap:nowrap;
      min-width:0;
      max-width:100%;
      overflow:hidden;
    }
    .player-name-text{
      min-width:0;
      flex: 0 1 auto;
      overflow:hidden;
      overflow-wrap:normal;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .player-verified-icon{
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      color: #2dd4bf;
      filter: drop-shadow(0 0 8px rgba(45,212,191,0.45));
    }
    .player-verified-icon svg{
      width:100%;
      height:100%;
      display:block;
      fill:none;
      stroke: currentColor;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .profile-details{
      margin: 22px 0 0;
      padding: 14px 0 0;
      border-top: 1px solid var(--border-lite);
      display:grid;
      grid-template-columns: max-content minmax(0, 1fr);
      gap: 8px 14px;
    }
    .profile-details dt{
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .profile-details dd{
      margin:0;
      min-width:0;
      color: rgba(233,238,248,0.92);
      font-size: 13px;
      font-weight: 800;
      overflow-wrap:anywhere;
    }
    .profile-section{
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--border-lite);
    }
    .profile-section-title{
      margin:0 0 12px;
      color: rgba(255,255,255,0.95);
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-align:center;
    }
    .profile-record-list{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap: 8px;
      --record-cell-width: calc((100% - 16px) / 3);
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .profile-record-list[data-count="1"]{
      grid-template-columns: minmax(0, var(--record-cell-width));
      justify-content:center;
    }
    .profile-record-list[data-count="2"]{
      grid-template-columns: repeat(2, minmax(0, var(--record-cell-width)));
      justify-content:center;
    }
    .profile-record-item{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap: 10px;
      min-height: 96px;
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--panel-bg);
      border-radius: 12px;
      padding: 18px 16px 20px;
      text-align:center;
      overflow:hidden;
    }
    .profile-record-item.is-record{
      border-color: rgba(250,204,21,0.46);
      background: linear-gradient(135deg, rgba(250,204,21,0.16), rgba(6,24,46,0.78));
      box-shadow: 0 0 24px rgba(250,204,21,0.14), inset 0 0 18px rgba(250,204,21,0.05);
    }
    .profile-record-item.is-record::after{
      content: "★";
      position:absolute;
      top: 7px;
      right: 8px;
      color: #facc15;
      font-size: 15px;
      line-height:1;
      text-shadow: 0 0 12px rgba(250,204,21,0.55);
      pointer-events:none;
    }
    .profile-record-item.is-hidden-rank{
      border-color: rgba(248,113,113,0.46);
      background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(6,24,46,0.78));
      box-shadow: 0 0 24px rgba(239,68,68,0.12), inset 0 0 18px rgba(239,68,68,0.05);
    }
    .profile-record-item.is-hidden-rank .profile-record-name{
      color: rgba(254,202,202,0.96);
    }
    .profile-hidden-rank-indicator{
      position:absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border: 1px solid rgba(248,113,113,0.38);
      border-radius: 999px;
      background: rgba(127,29,29,0.34);
      color: rgba(254,202,202,0.96);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:help;
    }
    .profile-hidden-rank-indicator svg{
      width: 14px;
      height: 14px;
      display:block;
      fill:none;
      stroke: currentColor;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .profile-hidden-rank-indicator::after{
      content: attr(data-tooltip);
      position:absolute;
      right: 0;
      bottom: calc(100% + 8px);
      width: max-content;
      max-width: 210px;
      padding: 7px 9px;
      border: 1px solid rgba(248,113,113,0.32);
      border-radius: 8px;
      background: rgba(2,6,23,0.96);
      color: rgba(254,226,226,0.98);
      font-size: 11px;
      font-weight: 850;
      line-height: 1.25;
      text-transform:none;
      letter-spacing:0;
      opacity:0;
      pointer-events:none;
      transform: translateY(4px);
      transition: opacity 130ms ease, transform 130ms ease;
      z-index:3;
    }
    .profile-hidden-rank-indicator:hover::after,
    .profile-hidden-rank-indicator:focus-visible::after{
      opacity:1;
      transform: translateY(0);
    }
    .profile-record-name{
      min-width:0;
      color: rgba(255,255,255,0.95);
      display:inline-flex;
      align-items:baseline;
      justify-content:center;
      gap: 2px;
      max-width:100%;
      font-size: 26px;
      font-weight: 950;
      text-transform: uppercase;
      line-height:1.1;
      white-space:nowrap;
    }
    .profile-record-number{
      line-height:1;
    }
    .profile-record-suffix{
      font-size: 0.54em;
      line-height:1;
      margin-bottom: 0;
      letter-spacing: .02em;
    }
    .profile-record-group{
      color: rgba(233,238,248,0.62);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
      line-height:1;
      white-space:nowrap;
    }
    .profile-record-key{
      margin: 10px 0 0;
      width: 100%;
      color: rgba(233,238,248,.9);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .06em;
      line-height: 1.2;
      text-align:center;
      text-transform: uppercase;
    }
    .profile-record-key-star{
      color: #facc15;
      text-shadow: 0 0 10px rgba(250,204,21,0.45);
    }
    .profile-actions{
      margin-top: 18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .ranked-league-title{
      margin-bottom: 10px;
    }
    .ranked-table-wrap{
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--event-ranked);
      border-radius: 12px;
      background: rgba(6,24,46,0.68);
      -webkit-overflow-scrolling: touch;
    }
    .ranked-table{
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
      table-layout: fixed;
      color: rgba(233,238,248,0.92);
      background: rgba(15,23,42,0.86);
      font-size: 11px;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }
    .ranked-col-season{ width: 13%; }
    .ranked-col-rank{ width: 13%; }
    .ranked-col-elo{ width: 20%; }
    .ranked-col-wins{ width: 16%; }
    .ranked-col-matches{ width: 20%; }
    .ranked-col-win-rate{ width: 18%; }
    .ranked-table th,
    .ranked-table td{
      border: 1px solid rgba(148,163,184,0.20);
      padding: 9px 6px;
      white-space: nowrap;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ranked-table thead tr:first-child > th{
      border-top: 0;
    }
    .ranked-table tr > :first-child{
      border-left: 0;
    }
    .ranked-table tr > :last-child{
      border-right: 0;
    }
    .ranked-table tbody tr:last-child > :is(td, th){
      border-bottom: 0;
    }
    .ranked-table thead th{
      background: rgba(15,23,42,0.95);
      color: rgba(156,163,199,0.86);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .10em;
    }
    .ranked-table tbody th{
      color: rgba(233,238,248,0.92);
      font-weight: 900;
    }
    .ranked-table tbody td,
    .ranked-table tbody th{
      background: rgba(255,255,255,0.045);
    }
    .ranked-table tbody td,
    .ranked-table tbody th{
      font-size: 22px;
    }
    .ranked-table tbody tr:nth-child(even) td,
    .ranked-table tbody tr:nth-child(even) th{
      background: rgba(255,255,255,0.032);
    }
    .ranked-cell-elo{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: .02em;
      font-weight: 950;
    }
    .ranked-teamup-link{
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      color: rgba(233,238,248,.9);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .06em;
      line-height: 1.2;
      text-decoration: none;
      text-transform: uppercase;
    }
    .ranked-teamup-link:hover{
      color: #f8fbff;
      text-decoration: none;
    }
    .proleague-section{
      --gold: #facc15;
      --silver: #e2e8f0;
      --bronze: #fb923c;
      --row-bg: rgba(255,255,255,0.045);
      --row-bg-2: rgba(148,163,184,0.10);
      --sep: rgba(255,255,255,0.24);
      margin-top: 14px;
      padding: 9px 0;
    }
    .proleague-section + .proleague-section{
      margin-top: 0;
    }
    .proleague-details{
      width: 100%;
    }
    .proleague-summary{
      position: relative;
      width: fit-content;
      max-width: 100%;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      min-height: 22px;
      border: 0;
      background: transparent;
      border-radius: 0;
      padding: 0;
      color: rgba(255,255,255,0.95);
      user-select: none;
    }
    .proleague-summary::-webkit-details-marker{ display:none; }
    .proleague-summary-title{
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .10em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .proleague-summary-icon{
      width: 18px;
      height: 18px;
      color: rgba(233,238,248,0.72);
      flex: 0 0 auto;
      transition: transform .16s ease;
    }
    .proleague-summary-icon svg{
      width: 100%;
      height: 100%;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .proleague-details[open] .proleague-summary-icon{
      transform: rotate(180deg);
    }
    .proleague-content{
      margin-top: 12px;
    }
    .proleague-loading,
    .proleague-error,
    .proleague-empty{
      margin: 0;
      padding: 12px 2px 2px;
      color: rgba(233,238,248,0.72);
      font-size: 12px;
      font-weight: 850;
      text-align: center;
    }
    .proleague-error{
      color: rgba(252,165,165,0.95);
    }
    .proleague-history .season-title{
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: rgba(255,255,255,.65);
      margin-bottom: 10px;
      text-align: left;
    }
    .proleague-history .season-entry{
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--event-proleague);
    }
    .proleague-history .season-entry + .season-entry{ margin-top: 10px; }
    .proleague-history .season-entry-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .proleague-history .season-entry-name{
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: rgba(255,255,255,0.92);
    }
    .proleague-history .season-entry-name a,
    .proleague-history .stage-header a{
      color: inherit;
      text-decoration: none;
    }
    .proleague-history .season-entry-name a:hover,
    .proleague-history .stage-header a:hover{
      color: rgba(186,230,253,0.98);
    }
    .proleague-history .stage-block{ padding-top: 8px; }
    .proleague-history .stage-block + .stage-block{
      margin-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.10);
      padding-top: 12px;
    }
    .proleague-history .stage-header{
      font-size: 10px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: rgba(255,255,255,0.70);
      margin-bottom: 8px;
    }
    .proleague-history .btn-row{
      display:flex;
      align-items:center;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 2px;
      justify-content: flex-end;
      -webkit-overflow-scrolling: touch;
    }
    .proleague-history .btn-row + .btn-row{ margin-top: 8px; }
    .proleague-history .chip{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      border-radius: 12px;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .10em;
      line-height: 1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: fit-content;
      max-width: 100%;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
    }
    .proleague-history .chip.rank{
      background: rgba(255,255,255,0.04);
      color: var(--title);
      border-color: rgba(255,255,255,0.10);
    }
    .proleague-history .chip.rank.gold{
      color: var(--gold);
      border-color: rgba(250,204,21,0.65);
    }
    .proleague-history .chip.rank.silver{
      color: var(--silver);
      border-color: rgba(226,232,240,0.65);
    }
    .proleague-history .chip.rank.bronze{
      color: var(--bronze);
      border-color: rgba(251,146,60,0.6);
    }
    .proleague-history .chip.rank.blue{
      color: rgba(186,230,253,0.95);
      border-color: rgba(56,189,248,0.6);
    }
    .proleague-history .chip.team{
      background: var(--team-bg, rgba(255,255,255,0.06));
      color: var(--team-fg, rgba(255,255,255,0.92));
      border-color: rgba(255,255,255,0.14);
      justify-content: center;
      text-align: center;
    }
    .proleague-history .chip.score{
      background: #d9d9d9;
      color: #000000;
      border-color: rgba(0,0,0,0.08);
      letter-spacing: .08em;
    }
    .proleague-history table.stage-rounds{
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
      table-layout: fixed;
      margin-top: 10px;
    }
    .proleague-history .stage-rounds thead th{
      background: rgba(15,23,42,0.92);
      padding: 6px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .12em;
      white-space: nowrap;
      text-align: center;
    }
    .proleague-history .stage-rounds td{
      padding: 8px 6px;
      font-size: 10px;
      color: rgba(233,238,248,0.92);
