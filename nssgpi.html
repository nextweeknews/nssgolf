<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NSS GPI</title>
  <link rel="icon" type="image/png" href="/logos/golf.png" />
  <style>
    :root{
      color-scheme: dark;
      --bg:#101113;
      --panel:#17191d;
      --panel-2:#1e2228;
      --text:#f4f6f8;
      --muted:#a9b0bb;
      --line:#303641;
      --accent:#6ee7b7;
      --danger:#fca5a5;
      --shadow:0 16px 44px rgba(0,0,0,.28);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main{
      width:min(1040px, calc(100vw - 32px));
      margin:0 auto;
      padding:32px 0 48px;
    }

    .page-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      font-size:clamp(28px, 4vw, 44px);
      line-height:1;
      letter-spacing:0;
    }

    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .run-meta{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:8px;
      color:var(--muted);
      font-size:12px;
    }

    .pill{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:999px;
      padding:6px 10px;
      white-space:nowrap;
    }

    .status{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:8px;
      padding:18px;
      box-shadow:var(--shadow);
      color:var(--muted);
    }

    .status.error{ color:var(--danger); }

    .button{
      appearance:none;
      border:1px solid rgba(110,231,183,.42);
      background:#0f2a22;
      color:var(--text);
      border-radius:8px;
      padding:10px 14px;
      font:inherit;
      font-weight:700;
      cursor:pointer;
    }

    .table-shell{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    table{
      width:100%;
      min-width:720px;
      border-collapse:collapse;
    }

    th,
    td{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      vertical-align:middle;
    }

    th{
      position:sticky;
      top:0;
      z-index:1;
      background:var(--panel-2);
      color:var(--muted);
      font-size:11px;
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.06em;
      text-align:left;
    }

    tbody tr:last-child td{ border-bottom:0; }
    tbody tr:nth-child(even) td{ background:rgba(255,255,255,.018); }

    .rank-cell{
      width:76px;
      color:var(--accent);
      font-weight:800;
      font-variant-numeric:tabular-nums;
    }

    .player-cell{
      min-width:280px;
    }

    .player{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .avatar{
      width:38px;
      height:38px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.14);
      background:#242832;
      object-fit:cover;
      flex:0 0 auto;
    }

    .player-name{
      display:block;
      font-weight:800;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .player-id{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:12px;
      font-variant-numeric:tabular-nums;
    }

    .rating-cell{
      width:140px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }

    .number-cell{
      color:var(--muted);
      font-variant-numeric:tabular-nums;
      text-align:right;
      width:112px;
    }

    .right{ text-align:right; }

    [hidden]{ display:none !important; }

    @media (max-width:720px){
      main{
        width:min(100vw - 20px, 1040px);
        padding-top:22px;
      }

      .page-head{
        display:block;
      }

      .run-meta{
        justify-content:flex-start;
        margin-top:14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="page-head">
      <div>
        <h1>NSS GPI</h1>
        <p class="subtitle">Internal Ranked League rating</p>
      </div>
      <div id="runMeta" class="run-meta" hidden></div>
    </header>

    <div id="status" class="status">Loading...</div>

    <section id="leaderboard" class="table-shell" hidden aria-label="Internal Ranked League leaderboard">
      <table>
        <thead>
          <tr>
            <th class="rank-cell">Rank</th>
            <th>Player</th>
            <th class="rating-cell right">Rating</th>
            <th class="number-cell">Matches</th>
            <th class="number-cell">W</th>
            <th class="number-cell">L</th>
            <th class="number-cell">T</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </section>
  </main>

  <script type="module">
    import { createBrowserSupabaseClient } from "/auth/supabase-auth.js";

    const supabase = createBrowserSupabaseClient();
    const statusEl = document.getElementById("status");
    const leaderboardEl = document.getElementById("leaderboard");
    const leaderboardBodyEl = document.getElementById("leaderboardBody");
    const runMetaEl = document.getElementById("runMeta");

    function normalizeText(value){
      return String(value || "").trim();
    }

    function normalizeDiscordId(value){
      const cleanValue = normalizeText(value);
      return /^[0-9]+$/.test(cleanValue) ? cleanValue : "";
    }

    function escapeHtml(value){
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;",
      }[char]));
    }

    function setStatus(message, tone = ""){
      statusEl.hidden = false;
      statusEl.className = `status ${tone}`.trim();
      statusEl.textContent = message || "";
    }

    function hideStatus(){
      statusEl.hidden = true;
    }

    function formatRating(value){
      const number = Number(value);
      if(!Number.isFinite(number)) return "";
      return new Intl.NumberFormat("en-US", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      }).format(number);
    }

    function formatDateTime(value){
      if(!value) return "";
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("en-US", {
        month:"short",
        day:"numeric",
        year:"numeric",
        hour:"numeric",
        minute:"2-digit",
      }).format(date);
    }

    async function loadLatestRun(){
      const { data, error } = await supabase
        .from("internal_ranked_elo_runs")
        .select("id,calculation_version,base_rating,k_factor,season_start,season_end,match_count,player_count,created_at")
        .order("created_at", { ascending:false })
        .limit(1)
        .maybeSingle();
      if(error) throw error;
      return data || null;
    }

    async function loadRatings(runId){
      const { data, error } = await supabase
        .from("internal_ranked_elo_ratings")
        .select("discord_user_id,display_name,rating,matches_played,pairwise_wins,pairwise_losses,pairwise_ties,rank")
        .eq("run_id", runId)
        .order("rank", { ascending:true });
      if(error) throw error;
      return data || [];
    }

    async function loadMembers(discordIds){
      const uniqueIds = [...new Set(discordIds.map(normalizeDiscordId).filter(Boolean))];
      const members = [];
      const chunkSize = 100;

      for(let index = 0; index < uniqueIds.length; index += chunkSize){
        const ids = uniqueIds.slice(index, index + chunkSize);
        const { data, error } = await supabase
          .from("discord_guild_members")
          .select("discord_user_id,username,display_name,avatar_url,server_avatar_url,is_current_member")
          .in("discord_user_id", ids);
        if(error) throw error;
        members.push(...(data || []));
      }

      return new Map(members.map(member => [normalizeDiscordId(member.discord_user_id), member]));
    }

    function renderRunMeta(run){
      runMetaEl.hidden = false;
      runMetaEl.innerHTML = [
        `Run #${run.id}`,
        `Seasons ${run.season_start}-${run.season_end}`,
        `${run.match_count} matches`,
        `${run.player_count} players`,
        `K ${Number(run.k_factor).toFixed(0)}`,
        formatDateTime(run.created_at),
      ].map(item => `<span class="pill">${escapeHtml(item)}</span>`).join("");
    }

    function memberDisplayName(row, member){
      return (
        normalizeText(member?.display_name) ||
        normalizeText(member?.username) ||
        normalizeText(row.display_name) ||
        normalizeDiscordId(row.discord_user_id) ||
        "Player"
      );
    }

    function memberAvatarUrl(member){
      return normalizeText(member?.server_avatar_url) || normalizeText(member?.avatar_url) || "/logos/golf.png";
    }

    function renderLeaderboard(rows, membersById){
      leaderboardBodyEl.innerHTML = rows.map((row) => {
        const discordId = normalizeDiscordId(row.discord_user_id);
        const member = membersById.get(discordId);
        const displayName = memberDisplayName(row, member);
        const avatarUrl = memberAvatarUrl(member);
        return `
          <tr>
            <td class="rank-cell">${escapeHtml(row.rank || "")}</td>
            <td class="player-cell">
              <div class="player">
                <img class="avatar" src="${escapeHtml(avatarUrl)}" alt="" loading="lazy" decoding="async" />
                <span>
                  <span class="player-name">${escapeHtml(displayName)}</span>
                  <span class="player-id">${escapeHtml(discordId)}</span>
                </span>
              </div>
            </td>
            <td class="rating-cell right">${escapeHtml(formatRating(row.rating))}</td>
            <td class="number-cell">${escapeHtml(row.matches_played ?? "")}</td>
            <td class="number-cell">${escapeHtml(row.pairwise_wins ?? "")}</td>
            <td class="number-cell">${escapeHtml(row.pairwise_losses ?? "")}</td>
            <td class="number-cell">${escapeHtml(row.pairwise_ties ?? "")}</td>
          </tr>
        `;
      }).join("");

      leaderboardEl.hidden = false;
    }

    async function loadPage(){
      const run = await loadLatestRun();
      if(!run){
        setStatus("No internal Ranked League Elo run is available yet.");
        return;
      }

      const ratings = await loadRatings(run.id);
      const membersById = await loadMembers(ratings.map(row => row.discord_user_id));
      renderRunMeta(run);
      renderLeaderboard(ratings, membersById);
      hideStatus();
    }

    loadPage().catch((error) => {
      console.error(error);
      setStatus(`Unable to load NSS GPI: ${error?.message || "Unknown error"}`, "error");
    });
  </script>
</body>
</html>
