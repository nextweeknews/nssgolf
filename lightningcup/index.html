<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <title>Lightning Cup 2026</title>

  <style>
    :root{
      --bg1:#061C3B; --bg2:#04142E; --bg3:#020B18;
      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);
      --header-bg: rgba(148,163,184,0.12);
      --row-bg: rgba(255,255,255,0.06);
      --text: #e9eef8;
      --title: #c7d7ff;
      --muted: #9ca3c7;
      --border-lite: rgba(148,163,184,0.20);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.10);
      --btn-border: rgba(255,255,255,0.15);
      --btn-border-hover: rgba(255,255,255,0.28);
      --success: rgba(34,197,94,0.20);
      --danger: rgba(239,68,68,0.22);
      --pending: rgba(148,163,184,0.20);
      --pick: rgba(56,189,248,0.18);
      --warning: rgba(251,191,36,0.22);
      --region-accent-rgb: 125,211,252;
      --qualifier-round-column-width: 264px;
      --qualifier-match-height: 64px;
      --qualifier-seed-col-width: 14px;
      --qualifier-score-col-width: 14px;
      --qualifier-final-score-width: 24px;
      --qualifier-scorepack-width: 78px;
      --qualifier-pick-indicator-width: 15px;
      --leaderboard-rank-col: 88px;
      --leaderboard-score-col: 108px;
      --leaderboard-max-col: 126px;
    }
    *{ box-sizing:border-box; }
    [hidden]{ display:none !important; }
    html{ background-color: var(--bg3); }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg3);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }
    .topbar{ position: sticky; top:0; z-index:10; border-bottom:1px solid rgba(255,255,255,.10); background: rgba(3,18,42,.70); backdrop-filter: blur(10px); }
    .topbar-inner{ max-width:1260px; margin:0 auto; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .brand{display:flex; gap:12px; align-items:center;}
    .home-badge{ width:40px; height:40px; border-radius:16px; border:1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.05); display:grid; place-items:center; overflow:hidden; user-select:none; }
    .home-badge img{ width:70%; height:70%; object-fit:contain; display:block; pointer-events:none; }
    .kicker{ font-size:11px; letter-spacing:.25em; text-transform:uppercase; color: rgba(255,255,255,.65); font-weight:900; }
    .page-nav-select{ background: rgba(2,6,23,.85); color: inherit; border: 1px solid rgba(125,211,252,.35); border-radius: 10px; padding: 6px 32px 6px 10px; font: inherit; letter-spacing: inherit; text-transform: uppercase; max-width: min(56vw, 420px); cursor: pointer; }
    .topbar-user{ margin-left:auto; position:relative; display:none; align-items:center; gap:8px; }
    .topbar-user.is-visible{ display:flex; }
    .user-greeting{ font-size:12px; font-weight:500; letter-spacing:.03em; color: rgba(233,238,248,0.92); }
    .user-greeting-name{ font-weight:800; }
    .user-menu-button{ width:38px; height:38px; border-radius:999px; border:1px solid var(--btn-border); background: var(--btn-bg); color: rgba(233,238,248,0.92); display:grid; place-items:center; cursor:pointer; overflow:hidden; padding:0; }
    .user-menu-button:hover{ background: var(--btn-bg-hover); border-color:var(--btn-border-hover); }
    .user-menu-avatar{ width:100%; height:100%; object-fit:cover; display:block; }
    .user-menu-button svg{ width:18px; height:18px; fill: currentColor; }
    .user-menu-button.has-avatar svg{ display:none; }
    .user-menu-dropdown{ position:absolute; top: calc(100% + 8px); right:0; min-width:220px; border-radius:12px; border:1px solid rgba(148,163,184,.35); background: rgba(2,8,24,.97); box-shadow: 0 24px 36px rgba(0,0,0,.48); padding:6px; display:none; z-index:30; }
    .user-menu-dropdown.is-open{ display:grid; gap:4px; }
    .user-menu-item{ width:100%; border:1px solid transparent; border-radius:9px; background: rgba(255,255,255,.04); color: rgba(255,255,255,.92); min-height:34px; padding:0 10px; text-align:left; font-size:11px; letter-spacing:.05em; text-transform:uppercase; font-weight:800; cursor:pointer; }
    .user-menu-item:hover{ background: rgba(255,255,255,.10); border-color:rgba(255,255,255,.22); }
    .user-menu-item[disabled]{ opacity:.5; cursor:not-allowed; }
    .user-menu-item[disabled]:hover{ background: rgba(255,255,255,.04); border-color:transparent; }
    .user-menu-divider{ height:1px; margin:4px 2px; background: rgba(148,163,184,.24); }

    .container{ max-width:1260px; margin:0 auto; padding:22px 18px 52px; display:grid; gap:12px; }
    .card{ background: var(--card-bg); border-radius: 20px; padding:14px; box-shadow: var(--card-shadow); border: 1px solid rgba(255,255,255,0.10); display:grid; gap:10px; }
    .lc-next-match-card{
      --lc-next-match-font-size:15px;
      gap:0;
      padding:12px 14px;
    }
    .lc-next-match-card-row{ display:flex; align-items:center; justify-content:space-between; gap:16px; min-width:0; }
    .lc-next-match-card-copy{ min-width:0; flex:1; display:flex; align-items:center; gap:6px; overflow:hidden; }
    .lc-next-match-card-label,
    .lc-next-match-card-vs{
      color: rgba(148,163,184,.92);
      font-size:var(--lc-next-match-font-size);
      font-weight:400;
      letter-spacing:.08em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .lc-next-match-card-vs{ text-transform:none; }
    .lc-next-match-card-round{
      color: rgba(255,255,255,.98);
      font-size:var(--lc-next-match-font-size);
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .lc-next-match-card-opponent{
      min-width:0;
      color: rgba(255,255,255,.98);
      font-size:var(--lc-next-match-font-size);
      font-weight:900;
      letter-spacing:.05em;
      text-transform:uppercase;
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      gap:4px;
      overflow:hidden;
    }
    .lc-next-match-card-opponent-seed{
      flex:0 0 auto;
      color:#93c5fd;
      font-size:.76em;
      font-weight:900;
      line-height:1;
      font-variant-numeric:tabular-nums;
      transform:translateY(1px);
    }
    .lc-next-match-card-opponent-name{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .lc-next-match-card-region{
      color: rgba(var(--lc-next-match-region-rgb, 125,211,252), .98);
      font-size:var(--lc-next-match-font-size);
      font-weight:400;
      letter-spacing:.08em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .lc-next-match-card-mobile-break{ display:none; }
    .lc-next-match-card-button{
      flex:0 0 auto;
      min-height:38px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid rgba(125,211,252,.95);
      background: rgba(125,211,252,.95);
      color:#020617;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:var(--lc-next-match-font-size);
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      transition: background-color 120ms ease, border-color 120ms ease;
    }
    .lc-next-match-card-button:hover{
      background: rgba(186,230,253,.95);
      border-color: rgba(186,230,253,.95);
    }
    .lc-next-match-card-button:active{
      background: rgba(103,232,249,.95);
      border-color: rgba(103,232,249,.95);
    }
    .lc-countdown-strip{
      display:grid;
      justify-items:center;
      gap:4px;
      color:#fff;
      text-align:center;
    }
    .lc-countdown-copy{
      margin:0;
      width:100%;
      color:#fff;
      font-size:12px;
      line-height:1.2;
      white-space:nowrap;
    }
    .lc-countdown-copy strong{
      font-weight:900;
    }
    .lc-countdown-timer{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#fff;
      font-variant-numeric:tabular-nums;
      font-size:15px;
      font-weight:850;
      line-height:1.1;
      text-transform:uppercase;
    }
    .lc-countdown-unit{
      display:inline-flex;
      align-items:baseline;
      gap:3px;
      white-space:nowrap;
    }
    .lc-countdown-unit-label{
      font-size:.7em;
      font-weight:650;
      opacity:.88;
    }
    .headline{ margin:0; font-size:26px; font-weight:950; color:var(--title); letter-spacing:.035em; text-transform:uppercase; text-align:center; }
    .season-head{ min-height:44px; padding:2px 0; margin-bottom:8px; display:flex; align-items:center; justify-content:center; }
    .status{ margin:0; color:var(--muted); font-size:12px; text-align:center; }

    .tabs{ width:100%; }
    .btn{ border:1px solid var(--btn-border); background: var(--btn-bg); color: rgba(255,255,255,.92); border-radius:999px; padding:8px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; font-weight:850; cursor:pointer; }
    .btn:hover{ background: var(--btn-bg-hover); border-color:var(--btn-border-hover); }
    .btn-primary{
      border-color: rgba(125,211,252,.95);
      border-radius:8px;
      background: rgba(125,211,252,.95);
      color:#020617;
      font-weight:900;
    }
    .btn-primary:hover{
      background: rgba(186,230,253,.95);
      border-color: rgba(186,230,253,.95);
      color:#020617;
    }
    .btn-primary:active{
      background: rgba(103,232,249,.95);
      border-color: rgba(103,232,249,.95);
    }
    .btn[disabled]{ opacity:.45; cursor:not-allowed; }
    .lc-nav-root{ width:100%; display:grid; gap:0; }
    .lc-nav-list{
      list-style:none;
      margin:0;
      padding:0;
      width:100%;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.24);
      background: transparent;
    }
    .lc-nav-item{ position:relative; min-width:0; }
    .lc-nav-trigger{
      width:100%;
      min-height:36px;
      position:relative;
      border:0;
      border-radius:0;
      background: transparent;
      color: rgba(233,238,248,.88);
      padding:7px 10px;
      text-align:center;
      line-height:1.2;
      font: inherit;
      font-size:12px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0;
      appearance:none;
      cursor:pointer;
      transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .lc-nav-trigger-label{ display:block; width:100%; text-align:center; }
    .lc-nav-mobile-break{ display:none; }
    .lc-nav-trigger::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      border-radius:0;
      background: transparent;
      transition: background-color 140ms ease;
    }
    .lc-nav-trigger:hover{
      background: rgba(148,163,184,.10);
      color: rgba(255,255,255,.96);
    }
    .lc-nav-item[value="game"] .lc-nav-trigger{ color: rgba(250,204,21,.94); }
    .lc-nav-item[value="game"] .lc-nav-trigger:hover{
      background: rgba(250,204,21,.12);
      color: rgba(254,243,199,.98);
    }
    .lc-nav-trigger[data-state="open"]{
      background: rgba(56,189,248,.14);
      color: #f1f8ff;
    }
    .lc-nav-trigger[data-state="open"]::after{ background: rgba(125,211,252,.95); }
    .lc-nav-item[value="game"] .lc-nav-trigger[data-state="open"]{
      background: rgba(250,204,21,.16);
      color: rgba(254,243,199,.98);
    }
    .lc-nav-item[value="game"] .lc-nav-trigger[data-state="open"]::after{ background: rgba(250,204,21,.95); }
    .lc-nav-trigger:focus-visible{
      outline:none;
      box-shadow: inset 0 0 0 1px rgba(125,211,252,.55);
    }
    .lc-nav-viewport-wrap{ position:relative; width:100%; }
    .lc-nav-viewport{
      position:relative;
      width:100%;
      height: var(--radix-navigation-menu-viewport-height);
      transform-origin: top center;
      border:0;
      border-radius:0;
      background: transparent;
      box-shadow:none;
      overflow:visible;
      transition: width 220ms ease, height 220ms ease;
    }
    .lc-nav-viewport[data-state="open"]{ animation: lc-nav-viewport-in 180ms ease; }
    .lc-nav-viewport[data-state="closed"]{ animation: lc-nav-viewport-out 140ms ease; }
    .lc-nav-content{
      width:100%;
      padding:0;
      display:grid;
      gap:4px;
    }
    .lc-nav-sublist{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:minmax(0,1fr);
      gap:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.22);
      background: transparent;
    }
    .lc-nav-sublist > li{ min-width:0; }
    .lc-nav-sublink{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:32px;
      border:0;
      border-radius:0;
      background: transparent;
      color: rgba(233,238,248,.9);
      padding:0 10px;
      text-align:center;
      text-decoration:none;
      line-height:1.2;
      font-size:10px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .lc-nav-sublink:hover{
      background: rgba(148,163,184,.10);
      color:#f8fbff;
    }
    .lc-nav-sublink[data-active]{
      background: rgba(148,163,184,.16);
      color: rgba(246,248,252,.97);
    }
    .lc-nav-sublink:focus-visible{
      outline:none;
      box-shadow: 0 0 0 2px rgba(125,211,252,.45);
    }
    .lc-nav-sublink[data-disabled]{ opacity:.55; cursor:not-allowed; }
    .lc-nav-sublink[data-disabled]:hover{
      background: transparent;
      color: rgba(233,238,248,.9);
    }
    .lc-nav-subtext{
      color: rgba(156,163,199,.9);
      font-size:11px;
      line-height:1.35;
      padding:4px 2px 1px;
      text-align:center;
    }
    .lc-region-tabs-root{ width:100%; }
    .lc-region-tabs-list{
      width:100%;
      display:grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap:0;
      padding:0;
      border:0;
      border-bottom:1px solid rgba(148,163,184,.24);
      border-radius:0;
      background: transparent;
    }
    .lc-region-tabs-trigger{
      position:relative;
      min-height:35px;
      border:0;
      border-radius:0;
      background: transparent;
      color: rgba(233,238,248,.86);
      padding:6px 8px 7px;
      text-align:center;
      line-height:1.2;
      font: inherit;
      font-size:11px;
      font-weight:850;
      letter-spacing:.06em;
      text-transform:uppercase;
      appearance:none;
      cursor:pointer;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }
    .lc-region-tabs-trigger-label{
      display:block;
      width:100%;
      text-align:center;
    }
    .lc-region-tabs-indicator{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:18px;
      pointer-events:none;
      font-size:10px;
      font-weight:900;
      letter-spacing:.02em;
      font-variant-numeric: tabular-nums;
      line-height:1;
      white-space:nowrap;
    }
    .lc-region-tabs-indicator.is-incomplete{
      color:#fca5a5;
    }
    .lc-region-tabs-indicator.is-complete{
      color: rgba(var(--lc-region-tab-indicator-rgb, var(--region-accent-rgb)), .98);
    }
    .lc-region-tabs-indicator-icon{
      width:14px;
      height:14px;
      display:block;
    }
    .lc-region-tabs-trigger::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      border-radius:0;
      background: transparent;
      transition: background-color 140ms ease;
    }
    .lc-region-tabs-trigger:hover{
      background: rgba(148,163,184,.10);
      color: rgba(255,255,255,.95);
    }
    .lc-region-tabs-trigger[data-state="active"]{
      background: rgba(var(--region-accent-rgb), .09);
      color:#f4faff;
    }
    .lc-region-tabs-trigger[data-state="active"]::after{ background: rgba(var(--region-accent-rgb), .78); }
    .lc-region-tabs-trigger:focus-visible{
      outline:none;
      box-shadow: inset 0 0 0 1px rgba(var(--region-accent-rgb), .42);
    }
    .lc-region-tabs-trigger[data-disabled]{ opacity:.5; cursor:not-allowed; }
    .lc-region-tabs-content{
      position:absolute;
      width:1px;
      height:1px;
      margin:-1px;
      padding:0;
      overflow:hidden;
      clip:rect(0, 0, 0, 0);
      white-space:nowrap;
      border:0;
    }
    @keyframes lc-nav-viewport-in{
      from{ opacity:0; transform:scale(.98); }
      to{ opacity:1; transform:scale(1); }
    }
    @keyframes lc-nav-viewport-out{
      from{ opacity:1; }
      to{ opacity:0; }
    }
    .two-col{ display:grid; grid-template-columns: minmax(0,1fr); gap:12px; }
    .panel{ border:1px solid var(--border-lite); border-radius:16px; padding:12px; background: rgba(15,23,42,0.55); }

    .qualifier-seed-list{ display:grid; gap:6px; }
    .qualifier-seed-head,.qualifier-seed-row{ display:grid; grid-template-columns: 44px 1fr; align-items:center; text-align:center; }
    .qualifier-seed-head{ background: var(--header-bg); border-radius:10px; padding:8px 6px; color:var(--muted); font-size:8px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; }
    .qualifier-seed-row{ background: var(--row-bg); border-radius:10px; padding:8px 6px; }
    .qualifier-seed-number{ font-size:12px; font-weight:800; color:#93c5fd; }
    .qualifier-seed-player{ font-size:12px; font-weight:850; text-transform: uppercase; overflow-wrap:anywhere; }

    .qualifier-bracket-scroll{ width:100%; overflow-x:auto; overflow-y:hidden; padding-bottom:4px; }
    .qualifier-bracket-grid{ display:grid; grid-auto-flow:column; grid-auto-columns:var(--qualifier-round-column-width); gap:18px; align-items:start; width:max-content; min-width:100%; justify-content:center; padding:2px; }
    .qualifier-round-column{ display:flex; flex-direction:column; gap:8px; min-width:0; }
    .qualifier-round-title{ margin:0; font-size:10px; font-weight:900; letter-spacing:.09em; color:var(--muted); text-align:center; }
    .qualifier-round-stack{ display:flex; flex-direction:column; gap: var(--qualifier-round-gap, 8px); }
    .qualifier-round-stack .qualifier-bracket-match:first-child{ padding-top: var(--qualifier-round-padding-top, 0px); }
    .qualifier-round-stack .qualifier-bracket-match + .qualifier-bracket-match{ padding-top: var(--qualifier-round-gap, 8px); }
    .qualifier-bracket-match{ display:grid; grid-template-columns:22px minmax(0,1fr); column-gap:6px; align-items:center; width:100%; min-height:var(--qualifier-match-height); }
    .qualifier-match-info-slot{ width:22px; height:22px; display:grid; place-items:center; }
    .qualifier-match-info{
      width:22px;
      flex:0 0 22px;
      height:22px;
      border-radius:999px;
      border:1px solid var(--btn-border);
      background: var(--btn-bg);
      color: rgba(233,238,248,0.86);
      font-size:11px;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight:700;
      cursor:pointer;
      display:grid;
      place-items:center;
      line-height:1;
      transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, transform 120ms ease;
    }
    .qualifier-match-info:hover{ background: var(--btn-bg-hover); border-color: var(--btn-border-hover); color:#fff; }
    .qualifier-match-info:focus-visible{
      outline:none;
      border-color: rgba(125,211,252,.72);
      box-shadow: 0 0 0 2px rgba(125,211,252,.28);
    }
    .qualifier-match-info.is-disabled{
      cursor: default;
      opacity:.5;
      pointer-events:none;
    }
    .qualifier-match-card{ position:relative; width:100%; min-width:0; border-radius:10px; overflow:hidden; background: rgba(255,255,255,0.05); isolation:isolate; }
    .qualifier-match-card::before{ content:""; position:absolute; inset:0; border:1px solid rgba(255,255,255,0.08); border-radius:inherit; pointer-events:none; z-index:3; transition: border-color 120ms ease, box-shadow 120ms ease; }
    .qualifier-match-row{ width:100%; display:grid; grid-template-columns:var(--qualifier-seed-col-width) minmax(0,1fr) var(--qualifier-scorepack-width); align-items:center; gap:8px; min-height:24px; background: rgba(255,255,255,0.06); color: var(--muted); padding:3px 5px 3px 6px; border:0; font-size:10px; text-align:left; position:relative; z-index:1; transition: box-shadow 120ms ease, border-color 120ms ease, background-color 120ms ease, color 120ms ease; }

    const normalizeName = (value) => String(value || "").trim();
    function escapeHtml(value){
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function normalizeUrlQueryValue(value){
      return normalizeName(value).toLowerCase().replace(/[\s_]+/g, "-");
    }
    function getMainTabViewQueryValue(mainTab = state.mainTab){
      return mainTab === "Actual Bracket" ? VIEW_QUERY_RESULTS : VIEW_QUERY_BRACKET_GAME;

    function getBracketGameTabQueryValue(mainTab = state.mainTab){
      return BRACKET_GAME_TAB_QUERY_VALUE_BY_MAIN_TAB[mainTab] || BRACKET_GAME_TAB_QUERY_VALUE_BY_MAIN_TAB["Your Bracket"];
    }
    function applyUrlStateToView(){
      const params = new URLSearchParams(window.location.search);
      const view = normalizeUrlQueryValue(params.get("view"));
      const bracketGameTab = normalizeUrlQueryValue(params.get("tab"));
      const requestedBracketGameTab = MAIN_TAB_BY_BRACKET_GAME_TAB_QUERY_VALUE[bracketGameTab] || "";
      if(view === VIEW_QUERY_RESULTS){
        state.mainTab = "Actual Bracket";

      if(!els.lightningCupCountdownStrip?.isConnected || !els.lightningCupCountdownTimer?.isConnected) return;
      const remainingMs = LIGHTNING_CUP_STARTS_AT_MS - Date.now();
      if(remainingMs <= 0){
        removeLightningCupCountdown();
        return;
      }
      els.lightningCupCountdownStrip.hidden = false;
      const totalSeconds = Math.floor(remainingMs / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const padUnit = (value) => String(value).padStart(2, "0");
      els.lightningCupCountdownTimer.innerHTML = [
        renderCountdownUnit(days, days === 1 ? "day" : "days"),
        renderCountdownUnit(padUnit(hours), "hours"),
        renderCountdownUnit(padUnit(minutes), "minutes"),
        renderCountdownUnit(padUnit(seconds), "seconds"),
      ].join("");
    }
    function startLightningCupCountdown(){
      if(lightningCupCountdownIntervalId != null){
        window.clearInterval(lightningCupCountdownIntervalId);

    function draftRowsFromPickMap(picksMap){
      if(!(picksMap instanceof Map)) return [];
      return [...picksMap.values()]
        .map((pick) => ({
          match_id: Number(pick.match_id),
          round_code: normalizeName(pick.round_code),
          round_number: Number(pick.round_number),
          selected_winner_name: normalizeName(pick.selected_winner_name),
          selected_winner_seed: pick.selected_winner_seed == null ? null : Number(pick.selected_winner_seed),
        }))
        .filter((pick) => Number.isFinite(pick.match_id) && pick.round_code && Number.isFinite(pick.round_number) && pick.selected_winner_name)
        .sort((a,b) => a.match_id - b.match_id);
    }

    function buildPickMapFromDraftRows(rows, bracketId){
      const normalizedBracketId = normalizeName(bracketId) || null;
      const map = new Map();
      if(!Array.isArray(rows)) return map;
      rows.forEach((row) => {
        const matchId = Number(row?.match_id);
        const roundCode = normalizeName(row?.round_code);
        const roundNumber = Number(row?.round_number);
        const selectedWinnerName = normalizeName(row?.selected_winner_name);
        if(!Number.isFinite(matchId) || !roundCode || !Number.isFinite(roundNumber) || !selectedWinnerName) return;
        map.set(matchId, {
          bracket_id: normalizedBracketId,
          match_id: matchId,
          round_code: roundCode,
          round_number: roundNumber,
          selected_winner_name: selectedWinnerName,
          selected_winner_seed: row?.selected_winner_seed == null ? null : Number(row.selected_winner_seed),
          is_correct: null,
          points_awarded: null,
          year: TOURNAMENT_YEAR,
        });
      });
      return map;
    }

    function arePickSelectionsEqual(leftPick, rightPick){
      if(!leftPick || !rightPick) return false;
      return normalizeName(leftPick.selected_winner_name) === normalizeName(rightPick.selected_winner_name)
        && Number(leftPick.selected_winner_seed ?? -1) === Number(rightPick.selected_winner_seed ?? -1)
        && normalizeName(leftPick.round_code) === normalizeName(rightPick.round_code)
        && Number(leftPick.round_number ?? 0) === Number(rightPick.round_number ?? 0);
    }

    function arePickMapsEquivalent(leftMap, rightMap){
      if(!(leftMap instanceof Map) || !(rightMap instanceof Map)) return false;
      if(leftMap.size !== rightMap.size) return false;
      for(const [matchId, leftPick] of leftMap.entries()){
        const rightPick = rightMap.get(matchId);
        if(!arePickSelectionsEqual(leftPick, rightPick)) return false;
      }
      return true;
    }

      if(!(picksMap instanceof Map)) return new Map();

      if(!state.savedPicksLoaded) return false;
      const currentComparable = state.context ? state.validUserPicks : normalizePickMapForComparison(state.userPicks);
      const savedComparable = normalizePickMapForComparison(state.savedPicksSnapshot);
      return arePickMapsEquivalent(currentComparable, savedComparable);
    }

    function loadLocalBracketDraft(userId, year = TOURNAMENT_YEAR){
      const key = getDraftStorageKey(userId, year);
      if(!key) return null;
      try{
        const raw = window.localStorage.getItem(key);
        if(!raw) return null;
        const parsed = JSON.parse(raw);
        if(!parsed || typeof parsed !== "object") return null;
        if(Number(parsed.version) !== BRACKET_DRAFT_STORAGE_VERSION) return null;
        if(normalizeName(parsed.userId) !== normalizeName(userId)) return null;
        if(normalizeName(parsed.year) !== normalizeName(year)) return null;
        return {
          updatedAt: normalizeName(parsed.updatedAt),
          picks: Array.isArray(parsed.picks) ? parsed.picks : [],
        };
      }catch{
        try{
          window.localStorage.removeItem(key);
        }catch{
          // Ignore storage cleanup errors for draft recovery.
        }
        return null;
      }
    }

    function clearLocalBracketDraft(userId = state.session?.user?.id, year = TOURNAMENT_YEAR){
      const key = getDraftStorageKey(userId, year);
      if(!key) return;
      try{
        window.localStorage.removeItem(key);
      }catch{
        // Ignore storage cleanup errors for draft recovery.
      }
    }

    function getLocalSavedMarkerTimestamp(userId, year = TOURNAMENT_YEAR){
      const key = getSavedMarkerStorageKey(userId, year);
      if(!key) return "";
      try{
        const raw = window.localStorage.getItem(key);
        if(!raw) return "";
        const parsed = JSON.parse(raw);
        if(!parsed || typeof parsed !== "object") return "";
        if(normalizeName(parsed.userId) !== normalizeName(userId)) return "";
        if(normalizeName(parsed.year) !== normalizeName(year)) return "";
        return normalizeName(parsed.savedAt);
      }catch{
        return "";
      }
    }

    function saveLocalSavedMarkerTimestamp(userId, year = TOURNAMENT_YEAR){
      const key = getSavedMarkerStorageKey(userId, year);
      if(!key) return;
      const payload = {
        userId: normalizeName(userId),
        year: normalizeName(year || TOURNAMENT_YEAR),
        savedAt: new Date().toISOString(),
      };
      try{
        window.localStorage.setItem(key, JSON.stringify(payload));
      }catch{
        // Ignore storage write errors so bracket save flow remains usable.
      }
    }

    function saveLocalBracketDraft(picksMap = state.userPicks){
      const userId = normalizeName(state.session?.user?.id);
      const key = getDraftStorageKey(userId, TOURNAMENT_YEAR);
      if(!key) return;
      const picks = draftRowsFromPickMap(picksMap);
      if(!picks.length){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return;
      }
      const payload = {
        version: BRACKET_DRAFT_STORAGE_VERSION,
        userId,
        year: TOURNAMENT_YEAR,
        updatedAt: new Date().toISOString(),
        picks,
      };
      try{
        window.localStorage.setItem(key, JSON.stringify(payload));
      }catch{
        // Ignore storage write errors so bracket editing remains usable.
      }
    }

    function resolveUserPicksForSession(userId, savedPicksMap, bracketId){
      const draft = loadLocalBracketDraft(userId, TOURNAMENT_YEAR);
      if(!draft){
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      const draftPickMap = buildPickMapFromDraftRows(draft.picks, bracketId);
      if(draftPickMap.size === 0){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      if(arePickMapsEquivalent(savedPicksMap, draftPickMap)){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      const draftUpdatedAt = normalizeName(draft.updatedAt);
      const savedMarkerUpdatedAt = getLocalSavedMarkerTimestamp(userId, TOURNAMENT_YEAR);
      const draftMillis = Date.parse(draftUpdatedAt);
      const savedMarkerMillis = Date.parse(savedMarkerUpdatedAt);
      if(Number.isFinite(draftMillis) && Number.isFinite(savedMarkerMillis) && draftMillis <= savedMarkerMillis){
        clearLocalBracketDraft(userId, TOURNAMENT_YEAR);
        return { picksMap: savedPicksMap, restoredDraft: false, draftUpdatedAt: "" };
      }

      return {
        picksMap: draftPickMap,
        restoredDraft: true,
        draftUpdatedAt,
      };
    }

    function normalizeAvatarUrl(value){
      const raw = normalizeName(value);
      if(!raw) return "";
      try{
        const parsed = new URL(raw, window.location.origin);
        if(parsed.protocol !== "http:" && parsed.protocol !== "https:") return "";
        return parsed.toString();
      }catch{
        return "";
      }
    }

    function getAvatarUrlFromProviders(providers){
      if(Array.isArray(providers)){
        for(const entry of providers){
          if(!entry || typeof entry !== "object") continue;
          const entryProvider = normalizeName(entry.provider || entry.name || entry.id).toLowerCase();
          if(entryProvider && entryProvider !== "discord") continue;
          const nestedDiscord = entry.discord && typeof entry.discord === "object" ? entry.discord : null;
          const candidate = normalizeAvatarUrl(
            entry.avatar_url ||
            entry.avatarUrl ||
            entry.picture ||
            entry.image_url ||
            nestedDiscord?.avatar_url ||
            nestedDiscord?.avatarUrl ||
            nestedDiscord?.picture ||
            nestedDiscord?.image_url
          );
          if(candidate) return candidate;
        }
        return "";
      }
      if(!providers || typeof providers !== "object") return "";
      const discordProvider = providers.discord && typeof providers.discord === "object" ? providers.discord : null;
      return normalizeAvatarUrl(
        discordProvider?.avatar_url ||
        discordProvider?.avatarUrl ||
        discordProvider?.picture ||
        discordProvider?.image_url ||
        providers.avatar_url ||
        providers.avatarUrl ||
        providers.picture ||
        providers.image_url
      );
    }

    function getDiscordAvatarUrlFromAuthUser(user){
      const providerCandidates = [
        user?.providers,
        user?.user_metadata?.providers,
        user?.raw_user_meta_data?.providers,
        user?.app_metadata?.providers,
        user?.raw_app_meta_data?.providers,
      ];
      for(const providers of providerCandidates){
        const url = getAvatarUrlFromProviders(providers);
        if(url) return url;
      }

      const identities = Array.isArray(user?.identities) ? user.identities : [];
      const discordIdentity = identities.find((identity) => normalizeName(identity?.provider).toLowerCase() === "discord");
      const identityData = discordIdentity?.identity_data && typeof discordIdentity.identity_data === "object"
        ? discordIdentity.identity_data
        : {};
      const fromIdentity = normalizeAvatarUrl(
        identityData.avatar_url ||
        identityData.picture ||
        identityData.image_url
      );
      if(fromIdentity) return fromIdentity;

      const metadata = user?.user_metadata && typeof user.user_metadata === "object" ? user.user_metadata : {};
      return normalizeAvatarUrl(metadata.avatar_url || metadata.picture || metadata.image_url);
    }

    function parsePlayers(raw){

      const map = new Map();
      rows.slice(1).forEach((r) => {

    function normalizeDiscordPlayerId(value){
      const raw = normalizeName(value);
      if(!raw) return "";
      const mentionMatch = raw.match(/^<@!?(\d+)>$/);
      return mentionMatch ? mentionMatch[1] : raw;
    }

    function parseSeedsNameDiscordMap(raw){
      const rows = Array.isArray(raw?.values) ? raw.values : [];
      const exact = new Map();
      const lower = new Map();
      rows.forEach((row, index) => {
        const name = normalizeName(row?.[0]);
        const discordId = normalizeDiscordPlayerId(row?.[2]);
        if(!name) return;
        if(index === 0 && name.toLowerCase() === "name") return;
        const lowerKey = name.toLowerCase();
        const previous = exact.get(name) || "";
        const next = discordId || previous;
        exact.set(name, next);
        lower.set(lowerKey, next);
      });
      return { exact, lower };
    }

    function formatOrdinal(value){
      const rank = Number(value);
      if(!Number.isFinite(rank)) return "—";
      const whole = Math.max(0, Math.trunc(rank));
      const mod100 = whole % 100;
      if(mod100 >= 11 && mod100 <= 13) return `${whole}th`;
      const mod10 = whole % 10;
      const suffix = mod10 === 1 ? "st" : mod10 === 2 ? "nd" : mod10 === 3 ? "rd" : "th";
      return `${whole}${suffix}`;
    }

    function isRankedEntryLike(value){
      return !!value && typeof value === "object" && (
        value.player_id != null ||
        value.playerId != null ||
        value.discord_id != null ||
        value.discordId != null
      );
    }

    function extractRankedEntriesFromPayload(payload){
      const parsedPayload = typeof payload === "string"
        ? (() => { try{ return JSON.parse(payload); }catch{ return null; } })()
        : payload;

      if(Array.isArray(parsedPayload)){
        if(parsedPayload.some(isRankedEntryLike)) return parsedPayload;
      }
      if(!parsedPayload || typeof parsedPayload !== "object"){
        return [];
      }

      const prioritized = [
        parsedPayload.entries,
        parsedPayload.leaderboard,
        parsedPayload.rankings,
        parsedPayload.rows,
        parsedPayload.players,
        parsedPayload.data,
      ];
      for(const candidate of prioritized){
        if(Array.isArray(candidate) && candidate.some(isRankedEntryLike)){
          return candidate;
        }
      }

      const queue = [parsedPayload];
      const visited = new Set();
      while(queue.length){
        const node = queue.shift();
        if(!node || typeof node !== "object") continue;
        if(visited.has(node)) continue;
        visited.add(node);

        if(Array.isArray(node)){
          if(node.some(isRankedEntryLike)) return node;
          node.forEach((child) => {
            if(child && typeof child === "object") queue.push(child);
          });
          continue;
        }

        Object.values(node).forEach((child) => {
          if(Array.isArray(child) || (child && typeof child === "object")){
            queue.push(child);
          }
        });
      }
      return [];
    }

    function buildRankedPlayerMapFromPayload(payload){
      const rows = extractRankedEntriesFromPayload(payload);
      const map = new Map();
      rows.forEach((row) => {
        if(!row || typeof row !== "object") return;
        const playerId = normalizeDiscordPlayerId(row.player_id ?? row.playerId ?? row.discord_id ?? row.discordId);
        if(!playerId) return;
        const rank = Number(row.rank);
        const elo = Number(row.elo);
        map.set(playerId, {
          rank: Number.isFinite(rank) ? Math.trunc(rank) : null,
          elo: Number.isFinite(elo) ? Math.trunc(elo) : null,
        });
      });
      return map;
    }

    async function loadRankedSeasonPayloads(){
      if(RANKED_SEASONS.every((season) => state.rankedBySeason.has(season))){
        return state.rankedBySeason;
      }
      if(state.rankedLoadPromise){
        return state.rankedLoadPromise;
      }

      state.rankedLoadPromise = (async () => {
        const { data, error } = await supabase
          .from("ranked")
          .select("season,payload")
          .in("season", RANKED_SEASONS);
        if(error){
          throw error;
        }

        const rankedBySeason = new Map();
        RANKED_SEASONS.forEach((season) => rankedBySeason.set(season, new Map()));
        (data || []).forEach((row) => {
          const season = Number(row?.season);
          if(!RANKED_SEASONS.includes(season)) return;
          rankedBySeason.set(season, buildRankedPlayerMapFromPayload(row?.payload));
        });
        state.rankedBySeason = rankedBySeason;
        return state.rankedBySeason;
      })()
        .finally(() => {
          state.rankedLoadPromise = null;
        });

      return state.rankedLoadPromise;
    }

    function buildBracketContext(actualMatches){
      const byRoundRegion = new Map();
      const byId = new Map(actualMatches.map((m) => [m.id, m]));
      actualMatches.forEach((m) => {
        const key = `${m.round}:${m.region}`;
        if(!byRoundRegion.has(key)) byRoundRegion.set(key, []);
        byRoundRegion.get(key).push(m);
      });
      for(const list of byRoundRegion.values()) list.sort((a,b)=>a.id-b.id);

      /** @type {Map<number,{nextId:number,slot:'top'|'bottom'}>} */
      const nextMap = new Map();
      /** @type {Map<number,{topSource:number|null,bottomSource:number|null}>} */
      const prevMap = new Map();
      const setEdge = (fromId, toId, slot) => {
        if(!fromId || !toId) return;
        nextMap.set(fromId, { nextId: toId, slot });
        const prev = prevMap.get(toId) || { topSource: null, bottomSource: null };
        prev[slot === "top" ? "topSource" : "bottomSource"] = fromId;
        prevMap.set(toId, prev);
      };

      const regionChampions = new Map();
      [1,2,3,4].forEach((region) => {
        const r64 = byRoundRegion.get(`R64:${region}`) || [];
        const r32 = byRoundRegion.get(`R32:${region}`) || [];
        const r16 = byRoundRegion.get(`R16:${region}`) || [];
        const r8 = byRoundRegion.get(`R8:${region}`) || [];

        r64.forEach((m, i) => setEdge(m.id, r32[Math.floor(i/2)]?.id, i % 2 === 0 ? "top" : "bottom"));
        r32.forEach((m, i) => setEdge(m.id, r16[Math.floor(i/2)]?.id, i % 2 === 0 ? "top" : "bottom"));
        r16.forEach((m, i) => setEdge(m.id, r8[Math.floor(i/2)]?.id, i % 2 === 0 ? "top" : "bottom"));
        if(r8[0]) regionChampions.set(region, r8[0].id);
      });

      const semifinals = actualMatches.filter((m) => m.round === "R4").sort((a,b)=>a.id-b.id);
      const finals = actualMatches.filter((m) => m.round === "Final").sort((a,b)=>a.id-b.id);
      const finalMatch = finals[0];

      setEdge(regionChampions.get(1), semifinals[0]?.id, "top");
      setEdge(regionChampions.get(4), semifinals[0]?.id, "bottom");
      setEdge(regionChampions.get(2), semifinals[1]?.id, "top");
      setEdge(regionChampions.get(3), semifinals[1]?.id, "bottom");
      setEdge(semifinals[0]?.id, finalMatch?.id, "top");
      setEdge(semifinals[1]?.id, finalMatch?.id, "bottom");

      return { byId, byRoundRegion, nextMap, prevMap };
    }

    function buildInitialUserBracketFromActualR64(context){
      const predicted = new Map();
      const actualSorted = [...context.byId.values()].sort((a,b)=>a.id-b.id);
      actualSorted.forEach((m) => {
        predicted.set(m.id, {
          id: m.id,
          round: m.round,
          roundNumber: ROUND_NUMBER[m.round] || 0,
          region: m.region,
          top: m.round === "R64" ? { ...m.top } : { seed: null, name: "", score: null },
          bottom: m.round === "R64" ? { ...m.bottom } : { seed: null, name: "", score: null },
          pickedWinner: "",
        });
      });
      return predicted;
    }

    function getParticipantFromPicked(match, pickedName){
      if(match.top.name && match.top.name === pickedName) return { ...match.top };
      if(match.bottom.name && match.bottom.name === pickedName) return { ...match.bottom };
      return null;
    }

    function getParticipantIdentityForFutureMatch(slot){
      return {
        seed: slot?.seed ?? null,
        name: normalizeName(slot?.name),
        score: null,
      };
    }

    function propagateWinnerToNextMatch(predicted, context, matchId, pickedName){
      const link = context.nextMap.get(matchId);
      if(!link) return;
      const current = predicted.get(matchId);
      const next = predicted.get(link.nextId);
      if(!current || !next) return;
      const participant = getParticipantFromPicked(current, pickedName);
      const fallback = { seed: null, name: "", score: null };
      next[link.slot] = participant ? getParticipantIdentityForFutureMatch(participant) : fallback;
    }

    function applyUserPicksToPredictedBracket(context, picksMap){
      const predicted = buildInitialUserBracketFromActualR64(context);
      const validPicks = new Map();
      const matchOrder = [...predicted.keys()].sort((a,b)=>a-b);
      matchOrder.forEach((matchId) => {
        const pick = picksMap.get(matchId);
        if(!pick) return;
        const match = predicted.get(matchId);
        const chosen = normalizeName(pick.selected_winner_name);
        if(!chosen) return;
        const participant = getParticipantFromPicked(match, chosen);
        if(!participant) return;

        const normalizedPick = {
          ...pick,
          selected_winner_seed: participant.seed ?? pick.selected_winner_seed ?? null,
          round_code: match.round,
          round_number: match.roundNumber,
        };
        match.pickedWinner = chosen;
        validPicks.set(matchId, normalizedPick);
        propagateWinnerToNextMatch(predicted, context, matchId, chosen);
      });
      return { predicted, validPicks };
    }

    function clearDependentDownstreamPicks(_changedMatchId, picksMap, context){
      const nextPickMap = new Map(picksMap);
      const { validPicks } = applyUserPicksToPredictedBracket(context, nextPickMap);
      return new Map(validPicks);
    }

    function hydratePickCorrectnessAgainstActualResults(pick, actualById){
      const actual = actualById.get(pick.match_id);
      if(!actual || !actual.winner) return { ...pick, is_correct: null, points_awarded: null };
      const isCorrect = actual.winner === pick.selected_winner_name;
      return {
        ...pick,
        is_correct: isCorrect,
        points_awarded: isCorrect ? roundBasePoints(pick.round_code) + (pick.selected_winner_seed || 0) : 0,
      };
    }

    function computeActualPossibleWinnerSets(context){
      const memo = new Map();
      const recurse = (matchId) => {
        if(memo.has(matchId)) return memo.get(matchId);
        const actual = context.byId.get(matchId);
        if(!actual){ const empty = new Set(); memo.set(matchId, empty); return empty; }
        if(actual.winner){ const done = new Set([actual.winner]); memo.set(matchId, done); return done; }
        const prev = context.prevMap.get(matchId);
        if(!prev){
          const set = new Set([actual.top.name, actual.bottom.name].filter(Boolean));
          memo.set(matchId, set);
          return set;
        }
        const set = new Set();
        if(prev.topSource) recurse(prev.topSource).forEach((name) => set.add(name));
        if(prev.bottomSource) recurse(prev.bottomSource).forEach((name) => set.add(name));
        memo.set(matchId, set);
        return set;
      };
      [...context.byId.keys()].forEach((id) => recurse(id));
      return memo;
    }

    function calculateActualScore(hydratedPicks){
      return hydratedPicks.reduce((sum, p) => sum + (p.is_correct ? (p.points_awarded || 0) : 0), 0);
    }

    function calculatePossibleRemainingScore(hydratedPicks, validPicks, actualPossibleSets){
      return hydratedPicks.reduce((sum, p) => {
        if(p.is_correct !== null) return sum;
        if(!validPicks.has(p.match_id)) return sum;
        const possibleSet = actualPossibleSets.get(p.match_id) || new Set();
        if(!possibleSet.has(p.selected_winner_name)) return sum;
        return sum + roundBasePoints(p.round_code) + (p.selected_winner_seed || 0);
      }, 0);
    }

    function calculatePossibleTotalScore(actualScore, possibleRemaining){
      return actualScore + possibleRemaining;
    }

    function calculateInitialMaxScore(validPicks){
      if(!(validPicks instanceof Map)) return 0;
      return [...validPicks.values()].reduce((sum, pick) => {
        return sum + roundBasePoints(pick.round_code) + Number(pick.selected_winner_seed || 0);
      }, 0);
    }

    function compareLeaderboardRows(left, right){
      const directionMultiplier = state.leaderboardSortDirection === "asc" ? 1 : -1;
      const key = state.leaderboardSortKey;
      const leftValue = key === "rank" ? left.rankOrder : key === "actual" ? left.actual : key === "currentMax" ? left.currentMax : left.initialMax;
      const rightValue = key === "rank" ? right.rankOrder : key === "actual" ? right.actual : key === "currentMax" ? right.currentMax : right.initialMax;
      if(leftValue !== rightValue){
        return (leftValue - rightValue) * directionMultiplier;
      }
      if(left.actual !== right.actual){
        return right.actual - left.actual;
      }
      if(left.currentMax !== right.currentMax){
        return right.currentMax - left.currentMax;
      }
      return left.bracket_name.localeCompare(right.bracket_name);
    }

    function getMatchesForTab(tab, matchesMap){
      const all = [...matchesMap.values()];
      if(tab === "Finals") return all.filter((m) => m.round === "R4" || m.round === "Final").sort((a,b)=>a.id-b.id);
      const region = Number(REGION_ID_BY_TAB[tab]);
      if(!Number.isFinite(region)) return [];
      return all.filter((m) => m.region === region && ["R64","R32","R16","R8"].includes(m.round)).sort((a,b)=>a.id-b.id);
    }

    function groupByRound(matches){
      return ROUND_ORDER.map((round) => ({ round, matches: matches.filter((m) => m.round === round) })).filter((g) => g.matches.length);
    }

    function parseScoreSegments(scoreValue){
      const tokens = normalizeName(scoreValue).split(/[\s|,/;]+/).filter(Boolean);
      if(tokens.length === 0){
        return { setScores: ["", "", ""], finalScore: "" };
      }
      if(tokens.length === 1){
        return { setScores: ["", "", ""], finalScore: tokens[0] };
      }
      const finalScore = tokens[tokens.length - 1];
      const recentSets = tokens.slice(0, -1).slice(-3);
      const setScores = ["", "", ""];
      setScores.splice(3 - recentSets.length, recentSets.length, ...recentSets);
      return { setScores, finalScore };
    }

    function getDisplayedScoreValue(match, slot, mode){
      if(mode === "actual") return normalizeName(slot?.score);
      const actualMatch = state.context?.byId?.get(Number(match?.id));
      const slotName = normalizeName(slot?.name);
      if(!actualMatch || !slotName) return "";
      if(normalizeName(actualMatch.round) !== normalizeName(match?.round)) return "";
      if(slotName === normalizeName(actualMatch.top?.name)) return normalizeName(actualMatch.top?.score);
      if(slotName === normalizeName(actualMatch.bottom?.name)) return normalizeName(actualMatch.bottom?.score);
      return "";
    }

    const EMPTY_PREDICTED_SLOT_APPEARANCE = Object.freeze({
      futureCorrect: false,
      futureIncorrect: false,
      strike: false,
    });

    function getMatchSlotKeyForPlayer(match, playerName){
      const normalizedPlayerName = normalizeName(playerName);
      if(!match || !normalizedPlayerName) return "";
      if(normalizeName(match.top?.name) === normalizedPlayerName) return "top";
      if(normalizeName(match.bottom?.name) === normalizedPlayerName) return "bottom";
      return "";
    }

    function createPredictedCarryStatusResolver(context, predictedMatchesMap, hydratedMap){
      if(!(predictedMatchesMap instanceof Map) || !(hydratedMap instanceof Map) || !context?.prevMap){
        return () => EMPTY_PREDICTED_SLOT_APPEARANCE;
      }

      const memo = new Map();
      const resolve = (matchId, slotKey) => {
        const normalizedMatchId = Number(matchId);
        const normalizedSlotKey = slotKey === "bottom" ? "bottom" : "top";
        const memoKey = `${normalizedMatchId}:${normalizedSlotKey}`;
        if(memo.has(memoKey)) return memo.get(memoKey);

        const match = predictedMatchesMap.get(normalizedMatchId);
        const slotName = normalizeName(match?.[normalizedSlotKey]?.name);
        if(!match || !slotName){
          memo.set(memoKey, EMPTY_PREDICTED_SLOT_APPEARANCE);
          return EMPTY_PREDICTED_SLOT_APPEARANCE;
        }

        const prev = context.prevMap.get(normalizedMatchId);
        const sourceMatchId = prev?.[normalizedSlotKey === "top" ? "topSource" : "bottomSource"];
        if(!sourceMatchId){
          memo.set(memoKey, EMPTY_PREDICTED_SLOT_APPEARANCE);
          return EMPTY_PREDICTED_SLOT_APPEARANCE;
        }

        const sourceMatch = predictedMatchesMap.get(sourceMatchId);
        const sourcePickedName = normalizeName(sourceMatch?.pickedWinner);
        if(!sourceMatch || !sourcePickedName || sourcePickedName !== slotName){
          memo.set(memoKey, EMPTY_PREDICTED_SLOT_APPEARANCE);
          return EMPTY_PREDICTED_SLOT_APPEARANCE;
        }

        const sourcePickedSlotKey = getMatchSlotKeyForPlayer(sourceMatch, sourcePickedName);
        const sourcePickedAppearance = sourcePickedSlotKey
          ? resolve(sourceMatchId, sourcePickedSlotKey)
          : EMPTY_PREDICTED_SLOT_APPEARANCE;
        const sourceHydrated = hydratedMap.get(Number(sourceMatchId));

        let appearance = EMPTY_PREDICTED_SLOT_APPEARANCE;
        if(sourcePickedAppearance.futureIncorrect){
          appearance = { futureCorrect: false, futureIncorrect: true, strike: true };
        }else if(sourceHydrated?.is_correct === false && normalizeName(sourceHydrated.selected_winner_name) === slotName){
          appearance = { futureCorrect: false, futureIncorrect: true, strike: true };
        }else if(sourceHydrated?.is_correct === true && normalizeName(sourceHydrated.selected_winner_name) === slotName){
          appearance = { futureCorrect: true, futureIncorrect: false, strike: false };
        }

        memo.set(memoKey, appearance);
        return appearance;
      };

      return (matchId, slotKey) => resolve(matchId, slotKey);
    }

    function renderBracketGrid(target, matches, options = {}){
      const { mode = "actual", picksMap = new Map(), hydratedMap = new Map(), predictedMatchesMap = null, clickable = false, lockPicking = false, infoSource = "actual" } = options;
      unmountMatchInfoPopovers(target);
      const groups = groupByRound(matches);
      const baseRoundGap = 8;
      const matchBlockHeight = 64;
      const baseRoundStep = matchBlockHeight + (baseRoundGap * 2);
      const roundTopPaddingAdjustments = {
        R32: 8,
        R16: 0,
        R8: -16,
        Final: 8,
      };
      const roundGapAdjustments = {
        R16: -8,
      };
      const resolvePredictedCarryStatus = mode === "pick" || mode === "detail"
        ? createPredictedCarryStatusResolver(state.context, predictedMatchesMap, hydratedMap)
        : () => EMPTY_PREDICTED_SLOT_APPEARANCE;
      target.dataset.bracketMode = mode;
      target.innerHTML = groups.map((group, roundIndex) => {
        const roundMultiplier = 2 ** roundIndex;
        const roundGap = Math.round((baseRoundStep * roundMultiplier - matchBlockHeight) / 2) + (roundGapAdjustments[group.round] || 0);
        const baseRoundTopPadding = roundIndex === 0
          ? 0
          : Math.round((baseRoundStep * (roundMultiplier - 1)) / 2);
        const roundTopPadding = baseRoundTopPadding + (roundTopPaddingAdjustments[group.round] || 0);
        return `
        <div class="qualifier-round-column" style="--qualifier-round-gap:${roundGap}px;--qualifier-round-padding-top:${roundTopPadding}px;">
          <h3 class="qualifier-round-title">${escapeHtml(formatBracketRoundLabel(group.round))}</h3>
          <div class="qualifier-round-stack">
            ${group.matches.map((match) => {
              const hasMatchInfoPlayers = !!normalizeName(match.top?.name) && !!normalizeName(match.bottom?.name);
              const pick = picksMap.get(match.id);
              const hydrated = hydratedMap.get(match.id);
              const selectedWinnerName = normalizeName(pick?.selected_winner_name);
              const selectedWinnerSlotKey = getMatchSlotKeyForPlayer(match, selectedWinnerName);
              const selectedWinnerCarryStatus = selectedWinnerSlotKey
                ? resolvePredictedCarryStatus(match.id, selectedWinnerSlotKey)
                : EMPTY_PREDICTED_SLOT_APPEARANCE;
              const topSelected = !!selectedWinnerName && selectedWinnerName === normalizeName(match.top?.name);
              const bottomSelected = !!selectedWinnerName && selectedWinnerName === normalizeName(match.bottom?.name);
              const selectionStatus = !selectedWinnerName
                ? ""
                : hydrated?.is_correct === true
                  ? "correct"
                  : hydrated?.is_correct === false
                    ? "incorrect"
                    : selectedWinnerCarryStatus.futureIncorrect
                      ? "incorrect"
                    : "pending";
              const isDetailMode = mode === "detail";
              const matchCardClass = [
                "qualifier-match-card",
                topSelected || bottomSelected ? "is-selected" : "",
                topSelected ? "is-selected-top" : "",
                bottomSelected ? "is-selected-bottom" : "",
                selectionStatus ? `is-selection-${selectionStatus}` : "",
              ].filter(Boolean).join(" ");
              const renderRow = (slot, slotKey) => {
                const name = slot.name || "";
                const safeName = escapeHtml(name);
                const isPicked = pick && pick.selected_winner_name === name;
                const carryStatus = resolvePredictedCarryStatus(match.id, slotKey);
                const stateClass = !isPicked ? "" : `selected ${selectionStatus || "pending"}`;
                const actualWinnerClass = mode === "actual" && name && match.winner === name ? "winner" : "";
                const showScoreIndicators = mode === "actual";
                const isInteractive = mode === "pick" && clickable && !lockPicking && !!name;
                const showPickRadioIndicator = isInteractive;
                const showPickFeedbackIndicator = mode === "detail" || (mode === "pick" && lockPicking);
                const scoreParts = parseScoreSegments(getDisplayedScoreValue(match, slot, mode));
                const isFutureIncorrect = !!carryStatus.futureIncorrect;
                const isFutureCorrect = !!carryStatus.futureCorrect;
                const detailStatusClass = hydrated?.is_correct === true
                  ? " is-correct"
                  : hydrated?.is_correct === false || (isPicked && isFutureIncorrect)
                    ? " is-incorrect"
                    : "";
                const nameClass = isFutureIncorrect
                  ? "qualifier-player-name is-picked-incorrect is-eliminated-future"
                  : isFutureCorrect
                    ? "qualifier-player-name is-picked-correct"
                    : "qualifier-player-name";
                const detailPointsMarkup = !isPicked
                  ? ""
                  : hydrated?.is_correct === true
                    ? `<span>+${hydrated.points_awarded || 0} pts</span>${getRadixCheckIconMarkup()}`
                    : hydrated?.is_correct === false || isFutureIncorrect
                      ? getRadixCross2IconMarkup()
                      : "";
                const scoreMarkup = showScoreIndicators
                  ? `<span class="qualifier-player-scorepack">${scoreParts.setScores.map((score) => `<span class="qualifier-player-set-score">${escapeHtml(score || "-")}</span>`).join("")}<span class="qualifier-player-final-score">${escapeHtml(scoreParts.finalScore || "-")}</span></span>`
                  : "";
                const pickFeedbackMarkup = showPickFeedbackIndicator
                  ? `<span class="qualifier-player-pick-points${detailStatusClass}">${detailPointsMarkup}</span>`
                  : "";
                const pickRadioMarkup = showPickRadioIndicator
                  ? isPicked && selectionStatus === "incorrect"
                    ? `<span class="qualifier-row-radio is-invalid-selected" data-state="invalid" aria-hidden="true">${getRadixCross2IconMarkup()}</span>`
                    : `<span class="qualifier-row-radio" data-state="${isPicked ? "checked" : "unchecked"}" aria-hidden="true"><span class="qualifier-row-radio-indicator"></span></span>`
                  : "";
                const rowClasses = [
                  "qualifier-match-row",
                  showScoreIndicators ? "" : "no-score",
                  showPickRadioIndicator ? "has-pick-radio" : "",
                  showPickFeedbackIndicator ? "has-pick-feedback" : "",
                  actualWinnerClass,
                  stateClass,
                ].filter(Boolean).join(" ");
                const nameMarkup = isDetailMode
                  ? `<span class="qualifier-player-name-slot"><span class="${nameClass}">${safeName}</span></span>`
                  : `<span class="${nameClass}">${safeName}</span>`;
                const rowTag = isInteractive ? "button" : "div";
                const rowTypeAttr = isInteractive ? ` type="button"` : "";
                return `<${rowTag} class="${rowClasses}" data-interactive="${isInteractive ? "true" : "false"}" data-match-id="${match.id}" data-name="${escapeHtml(slot.name || "")}" data-seed="${slot.seed ?? ""}"${rowTypeAttr}><span class="qualifier-player-seed">${slot.seed ?? ""}</span>${nameMarkup}${scoreMarkup}${pickFeedbackMarkup}${pickRadioMarkup}</${rowTag}>`;
              };
              const matchInfoMarkup = hasMatchInfoPlayers
                ? `<button class="qualifier-match-info" type="button" data-match-info="${match.id}" data-source="${infoSource}" aria-label="Match info for ${match.id}">i</button>`
                : `<span class="qualifier-match-info is-disabled" aria-hidden="true">i</span>`;
              return `<div class="qualifier-bracket-match">${matchInfoMarkup}<div class="${matchCardClass}">${renderRow(match.top, "top")}${renderRow(match.bottom, "bottom")}</div></div>`;
            }).join("")}
          </div>
        </div>`;
      }).join("");
      mountMatchInfoPopovers(target);
    }

      return true;

    function getAvailableMainTabs(){
      const tabs = ["Actual Bracket"];

      }else if(canAccessLeaderboardTab()){

    function renderMainTabs(){

    function buildRegionTabProgressMap(){
      const progressByTab = new Map();
      const predictedMatches = state.predicted instanceof Map ? state.predicted : new Map();
      const validPickMap = state.validUserPicks instanceof Map ? state.validUserPicks : new Map();

      REGION_TABS.forEach((tab) => {
        const total = Number(REGION_TAB_PICK_TOTALS.get(tab)) || 0;
        const matches = getMatchesForTab(tab, predictedMatches);
        const count = matches.reduce((sum, match) => sum + (validPickMap.has(match.id) ? 1 : 0), 0);
        progressByTab.set(tab, {
          count,
          total,
          complete: total > 0 && count >= total,
          accentRgb: REGION_ACCENT_RGB_BY_TAB[tab] || REGION_ACCENT_RGB_BY_TAB["Spocco Square"],
        });
      });

      return progressByTab;
    }

    function computeScoresFromPicks(validPicks){
      const actualPossibleSets = computeActualPossibleWinnerSets(state.context);
      const hydrated = [...validPicks.values()].map((p) => hydratePickCorrectnessAgainstActualResults(p, state.context.byId));
      const actual = calculateActualScore(hydrated);
      const possibleRemaining = calculatePossibleRemainingScore(hydrated, validPicks, actualPossibleSets);
      return { actual, possibleRemaining, possibleTotal: calculatePossibleTotalScore(actual, possibleRemaining), hydratedMap: new Map(hydrated.map((p)=>[p.match_id,p])) };
    }

    function animateLeaderboardDetailClose(onComplete){
      const shell = els.leaderboardTable.querySelector("[data-leaderboard-detail-shell]");
      if(!shell){
        onComplete?.();
        return;
      }
      let finished = false;
      const startHeight = shell.scrollHeight;
      shell.style.height = `${startHeight}px`;
      shell.style.opacity = "1";
      shell.offsetHeight;
      requestAnimationFrame(() => {
        shell.classList.add("is-collapsing");
        shell.classList.remove("is-expanded");
        shell.style.height = "0px";
        shell.style.opacity = "0";
      });
      const finish = () => {
        if(finished) return;
        finished = true;
        shell.removeEventListener("transitionend", handleTransitionEnd);
        shell.classList.remove("is-collapsing");
        onComplete?.();
      };
      const handleTransitionEnd = (event) => {
        if(event.target !== shell || event.propertyName !== "height") return;
        finish();
      };
      shell.addEventListener("transitionend", handleTransitionEnd);
      window.setTimeout(finish, 360);
    }

    function animateLeaderboardDetailOpen(bracketId){
      const shell = els.leaderboardTable.querySelector(`[data-leaderboard-detail-shell="${CSS.escape(String(bracketId))}"]`);
      if(!shell) return;
      let cleaned = false;
      shell.classList.remove("is-collapsing");
      const targetHeight = shell.scrollHeight;
      shell.style.height = "0px";
      shell.style.opacity = "0";
      shell.offsetHeight;
      requestAnimationFrame(() => {
        shell.classList.add("is-expanded");
        shell.style.height = `${targetHeight}px`;
        shell.style.opacity = "1";
      });
      const cleanup = () => {
        if(cleaned) return;
        cleaned = true;
        shell.removeEventListener("transitionend", handleTransitionEnd);
        shell.style.height = "auto";
        shell.style.opacity = "";
      };
      const handleTransitionEnd = (event) => {
        if(event.target !== shell || event.propertyName !== "height") return;
        cleanup();
      };
      shell.addEventListener("transitionend", handleTransitionEnd);
      window.setTimeout(cleanup, 360);
    }

      if(!canViewLeaderboardBrackets()){

        return;
      }

      const detailGrid = document.getElementById(`leaderboardDetailGrid-${selectedRow.id}`);
      if(!detailGrid){
        state.detailPredicted = new Map();

      const rawPicks = new Map(state.allPicks.filter((pick) => pick.bracket_id === selectedRow.id).map((pick) => [pick.match_id, pick]));
      const { predicted, validPicks } = applyUserPicksToPredictedBracket(state.context, rawPicks);
      state.detailPredicted = predicted;

      const { hydratedMap } = computeScoresFromPicks(validPicks);

    function renderLeaderboard({ animateOpen = false } = {}){
      const canViewBrackets = canViewLeaderboardBrackets();
      if(!canViewBrackets && state.selectedBracketId){
        state.selectedBracketId = null;
        state.detailPredicted = new Map();
      }

      const pickByBracket = new Map();
      state.allPicks.forEach((p) => {
        if(!pickByBracket.has(p.bracket_id)) pickByBracket.set(p.bracket_id, []);
        pickByBracket.get(p.bracket_id).push(p);
      });
      const scoredRows = state.allBrackets.map((b) => {
        const raw = pickByBracket.get(b.id) || [];
        const rawMap = new Map(raw.map((p) => [p.match_id, p]));
        const { validPicks } = applyUserPicksToPredictedBracket(state.context, rawMap);
        const scores = computeScoresFromPicks(validPicks);
        const initialMax = calculateInitialMaxScore(validPicks);
        return {
          ...b,
          actual: scores.actual,
          currentMax: scores.possibleTotal,
          initialMax,
          validPicks,
        };
      });

      const rankedRows = [...scoredRows].sort((left, right) => {
        if(right.actual !== left.actual) return right.actual - left.actual;
        if(right.currentMax !== left.currentMax) return right.currentMax - left.currentMax;
        if(right.initialMax !== left.initialMax) return right.initialMax - left.initialMax;
        return left.bracket_name.localeCompare(right.bracket_name);
      });

      const topScore = rankedRows[0]?.actual ?? null;
      const rankByScore = new Map();
      [...new Set(rankedRows.map((row) => row.actual))].forEach((score, idx) => rankByScore.set(score, idx + 1));
      rankedRows.forEach((row) => {
        const tiedCount = rankedRows.filter((entry) => entry.actual === row.actual).length;
        const rankValue = rankByScore.get(row.actual);
        row.rankOrder = rankValue;
        row.rankLabel = tiedCount > 1 ? `T-${rankValue}` : `${rankValue}`;
        row.isTopScore = topScore != null && row.actual === topScore;
      });

      const rows = [...rankedRows].sort(compareLeaderboardRows);
      if(state.selectedBracketId && !rows.some((row) => row.id === state.selectedBracketId)){
        state.selectedBracketId = null;
      }
      if(!state.selectedBracketId){
        state.detailPredicted = new Map();
      }

      if(!rows.length){
        els.leaderboardTable.innerHTML = `<colgroup><col class="leaderboard-col-rank" /><col class="leaderboard-col-name" /><col class="leaderboard-col-score" /><col class="leaderboard-col-current-max" /><col class="leaderboard-col-initial-max" /></colgroup><thead><tr><th>${renderLeaderboardSortButton("rank", "Rank")}</th><th><span class="leaderboard-header-label">Name</span></th><th>${renderLeaderboardSortButton("actual", "Score")}</th><th>${renderLeaderboardSortButton("currentMax", "Max Score")}</th><th>${renderLeaderboardSortButton("initialMax", "Initial Max")}</th></tr></thead><tbody><tr><td class="leaderboard-empty-cell" colspan="5"><div class="leaderboard-empty-state">No entries yet.</div></td></tr></tbody>`;
        return;
      }

      const detailTab = getDefaultLeaderboardDetailTab();
      state.leaderboardDetailTab = detailTab;
      const detailAccent = REGION_ACCENT_RGB_BY_TAB[detailTab] || REGION_ACCENT_RGB_BY_TAB["Spocco Square"];
      const tableMarkup = rows.map((row) => {
        const isExpanded = canViewBrackets && row.id === state.selectedBracketId;
        const rowClass = `leaderboard-row${isExpanded ? " is-expanded" : ""}`;
        const rankPlacementClass = row.rankOrder === 1
          ? " is-gold"
          : row.rankOrder === 2
            ? " is-silver"
            : row.rankOrder === 3
              ? " is-bronze"
              : "";
        const rankChipClass = `leaderboard-rank-chip${rankPlacementClass}`;
        const detailRowMarkup = !isExpanded
          ? ""
          : `<tr class="leaderboard-detail-row"><td colspan="5"><div class="leaderboard-detail-shell${animateOpen ? "" : " is-expanded"}" data-leaderboard-detail-shell="${escapeHtml(row.id)}"><div class="leaderboard-detail-card" style="--region-accent-rgb:${detailAccent};"><div class="leaderboard-detail-tabs"><div class="lc-region-tabs-list">${REGION_TABS.map((tab) => `<button class="lc-region-tabs-trigger" type="button" data-detail-tab="${escapeHtml(tab)}" data-bracket-id="${escapeHtml(row.id)}" data-state="${tab === detailTab ? "active" : "inactive"}"><span class="lc-region-tabs-trigger-label">${escapeHtml(tab)}</span></button>`).join("")}</div></div><div class="leaderboard-detail-panel qualifier-bracket-scroll"><div class="qualifier-bracket-grid leaderboard-detail-grid" id="leaderboardDetailGrid-${escapeHtml(row.id)}"></div></div></div></div></td></tr>`;
        const bracketNameMarkup = canViewBrackets
          ? `<button class="leaderboard-name-button" type="button" data-toggle-bracket-detail="${escapeHtml(row.id)}"><span class="leaderboard-name-text">${escapeHtml(row.bracket_name)}</span></button>`
          : `<span class="leaderboard-name-static"><span class="leaderboard-name-text">${escapeHtml(row.bracket_name)}</span></span>`;
        return `<tr class="${rowClass}"><td><div class="${rankChipClass}">${escapeHtml(row.rankLabel)}</div></td><td>${bracketNameMarkup}</td><td><div class="leaderboard-metric-chip is-score">${row.actual}</div></td><td><div class="leaderboard-metric-chip">${row.currentMax}</div></td><td><div class="leaderboard-metric-chip">${row.initialMax}</div></td></tr>${detailRowMarkup}`;
      }).join("");

      els.leaderboardTable.innerHTML = `<colgroup><col class="leaderboard-col-rank" /><col class="leaderboard-col-name" /><col class="leaderboard-col-score" /><col class="leaderboard-col-current-max" /><col class="leaderboard-col-initial-max" /></colgroup><thead><tr><th>${renderLeaderboardSortButton("rank", "Rank")}</th><th><span class="leaderboard-header-label">Name</span></th><th>${renderLeaderboardSortButton("actual", "Score")}</th><th>${renderLeaderboardSortButton("currentMax", "Max Score")}</th><th>${renderLeaderboardSortButton("initialMax", "Initial Max")}</th></tr></thead><tbody>${tableMarkup}</tbody>`;

      const selectedRow = rows.find((row) => row.id === state.selectedBracketId) || null;
      renderExpandedLeaderboardDetail(selectedRow);
      if(animateOpen && selectedRow){
        animateLeaderboardDetailOpen(selectedRow.id);
      }
    }

    async function syncProfileFromAuthUser(){
      const sessionUserId = normalizeName(state.session?.user?.id);
      if(!sessionUserId) return;

      let authUser = state.session?.user || null;
      try{
        const { data, error } = await supabase.auth.getUser();
        if(!error && data?.user?.id === sessionUserId){
          authUser = data.user;
        }
      }catch{
        // Keep profile bootstrap non-blocking if auth user enrichment is unavailable.
      }

      const identities = Array.isArray(authUser?.identities)
        ? authUser.identities
        : Array.isArray(state.session?.user?.identities)
          ? state.session.user.identities
          : [];
      const discordUserId = getDiscordProviderIdFromIdentities(identities);
      const providerFullName = getProviderProfileName(authUser || state.session?.user);
      state.userAvatarUrl = getDiscordAvatarUrlFromAuthUser(authUser || state.session?.user);

      let existingProfile = null;
      try{
        const { data, error } = await supabase
          .from("profiles")
          .select("user_id,username,discord_user_id,full_name")
          .eq("user_id", sessionUserId)
          .maybeSingle();
        if(error) return;
        existingProfile = data || null;
      }catch{
        return;
      }

      const existingUsername = normalizeName(existingProfile?.username);
      const existingDiscordUserId = normalizeName(existingProfile?.discord_user_id);
      const existingFullName = normalizeName(existingProfile?.full_name);

      /** @type {{user_id:string,username?:string,discord_user_id?:string,full_name?:string}} */
      const payload = { user_id: sessionUserId };
      let shouldUpsert = !existingProfile;

      if(discordUserId && discordUserId !== existingDiscordUserId){
        payload.discord_user_id = discordUserId;
        shouldUpsert = true;
      }

      if(providerFullName && providerFullName !== existingFullName){
        payload.full_name = providerFullName;
        shouldUpsert = true;
      }

      if(!existingUsername && providerFullName){
        payload.username = providerFullName;
        if(providerFullName !== normalizeName(existingProfile?.username)){
          shouldUpsert = true;
        }
      }

      if(!shouldUpsert) return;

      try{
        const { error } = await supabase.from("profiles").upsert(payload, { onConflict: "user_id" });
        if(error) return;
      }catch{
        // Keep auth flow and onboarding resilient if profile sync fails.
      }
    }

    async function isUsernameAvailable(username){
      const desired = normalizeName(username);
      const { data, error } = await supabase
        .from("profiles")
        .select("user_id")
        .eq("username", desired)
        .maybeSingle();
      if(error) throw error;
      if(!data) return true;
      return !!state.session && data.user_id === state.session.user.id;
    }

    async function saveUsernameForCurrentUser(rawUsername){
      if(!state.session) throw new Error("Log in first.");
      const username = normalizeName(rawUsername);
      if(!username) throw new Error("Username is required.");
      const available = await isUsernameAvailable(username);
      if(!available) throw new Error("That username is already taken.");

      const { data: updatedProfile, error } = await supabase
        .from("profiles")
        .update({ username })
        .eq("user_id", state.session.user.id)
        .select("user_id,username")
        .maybeSingle();
      if(error) throw error;
      if(!updatedProfile){
        throw new Error("Profile setup is incomplete. Please try again.");
      }

      await refreshAuthDrivenUI("save username", { syncSession: false });
    }
