<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <link rel="icon" href="/logos/golf.png" />
  <title>Lightning Cup Match</title>

  <style>
    :root{
      --bg1:#061C3B;
      --bg2:#04142E;
      --bg3:#020B18;
      --text:#e9eef8;
      --muted:#9ca3c7;
      --title:#c7d7ff;
      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);
      --player-one-rgb: 96,165,250;
      --player-two-rgb: 34,197,94;
      --panel-border: rgba(148,163,184,.22);
      --panel-fill: rgba(255,255,255,.05);
    }
    *{ box-sizing:border-box; }
    html{ background-color: var(--bg3); }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg3);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:1px solid rgba(255,255,255,.10);
      background: rgba(3,18,42,.72);
      backdrop-filter: blur(10px);
    }
    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .home-badge{
      width:40px;
      height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
      display:grid;
      place-items:center;
      overflow:hidden;
    }
    .home-badge img{
      width:70%;
      height:70%;
      object-fit:contain;
      display:block;
    }
    .brand-copy{ display:grid; gap:2px; }
    .brand-kicker{
      font-size:11px;
      font-weight:900;
      letter-spacing:.22em;
      text-transform:uppercase;
      color: rgba(255,255,255,.64);
    }
    .brand-title{
      font-size:16px;
      font-weight:900;
      letter-spacing:.05em;
      text-transform:uppercase;
      color: var(--title);
    }
    .back-link{
      color: rgba(191,219,254,.92);
      text-decoration:none;
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .back-link:hover{ color:#fff; }
    .match-shell{
      max-width:1100px;
      margin:0 auto;
      padding:24px 18px 52px;
      display:grid;
      gap:14px;
    }
    .card{
      background: var(--card-bg);
      border-radius:20px;
      padding:18px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.10);
      display:grid;
      gap:18px;
    }
    .match-page-status{
      margin:0;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(248,113,113,.28);
      background: rgba(127,29,29,.25);
      color:#fecaca;
      font-size:13px;
      font-weight:700;
    }
    .match-page-status.is-hidden{ display:none; }
    .scoreboard-shell{
      display:grid;
      gap:8px;
    }
    .scoreboard-header,
    .scoreboard-row{
      display:grid;
      grid-template-columns:8px minmax(0,1fr) repeat(3, 58px) 76px;
      gap:8px;
      align-items:center;
    }
    .scoreboard-header{
      min-height:24px;
      color: rgba(148,163,184,.86);
      font-size:10px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .scoreboard-header span{
      display:grid;
      place-items:center;
      min-height:100%;
      text-align:center;
      line-height:1.1;
    }
    .scoreboard-row{
      min-height:64px;
      border-radius:14px;
      border:1px solid var(--panel-border);
      background: var(--panel-fill);
      padding:8px;
    }
    .scoreboard-color-bar{
      width:100%;
      min-height:100%;
      border-radius:999px;
    }
    .scoreboard-row.is-player-one .scoreboard-color-bar{ background: rgba(var(--player-one-rgb), .94); }
    .scoreboard-row.is-player-two .scoreboard-color-bar{ background: rgba(var(--player-two-rgb), .9); }
    .scoreboard-player{
      min-width:0;
      display:flex;
      align-items:center;
      gap:8px;
      align-self:center;
    }
    .scoreboard-seed{
      flex:0 0 auto;
      align-self:center;
      color: rgba(148,163,184,.92);
      font-size:12px;
      font-weight:500;
      line-height:1;
    }
    .scoreboard-name{
      min-width:0;
      color:#fff;
      font-size:18px;
      font-weight:950;
      letter-spacing:.03em;
      text-transform:uppercase;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .online-dot,
    .live-dot{
      width:9px;
      height:9px;
      flex:0 0 auto;
      border-radius:999px;
      background: rgba(148,163,184,.36);
      box-shadow:none;
    }
    .online-dot.is-online,
    .live-dot.is-live{
      background:#22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,.55);
      animation: pulse-live 1.45s ease-out infinite;
    }
    .scoreboard-score,
    .scoreboard-match-score{
      min-height:46px;
      display:grid;
      place-items:center;
      border-radius:8px;
      border:1px solid rgba(148,163,184,.24);
      background: rgba(2,6,23,.34);
      color: rgba(226,232,240,.92);
      font-size:19px;
      font-weight:900;
      font-variant-numeric: tabular-nums;
    }
    .scoreboard-score.is-won{
      color:#fef3c7;
      background: rgba(250,204,21,.12);
      border-color: rgba(148,163,184,.30);
    }
    .scoreboard-match-score{
      background: rgba(255,255,255,.08);
      color:#fff;
      font-size:25px;
    }
    .scoreboard-match-score.is-won{
      background: rgba(250,204,21,.18);
      color:#fef08a;
    }
    .flow-panel{
      width:min(680px, 100%);
      justify-self:center;
      display:grid;
      gap:12px;
      justify-items:center;
      text-align:center;
      padding:18px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.24);
      background: rgba(255,255,255,.055);
    }
    .flow-prompt{
      margin:0;
      color:#fff;
      font-size:26px;
      line-height:1.2;
      font-weight:950;
    }
    .flow-detail{
      margin:0;
      min-height:1.25em;
      color: rgba(191,219,254,.92);
      font-size:14px;
      line-height:1.4;
      font-weight:700;
    }
    .flow-control-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .flow-actions{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .flow-action,
    .undo-button,
    .sign-in-button{
      min-height:42px;
      padding:0 18px;
      border:1px solid rgba(148,163,184,.34);
      border-radius:8px;
      background: rgba(71,85,105,.92);
      color:#fff;
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow:none;
    }
    .flow-action:hover,
    .undo-button:hover,
    .sign-in-button:hover{ background: rgba(100,116,139,.96); }
    .flow-action.is-player-one{ background: rgba(var(--player-one-rgb), .94); color:#020617; }
    .flow-action.is-player-two{ background: rgba(var(--player-two-rgb), .88); color:#020617; }
    .undo-button{
      background: rgba(30,41,59,.92);
      color: rgba(226,232,240,.94);
    }
    .flow-action[disabled],
    .undo-button[disabled],
    .sign-in-button[disabled]{
      cursor:not-allowed;
      opacity:.48;
      background: rgba(71,85,105,.64);
    }
    .flow-action-note{
      color: rgba(226,232,240,.9);
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .course-section{
      display:grid;
      gap:10px;
    }
    .course-board{
      display:grid;
      grid-template-columns:minmax(0, 3fr) minmax(126px, .9fr);
      gap:12px;
      align-items:center;
    }
    .course-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:8px;
    }
    .special-course-slot{
      display:grid;
      align-items:center;
      min-height:100%;
    }
    .course-button{
      width:100%;
      min-height:58px;
      padding:10px;
      border-radius:8px;
      border:1px solid rgba(148,163,184,.30);
      background: rgba(255,255,255,.045);
      color: rgba(241,245,249,.94);
      display:grid;
      gap:4px;
      align-content:center;
      justify-items:center;
      text-align:center;
      cursor:pointer;
      transition: background-color 140ms ease, border-color 140ms ease;
    }
    .course-button:not([disabled]):hover{
      background: rgba(255,255,255,.09);
      border-color: rgba(148,163,184,.46);
    }
    .course-button[disabled]{
      cursor:not-allowed;
      opacity:.56;
    }
    .course-button.is-picked{
      opacity:1;
      color:#020617;
      border-color: rgba(148,163,184,.36);
    }
    .course-button.is-picked.is-player-one{ background: rgba(var(--player-one-rgb), .94); }
    .course-button.is-picked.is-player-two{ background: rgba(var(--player-two-rgb), .90); }
    .course-button-name{
      font-size:13px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .course-button-meta{
      min-height:1em;
      color: inherit;
      font-size:10px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.78;
    }
    .course-hint{
      margin:0;
      color: rgba(148,163,184,.92);
      font-size:12px;
      line-height:1.4;
      font-weight:700;
      text-align:center;
    }
    .event-log-section{
      display:grid;
      gap:8px;
    }
    .event-log-title{
      color: rgba(148,163,184,.88);
      font-size:11px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .event-log{
      max-height:180px;
      overflow:auto;
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:5px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.24);
      padding:8px;
    }
    .event-log-item,
    .event-log-empty{
      border-radius:8px;
      border:1px solid rgba(148,163,184,.14);
      background: rgba(255,255,255,.035);
      padding:7px 9px;
    }
    .event-log-item{
      display:grid;
      grid-template-columns:58px 86px minmax(0,1fr);
      gap:8px;
      align-items:center;
      border-left:3px solid rgba(148,163,184,.72);
    }
    .event-log-item.is-player-one{ border-left-color: rgba(var(--player-one-rgb), .94); }
    .event-log-item.is-player-two{ border-left-color: rgba(var(--player-two-rgb), .9); }
    .event-log-set{
      color: rgba(226,232,240,.92);
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .event-log-time{
      color: rgba(148,163,184,.92);
      font-size:10px;
      font-weight:800;
      letter-spacing:.03em;
      font-variant-numeric: tabular-nums;
    }
    .event-log-message{
      color: rgba(241,245,249,.96);
      font-size:12px;
      line-height:1.25;
      font-weight:750;
    }
    .event-log-empty{
      color: rgba(148,163,184,.92);
      font-size:12px;
      font-weight:750;
    }
    .realtime-row{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      color: rgba(148,163,184,.92);
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
    }
    .realtime-state{
      color:#22c55e;
      font-weight:950;
    }
    .realtime-state.is-error{
      color:#f87171;
    }
    .realtime-updated{
      color: rgba(226,232,240,.84);
      text-transform:none;
      letter-spacing:.02em;
    }
    @keyframes pulse-live{
      0%{ box-shadow: 0 0 0 0 rgba(34,197,94,.55); }
      70%{ box-shadow: 0 0 0 7px rgba(34,197,94,0); }
      100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    @media (max-width:760px){
      .scoreboard-header,
      .scoreboard-row{
        grid-template-columns:6px minmax(0,1fr) repeat(3, 38px) 50px;
        gap:6px;
      }
      .scoreboard-row{ min-height:58px; padding:7px; }
      .scoreboard-name{ font-size:14px; }
      .scoreboard-seed{ font-size:11px; }
      .scoreboard-score{ min-height:40px; font-size:16px; }
      .scoreboard-match-score{ min-height:40px; font-size:21px; }
      .flow-panel{ padding:16px 12px; }
      .flow-prompt{ font-size:22px; }
      .course-board{ grid-template-columns:1fr; }
      .course-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
      .special-course-slot{ min-height:auto; }
      .event-log-item{ grid-template-columns:50px minmax(0,1fr); gap:4px 8px; }
      .event-log-message{ grid-column:1 / -1; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="home-badge" aria-hidden="true"><img src="/logos/golf.png" alt="" loading="eager" decoding="async" /></div>
        <div class="brand-copy">
          <span class="brand-kicker">Lightning Cup</span>
          <span class="brand-title">Match Page</span>
        </div>
      </div>
      <a class="back-link" href="/lightningcup/index.html">Back to Lightning Cup</a>
    </div>
  </div>

  <main class="match-shell">
    <p class="match-page-status is-hidden" id="pageStatus"></p>

    <section class="card">
      <div class="scoreboard-shell" aria-label="Lightning Cup match scoreboard">
        <div class="scoreboard-header" aria-hidden="true">
          <span></span>
          <span></span>
          <span>Set 1</span>
          <span>Set 2</span>
          <span>Set 3</span>
          <span>Match</span>
        </div>
        <div class="scoreboard-row is-player-one">
          <span class="scoreboard-color-bar" aria-hidden="true"></span>
          <div class="scoreboard-player">
            <span class="scoreboard-seed" id="scoreboardTopSeed">TBD</span>
            <span class="scoreboard-name" id="scoreboardTopName">TBD</span>
            <span class="online-dot" id="scoreboardTopOnline" aria-hidden="true"></span>
          </div>
          <span class="scoreboard-score" id="scoreboardTopSet1">-</span>
          <span class="scoreboard-score" id="scoreboardTopSet2">-</span>
          <span class="scoreboard-score" id="scoreboardTopSet3">-</span>
          <span class="scoreboard-match-score" id="scoreboardTopMatch">0</span>
        </div>
        <div class="scoreboard-row is-player-two">
          <span class="scoreboard-color-bar" aria-hidden="true"></span>
          <div class="scoreboard-player">
            <span class="scoreboard-seed" id="scoreboardBottomSeed">TBD</span>
            <span class="scoreboard-name" id="scoreboardBottomName">TBD</span>
            <span class="online-dot" id="scoreboardBottomOnline" aria-hidden="true"></span>
          </div>
          <span class="scoreboard-score" id="scoreboardBottomSet1">-</span>
          <span class="scoreboard-score" id="scoreboardBottomSet2">-</span>
          <span class="scoreboard-score" id="scoreboardBottomSet3">-</span>
          <span class="scoreboard-match-score" id="scoreboardBottomMatch">0</span>
        </div>
      </div>

      <section class="flow-panel" aria-label="Match flow">
        <p class="flow-prompt" id="flowPrompt">Start match</p>
        <p class="flow-detail" id="flowDetail"></p>
        <div class="flow-control-row">
          <div class="flow-actions" id="actionButtons"></div>
          <button class="sign-in-button" id="signInBtn" type="button" hidden>Sign In</button>
          <button class="undo-button" id="undoBtn" type="button">Undo</button>
        </div>
      </section>

      <section class="course-section" aria-label="Course selection">
        <div class="course-board">
          <div class="course-grid" id="courseGrid" aria-label="Course choices"></div>
          <div class="special-course-slot" id="specialCourseSlot" aria-label="Special course choice"></div>
        </div>
        <p class="course-hint" id="courseHint">Courses reset each set.</p>
      </section>

      <section class="event-log-section" aria-label="Live event log">
        <span class="event-log-title">Event Log</span>
        <ol class="event-log" id="eventLog"></ol>
      </section>

      <section class="realtime-row" aria-label="Realtime sync">
        <span class="realtime-state" id="realtimeStatusText">LIVE</span>
        <span class="live-dot" id="realtimePulse" aria-hidden="true"></span>
        <span class="realtime-updated" id="lastUpdatedText">Last updated: -</span>
      </section>
    </section>
  </main>

  <script type="module" src="/lightningcup/match-page.js"></script>
</body>
</html>
