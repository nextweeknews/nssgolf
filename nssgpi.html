<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NSS GPI</title>
  <link rel="icon" type="image/png" href="/logos/golf.png" />
  <style>
    :root{
      color-scheme: dark;
      --bg:#101113;
      --panel:#17191d;
      --panel-2:#1e2228;
      --text:#f4f6f8;
      --muted:#a9b0bb;
      --line:#303641;
      --accent:#6ee7b7;
      --danger:#fca5a5;
      --shadow:0 16px 44px rgba(0,0,0,.28);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main{
      width:min(1040px, calc(100vw - 32px));
      margin:0 auto;
      padding:32px 0 48px;
    }

    .page-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      font-size:clamp(28px, 4vw, 44px);
      line-height:1;
      letter-spacing:0;
    }

    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .run-meta{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:8px;
      color:var(--muted);
      font-size:12px;
    }

    .table-controls{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:0 0 12px;
      color:var(--muted);
      font-size:13px;
    }

    .pager{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .pager-button{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      border-radius:8px;
      padding:8px 10px;
      font:inherit;
      font-weight:750;
      cursor:pointer;
    }

    .pager-button:disabled{
      cursor:not-allowed;
      opacity:.45;
    }

    .pill{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:999px;
      padding:6px 10px;
      white-space:nowrap;
    }

    .status{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:8px;
      padding:18px;
      box-shadow:var(--shadow);
      color:var(--muted);
    }

    .status.error{ color:var(--danger); }

    .button,
    .sort-button,
    .player-button,
    .modal-close{
      appearance:none;
      color:var(--text);
      font:inherit;
      cursor:pointer;
    }

    .button{
      border:1px solid rgba(110,231,183,.42);
      background:#0f2a22;
      border-radius:8px;
      padding:10px 14px;
      font-weight:700;
    }

    .table-shell{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    table{
      width:100%;
      min-width:860px;
      border-collapse:collapse;
    }

    th,
    td{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      vertical-align:middle;
    }

    th{
      position:sticky;
      top:0;
      z-index:1;
      background:var(--panel-2);
      color:var(--muted);
      font-size:11px;
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.06em;
      text-align:left;
    }

    .sort-button{
      display:inline-flex;
      align-items:center;
      justify-content:flex-end;
      gap:5px;
      width:100%;
      min-height:20px;
      border:0;
      background:transparent;
      padding:0;
      color:inherit;
      font-size:inherit;
      line-height:inherit;
      text-transform:inherit;
      letter-spacing:inherit;
    }

    th:not(.right) .sort-button{
      justify-content:flex-start;
    }

    .sort-button::after{
      content:"";
      width:0;
      height:0;
      border-left:4px solid transparent;
      border-right:4px solid transparent;
      border-top:5px solid transparent;
      opacity:.55;
    }

    .sort-button[aria-sort="ascending"]::after{
      border-top:0;
      border-bottom:5px solid var(--accent);
      opacity:1;
    }

    .sort-button[aria-sort="descending"]::after{
      border-top:5px solid var(--accent);
      opacity:1;
    }

    tbody tr:last-child td{ border-bottom:0; }
    tbody tr:nth-child(even) td{ background:rgba(255,255,255,.018); }

    .rank-cell{
      width:76px;
      color:var(--accent);
      font-weight:800;
      font-variant-numeric:tabular-nums;
    }

    .player-cell{
      min-width:280px;
    }

    .player{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .player-button{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      width:100%;
      border:0;
      background:transparent;
      padding:0;
      text-align:left;
    }

    .player-button:hover .player-name,
    .player-button:focus-visible .player-name{
      color:var(--accent);
      text-decoration:underline;
      text-underline-offset:3px;
    }

    .avatar{
      width:38px;
      height:38px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.14);
      background:#242832;
      object-fit:cover;
      flex:0 0 auto;
    }

    .player-name{
      display:block;
      font-weight:800;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .player-id{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:12px;
      font-variant-numeric:tabular-nums;
    }

    .rating-cell{
      width:140px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }

    .number-cell{
      color:var(--muted);
      font-variant-numeric:tabular-nums;
      text-align:right;
      width:112px;
    }

    .outcome-cell{
      color:var(--muted);
      font-variant-numeric:tabular-nums;
      text-align:right;
      white-space:nowrap;
      width:132px;
    }

    .win-text{ color:#86efac; }
    .loss-text{ color:#fca5a5; }
    .tie-text,
    .dash-text{ color:var(--muted); }

    .right{ text-align:right; }

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:20;
      display:grid;
      place-items:center;
      padding:22px;
      background:rgba(0,0,0,.66);
    }

    .modal{
      width:min(940px, 100%);
      max-height:min(86vh, 820px);
      overflow:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px;
      border-bottom:1px solid var(--line);
      background:var(--panel-2);
    }

    .modal-player{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .modal-title{
      margin:0;
      font-size:20px;
      line-height:1.1;
      letter-spacing:0;
    }

    .modal-close{
      width:34px;
      height:34px;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      font-size:22px;
      line-height:1;
    }

    .modal-body{
      padding:18px;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      border:1px solid var(--line);
      border-radius:8px;
      overflow:hidden;
      margin-bottom:18px;
    }

    .detail-cell{
      min-width:0;
      padding:12px;
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.018);
    }

    .detail-cell:nth-child(4n){ border-right:0; }
    .detail-cell:nth-last-child(-n+4){ border-bottom:0; }

    .detail-label{
      display:block;
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.06em;
      margin-bottom:6px;
    }

    .detail-value{
      font-weight:850;
      font-variant-numeric:tabular-nums;
      overflow-wrap:anywhere;
    }

    .chart-shell{
      border:1px solid var(--line);
      border-radius:8px;
      overflow:hidden;
      background:#121417;
    }

    .chart-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
    }

    .chart{
      display:block;
      width:100%;
      height:auto;
      min-height:260px;
    }

    .chart-empty{
      padding:18px;
      color:var(--muted);
    }

    [hidden]{ display:none !important; }

    @media (max-width:720px){
      main{
        width:min(100vw - 20px, 1040px);
        padding-top:22px;
      }

      .page-head{
        display:block;
      }

      .run-meta{
        justify-content:flex-start;
        margin-top:14px;
      }

      .detail-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }

      .detail-cell:nth-child(4n){ border-right:1px solid var(--line); }
      .detail-cell:nth-child(2n){ border-right:0; }
      .detail-cell:nth-last-child(-n+4){ border-bottom:1px solid var(--line); }
      .detail-cell:nth-last-child(-n+2){ border-bottom:0; }
    }
  </style>
</head>
<body>
  <main>
    <header class="page-head">
      <div>
        <h1>NSS GPI</h1>
        <p class="subtitle">Internal Ranked League rating</p>
      </div>
      <div id="runMeta" class="run-meta" hidden></div>
    </header>

    <div id="status" class="status">Loading...</div>

    <section id="leaderboard" hidden aria-label="Internal Ranked League leaderboard">
      <div class="table-controls">
        <div id="pageInfo">Loading rankings...</div>
        <div class="pager">
          <button id="prevPage" class="pager-button" type="button">Previous</button>
          <button id="nextPage" class="pager-button" type="button">Next</button>
        </div>
      </div>
      <div class="table-shell">
        <table>
          <thead>
            <tr>
              <th class="rank-cell"><button class="sort-button" type="button" data-sort="rank">Rank</button></th>
              <th>Player</th>
              <th class="rating-cell right"><button class="sort-button" type="button" data-sort="rating">Rating</button></th>
              <th class="number-cell"><button class="sort-button" type="button" data-sort="matches">Matches</button></th>
              <th class="outcome-cell"><button class="sort-button" type="button" data-sort="wins">W-L-T</button></th>
              <th class="number-cell"><button class="sort-button" type="button" data-sort="outcomeWinPct">Win %</button></th>
              <th class="number-cell"><button class="sort-button" type="button" data-sort="matchWinPct">Match Win %</button></th>
            </tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="playerModal" class="modal-backdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-head">
        <div id="modalPlayerHead" class="modal-player"></div>
        <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
      </header>
      <div id="modalBody" class="modal-body"></div>
    </section>
  </div>

  <script type="module">
    import { createBrowserSupabaseClient } from "/auth/supabase-auth.js";

    const supabase = createBrowserSupabaseClient();
    const statusEl = document.getElementById("status");
    const leaderboardEl = document.getElementById("leaderboard");
    const leaderboardBodyEl = document.getElementById("leaderboardBody");
    const runMetaEl = document.getElementById("runMeta");
    const pageInfoEl = document.getElementById("pageInfo");
    const prevPageEl = document.getElementById("prevPage");
    const nextPageEl = document.getElementById("nextPage");
    const playerModalEl = document.getElementById("playerModal");
    const modalPlayerHeadEl = document.getElementById("modalPlayerHead");
    const modalBodyEl = document.getElementById("modalBody");
    const modalCloseEl = document.getElementById("modalClose");
    const PAGE_SIZE = 100;
    let latestRun = null;
    let leaderboardRows = [];
    let totalRatings = 0;
    let currentPage = 0;
    let sortState = { key:"rank", direction:"asc" };

    function normalizeText(value){
      return String(value || "").trim();
    }

    function normalizeDiscordId(value){
      const cleanValue = normalizeText(value);
      return /^[0-9]+$/.test(cleanValue) ? cleanValue : "";
    }

    function escapeHtml(value){
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;",
      }[char]));
    }

    function setStatus(message, tone = ""){
      statusEl.hidden = false;
      statusEl.className = `status ${tone}`.trim();
      statusEl.textContent = message || "";
    }

    function hideStatus(){
      statusEl.hidden = true;
    }

    function formatRating(value){
      const number = Number(value);
      if(!Number.isFinite(number)) return "";
      return new Intl.NumberFormat("en-US", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      }).format(number);
    }

    function formatDateTime(value){
      if(!value) return "";
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("en-US", {
        month:"short",
        day:"numeric",
        year:"numeric",
        hour:"numeric",
        minute:"2-digit",
      }).format(date);
    }

    function formatShortDate(value){
      if(!value) return "";
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("en-US", {
        month:"short",
        day:"numeric",
        year:"numeric",
      }).format(date);
    }

    function formatPercent(value){
      const number = Number(value);
      if(!Number.isFinite(number)) return "";
      return new Intl.NumberFormat("en-US", {
        style:"percent",
        minimumFractionDigits:1,
        maximumFractionDigits:1,
      }).format(number);
    }

    async function loadLatestRun(){
      const { data, error } = await supabase
        .from("internal_ranked_gpi_runs")
        .select("id,calculation_version,model,base_rating,rating_scale,season_start,season_end,match_count,player_count,latest_match_at,config,created_at")
        .order("created_at", { ascending:false })
        .limit(1)
        .maybeSingle();
      if(error) throw error;
      return data || null;
    }

    function sortColumnForKey(key){
      return {
        rank:"rank",
        rating:"rating",
        matches:"matches_played",
        wins:"pairwise_wins",
        outcomeWinPct:"outcome_win_percentage",
        matchWinPct:"match_win_percentage",
      }[key] || "rank";
    }

    async function loadRatingsPage(runId, { page = 0, sort = sortState } = {}){
      const from = page * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;
      const sortColumn = sortColumnForKey(sort.key);
      const ascending = sort.direction === "asc";
      let query = supabase
        .from("internal_ranked_gpi_ratings")
        .select("discord_user_id,display_name,rating,raw_rating,reliability,matches_played,weighted_matches,average_match_weight,pairwise_wins,pairwise_losses,pairwise_ties,pairwise_games,first_place_finishes,outcome_win_percentage,match_win_percentage,placement_score_average,weighted_placement_score,first_played_at,last_played_at,rank", { count:"exact" })
        .eq("run_id", runId);

      if(sortColumn === "rank"){
        query = query.order("rank", { ascending });
      }else{
        query = query
          .order(sortColumn, { ascending })
          .order("rank", { ascending:true })
          .order("discord_user_id", { ascending:true });
      }

      query = query.range(from, to);
      const { data, error, count } = await query;
      if(error) throw error;
      return { rows:data || [], count:count || 0 };
    }

    async function loadMembers(discordIds){
      const uniqueIds = [...new Set(discordIds.map(normalizeDiscordId).filter(Boolean))];
      const members = [];
      const chunkSize = 100;

      for(let index = 0; index < uniqueIds.length; index += chunkSize){
        const ids = uniqueIds.slice(index, index + chunkSize);
        const { data, error } = await supabase
          .from("discord_guild_members")
          .select("discord_user_id,username,display_name,avatar_url,server_avatar_url,is_current_member")
          .in("discord_user_id", ids);
        if(error) throw error;
        members.push(...(data || []));
      }

      return new Map(members.map(member => [normalizeDiscordId(member.discord_user_id), member]));
    }

    function runSupportsPerMatchHistory(run){
      return run?.model === "normalized_placement_elo";
    }

    async function loadPlayerGpiMatchResults(runId, discordId){
      const rows = [];
      const pageSize = 1000;
      let from = 0;

      while(true){
        const { data, error } = await supabase
          .from("internal_ranked_gpi_match_results")
          .select("discord_user_id,played_at,timestamp_ms,place,rating_after,normalized_score,expected_score,participant_weight")
          .eq("run_id", runId)
          .eq("discord_user_id", discordId)
          .order("timestamp_ms", { ascending:true })
          .range(from, from + pageSize - 1);
        if(error) throw error;
        rows.push(...(data || []));
        if(!data || data.length < pageSize) break;
        from += pageSize;
      }

      return rows;
    }

    function renderRunMeta(run){
      const modelLabel = {
        plackett_luce: "Plackett-Luce",
        normalized_placement_elo: "NPS Elo",
      }[run.model] || run.model;
      const configKFactor = Number(run.config?.k_factor);
      const tuningLabel = Number.isFinite(configKFactor)
        ? `K ${configKFactor.toFixed(0)}`
        : `Scale ${Number(run.rating_scale).toFixed(1)}`;
      runMetaEl.hidden = false;
      runMetaEl.innerHTML = [
        `GPI Run #${run.id}`,
        modelLabel,
        `Seasons ${run.season_start}-${run.season_end}`,
        `${run.match_count} matches`,
        `${run.player_count} players`,
        tuningLabel,
        formatDateTime(run.created_at),
      ].map(item => `<span class="pill">${escapeHtml(item)}</span>`).join("");
    }

    function memberDisplayName(row, member){
      return (
        normalizeText(member?.display_name) ||
        normalizeText(member?.username) ||
        normalizeText(row.display_name) ||
        normalizeDiscordId(row.discord_user_id) ||
        "Player"
      );
    }

    function memberAvatarUrl(member){
      return normalizeText(member?.server_avatar_url) || normalizeText(member?.avatar_url) || "/logos/golf.png";
    }

    function outcomeHtml(row){
      return `
        <span class="win-text">${escapeHtml(row.pairwise_wins ?? 0)}</span><span class="dash-text">-</span><span class="loss-text">${escapeHtml(row.pairwise_losses ?? 0)}</span><span class="dash-text">-</span><span class="tie-text">${escapeHtml(row.pairwise_ties ?? 0)}</span>
      `;
    }

    function buildLeaderboardRows(ratings, membersById){
      return ratings.map((row) => {
        const discordId = normalizeDiscordId(row.discord_user_id);
        const member = membersById.get(discordId);
        const firstPlaceFinishes = Number(row.first_place_finishes) || 0;
        const matches = Number(row.matches_played) || 0;
        const wins = Number(row.pairwise_wins) || 0;
        const losses = Number(row.pairwise_losses) || 0;
        const ties = Number(row.pairwise_ties) || 0;
        const outcomes = wins + losses + ties;
        return {
          ...row,
          discord_user_id: discordId,
          member,
          displayName: memberDisplayName(row, member),
          avatarUrl: memberAvatarUrl(member),
          rankNumber: Number(row.rank) || 0,
          ratingNumber: Number(row.rating) || 0,
          matchesNumber: matches,
          winsNumber: wins,
          lossesNumber: losses,
          tiesNumber: ties,
          outcomeWinPct: Number(row.outcome_win_percentage) || (outcomes > 0 ? wins / outcomes : 0),
          firstPlaceFinishes,
          matchWinPct: Number(row.match_win_percentage) || (matches > 0 ? firstPlaceFinishes / matches : 0),
          reliability: Number(row.reliability) || 0,
          weightedMatches: Number(row.weighted_matches) || 0,
          weightedPlacementScore: Number(row.weighted_placement_score) || 0,
          history: null,
        };
      });
    }

    function updateSortButtons(){
      document.querySelectorAll(".sort-button[data-sort]").forEach((button) => {
        const active = button.dataset.sort === sortState.key;
        button.setAttribute("aria-sort", active ? (sortState.direction === "asc" ? "ascending" : "descending") : "none");
      });
    }

    function renderLeaderboard(){
      updateSortButtons();
      leaderboardBodyEl.innerHTML = leaderboardRows.map((row) => {
        return `
          <tr>
            <td class="rank-cell">${escapeHtml(row.rank || "")}</td>
            <td class="player-cell">
              <button class="player-button" type="button" data-player-id="${escapeHtml(row.discord_user_id)}">
                <img class="avatar" src="${escapeHtml(row.avatarUrl)}" alt="" loading="lazy" decoding="async" />
                <span>
                  <span class="player-name">${escapeHtml(row.displayName)}</span>
                  <span class="player-id">${escapeHtml(row.discord_user_id)}</span>
                </span>
              </button>
            </td>
            <td class="rating-cell right">${escapeHtml(formatRating(row.rating))}</td>
            <td class="number-cell">${escapeHtml(row.matchesNumber)}</td>
            <td class="outcome-cell">${outcomeHtml(row)}</td>
            <td class="number-cell">${escapeHtml(formatPercent(row.outcomeWinPct))}</td>
            <td class="number-cell">${escapeHtml(formatPercent(row.matchWinPct))}</td>
          </tr>
        `;
      }).join("");

      leaderboardEl.hidden = false;
      renderPager();
    }

    function renderPager(){
      const from = totalRatings === 0 ? 0 : currentPage * PAGE_SIZE + 1;
      const to = Math.min(totalRatings, (currentPage + 1) * PAGE_SIZE);
      pageInfoEl.textContent = totalRatings
        ? `Showing ${from}-${to} of ${totalRatings}`
        : "No ranked players";
      prevPageEl.disabled = currentPage <= 0;
      nextPageEl.disabled = to >= totalRatings;
    }

    function normalizeHistory(matchResults){
      return (matchResults || []).map((result) => ({
        played_at: result.played_at,
        timestamp_ms: Number(result.timestamp_ms) || new Date(result.played_at).getTime(),
        rating_after: Number(result.rating_after),
        place: Number(result.place),
        normalized_score: Number(result.normalized_score),
        expected_score: Number(result.expected_score),
        participant_weight: Number(result.participant_weight),
      })).sort((left, right) => left.timestamp_ms - right.timestamp_ms);
    }

    function chartSvgFor(row){
      const points = row.history
        .filter(point => Number.isFinite(point.timestamp_ms) && Number.isFinite(point.rating_after))
        .sort((left, right) => left.timestamp_ms - right.timestamp_ms);
      if(!points.length){
        return `<div class="chart-empty">${runSupportsPerMatchHistory(latestRun) ? "No rating history is available for this player yet." : "Per-match rating history is not available for this GPI run."}</div>`;
      }

      const width = 840;
      const height = 300;
      const padLeft = 58;
      const padRight = 18;
      const padTop = 22;
      const padBottom = 42;
      const chartWidth = width - padLeft - padRight;
      const chartHeight = height - padTop - padBottom;
      const minTime = points[0].timestamp_ms;
      const maxTime = Math.max(Date.now(), points[points.length - 1].timestamp_ms + 1);
      const ratings = points.map(point => point.rating_after);
      const minRatingRaw = Math.min(...ratings);
      const maxRatingRaw = Math.max(...ratings);
      const spread = Math.max(10, maxRatingRaw - minRatingRaw);
      const minRating = Math.floor((minRatingRaw - spread * 0.12) / 10) * 10;
      const maxRating = Math.ceil((maxRatingRaw + spread * 0.12) / 10) * 10;
      const ratingRange = Math.max(1, maxRating - minRating);
      const xFor = (timestamp) => padLeft + ((timestamp - minTime) / Math.max(1, maxTime - minTime)) * chartWidth;
      const yFor = (rating) => padTop + (1 - ((rating - minRating) / ratingRange)) * chartHeight;
      const polylinePoints = points.map(point => `${xFor(point.timestamp_ms).toFixed(2)},${yFor(point.rating_after).toFixed(2)}`).join(" ");
      const firstDate = formatShortDate(minTime);
      const lastDate = formatShortDate(maxTime);
      const yTicks = [minRating, Math.round((minRating + maxRating) / 2), maxRating];
      const circles = points.map((point) => `
        <circle cx="${xFor(point.timestamp_ms).toFixed(2)}" cy="${yFor(point.rating_after).toFixed(2)}" r="3.2" fill="#6ee7b7" opacity=".84">
          <title>${escapeHtml(`${formatDateTime(point.played_at || point.timestamp_ms)}: ${formatRating(point.rating_after)}`)}</title>
        </circle>
      `).join("");

      return `
        <div class="chart-shell">
          <div class="chart-head">
            <span>${escapeHtml(firstDate)}</span>
            <span>${escapeHtml(points.length)} rating points</span>
            <span>${escapeHtml(lastDate)}</span>
          </div>
          <svg class="chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Rating over time for ${escapeHtml(row.displayName)}">
            <rect x="0" y="0" width="${width}" height="${height}" fill="#121417"></rect>
            ${yTicks.map((tick) => `
              <line x1="${padLeft}" y1="${yFor(tick).toFixed(2)}" x2="${width - padRight}" y2="${yFor(tick).toFixed(2)}" stroke="#303641" stroke-width="1"></line>
              <text x="${padLeft - 10}" y="${(yFor(tick) + 4).toFixed(2)}" text-anchor="end" fill="#a9b0bb" font-size="12">${escapeHtml(formatRating(tick))}</text>
            `).join("")}
            <line x1="${padLeft}" y1="${padTop}" x2="${padLeft}" y2="${height - padBottom}" stroke="#46505f" stroke-width="1"></line>
            <line x1="${padLeft}" y1="${height - padBottom}" x2="${width - padRight}" y2="${height - padBottom}" stroke="#46505f" stroke-width="1"></line>
            <text x="${padLeft}" y="${height - 14}" fill="#a9b0bb" font-size="12">${escapeHtml(firstDate)}</text>
            <text x="${width - padRight}" y="${height - 14}" text-anchor="end" fill="#a9b0bb" font-size="12">Present</text>
            <polyline points="${polylinePoints}" fill="none" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
            ${circles}
          </svg>
        </div>
      `;
    }

    async function openPlayerModal(discordId){
      const row = leaderboardRows.find(candidate => candidate.discord_user_id === discordId);
      if(!row) return;

      modalPlayerHeadEl.innerHTML = `
        <img class="avatar" src="${escapeHtml(row.avatarUrl)}" alt="" loading="lazy" decoding="async" />
        <span>
          <h2 id="modalTitle" class="modal-title">${escapeHtml(row.displayName)}</h2>
          <span class="player-id">${escapeHtml(row.discord_user_id)}</span>
        </span>
      `;
      modalBodyEl.innerHTML = `<div class="status">Loading rating history...</div>`;
      playerModalEl.hidden = false;
      modalCloseEl.focus();

      if(row.history == null){
        row.history = runSupportsPerMatchHistory(latestRun)
          ? normalizeHistory(await loadPlayerGpiMatchResults(latestRun.id, discordId))
          : [];
      }

      modalBodyEl.innerHTML = `
        <div class="detail-grid">
          <div class="detail-cell"><span class="detail-label">Rank</span><span class="detail-value">${escapeHtml(row.rank)}</span></div>
          <div class="detail-cell"><span class="detail-label">Rating</span><span class="detail-value">${escapeHtml(formatRating(row.rating))}</span></div>
          <div class="detail-cell"><span class="detail-label">Matches</span><span class="detail-value">${escapeHtml(row.matchesNumber)}</span></div>
          <div class="detail-cell"><span class="detail-label">W-L-T</span><span class="detail-value">${outcomeHtml(row)}</span></div>
          <div class="detail-cell"><span class="detail-label">Win %</span><span class="detail-value">${escapeHtml(formatPercent(row.outcomeWinPct))}</span></div>
          <div class="detail-cell"><span class="detail-label">Match Win %</span><span class="detail-value">${escapeHtml(formatPercent(row.matchWinPct))}</span></div>
          <div class="detail-cell"><span class="detail-label">1st Place</span><span class="detail-value">${escapeHtml(row.firstPlaceFinishes)}</span></div>
          <div class="detail-cell"><span class="detail-label">Reliability</span><span class="detail-value">${escapeHtml(formatPercent(row.reliability))}</span></div>
          <div class="detail-cell"><span class="detail-label">Weighted Matches</span><span class="detail-value">${escapeHtml(formatRating(row.weightedMatches))}</span></div>
          <div class="detail-cell"><span class="detail-label">Weighted Placement</span><span class="detail-value">${escapeHtml(formatPercent(row.weightedPlacementScore))}</span></div>
          <div class="detail-cell"><span class="detail-label">Last Match</span><span class="detail-value">${escapeHtml(formatDateTime(row.last_played_at))}</span></div>
        </div>
        ${chartSvgFor(row)}
      `;
    }

    function closePlayerModal(){
      playerModalEl.hidden = true;
      modalPlayerHeadEl.innerHTML = "";
      modalBodyEl.innerHTML = "";
    }

    async function loadPage(){
      latestRun = await loadLatestRun();
      if(!latestRun){
        setStatus("No internal Ranked League GPI run is available yet. Run the Plackett-Luce replay first.");
        return;
      }

      await loadLeaderboardPage(0);
      renderRunMeta(latestRun);
      hideStatus();
    }

    async function loadLeaderboardPage(page){
      if(!latestRun) return;
      currentPage = Math.max(0, page);
      leaderboardEl.hidden = false;
      pageInfoEl.textContent = "Loading rankings...";
      prevPageEl.disabled = true;
      nextPageEl.disabled = true;
      const { rows:ratings, count } = await loadRatingsPage(latestRun.id, {
        page:currentPage,
        sort:sortState,
      });
      const membersById = await loadMembers(ratings.map(row => row.discord_user_id));
      totalRatings = count;
      leaderboardRows = buildLeaderboardRows(ratings, membersById);
      renderLeaderboard();
    }

    document.querySelectorAll(".sort-button[data-sort]").forEach((button) => {
      button.addEventListener("click", () => {
        const key = button.dataset.sort;
        const defaultDirection = key === "rank" ? "asc" : "desc";
        if(sortState.key === key){
          sortState = {
            key,
            direction: sortState.direction === "asc" ? "desc" : "asc",
          };
        }else{
          sortState = { key, direction: defaultDirection };
        }
        loadLeaderboardPage(0).catch((error) => {
          console.error(error);
          setStatus(`Unable to sort NSS GPI: ${error?.message || "Unknown error"}`, "error");
        });
      });
    });

    leaderboardBodyEl.addEventListener("click", (event) => {
      const button = event.target.closest(".player-button[data-player-id]");
      if(!button) return;
      openPlayerModal(button.dataset.playerId).catch((error) => {
        console.error(error);
        setStatus(`Unable to load player rating history: ${error?.message || "Unknown error"}`, "error");
      });
    });

    prevPageEl.addEventListener("click", () => {
      if(currentPage <= 0) return;
      loadLeaderboardPage(currentPage - 1).catch((error) => {
        console.error(error);
        setStatus(`Unable to load previous page: ${error?.message || "Unknown error"}`, "error");
      });
    });

    nextPageEl.addEventListener("click", () => {
      if((currentPage + 1) * PAGE_SIZE >= totalRatings) return;
      loadLeaderboardPage(currentPage + 1).catch((error) => {
        console.error(error);
        setStatus(`Unable to load next page: ${error?.message || "Unknown error"}`, "error");
      });
    });

    modalCloseEl.addEventListener("click", closePlayerModal);
    playerModalEl.addEventListener("click", (event) => {
      if(event.target === playerModalEl) closePlayerModal();
    });
    document.addEventListener("keydown", (event) => {
      if(event.key === "Escape" && !playerModalEl.hidden) closePlayerModal();
    });

    loadPage().catch((error) => {
      console.error(error);
      setStatus(`Unable to load NSS GPI: ${error?.message || "Unknown error"}`, "error");
    });
  </script>
</body>
</html>
