<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020B18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/logos/golf.png" />
  <title>NSS Golf Community</title>

  <style>
    :root{
      --bg1:#061C3B; --bg2:#04142E; --bg3:#020B18;

      --card-bg: rgba(15,23,42,1);
      --card-shadow: 0 32px 32px rgba(0,0,0,0.65);

      --text: #e9eef8;
      --title: #c7d7ff;
      --muted: #9ca3c7;

      --border-lite: rgba(148,163,184,0.20);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.10);
      --btn-border: rgba(255,255,255,0.15);
      --btn-border-hover: rgba(255,255,255,0.28);
    }

    *{ box-sizing:border-box; }
    html{
      background-color: var(--bg3);
    }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg3);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2), var(--bg3));
    }

    .topbar{
      position: sticky; top:0; z-index:10;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(3,18,42,.70);
      backdrop-filter: blur(10px);
    }
    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{display:flex; gap:12px; align-items:center;}
    .home-badge,
    .home-btn{
      width:40px; height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
      display:grid; place-items:center;
      overflow:hidden;
      user-select:none;
      flex-shrink:0;
    }
    .home-badge img,
    .home-btn img{
      width:70%;
      height:70%;
      object-fit: contain;
      display:block;
      pointer-events:none;
    }

    .kicker{
      font-size:11px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color: rgba(255,255,255,.65);
      font-weight:900;
    }
    .page-nav-select{
      background: rgba(2,6,23,.85);
      color: inherit;
      border: 1px solid rgba(125,211,252,.35);
      border-radius: 10px;
      padding: 6px 32px 6px 10px;
      font: inherit;
      letter-spacing: inherit;
      text-transform: uppercase;
      max-width: min(56vw, 420px);
      cursor: pointer;
    }
    .page-nav-select:focus-visible{
      outline: 2px solid rgba(125,211,252,.6);
      outline-offset: 2px;
    }


    .container{
      max-width:1100px;
      margin:0 auto;
      padding: 16px 18px 56px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 16px;
    }

    .card{
      width: min(820px, 100%);
      background: var(--card-bg);
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .headline{
      font-size: 22px;
      font-weight: 950;
      color: var(--title);
      letter-spacing: .035em;
      text-transform: uppercase;
      margin: 0 0 10px 0;
    }

    .copy{
      margin: 0;
      color: rgba(233,238,248,0.92);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .actions{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content: center;
      padding-top: 6px;
    }

    .archive-card{
      text-align:center;
    }

    .archive-actions{
      display:flex;
      justify-content:center;
      padding-top: 4px;
    }
    .player-search{
      position:relative;
      width:min(520px, 100%);
      margin: 4px auto 14px;
    }
    .player-search-input{
      appearance:none;
      -webkit-appearance:none;
      width:100%;
      border:1px solid rgba(148,163,184,0.28);
      background: rgba(255,255,255,0.045);
      color: rgba(233,238,248,0.95);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      outline: none;
      text-align:left;
    }
    .player-search-input::placeholder{
      color: rgba(156,163,199,0.72);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 11px;
      font-weight: 900;
    }
    .player-search-input::-webkit-search-cancel-button{
      -webkit-appearance:none;
      appearance:none;
      width: 14px;
      height: 14px;
      margin-left: 8px;
      background-color: rgba(156,163,199,0.72);
      cursor:pointer;
      -webkit-mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.5 3.5 12.5 12.5M12.5 3.5 3.5 12.5' stroke='black' stroke-width='2.2' stroke-linecap='round'/%3E%3C/svg%3E") center / 12px 12px no-repeat;
      mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.5 3.5 12.5 12.5M12.5 3.5 3.5 12.5' stroke='black' stroke-width='2.2' stroke-linecap='round'/%3E%3C/svg%3E") center / 12px 12px no-repeat;
    }
    .player-search-input:focus{
      border-color: rgba(45,212,191,0.62);
      box-shadow: 0 0 0 2px rgba(45,212,191,0.12), 0 0 18px rgba(45,212,191,0.12);
    }
    .player-search-results{
      position:absolute;
      top: calc(100% + 8px);
      left:0;
      right:0;
      z-index: 20;
      display:grid;
      gap: 6px;
      max-height: 292px;
      overflow:auto;
      padding: 8px;
      border:1px solid rgba(148,163,184,0.28);
      border-radius: 14px;
      background: rgba(2,8,24,0.98);
      box-shadow: 0 22px 34px rgba(0,0,0,0.42);
      text-align:left;
    }
    .player-search-results[hidden]{
      display:none;
    }
    .player-search-result{
      appearance:none;
      -webkit-appearance:none;
      border:1px solid transparent;
      background: rgba(255,255,255,0.045);
      color: inherit;
      border-radius: 10px;
      padding: 7px 8px;
      display:flex;
      align-items:center;
      gap: 10px;
      min-width:0;
      cursor:pointer;
      text-align:left;
    }
    .player-search-result:hover,
    .player-search-result:focus-visible{
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.18);
      outline: none;
    }
    .player-search-avatar{
      width: 32px;
      height: 32px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }
    .player-search-copy{
      min-width:0;
      display:flex;
      align-items:baseline;
      gap: 8px;
      flex: 1 1 auto;
    }
    .player-search-display{
      min-width:0;
      color:#fff;
      font-size: 13px;
      font-weight: 950;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .player-search-username{
      min-width:0;
      color: rgba(156,163,199,0.78);
      font-size: 12px;
      font-weight: 650;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex: 1 1 auto;
    }
    .player-search-empty{
      margin:0;
      padding: 8px 10px;
      color: rgba(156,163,199,0.86);
      font-size: 12px;
      font-weight: 800;
      text-align:center;
    }

    .league-tabs{
      margin: 16px 0 0;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab-button{
      appearance:none;
      -webkit-appearance:none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: rgba(255,255,255,0.92);
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-size: 11px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height: 1;
      flex: 1 1 0;
      min-width: 160px;
    }

    .tab-button.is-active{
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.45);
      color: #fff;
    }

    .league-section{
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border-lite);
      text-align: center;
    }

    .league-section[hidden]{
      display: none;
    }

    .league-placeholder{
      margin: 0;
      font-size: 14px;
      color: rgba(233,238,248,0.72);
      font-weight: 600;
    }

    .btn{
      appearance:none;
      -webkit-appearance:none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: rgba(255,255,255,0.92);
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-size: 12px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      line-height: 1;
    }
    .btn.neon-red{
      color: #ff5a5a;
      border-color: rgba(255,90,90,0.9);
      box-shadow: 0 0 12px rgba(255,90,90,0.45), 0 0 24px rgba(255,90,90,0.2);
      text-shadow: 0 0 8px rgba(255,90,90,0.9);
    }
    .btn.neon-blue{
      color: #7dd3fc;
      border-color: rgba(125,211,252,0.9);
      box-shadow: 0 0 12px rgba(125,211,252,0.45), 0 0 24px rgba(125,211,252,0.2);
      text-shadow: 0 0 8px rgba(125,211,252,0.9);
    }
    .btn.neon-green{
      color: #5dff9c;
      border-color: rgba(93,255,156,0.9);
      box-shadow: 0 0 12px rgba(93,255,156,0.45), 0 0 24px rgba(93,255,156,0.2);
      text-shadow: 0 0 8px rgba(93,255,156,0.9);
    }
    .btn.neon-yellow{
      color: #f6ff6a;
      border-color: rgba(246,255,106,0.9);
      box-shadow: 0 0 12px rgba(246,255,106,0.45), 0 0 24px rgba(246,255,106,0.2);
      text-shadow: 0 0 8px rgba(246,255,106,0.9);
    }
    .btn.neon-purple{
      color: #d176ff;
      border-color: rgba(209,118,255,0.9);
      box-shadow: 0 0 12px rgba(209,118,255,0.45), 0 0 24px rgba(209,118,255,0.2);
      text-shadow: 0 0 8px rgba(209,118,255,0.9);
    }
    .btn.solid-teal{
      color: #2dd4bf;
      border-color: rgba(45,212,191,0.9);
      box-shadow: 0 0 12px rgba(45,212,191,0.45), 0 0 24px rgba(45,212,191,0.2);
      text-shadow: 0 0 8px rgba(45,212,191,0.9);
    }
    .btn.solid-teal:hover{
      color: #5eead4;
      border-color: rgba(94,234,212,0.95);
      background: var(--btn-bg-hover);
    }
    .btn.indigo{
      color: #818cf8;
      border-color: rgba(129,140,248,0.9);
      box-shadow: 0 0 12px rgba(129,140,248,0.45), 0 0 24px rgba(99,102,241,0.22);
      text-shadow: 0 0 8px rgba(129,140,248,0.9);
    }
    .btn.indigo:hover{
      color: #a5b4fc;
      border-color: rgba(165,180,252,0.95);
      background: var(--btn-bg-hover);
    }
    .btn.neon-gradient{
      border: 1px solid transparent;
      border-image: linear-gradient(90deg, #7dd3fc, #f6ff6a) 1;
      border-radius: 14px;
      background-image: linear-gradient(90deg, #7dd3fc, #f6ff6a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      box-shadow: 0 0 12px rgba(125,211,252,0.45), 0 0 24px rgba(246,255,106,0.2);
      filter: drop-shadow(0 0 6px rgba(125,211,252,0.5)) drop-shadow(0 0 8px rgba(246,255,106,0.35));
    }
    .btn-icon{
      width: 16px;
      height: 16px;
      display: block;
      fill: currentColor;
    }
    .btn-icon path{
      fill: currentColor;
    }
    .btn:hover{
      background: var(--btn-bg-hover);
      border-color: var(--btn-border-hover);
    }
    .discord-button{
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: .08em;
      line-height: 1;
      flex-shrink: 0;
    }
    .discord-button .btn-icon{
      width: 14px;
      height: 14px;
    }
    .home-discord-invite{
      display:flex;
      justify-content:center;
      margin: 0;
    }
    .home-discord-invite .discord-button{
      --discord-blue: #5865F2;
      padding: 14px 20px;
      font-size: 13px;
      letter-spacing: .1em;
      border-radius: 18px;
      border-color: rgba(88,101,242,0.78);
      box-shadow:
        0 0 0 1px rgba(88,101,242,0.24),
        0 0 18px rgba(88,101,242,0.34),
        0 10px 26px rgba(0,0,0,0.25);
    }
    .home-discord-invite .discord-button:hover{
      border-color: var(--discord-blue);
      box-shadow:
        0 0 0 1px rgba(88,101,242,0.34),
        0 0 24px rgba(88,101,242,0.48),
        0 12px 30px rgba(0,0,0,0.30);
    }
    .home-discord-invite .discord-button .btn-icon{
      width: 18px;
      height: 18px;
    }

    @media (max-width: 760px){
      .container{ padding: 14px 12px 44px; }
      .topbar-inner{ padding: 12px 12px; flex-wrap: nowrap; }
      .brand{ flex: 1; min-width: 0; }
      .brand > div{ min-width: 0; }
      .page-nav-select{ width: min(100%, 420px); max-width: 100%; }
      .discord-button{ padding: 8px 10px; font-size: 10px; letter-spacing: .06em; }
      .discord-button .btn-icon{ width: 14px; height: 14px; }
      .home-discord-invite .discord-button{ padding: 13px 18px; font-size: 12px; }
      .headline{ font-size: 18px; }
      .card{ padding: 18px 14px; border-radius: 18px; }
      .league-tabs{
        display:grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .tab-button{
        min-width: 0;
      }
      .tab-button.tab-primary{
        grid-column: 1 / -1;
      }
      .league-section .actions{
        flex-direction: column;
        align-items: stretch;
        padding-left: 12px;
        padding-right: 12px;
      }
      .league-section .actions .btn{
        width: 100%;
        justify-content: center;
        text-align: center;
        min-height: 44px;
      }
      .archive-actions{
        padding-left: 12px;
        padding-right: 12px;
      }
      .player-search{
        width:100%;
        padding-left:12px;
        padding-right:12px;
      }
      .player-search-results{
        left:12px;
        right:12px;
      }
      .player-search-copy{
        align-items:flex-start;
        flex-direction:column;
        gap: 3px;
      }
      .player-search-display,
      .player-search-username{
        width:100%;
      }
      .archive-actions .btn{
        width: 100%;
        justify-content: center;
      }
    }
  </style>
  <link rel="stylesheet" href="/site-topbar.css" />
</head>

  <script type="module">
    import { createBrowserSupabaseClient } from "/auth/supabase-auth.js";

    const supabase = createBrowserSupabaseClient();
    const leagueTabs = Array.from(document.querySelectorAll(".league-tabs .tab-button[data-target]"));
    const leagueSections = Array.from(document.querySelectorAll("#happening-now-section, #upcoming-section, #archive-section"));
    const playerSearchEl = document.getElementById("playerSearch");
    const playerSearchInput = document.getElementById("playerSearchInput");
    const playerSearchResults = document.getElementById("playerSearchResults");
    const PLAYER_SEARCH_LIMIT = 8;
    const MEMBER_PAGE_SIZE = 1000;
    let memberSearchRows = [];
    let memberSearchPromise = null;

    function setActiveLeagueTab(targetId){
      for(const section of leagueSections){
        const isActive = section.id === targetId;
        section.hidden = !isActive;
        section.setAttribute("aria-hidden", isActive ? "false" : "true");
      }
      for(const tab of leagueTabs){
        const isActive = tab.dataset.target === targetId;
        tab.classList.toggle("is-active", isActive);
        tab.setAttribute("aria-selected", isActive ? "true" : "false");
      }
    }

    function initLeagueTabs(){
      if(!leagueTabs.length) return;
      const targetIds = new Set(leagueSections.map(section => section.id));
      const initial = leagueTabs.find(tab => tab.classList.contains("is-active") && targetIds.has(tab.dataset.target))
        || leagueTabs.find(tab => targetIds.has(tab.dataset.target))
        || null;

      if(initial?.dataset.target){
        setActiveLeagueTab(initial.dataset.target);
      }

      for(const tab of leagueTabs){
        if(!targetIds.has(tab.dataset.target)) continue;
        tab.addEventListener("click", (event) => {
          event.preventDefault();
          setActiveLeagueTab(tab.dataset.target);
        });
      }
    }

    initLeagueTabs();

    function normalizeSearchText(value){
      return String(value || "").trim();
    }

    function normalizeSearchKey(value){
      return normalizeSearchText(value).toLowerCase();
    }

    function avatarUrlForMember(member){
      return member?.server_avatar_url || member?.avatar_url || "/logos/golf.png";
    }

    async function loadMemberSearchRows(){
      if(memberSearchRows.length) return memberSearchRows;
      if(memberSearchPromise) return memberSearchPromise;

      memberSearchPromise = (async () => {
        const rows = [];
        for(let from = 0;; from += MEMBER_PAGE_SIZE){
          const to = from + MEMBER_PAGE_SIZE - 1;
          const { data, error } = await supabase
            .from("discord_guild_members")
            .select("discord_user_id,username,display_name,server_avatar_url,avatar_url")
            .eq("is_current_member", true)
            .range(from, to);

          if(error) throw error;
          rows.push(...(data || []));
          if(!data || data.length < MEMBER_PAGE_SIZE) break;
        }

        memberSearchRows = rows
          .filter(member => normalizeSearchText(member?.discord_user_id))
          .map((member) => ({
            ...member,
            displaySearch: normalizeSearchKey(member.display_name),
            usernameSearch: normalizeSearchKey(member.username),
          }));
        return memberSearchRows;
      })().finally(() => {
        memberSearchPromise = null;
      });

      return memberSearchPromise;
    }

    function scoreMemberSearchResult(member, query){
      const display = member.displaySearch;
      const username = member.usernameSearch;
      if(!query) return 0;
      if(display === query) return 120;
      if(username === query) return 110;
      if(display.startsWith(query)) return 95;
      if(username.startsWith(query)) return 85;
      if(display.includes(query)) return 65;
      if(username.includes(query)) return 55;
      return 0;
    }

    function hidePlayerSearchResults(){
      playerSearchResults.hidden = true;
      playerSearchInput.setAttribute("aria-expanded", "false");
    }

    function showPlayerSearchResults(){
      playerSearchResults.hidden = false;
      playerSearchInput.setAttribute("aria-expanded", "true");
    }

    function renderPlayerSearchResults(results, query){
      playerSearchResults.innerHTML = "";

      if(!query){
        hidePlayerSearchResults();
        return;
      }

      if(!results.length){
        const empty = document.createElement("p");
        empty.className = "player-search-empty";
        empty.textContent = "No players found.";
        playerSearchResults.appendChild(empty);
        showPlayerSearchResults();
        return;
      }

      for(const member of results){
        const button = document.createElement("button");
        button.className = "player-search-result";
        button.type = "button";
        button.dataset.playerId = member.discord_user_id;

        const avatar = document.createElement("img");
        avatar.className = "player-search-avatar";
        avatar.src = avatarUrlForMember(member);
        avatar.alt = "";
        avatar.loading = "lazy";
        avatar.decoding = "async";
        avatar.referrerPolicy = "no-referrer";

        const copy = document.createElement("span");
        copy.className = "player-search-copy";

        const displayName = document.createElement("span");
        displayName.className = "player-search-display";
        displayName.textContent = normalizeSearchText(member.display_name) || normalizeSearchText(member.username) || member.discord_user_id;

        const username = document.createElement("span");
        username.className = "player-search-username";
        username.textContent = normalizeSearchText(member.username) || member.discord_user_id;

        copy.append(displayName, username);
        button.append(avatar, copy);
        playerSearchResults.appendChild(button);
      }

      showPlayerSearchResults();
    }

    async function updatePlayerSearch(){
      const query = normalizeSearchKey(playerSearchInput.value);
      if(!query){
        hidePlayerSearchResults();
        return;
      }

      try{
        const rows = await loadMemberSearchRows();
        const results = rows
          .map(member => ({ member, score: scoreMemberSearchResult(member, query) }))
          .filter(result => result.score > 0)
          .sort((left, right) => {
            if(right.score !== left.score) return right.score - left.score;
            return normalizeSearchText(left.member.display_name || left.member.username)
              .localeCompare(normalizeSearchText(right.member.display_name || right.member.username));
          })
          .slice(0, PLAYER_SEARCH_LIMIT)
          .map(result => result.member);
        renderPlayerSearchResults(results, query);
      }catch(error){
        console.error(error);
        playerSearchResults.innerHTML = "";
        const empty = document.createElement("p");
        empty.className = "player-search-empty";
        empty.textContent = "Could not load players.";
        playerSearchResults.appendChild(empty);
        showPlayerSearchResults();
      }
    }

    playerSearchInput.addEventListener("focus", () => {
      void loadMemberSearchRows();
      void updatePlayerSearch();
    });

    playerSearchInput.addEventListener("input", () => {
      void updatePlayerSearch();
    });

    playerSearchResults.addEventListener("click", (event) => {
      const result = event.target.closest(".player-search-result[data-player-id]");
      if(!result) return;
      window.location.href = `/player.html?id=${encodeURIComponent(result.dataset.playerId)}`;
    });

    document.addEventListener("click", (event) => {
      if(playerSearchEl.contains(event.target)) return;
      hidePlayerSearchResults();
    });
  </script>
  <script type="module" src="/site-topbar.js"></script>
</body>
