<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build Player List | NSS Golf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;950&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site-topbar.css" />
  <link rel="stylesheet" href="/settings-page.css?v=20260609-build" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="settings-brand">
        <a class="settings-home-btn" href="/index.html" aria-label="NSS Golf home">
          <img src="/logos/golf.png" alt="" />
        </a>
        <div class="topbar-page-title" aria-label="Build Player List">
          <svg class="topbar-page-title-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M8 6h13"></path>
            <path d="M8 12h13"></path>
            <path d="M8 18h13"></path>
            <path d="M3 6h.01"></path>
            <path d="M3 12h.01"></path>
            <path d="M3 18h.01"></path>
          </svg>
          <span>Build Player List</span>
        </div>
      </div>
    </div>
  </header>

  <main class="settings-main">
    <section class="settings-card" aria-labelledby="builderTitle">
      <h1 class="settings-title" id="builderTitle">Build Player List</h1>
      <div class="settings-actions" id="builderLoginActions" hidden>
        <button class="settings-button" id="builderLoginBtn" type="button">Log In With Discord</button>
      </div>

      <div class="builder-panel" id="builderPanel" hidden>
        <div class="builder-toolbar">
          <a class="settings-button secondary" href="/admin-settings.html">Admin Actions</a>
          <div class="builder-actions">
            <button class="settings-button" id="copyCsvBtn" type="button">Copy CSV</button>
          </div>
        </div>

        <div class="builder-table-wrap">
          <table class="builder-table">
            <colgroup>
              <col class="builder-row-col" />
              <col class="builder-player-col" />
              <col class="builder-discord-col" />
            </colgroup>
            <thead>
              <tr>
                <th scope="col" aria-label="Row">#</th>
                <th scope="col">Player</th>
                <th scope="col">
                  <span class="builder-column-header">
                    <span>Discord ID</span>
                    <button class="builder-header-copy" id="copyDiscordColumnBtn" type="button" aria-label="Copy Discord ID column" title="Copy Discord ID column">
                      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                      </svg>
                    </button>
                  </span>
                </th>
              </tr>
            </thead>
            <tbody id="builderRows"></tbody>
          </table>
          <button class="builder-add-row-bar" id="addRowBtn" type="button" aria-label="Add row" title="Add row">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
          </button>
        </div>
      </div>

      <p class="settings-status" id="builderStatus" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="/site-topbar.js"></script>
  <script type="module">
    import { buildAuthRedirectTo, createBrowserSupabaseClient } from "/auth/supabase-auth.js";
    import { ADMIN_ROLE_ID } from "/settings-data.js";

    const supabase = createBrowserSupabaseClient();
    const statusEl = document.getElementById("builderStatus");
    const loginActions = document.getElementById("builderLoginActions");
    const loginBtn = document.getElementById("builderLoginBtn");
    const builderPanel = document.getElementById("builderPanel");
    const rowsEl = document.getElementById("builderRows");
    const addRowBtn = document.getElementById("addRowBtn");
    const copyCsvBtn = document.getElementById("copyCsvBtn");
    const copyDiscordColumnBtn = document.getElementById("copyDiscordColumnBtn");
    const PLAYER_SEARCH_LIMIT = 8;
    const MEMBER_PAGE_SIZE = 1000;
    let memberSearchRows = [];
    let memberSearchPromise = null;
    let rows = [createEmptyRow()];
    let draggedRowId = "";
    const SELECTABLE_COLUMNS = ["player", "discord"];
    let selectionAnchor = null;
    let selectionFocus = null;
    let activeCell = null;
    let editingCell = null;
    let isSelectingCells = false;
    let selectionDragMode = "";
    let lastTap = { rowId: "", column: "", at: 0 };

    function normalizeText(value){
      return String(value || "").trim();
    }

    function normalizeSearchKey(value){
      return normalizeText(value).toLowerCase();
    }

    function normalizeDiscordId(value){
      return normalizeText(value).replace(/[^\d]/g, "");
    }

    function getDiscordIdentity(user){
      const identities = Array.isArray(user?.identities) ? user.identities : [];
      return identities.find(identity => normalizeText(identity?.provider).toLowerCase() === "discord") || null;
    }

    function getDiscordIdFromUser(user){
      const identity = getDiscordIdentity(user);
      return normalizeDiscordId(
        identity?.provider_id ||
        identity?.identity_data?.provider_id ||
        identity?.identity_data?.sub ||
        identity?.identity_data?.id ||
        user?.user_metadata?.provider_id ||
        user?.user_metadata?.sub
      );
    }

    function setStatus(message, tone = ""){
      statusEl.textContent = message || "";
      statusEl.className = `settings-status ${tone}`.trim();
    }

    function createRowId(){
      if(globalThis.crypto?.randomUUID) return crypto.randomUUID();
      return `row-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function createEmptyRow(){
      return {
        id: createRowId(),
        selectedPlayerId: "",
        playerName: "",
        searchValue: "",
        discordId: "",
      };
    }

    function isRowSelected(row){
      return !!normalizeDiscordId(row?.selectedPlayerId) && !!normalizeDiscordId(row?.discordId);
    }

    function isRowBlank(row){
      return !normalizeText(row?.playerName || row?.searchValue) && !normalizeDiscordId(row?.discordId) && !normalizeDiscordId(row?.selectedPlayerId);
    }

    function isRowDraft(row){
      return !isRowSelected(row) && !isRowBlank(row);
    }

    function avatarUrlForMember(member){
      return member?.server_avatar_url || member?.avatar_url || "/logos/golf.png";
    }

    function displayNameForMember(member){
      return normalizeText(member?.display_name) || normalizeText(member?.username) || normalizeDiscordId(member?.discord_user_id);
    }

    async function loadProfileForUser(user){
      const { data, error } = await supabase
        .from("profiles")
        .select("username,discord_user_id")
        .eq("user_id", user.id)
        .maybeSingle();
      if(error) throw error;
      return data || null;
    }

    async function playerHasAdminRole(discordId){
      const cleanDiscordId = normalizeDiscordId(discordId);
      if(!cleanDiscordId) return false;

      const { data, error } = await supabase
        .from("discord_member_roles")
        .select("role_id")
        .eq("discord_user_id", cleanDiscordId)
        .eq("role_id", ADMIN_ROLE_ID)
        .maybeSingle();
      if(error) throw error;
      return !!data;
    }

    async function loadMemberSearchRows(){
      if(memberSearchRows.length) return memberSearchRows;
      if(memberSearchPromise) return memberSearchPromise;

      memberSearchPromise = (async () => {
        const loadedRows = [];
        for(let from = 0;; from += MEMBER_PAGE_SIZE){
          const to = from + MEMBER_PAGE_SIZE - 1;
          const { data, error } = await supabase
            .from("discord_guild_members")
            .select("discord_user_id,username,display_name,server_avatar_url,avatar_url")
            .eq("is_current_member", true)
            .range(from, to);

          if(error) throw error;
          loadedRows.push(...(data || []));
          if(!data || data.length < MEMBER_PAGE_SIZE) break;
        }

        memberSearchRows = loadedRows
          .filter(member => normalizeDiscordId(member?.discord_user_id))
          .map((member) => ({
            ...member,
            discord_user_id: normalizeDiscordId(member.discord_user_id),
            displaySearch: normalizeSearchKey(member.display_name),
            usernameSearch: normalizeSearchKey(member.username),
          }));
        return memberSearchRows;
      })().finally(() => {
        memberSearchPromise = null;
      });

      return memberSearchPromise;
    }

    function scoreMemberSearchResult(member, query){
      const display = member.displaySearch;
      const username = member.usernameSearch;
      if(!query) return 0;
      if(display === query) return 120;
      if(username === query) return 110;
      if(display.startsWith(query)) return 95;
      if(username.startsWith(query)) return 85;
      if(display.includes(query)) return 65;
      if(username.includes(query)) return 55;
      return 0;
    }

    function searchResultsFor(query){
      return memberSearchRows
        .map(member => ({ member, score: scoreMemberSearchResult(member, query) }))
        .filter(result => result.score > 0)
        .sort((left, right) => {
          if(right.score !== left.score) return right.score - left.score;
          return displayNameForMember(left.member).localeCompare(displayNameForMember(right.member));
        })
        .slice(0, PLAYER_SEARCH_LIMIT)
        .map(result => result.member);
    }

    function csvEscape(value){
      const text = String(value || "");
      if(/[",\r\n]/.test(text)) return `"${text.replace(/"/g, "\"\"")}"`;
      return text;
    }

    function exportRows(){
      let lastContentIndex = -1;
      rows.forEach((row, index) => {
        if(isRowSelected(row)) lastContentIndex = index;
      });

      const exportedRows = lastContentIndex >= 0 ? rows.slice(0, lastContentIndex + 1) : [];
      return [
        ["Player", "Discord ID"],
        ...exportedRows.map((row) => {
          if(!isRowSelected(row)) return ["", ""];
          return [normalizeText(row.playerName), normalizeDiscordId(row.discordId)];
        }),
      ]
        .map(row => row.map(csvEscape).join(","))
        .join("\n");
    }

    function exportDiscordIdColumn(){
      let lastContentIndex = -1;
      rows.forEach((row, index) => {
        if(isRowSelected(row)) lastContentIndex = index;
      });

      if(lastContentIndex < 0) return "";
      return rows
        .slice(0, lastContentIndex + 1)
        .map(row => isRowSelected(row) ? normalizeDiscordId(row.discordId) : "")
        .join("\n");
    }

    function draftRowNumbers(){
      return rows
        .map((row, index) => isRowDraft(row) ? index + 1 : null)
        .filter(Boolean);
    }

    function columnIndex(column){
      return SELECTABLE_COLUMNS.indexOf(column);
    }

    function isValidCell(cell){
      return !!cell && rowIndexById(cell.rowId) >= 0 && columnIndex(cell.column) >= 0;
    }

    function cellsMatch(left, right){
      return !!left && !!right && left.rowId === right.rowId && left.column === right.column;
    }

    function isEditingCell(rowId, column){
      return cellsMatch(editingCell, { rowId, column });
    }

    function selectedBounds(){
      if(!isValidCell(selectionAnchor) || !isValidCell(selectionFocus)) return null;
      const anchorRow = rowIndexById(selectionAnchor.rowId);
      const focusRow = rowIndexById(selectionFocus.rowId);
      const anchorCol = columnIndex(selectionAnchor.column);
      const focusCol = columnIndex(selectionFocus.column);
      return {
        rowStart: Math.min(anchorRow, focusRow),
        rowEnd: Math.max(anchorRow, focusRow),
        colStart: Math.min(anchorCol, focusCol),
        colEnd: Math.max(anchorCol, focusCol),
      };
    }

    function isCellInSelection(rowId, column){
      const bounds = selectedBounds();
      if(!bounds) return false;
      const row = rowIndexById(rowId);
      const col = columnIndex(column);
      return row >= bounds.rowStart && row <= bounds.rowEnd && col >= bounds.colStart && col <= bounds.colEnd;
    }

    function cellValue(row, column){
      if(column === "player") return row.searchValue || row.playerName || "";
      if(column === "discord") return normalizeDiscordId(row.discordId);
      return "";
    }

    function selectedCellsText(){
      const bounds = selectedBounds();
      if(!bounds) return "";
      const copiedRows = [];
      for(let rowIndex = bounds.rowStart; rowIndex <= bounds.rowEnd; rowIndex += 1){
        const row = rows[rowIndex];
        const copiedCells = [];
        for(let colIndex = bounds.colStart; colIndex <= bounds.colEnd; colIndex += 1){
          copiedCells.push(cellValue(row, SELECTABLE_COLUMNS[colIndex]));
        }
        copiedRows.push(copiedCells.join("\t"));
      }
      return copiedRows.join("\n");
    }

    function applySelectionClasses(){
      rowsEl.querySelectorAll(".builder-cell").forEach((cell) => {
        const selected = isCellInSelection(cell.dataset.rowId, cell.dataset.cellColumn);
        const active = cellsMatch(activeCell, {
          rowId: cell.dataset.rowId,
          column: cell.dataset.cellColumn,
        });
        cell.classList.toggle("is-cell-selected", selected);
        cell.classList.toggle("is-cell-active", active);
        cell.classList.toggle("is-cell-editing", isEditingCell(cell.dataset.rowId, cell.dataset.cellColumn));
        cell.setAttribute("aria-selected", selected ? "true" : "false");
      });

      rowsEl.querySelectorAll(".builder-row-number[data-row-id]").forEach((cell) => {
        const rowId = cell.dataset.rowId;
        cell.classList.toggle(
          "is-row-range-selected",
          SELECTABLE_COLUMNS.every(column => isCellInSelection(rowId, column))
        );
      });
    }

    function setCellSelection(anchor, focus = anchor){
      if(!isValidCell(anchor) || !isValidCell(focus)) return;
      selectionAnchor = { ...anchor };
      selectionFocus = { ...focus };
      activeCell = { ...focus };
      editingCell = null;
      hideAllSearchResults();
      applySelectionClasses();
    }

    function selectCell(rowId, column, extend = false){
      const focus = { rowId, column };
      const anchor = extend && isValidCell(selectionAnchor) ? selectionAnchor : focus;
      setCellSelection(anchor, focus);
    }

    function selectRowCells(rowId, extend = false){
      const anchor = extend && isValidCell(selectionAnchor)
        ? selectionAnchor
        : { rowId, column: "player" };
      setCellSelection(anchor, { rowId, column: "discord" });
    }

    function cellFromTarget(target){
      const cell = target.closest?.(".builder-cell[data-row-id][data-cell-column]");
      if(!cell) return null;
      return {
        rowId: cell.dataset.rowId,
        column: cell.dataset.cellColumn,
      };
    }

    function startEditingCell(rowId, column, initialValue = null){
      if(column !== "player") return;
      const row = rows.find(item => item.id === rowId);
      if(!row) return;

      selectionAnchor = { rowId, column };
      selectionFocus = { rowId, column };
      activeCell = { rowId, column };
      editingCell = { rowId, column };

      if(typeof initialValue === "string"){
        row.searchValue = initialValue;
        row.playerName = "";
        row.discordId = "";
        row.selectedPlayerId = "";
        if(rowIndexById(row.id) === rows.length - 1 && !isRowBlank(row)){
          ensureTrailingBlankRow(row.id);
        }else{
          renderRows(row.id);
        }
      }else{
        renderRows(row.id);
      }

      requestAnimationFrame(() => {
        const input = document.getElementById(`player-${rowId}`);
        if(!input) return;
        input.focus();
        const cursorIndex = input.value.length;
        input.setSelectionRange(cursorIndex, cursorIndex);
        void loadMemberSearchRows();
        void updatePlayerSearch(row);
      });
    }

    function stopEditingCell(){
      if(!editingCell) return;
      editingCell = null;
      renderRows();
    }

    function hideAllSearchResults(exceptRowId = ""){
      rowsEl.querySelectorAll(".builder-search-results").forEach((results) => {
        if(results.dataset.rowId === exceptRowId) return;
        results.hidden = true;
        results.style.removeProperty("left");
        results.style.removeProperty("top");
        results.style.removeProperty("width");
        results.style.removeProperty("max-height");
      });
      rowsEl.querySelectorAll(".builder-search-input").forEach((input) => {
        if(input.dataset.rowId === exceptRowId) return;
        input.setAttribute("aria-expanded", "false");
      });
    }

    function positionSearchResults(rowId){
      const input = document.getElementById(`player-${rowId}`);
      const results = document.getElementById(`results-${rowId}`);
      if(!input || !results || results.hidden) return;

      const rect = input.getBoundingClientRect();
      const viewportGap = 10;
      const top = Math.min(rect.bottom + 6, window.innerHeight - viewportGap);
      results.style.left = `${rect.left}px`;
      results.style.top = `${top}px`;
      results.style.width = `${rect.width}px`;
      results.style.maxHeight = `${Math.max(120, window.innerHeight - top - viewportGap)}px`;
    }

    function positionOpenSearchResults(){
      rowsEl.querySelectorAll(".builder-search-results:not([hidden])").forEach((results) => {
        positionSearchResults(results.dataset.rowId);
      });
    }

    function renderSearchResults(row, results, query){
      const resultsEl = document.getElementById(`results-${row.id}`);
      const input = document.getElementById(`player-${row.id}`);
      if(!resultsEl || !input) return;
      resultsEl.replaceChildren();

      if(!query){
        resultsEl.hidden = true;
        resultsEl.style.removeProperty("left");
        resultsEl.style.removeProperty("top");
        resultsEl.style.removeProperty("width");
        resultsEl.style.removeProperty("max-height");
        input.setAttribute("aria-expanded", "false");
        return;
      }

      if(!results.length){
        const empty = document.createElement("p");
        empty.className = "builder-search-empty";
        empty.textContent = "No players found.";
        resultsEl.appendChild(empty);
        resultsEl.hidden = false;
        input.setAttribute("aria-expanded", "true");
        positionSearchResults(row.id);
        return;
      }

      for(const member of results){
        const button = document.createElement("button");
        button.className = "builder-search-result";
        button.type = "button";
        button.dataset.playerId = member.discord_user_id;
        button.dataset.rowId = row.id;

        const avatar = document.createElement("img");
        avatar.className = "builder-search-avatar";
        avatar.src = avatarUrlForMember(member);
        avatar.alt = "";
        avatar.loading = "lazy";
        avatar.decoding = "async";
        avatar.referrerPolicy = "no-referrer";

        const copy = document.createElement("span");
        copy.className = "builder-search-copy";

        const displayName = document.createElement("span");
        displayName.className = "builder-search-display";
        displayName.textContent = displayNameForMember(member);

        const username = document.createElement("span");
        username.className = "builder-search-username";
        username.textContent = normalizeText(member.username) || member.discord_user_id;

        copy.append(displayName, username);
        button.append(avatar, copy);
        resultsEl.appendChild(button);
      }

      resultsEl.hidden = false;
      input.setAttribute("aria-expanded", "true");
      positionSearchResults(row.id);
    }

    async function updatePlayerSearch(row){
      const query = normalizeSearchKey(row.searchValue);
      hideAllSearchResults(row.id);
      if(!query){
        renderSearchResults(row, [], query);
        return;
      }

      try{
        await loadMemberSearchRows();
        renderSearchResults(row, searchResultsFor(query), query);
      }catch(error){
        console.error(error);
        const resultsEl = document.getElementById(`results-${row.id}`);
        const input = document.getElementById(`player-${row.id}`);
        if(!resultsEl || !input) return;
        resultsEl.replaceChildren();
        const empty = document.createElement("p");
        empty.className = "builder-search-empty";
        empty.textContent = "Could not load players.";
        resultsEl.appendChild(empty);
        resultsEl.hidden = false;
        input.setAttribute("aria-expanded", "true");
        positionSearchResults(row.id);
      }
    }

    function createIconButton(label, pathData){
      const button = document.createElement("button");
      button.className = "builder-icon-button";
      button.type = "button";
      button.setAttribute("aria-label", label);
      button.title = label;

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("aria-hidden", "true");
      svg.setAttribute("focusable", "false");
      for(const data of pathData){
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", data);
        svg.appendChild(path);
      }
      button.appendChild(svg);
      return button;
    }

    function renderRows(focusRowId = ""){
      rowsEl.replaceChildren();

      rows.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.dataset.rowId = row.id;
        if(isRowSelected(row)) tr.classList.add("is-selected");

        const numberCell = document.createElement("td");
        numberCell.className = "builder-row-number";
        numberCell.dataset.rowId = row.id;
        const dragHandle = document.createElement("button");
        dragHandle.className = "builder-drag-handle";
        dragHandle.type = "button";
        dragHandle.draggable = true;
        dragHandle.dataset.rowId = row.id;
        dragHandle.setAttribute("aria-label", `Drag row ${index + 1}`);
        dragHandle.title = "Drag to reorder";

        const gripIcon = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        gripIcon.setAttribute("viewBox", "0 0 24 24");
        gripIcon.setAttribute("aria-hidden", "true");
        gripIcon.setAttribute("focusable", "false");
        for(const data of ["M5 7h14", "M5 12h14", "M5 17h14"]){
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", data);
          gripIcon.appendChild(path);
        }

        const rowNumber = document.createElement("span");
        rowNumber.className = "builder-row-index";
        rowNumber.textContent = String(index + 1);
        dragHandle.appendChild(gripIcon);
        numberCell.append(dragHandle, rowNumber);

        const playerCell = document.createElement("td");
        playerCell.className = "builder-player-cell builder-cell";
        playerCell.dataset.rowId = row.id;
        playerCell.dataset.cellColumn = "player";

        const searchWrap = document.createElement("div");
        searchWrap.className = "builder-search";

        const playerInput = document.createElement("input");
        const playerIsEditing = isEditingCell(row.id, "player");
        playerInput.className = "builder-search-input";
        playerInput.id = `player-${row.id}`;
        playerInput.dataset.rowId = row.id;
        playerInput.type = "search";
        playerInput.autocomplete = "off";
        playerInput.spellcheck = false;
        playerInput.readOnly = !playerIsEditing;
        playerInput.tabIndex = playerIsEditing ? 0 : -1;
        playerInput.placeholder = "Search players";
        playerInput.value = row.searchValue || row.playerName;
        playerInput.setAttribute("aria-label", `Search players for row ${index + 1}`);
        playerInput.setAttribute("aria-controls", `results-${row.id}`);
        playerInput.setAttribute("aria-expanded", "false");

        const results = document.createElement("div");
        results.className = "builder-search-results";
        results.id = `results-${row.id}`;
        results.dataset.rowId = row.id;
        results.hidden = true;

        searchWrap.append(playerInput, results);
        playerCell.appendChild(searchWrap);

        const discordCell = document.createElement("td");
        discordCell.className = "builder-discord-cell builder-cell";
        discordCell.dataset.rowId = row.id;
        discordCell.dataset.cellColumn = "discord";
        const discordInput = document.createElement("input");
        discordInput.className = "builder-discord-input";
        discordInput.id = `discord-${row.id}`;
        discordInput.dataset.rowId = row.id;
        discordInput.inputMode = "numeric";
        discordInput.autocomplete = "off";
        discordInput.spellcheck = false;
        discordInput.readOnly = true;
        discordInput.tabIndex = -1;
        discordInput.placeholder = "Select a player";
        discordInput.value = row.discordId;
        discordInput.setAttribute("aria-label", `Discord ID for row ${index + 1}`);

        const clearButton = createIconButton("Clear row", ["M18 6 6 18", "M6 6l12 12"]);
        clearButton.classList.add("builder-row-remove");
        clearButton.dataset.action = "clear";
        clearButton.dataset.rowId = row.id;
        discordCell.append(discordInput, clearButton);

        tr.append(numberCell, playerCell, discordCell);
        rowsEl.appendChild(tr);
      });

      applySelectionClasses();

      if(focusRowId && isEditingCell(focusRowId, "player")){
        requestAnimationFrame(() => {
          document.getElementById(`player-${focusRowId}`)?.focus();
        });
      }
    }

    function rowIndexById(rowId){
      return rows.findIndex(row => row.id === rowId);
    }

    function ensureBlankRowAfter(index){
      const nextRow = rows[index + 1];
      if(nextRow && isRowBlank(nextRow)){
        renderRows(nextRow.id);
        return nextRow.id;
      }
      const newRow = createEmptyRow();
      rows.splice(index + 1, 0, newRow);
      renderRows(newRow.id);
      return newRow.id;
    }

    function ensureTrailingBlankRow(currentRowId = ""){
      const lastRow = rows[rows.length - 1];
      if(!lastRow || isRowBlank(lastRow)) return;
      rows.push(createEmptyRow());
      renderRows(currentRowId);
    }

    function clearRow(rowId){
      const index = rowIndexById(rowId);
      if(index < 0) return;
      if(isRowBlank(rows[index])){
        rows.splice(index, 1);
        renderRows();
        return;
      }
      rows[index] = createEmptyRow();
      renderRows(rows[index].id);
    }

    function clearDropIndicators(){
      rowsEl.querySelectorAll(".is-drop-before, .is-drop-after, .is-dragging").forEach((rowEl) => {
        rowEl.classList.remove("is-drop-before", "is-drop-after", "is-dragging");
      });
    }

    function rowDropPlacement(event, rowEl){
      const rect = rowEl.getBoundingClientRect();
      return event.clientY > rect.top + rect.height / 2 ? "after" : "before";
    }

    function moveRow(dragRowId, targetRowId, placement){
      const fromIndex = rowIndexById(dragRowId);
      let targetIndex = rowIndexById(targetRowId);
      if(fromIndex < 0 || targetIndex < 0 || dragRowId === targetRowId) return;

      const [movedRow] = rows.splice(fromIndex, 1);
      if(fromIndex < targetIndex) targetIndex -= 1;
      if(placement === "after") targetIndex += 1;
      rows.splice(Math.max(0, Math.min(targetIndex, rows.length)), 0, movedRow);
      renderRows(dragRowId);
    }

    function selectPlayer(rowId, playerId){
      const index = rowIndexById(rowId);
      if(index < 0) return;
      const member = memberSearchRows.find(row => row.discord_user_id === playerId);
      if(!member) return;
      rows[index].selectedPlayerId = member.discord_user_id;
      rows[index].playerName = displayNameForMember(member);
      rows[index].searchValue = displayNameForMember(member);
      rows[index].discordId = member.discord_user_id;
      editingCell = null;
      const nextRowId = ensureBlankRowAfter(index);
      selectCell(nextRowId, "player");
      setStatus("");
    }

    rowsEl.addEventListener("focusin", (event) => {
      const input = event.target.closest(".builder-search-input[data-row-id]");
      if(!input) return;
      if(input.readOnly) return;
      const row = rows.find(item => item.id === input.dataset.rowId);
      if(!row) return;
      void loadMemberSearchRows();
      void updatePlayerSearch(row);
    });

    rowsEl.addEventListener("input", (event) => {
      const playerInput = event.target.closest(".builder-search-input[data-row-id]");
      if(playerInput){
        if(playerInput.readOnly) return;
        const row = rows.find(item => item.id === playerInput.dataset.rowId);
        if(!row) return;
        row.searchValue = playerInput.value;
        row.playerName = "";
        row.discordId = "";
        row.selectedPlayerId = "";
        if(rowIndexById(row.id) === rows.length - 1 && !isRowBlank(row)){
          ensureTrailingBlankRow(row.id);
        }
        void updatePlayerSearch(row);
        return;
      }
    });

    rowsEl.addEventListener("pointerdown", (event) => {
      if(event.target.closest(".builder-search-results, .builder-icon-button, .builder-drag-handle")) return;
      const rowNumber = event.target.closest(".builder-row-number[data-row-id]");
      const cell = cellFromTarget(event.target);
      if(!rowNumber && !cell) return;
      if(cell && isEditingCell(cell.rowId, cell.column)) return;

      event.preventDefault();
      const rowId = cell?.rowId || rowNumber.dataset.rowId;
      const column = cell?.column || "row";
      const now = Date.now();
      const isDoubleTap = lastTap.rowId === rowId && lastTap.column === column && now - lastTap.at < 360;
      lastTap = { rowId, column, at: now };

      if(cell && isDoubleTap && !event.shiftKey){
        startEditingCell(cell.rowId, cell.column);
        return;
      }

      if(cell){
        selectCell(cell.rowId, cell.column, event.shiftKey);
        selectionDragMode = "cell";
      }else{
        selectRowCells(rowNumber.dataset.rowId, event.shiftKey);
        selectionDragMode = "row";
      }

      isSelectingCells = true;
    });

    rowsEl.addEventListener("pointerover", (event) => {
      if(!isSelectingCells) return;
      if(selectionDragMode === "cell"){
        const cell = cellFromTarget(event.target);
        if(cell) selectCell(cell.rowId, cell.column, true);
        return;
      }

      const rowNumber = event.target.closest(".builder-row-number[data-row-id]");
      const row = rowNumber || event.target.closest("tr[data-row-id]");
      if(row?.dataset?.rowId) selectRowCells(row.dataset.rowId, true);
    });

    rowsEl.addEventListener("dblclick", (event) => {
      const cell = cellFromTarget(event.target);
      if(!cell || event.target.closest(".builder-search-results, .builder-icon-button, .builder-drag-handle")) return;
      event.preventDefault();
      startEditingCell(cell.rowId, cell.column);
    });

    rowsEl.addEventListener("click", (event) => {
      const result = event.target.closest(".builder-search-result[data-player-id][data-row-id]");
      if(result){
        selectPlayer(result.dataset.rowId, result.dataset.playerId);
        return;
      }

      const actionButton = event.target.closest(".builder-icon-button[data-action][data-row-id]");
      if(!actionButton) return;
      if(actionButton.dataset.action === "clear") clearRow(actionButton.dataset.rowId);
    });

    rowsEl.addEventListener("dragstart", (event) => {
      const handle = event.target.closest(".builder-drag-handle[data-row-id]");
      if(!handle) return;
      draggedRowId = handle.dataset.rowId;
      hideAllSearchResults();
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedRowId);
      handle.closest("tr")?.classList.add("is-dragging");
    });

    rowsEl.addEventListener("dragover", (event) => {
      const rowEl = event.target.closest("tr[data-row-id]");
      if(!draggedRowId || !rowEl || rowEl.dataset.rowId === draggedRowId) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      rowsEl.querySelectorAll(".is-drop-before, .is-drop-after").forEach((el) => {
        el.classList.remove("is-drop-before", "is-drop-after");
      });
      rowEl.classList.add(rowDropPlacement(event, rowEl) === "after" ? "is-drop-after" : "is-drop-before");
    });

    rowsEl.addEventListener("dragleave", (event) => {
      if(rowsEl.contains(event.relatedTarget)) return;
      clearDropIndicators();
    });

    rowsEl.addEventListener("drop", (event) => {
      const rowEl = event.target.closest("tr[data-row-id]");
      if(!draggedRowId || !rowEl) return;
      event.preventDefault();
      const targetRowId = rowEl.dataset.rowId;
      const placement = rowDropPlacement(event, rowEl);
      clearDropIndicators();
      moveRow(draggedRowId, targetRowId, placement);
      draggedRowId = "";
    });

    rowsEl.addEventListener("dragend", () => {
      draggedRowId = "";
      clearDropIndicators();
    });

    document.addEventListener("click", (event) => {
      if(rowsEl.contains(event.target)) return;
      hideAllSearchResults();
    });

    document.addEventListener("pointerup", () => {
      isSelectingCells = false;
      selectionDragMode = "";
    });

    document.addEventListener("copy", (event) => {
      const target = event.target;
      if(target?.matches?.(".builder-search-input:not([readonly])")) return;
      if(!selectedBounds()) return;
      const text = selectedCellsText();
      event.preventDefault();
      event.clipboardData?.setData("text/plain", text);
      setStatus("Selected cells copied.", "success");
    });

    document.addEventListener("keydown", (event) => {
      const target = event.target;
      if(target?.matches?.(".builder-search-input:not([readonly])")){
        if(event.key === "Escape"){
          event.preventDefault();
          stopEditingCell();
        }
        return;
      }

      if(!isValidCell(activeCell)) return;
      const isShortcut = event.metaKey || event.ctrlKey;
      if(isShortcut || event.altKey) return;

      const currentRow = rowIndexById(activeCell.rowId);
      const currentCol = columnIndex(activeCell.column);
      let nextRow = currentRow;
      let nextCol = currentCol;

      if(event.key === "ArrowUp") nextRow -= 1;
      else if(event.key === "ArrowDown") nextRow += 1;
      else if(event.key === "ArrowLeft") nextCol -= 1;
      else if(event.key === "ArrowRight") nextCol += 1;
      else if(event.key === "Enter" || event.key === "F2"){
        event.preventDefault();
        startEditingCell(activeCell.rowId, activeCell.column);
        return;
      }else if(event.key.length === 1){
        event.preventDefault();
        startEditingCell(activeCell.rowId, activeCell.column, event.key);
        return;
      }else{
        return;
      }

      event.preventDefault();
      nextRow = Math.max(0, Math.min(nextRow, rows.length - 1));
      nextCol = Math.max(0, Math.min(nextCol, SELECTABLE_COLUMNS.length - 1));
      selectCell(rows[nextRow].id, SELECTABLE_COLUMNS[nextCol], event.shiftKey);
    });

    window.addEventListener("resize", positionOpenSearchResults);
    window.addEventListener("scroll", positionOpenSearchResults, true);

    addRowBtn.addEventListener("click", () => {
      const newRow = createEmptyRow();
      rows.push(newRow);
      selectionAnchor = { rowId: newRow.id, column: "player" };
      selectionFocus = { rowId: newRow.id, column: "player" };
      activeCell = { rowId: newRow.id, column: "player" };
      editingCell = null;
      renderRows(newRow.id);
    });

    copyCsvBtn.addEventListener("click", async () => {
      const draftRows = draftRowNumbers();
      if(draftRows.length){
        setStatus(`Select a player from the dropdown for row${draftRows.length === 1 ? "" : "s"} ${draftRows.join(", ")} before copying.`, "error");
        return;
      }

      const csv = exportRows();
      try{
        await navigator.clipboard.writeText(csv);
        setStatus("CSV copied.", "success");
      }catch{
        setStatus("Unable to copy CSV from this browser.", "error");
      }
    });

    copyDiscordColumnBtn.addEventListener("click", async () => {
      const draftRows = draftRowNumbers();
      if(draftRows.length){
        setStatus(`Select a player from the dropdown for row${draftRows.length === 1 ? "" : "s"} ${draftRows.join(", ")} before copying.`, "error");
        return;
      }

      try{
        await navigator.clipboard.writeText(exportDiscordIdColumn());
        setStatus("Discord ID column copied.", "success");
      }catch{
        setStatus("Unable to copy Discord ID column from this browser.", "error");
      }
    });

    loginBtn.addEventListener("click", async () => {
      setStatus("Opening Discord login...");
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "discord",
        options: { redirectTo: buildAuthRedirectTo("/build.html") },
      });
      if(error) setStatus(error.message || "Unable to start Discord login.", "error");
    });

    async function initialize(){
      const { data: sessionData } = await supabase.auth.getSession();
      if(!sessionData?.session?.user){
        loginActions.hidden = false;
        setStatus("Log in with Discord to build player lists.");
        return;
      }

      const { data: userData, error: userError } = await supabase.auth.getUser();
      if(userError) throw userError;
      const profile = await loadProfileForUser(userData.user);
      const discordId = normalizeDiscordId(profile?.discord_user_id) || getDiscordIdFromUser(userData.user);
      const isAdmin = await playerHasAdminRole(discordId);

      if(!isAdmin){
        builderPanel.hidden = true;
        setStatus("Your Discord account does not have the administrator role.", "error");
        return;
      }

      builderPanel.hidden = false;
      renderRows();
      setStatus("");
    }

    initialize().catch(error => {
      console.error(error);
      setStatus(error?.message || "Unable to load player list builder.", "error");
    });
  </script>
</body>
</html>
